    "lark",                                        # geometry: IDS/selector parsing-grammar engine; pure Python, cp315-clean
    "pystac",                                      # data: STAC item/collection object model; pure Python
    "pystac-client",                               # data: STAC API search/discovery client; pure Python
    "stac-geoparquet",                             # data: STAC item GeoParquet table interchange; pure Python
    "array-api-compat",                            # compute: array API portability shim
    "array-api-extra",                             # compute: supplemental array API helpers
    "mpmath",                                      # compute: arbitrary-precision real and complex math
