chat:
    art: false
    allow_non_org_members: true
    auto_reply: true
    integrations:
        jira:
            usage: disabled
        linear:
            usage: disabled
knowledge_base:
    opt_out: false
    web_search:
        enabled: true
    code_guidelines:
        enabled: true
        filePatterns:
            - "README.md"
            - "docs/laws/*.md"
            - "docs/standards/*.md"
            - "docs/stacks/*.md"
            - "docs/stacks/*/README.md"
            - files: "libs/.planning/campaign-method.md"
              applyTo: "libs/**"
    learnings:
        scope: local
        approval_delay: 0
    issues:
        scope: local
    jira:
        usage: disabled
    linear:
        usage: disabled
    pull_requests:
        scope: local
    mcp:
        usage: auto
    automatic_repository_linking: false
    linked_repositories:
        - repository: bsamiee/Parametric_Forge
          instructions: >-
            Machine owner for shell, PATH, provisioning, and launcher rails the Rasm toolchain rides; harness skill masters mirror between the repos — flag divergence in mirrored surfaces.
        - repository: bsamiee/Maghz
          instructions: >-
            Sibling consumer of the shared stack doctrine and mirrored skills; doctrine changes here ripple to its copied stack law.
issue_enrichment:
    auto_enrich:
        enabled: true
    planning:
        enabled: false
    labeling:
        auto_apply_labels: false
