  nx: true
  protobufjs: true
  sharp: true
  ssh2: true
  unrs-resolver: true
  '@pulumi/docker-build': true
  cbor-extract: true

preferWorkspacePackages: true

saveExact: true

strictSsl: true

verifyDepsBeforeRun: warn

