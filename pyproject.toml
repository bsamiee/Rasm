[project]
name = "workspace-foundation-python"
version = "0.1.0"
requires-python = ">=3.15"
dependencies = [
    "anyio>=4.14.0",
    "protobuf>=6.33,<7.0",       # runtime transport wire codec; capped <7.0 by opentelemetry-proto (no OTel release admits protobuf 7.x yet); lift the cap when it does. cp310-abi3+py3-none-any => cp315-clean
    "grpcio>=1.81",              # runtime: gRPC transport (server/serve ServerHost); resolves on cp315, already transitive core via google-cloud-storage
    "findiff>=0.13.1; python_version<'3.15'", # compute finite-difference floor for solvers/sensitivity; gated by transitive scipy CPython 3.15 wheel lag
    "beartype>=0.22.2",
    "cyclopts>=4.18.0",
    "msgspec>=0.21.1",
    "opentelemetry-api>=1.41.1",
    "opentelemetry-exporter-otlp-proto-http>=1.41.1",
    "opentelemetry-sdk>=1.41.1",
    "opentelemetry-instrumentation-grpc>=0.62b0",  # runtime: gRPC server/client span instrumentation for server/serve
    "pydantic>=2.13.4",
    "pydantic-settings>=2.14.1",
    "expression>=5.6.0",
    "stamina>=26.1.0",
    "structlog>=26.1.0",
    "psutil>=7.2.2",
    "fsspec>=2026.6.0",
    "s3fs>=2026.6.0",             # data: S3 fsspec backend for shared-pull artifact reads
    "gcsfs>=2026.6.0",            # data: GCS fsspec backend for shared-pull artifact reads
    "obstore>=0.10.1",            # data: abi3 object_store backend while cloud-storage wheels lag on CPython 3.15
    "httpx>=0.28.1",              # transport: approved HTTP client surface for typed adapters
    "watchfiles>=1.2.0",
    "apscheduler>=3.11.2",        # runtime: cron, interval, and date triggers (sole cron owner; aiocron purged)
    "universal-pathlib>=0.3.10",  # data: UPath storage_options/protocol resolution for the fsspec artifact store
    "asyncssh>=2.23.1",
    "tree-sitter>=0.25.2",
    "tree-sitter-python>=0.25.0",
    "tree-sitter-typescript>=0.23.2",
    "keyring",                    # runtime: OS keychain credential boundary; never probe unattended
    "zstandard>=0.23.0",          # tooling: zstd compression for the tools.assay logging/cache rail; root-tool dependency, always available
]

[dependency-groups]
dev = [
    "coverage>=7.14.1",
    "dirty-equals",
    "hypothesis>=6.155.3",
    "inline-snapshot",
    "moto[server]>=5.2.2",
    "mypy>=2.1.0",
    "pytest>=9.1.0",
    "pytest-benchmark>=5.2.3",
    "pytest-cov>=7.1.0",
    "pytest-deadfixtures>=3.1.0",
    "pytest-randomly>=4.1.0",
    "pytest-socket>=0.8.0",
    "pytest-timeout>=2.4.0",
    "pytest-xdist>=3.8.0",
    "ruff>=0.15.17,<0.16",
    "squawk-cli>=2.58.0",
    "ty>=0.0.50",
    "types-psutil>=7.2.2.20260518",
    "validate-pyproject[all]",
]
mutation = ["mutmut>=3.6.0"]
scientific = [
    "adbc-driver-manager",                         # data: ADBC driver manager for Arrow Flight SQL and DuckDB; Cython source-build on CPython 3.15
    "arro3-core>=0.8.1",                           # data: abi3 Arrow core bridge while pyarrow CPython 3.15 support stabilizes
    "arviz>=1.2.0; python_version<'3.15'",         # compute: Bayesian diagnostics; gated by scipy/Pythran CPython 3.15 lag
    "awkward>=2.9.1",                              # data: ragged arrays; pure Python
    "compas>=2.15.1; python_version<'3.15'",       # geometry: algebra toolkit; gated by scipy-family CPython 3.15 lag
    "connectorx>=0.4.5; python_version<'3.15'",    # data: SQL-to-Arrow loader; Rust/maturin lacks CPython 3.15 wheel
    "cubed>=0.28.0",                               # data: bounded-memory distributed arrays; pure Python
    "dask",
    "deltalake",                                   # data: lakehouse tables; abi3 wheel on CPython 3.15
    "duckdb",                                      # data: analytical SQL engine; source-builds on CPython 3.15
    "geopandas",                                   # geometry: geospatial frames; source-build via Parametric_Forge scientific toolchain
    "h5py>=3.16.0",                                # data: HDF5 arrays; source-build via Parametric_Forge HDF5 toolchain
    "icechunk>=2.0.6; python_version<'3.15'",      # data: versioned tensor store; Rust pyo3 lacks CPython 3.15 wheel
    "ibis-framework>=12.0.0",                      # data: backend-agnostic SQL-expression IR
    "jax>=0.10.1; python_version<'3.15'",          # compute: XLA accelerator; jaxlib lacks CPython 3.15 wheel
    "laspy>=2.7.0",                                # geometry: LAS/LAZ point-cloud IO; pure Python
    "meshio",
    "nanoarrow>=0.8.0",                            # data: Arrow C-data interop; meson/Cython source-build
    "narwhals>=2.22.1",                            # data: dataframe-agnostic API; pure Python
    "netcdf4>=1.7.4",                              # compute: CFD and field IO; source-build via Parametric_Forge netCDF toolchain
