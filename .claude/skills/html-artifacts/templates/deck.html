<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<!-- replace: page title -->
<title>Deck: Collapsing the Shape Surface</title>
<style>
/* --- [DESIGN_SYSTEM_BASELINE] --- verbatim across templates; edit token values only */
@layer reset,tokens,base,components,utilities,print,overrides;
@layer reset{
*,*::before,*::after{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}body{margin:0}img,svg{max-width:100%;height:auto}
}
@layer tokens{
:root{
  color-scheme:light;
  --bg:#FFFBEB;--surface:#ECE9DF;--raised:#EFEDDC;--line:#DEDCCF;--text:#1F1F1F;--muted:#6C664B;
  --accent:#644AC9;--accent-muted:#815CD6;--ok:#14710A;--warn:#A34D14;--fail:#CB3A2A;--info:#036A96;
  --s1:4px;--s2:8px;--s3:12px;--s4:16px;--s5:24px;--s6:32px;
  --f0:12px;--f1:13.5px;--f2:15px;--f3:18px;--f4:24px;--f5:32px;
  --r1:6px;--r2:10px;--r3:14px;--measure:1100px;
  --shadow-1:0 1px 2px rgba(0,0,0,.06);--shadow-2:0 4px 16px rgba(0,0,0,.10);
  --font-sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --font-mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
@media (prefers-color-scheme:dark){:root:not([data-theme]){
  color-scheme:dark;
  --bg:#282A36;--surface:#21222C;--raised:#343746;--line:#44475A;--text:#F8F8F2;--muted:#6272A4;
  --accent:#BD93F9;--accent-muted:#815CD6;--ok:#50FA7B;--warn:#FFB86C;--fail:#FF5555;--info:#8BE9FD;
  --shadow-1:0 1px 2px rgba(0,0,0,.4);--shadow-2:0 8px 24px rgba(0,0,0,.5);
}}
:root[data-theme="dark"]{
  color-scheme:dark;
  --bg:#282A36;--surface:#21222C;--raised:#343746;--line:#44475A;--text:#F8F8F2;--muted:#6272A4;
  --accent:#BD93F9;--accent-muted:#815CD6;--ok:#50FA7B;--warn:#FFB86C;--fail:#FF5555;--info:#8BE9FD;
  --shadow-1:0 1px 2px rgba(0,0,0,.4);--shadow-2:0 8px 24px rgba(0,0,0,.5);
}
:root[data-theme="light"]{
  color-scheme:light;
  --bg:#FFFBEB;--surface:#ECE9DF;--raised:#EFEDDC;--line:#DEDCCF;--text:#1F1F1F;--muted:#6C664B;
  --accent:#644AC9;--accent-muted:#815CD6;--ok:#14710A;--warn:#A34D14;--fail:#CB3A2A;--info:#036A96;
  --shadow-1:0 1px 2px rgba(0,0,0,.06);--shadow-2:0 4px 16px rgba(0,0,0,.10);
}
}
@layer base{
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:var(--f2);line-height:1.55;overflow-x:hidden}
.wrap{max-width:var(--measure);margin:0 auto;padding:var(--s5) var(--s4)}
h1{font-size:var(--f5);line-height:1.15;margin:0 0 var(--s3)}
h2{font-size:var(--f4);line-height:1.2;margin:var(--s6) 0 var(--s3)}
h3{font-size:var(--f3);margin:var(--s5) 0 var(--s2)}
h1,h2,h3{text-wrap:balance}
p,li{text-wrap:pretty}
.num{font-variant-numeric:tabular-nums}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
p{margin:0 0 var(--s3)}.muted{color:var(--muted)}small{font-size:var(--f1);color:var(--muted)}
hr{border:0;border-top:1px solid var(--line);margin:var(--s5) 0}
button,select,input,textarea{font:inherit;color:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
}
@layer components{
.card{background:var(--raised);border:1px solid var(--line);border-radius:var(--r2);padding:var(--s4);box-shadow:var(--shadow-1)}
.grid{display:grid;gap:var(--s4);grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.chip{display:inline-flex;align-items:center;gap:var(--s1);font-family:var(--font-mono);font-size:var(--f0);font-weight:600;letter-spacing:.02em;text-transform:uppercase;padding:2px var(--s2);border-radius:999px;border:1px solid var(--line);color:var(--muted);background:var(--surface)}
.chip::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor}
.chip.ok{color:var(--ok);border-color:color-mix(in srgb,var(--ok) 40%,transparent);background:color-mix(in srgb,var(--ok) 12%,transparent)}
.chip.warn{color:var(--warn);border-color:color-mix(in srgb,var(--warn) 40%,transparent);background:color-mix(in srgb,var(--warn) 12%,transparent)}
.chip.fail{color:var(--fail);border-color:color-mix(in srgb,var(--fail) 40%,transparent);background:color-mix(in srgb,var(--fail) 12%,transparent)}
.chip.info{color:var(--info);border-color:color-mix(in srgb,var(--info) 40%,transparent);background:color-mix(in srgb,var(--info) 12%,transparent)}
.kbd{font-family:var(--font-mono);font-size:var(--f0);padding:1px 6px;border:1px solid var(--line);border-bottom-width:2px;border-radius:var(--r1);background:var(--surface)}
.toc{position:sticky;top:var(--s4);align-self:start;font-size:var(--f1)}
.toc a{display:block;padding:var(--s1) var(--s2);color:var(--muted);border-left:2px solid var(--line)}
.toc a:hover{color:var(--text);border-left-color:var(--accent);text-decoration:none}
.meter{height:8px;border-radius:999px;background:var(--surface);overflow:hidden}
.meter>span{display:block;height:100%;background:var(--accent)}
.twrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r2)}
table{border-collapse:collapse;width:100%;font-size:var(--f1)}
th,td{text-align:left;padding:var(--s2) var(--s3);border-bottom:1px solid var(--line);vertical-align:top}
th{background:var(--surface);font-weight:600}tr:last-child td{border-bottom:0}
code{font-family:var(--font-mono);font-size:.9em;background:var(--surface);padding:1px 5px;border-radius:var(--r1)}
pre{overflow-x:auto;background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);padding:var(--s4);font-size:var(--f1);line-height:1.5}
pre code{background:none;padding:0}
.btn{font-size:var(--f1);padding:var(--s2) var(--s3);border:1px solid var(--line);border-radius:var(--r1);background:var(--surface);cursor:pointer}
.btn:hover{border-color:var(--accent)}
input,select,textarea{background:var(--bg);border:1px solid var(--line);border-radius:var(--r1);padding:var(--s2)}
}
@layer print{
@media print{
  :root{
    color-scheme:light;
    --bg:#fff;--surface:#ECE9DF;--raised:#fff;--line:#DEDCCF;--text:#1F1F1F;--muted:#6C664B;
    --accent:#644AC9;--accent-muted:#815CD6;--ok:#14710A;--warn:#A34D14;--fail:#CB3A2A;--info:#036A96;
    --shadow-1:none;--shadow-2:none;
  }
  @page{margin:14mm}
  .toc,.no-print,.btn,button{display:none!important}
  details>*{display:block!important}
  .card{box-shadow:none}
  .card,tr,pre,figure{break-inside:avoid}
  body,.twrap,pre{overflow:visible}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
}
@layer overrides{
@media (forced-colors:active){
  :root{--bg:Canvas;--surface:Canvas;--raised:Canvas;--text:CanvasText;--muted:CanvasText;--accent:Highlight;--line:CanvasText}
  *{box-shadow:none!important;text-shadow:none!important}
}
}
/* --- [DECK_LOCAL] --- appends into the floor's named layers; the floor owns the order */
@layer tokens{
  :root{--dur:0ms;--ease:cubic-bezier(.16,1,.3,1);--slide-lead:clamp(1.75rem,1.2rem + 3cqi,2.9rem)}
  @media (prefers-reduced-motion:no-preference){:root{--dur:180ms}}
}
@layer components{
  @property --lift{syntax:"<number>";inherits:false;initial-value:0}
  .skip{position:absolute;left:-9999px}
  .skip:focus{left:var(--s4);top:var(--s4);position:fixed;z-index:5;background:var(--raised);padding:var(--s2) var(--s3);border:1px solid var(--line);border-radius:var(--r1)}
  .deckbar{display:flex;flex-wrap:wrap;align-items:center;gap:var(--s3);justify-content:space-between;position:sticky;top:0;z-index:3;background:var(--bg);padding:var(--s3) 0;border-bottom:1px solid var(--line)}
  .deckbar__title{display:flex;align-items:center;gap:var(--s2)}
  .controls{display:flex;flex-wrap:wrap;align-items:center;gap:var(--s2)}
  #counter{min-width:5ch;text-align:center;color:var(--muted)}
  .exportbar{display:flex;flex-wrap:wrap;align-items:center;gap:var(--s2);margin-block:var(--s5);padding:var(--s2) var(--s3);background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);font-size:var(--f0)}
  .exportbar .btn{font-size:var(--f0);padding:2px var(--s2)}
  .egress-meta{color:var(--muted);font-size:var(--f1)}
  .egress-label{display:flex;flex-direction:column;gap:var(--s1);flex:1 1 240px;font-size:var(--f1);color:var(--muted)}
  #egress{inline-size:100%;resize:vertical;font-family:var(--font-mono);font-size:var(--f0)}
  .stage{container:stage / inline-size;display:grid;align-content:center;min-block-size:60vh;padding:var(--s6) var(--s5);background:var(--raised);border:1px solid var(--line);border-radius:var(--r3);box-shadow:var(--shadow-2)}
  .slide{display:none;padding:var(--s3) 0}
  .slide.active{display:block}
  .slide__lead{font-size:var(--slide-lead);line-height:1.08;margin:0 0 var(--s3)}
  .slide__body>*+*{margin-block-start:var(--s4)}
  .slide__list{margin:0;padding-inline-start:var(--s5)}
  .slide__list li{margin:var(--s1) 0}
  .chip-line{display:flex;flex-wrap:wrap;gap:var(--s2);margin:0}
  .chip__mark{font-weight:700}
  .dwarn{margin:0 0 var(--s3)}
  .stat{display:grid;gap:var(--s3);grid-template-columns:1fr}
  @container stage (inline-size >= 34rem){.stat{grid-template-columns:repeat(3,1fr)}}
  .stat__cell{--lift:0;transform:translateY(calc(var(--lift) * -1 * var(--s1)));transition:--lift var(--dur) var(--ease)}
  .stat__cell:hover{--lift:1}
  .stat__cell .n{font-size:var(--f4);display:block}
  .capture{margin-block-start:var(--s5);display:grid;gap:var(--s3);grid-template-columns:1fr;padding:var(--s3);border:1px solid var(--line);border-radius:var(--r2);background:color-mix(in oklch,var(--raised),var(--accent) 0%);transition:background-color var(--dur) var(--ease),border-color var(--dur) var(--ease)}
  .capture:has(select:focus-visible),.capture:has(textarea:focus-visible){background:color-mix(in oklch,var(--raised),var(--accent) 8%);border-color:var(--accent)}
  @container stage (inline-size >= 34rem){.capture{grid-template-columns:max-content 1fr;align-items:start}}
  .capture__field{display:flex;flex-direction:column;gap:var(--s1);font-size:var(--f1);color:var(--muted)}
  .capture textarea{inline-size:100%;resize:vertical}
  .speaker{margin-block-start:var(--s5);padding:var(--s3);border-inline-start:3px solid var(--accent-muted);background:var(--surface);border-radius:0 var(--r1) var(--r1) 0;font-size:var(--f1);color:var(--text)}
  body[data-mode="present"] .speaker{display:none}
  #toast{position:fixed;inset:auto var(--s4) var(--s4) auto;margin:0;padding:var(--s2) var(--s3);border:1px solid var(--line);border-radius:var(--r2);background:var(--raised);box-shadow:var(--shadow-2);color:var(--text)}
}
@layer print{
@media print{
  .deckbar,.exportbar,.capture,.skip{display:none!important}
  .stage{display:block;min-block-size:0;padding:0;border:0;box-shadow:none;background:none}
  .slide,.slide.active{display:block!important;min-block-size:0;break-inside:avoid;break-after:page;border-bottom:1px solid var(--line);padding:var(--s5) 0}
  .slide:last-child{break-after:auto}
  .speaker{display:block!important}
  .stat{grid-template-columns:repeat(3,1fr)}
}
}
@layer overrides{
  body[data-mode="notes"] .speaker{display:block}
}
</style>
</head>
<body data-mode="present">
<a class="skip" href="#deck-main">Skip to slides</a>
<div class="wrap">
  <header class="deckbar no-print">
    <!-- replace: deck title -->
    <div class="deckbar__title"><strong>Collapsing the Shape Surface</strong> <span class="chip info">[CASE]</span></div>
    <div class="controls">
      <button type="button" class="btn" data-nav="-1" aria-label="Previous slide">Prev</button>

      <button type="button" class="btn" data-toggle-theme>Theme</button>
    </div>
  </header>
  <div class="exportbar no-print">
    <button type="button" class="btn" data-export="md">Copy outline</button>

    <span class="egress-meta num" id="egress-meta">0 flagged, 0 copied</span>
    <label class="egress-label">Exported payload
      <textarea id="egress" readonly rows="3"></textarea>
    </label>
  </div>
  <main id="deck-main" tabindex="-1" class="stage"></main>
</div>
<output id="toast" popover="manual" aria-live="polite"></output>
<!-- replace: deck model payload -->
<script type="application/json" id="payload">{"meta":{"title":"Collapsing the Shape Surface","date":"2026-07-06","owner":"Platform / Shape owner"},"slides":[{"id":"sl-title","kind":"title","title":"Collapsing the Shape Surface","speaker":"Set the frame: this is a density decision, not a rewrite. The room owns the call sites.","blocks":[{"type":"paragraph","text":"One polymorphic owner replaces five parallel exports."}]},{"id":"sl-context","kind":"context","title":"Context","speaker":"Anchor the cost in the reviewers' own diffs: the last two modalities each touched all five sites.","blocks":[{"type":"paragraph","text":"The Shape concept ships five entry points, each re-deriving the same routing and boundary mapping."},{"type":"list","items":["Every new modality has added a sibling export, not a row.","Boundary translation is duplicated across three of the five.","Callers pick an entry by name, so arity leaks into the call site."]}]},{"id":"sl-evidence","kind":"evidence","title":"Evidence","speaker":"The minus figure is surface, not capability; every modality stays reachable through one door.","blocks":[{"type":"stat-row","stats":[{"n":"5 to 1","label":"public entry points"},{"n":"-214","label":"net lines of surface"},{"n":"1","label":"boundary mapping site"}]},{"type":"list","items":["get_primary folds into the request arity.","get_many and list collapse to one batch shape.","find and search discriminate on a filter value.","Boundary mapping runs once at ingress."]},{"type":"paragraph","text":"Arity, filter, and provider move into the request shape; the owner dispatches on a closed vocabulary."},{"type":"chip-line","chips":[{"tone":"info","mark":"[MEASURED]","text":"surface delta from the branch"},{"tone":"ok","mark":"[REACHABLE]","text":"every modality preserved"}]}]},{"id":"sl-decision","kind":"decision","title":"Decision","speaker":"Name what is out of scope: the wire format is unchanged, so no downstream service moves this quarter.","blocks":[{"type":"chip-line","chips":[{"tone":"ok","mark":"[DECIDED]","text":"merge five exports into Shape.dispatch(req)"},{"tone":"info","mark":"[BOUNDARY]","text":"PRIMARY maps once at ingress"}]},{"type":"paragraph","text":"The owner discriminates on req.arity against a bounded vocabulary; internals read canonical names only."}]},{"id":"sl-asks","kind":"asks","title":"Asks","speaker":"Close on the Friday date and the one named owner; leave with a commitment, not a discussion.","blocks":[{"type":"list","items":["Approve the single-entry dispatch shape by Friday.","One reviewer owns the call-site migration audit.","Confirm the arity vocabulary is closed, no runtime-supplied kinds."]}]}]}</script>
<script>
const $ = (sel, root = document) => root.querySelector(sel);
const el = (tag, cls, txt) => { const n = document.createElement(tag); if (cls) n.className = cls; if (txt != null) n.textContent = txt; return n; };
const themeKey = "theme:" + document.title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
const root = document.documentElement;
try { root.dataset.theme = localStorage.getItem(themeKey) ?? "dark"; } catch { root.dataset.theme = "dark"; }

// --- model -> derived state
const model = JSON.parse($("#payload").textContent);
const BUDGET = 6;
const blockWeight = { paragraph: () => 1, list: b => b.items.length, "stat-row": b => b.stats.length, "chip-line": b => b.chips.length };
const slideWeight = s => s.blocks.reduce((w, b) => w + blockWeight[b.type](b), 0);
const state = {
  meta: model.meta,
  slides: model.slides.map(s => { const weight = slideWeight(s); return { ...s, weight, over: weight > BUDGET }; }),
  captures: Object.fromEntries(model.slides.map(s => [s.id, { flag: "none", note: "", exported: false }])),
  copies: 0,
};

// --- typed block renderer
const chipNode = (tone, mark, text) => { const c = el("span", "chip " + tone); c.append(el("span", "chip__mark", mark), document.createTextNode(" " + text)); return c; };
const renderBlock = b => {
  if (b.type === "paragraph") return el("p", null, b.text);
  if (b.type === "list") { const ul = el("ul", "slide__list"); b.items.forEach(i => ul.append(el("li", null, i))); return ul; }
  if (b.type === "stat-row") { const d = el("div", "stat"); b.stats.forEach(s => { const cell = el("div", "card stat__cell"); cell.append(el("span", "n num", s.n), el("small", null, s.label)); d.append(cell); }); return d; }
  const p = el("p", "chip-line"); b.chips.forEach(c => p.append(chipNode(c.tone, c.mark, c.text))); return p;
};

// --- slide projection
const stage = $("#deck-main");
const renderSlide = (s, i) => {
  const sec = el("section", "slide" + (i === 0 ? " active" : ""));
  sec.id = s.id; sec.dataset.kind = s.kind;
  sec.setAttribute("aria-label", `Slide ${i + 1}: ${s.title}`);
  sec.append(s.kind === "title" ? el("h1", "slide__lead", s.title) : el("h2", null, s.title));
  if (s.over) { const w = el("p", "dwarn"); w.append(chipNode("warn", "[DENSE]", `${s.weight} units over the ${BUDGET}-unit budget, split this slide`)); sec.append(w); }
  const body = el("div", "slide__body"); s.blocks.forEach(b => body.append(renderBlock(b))); sec.append(body);
  const cap = el("div", "capture no-print");
  const fl = el("label", "capture__field"); fl.append(el("span", null, "Flag"));
  const sel = el("select"); sel.dataset.flag = s.id;
  [["none", "none"], ["question", "question"], ["objection", "objection"]].forEach(([v, t]) => { const o = el("option", null, t); o.value = v; sel.append(o); });
  fl.append(sel);
  const nl = el("label", "capture__field"); nl.append(el("span", null, "Note"));
  const ta = el("textarea"); ta.dataset.note = s.id; ta.rows = 2; ta.placeholder = "Reader note for this slide"; nl.append(ta);
  cap.append(fl, nl); sec.append(cap);
  const aside = el("aside", "speaker", s.speaker); aside.setAttribute("aria-label", `Speaker aside ${i + 1}`); sec.append(aside);
  return sec;
};
state.slides.forEach((s, i) => stage.append(renderSlide(s, i)));

// --- nav state machine + guarded view transition + hash restore
const counter = $("#counter");
const swap = document.startViewTransition ? cb => document.startViewTransition(cb) : cb => cb();
const clamp = n => Math.max(0, Math.min(state.slides.length - 1, n));
const fromHash = () => clamp((parseInt(location.hash.slice(1), 10) || 1) - 1);
let index = fromHash();
const paint = () => { [...stage.querySelectorAll(".slide")].forEach((s, i) => s.classList.toggle("active", i === index)); counter.textContent = `${index + 1} / ${state.slides.length}`; };
const show = next => { const t = clamp(next); if (t === index) return; index = t; try { history.replaceState(null, "", "#" + (index + 1)); } catch { /* file:// hash write is best-effort */ } swap(paint); };
addEventListener("hashchange", () => { index = fromHash(); paint(); });
paint();

// --- capture, annotations, export meta
const flagged = () => state.slides.filter(s => { const c = state.captures[s.id]; return c.flag !== "none" || c.note.trim(); });
const annotations = () => flagged().map(s => { const c = state.captures[s.id]; return { id: "a-" + s.id, itemId: s.id, intent: c.flag === "none" ? "comment" : c.flag, status: c.exported ? "exported" : "active", text: c.note.trim() }; });
const meta = $("#egress-meta");
const flaggedBtn = $('[data-export="flagged"]');
const refreshMeta = () => { const f = flagged().length; meta.textContent = `${f} flagged, ${state.copies} copied`; flaggedBtn.disabled = f === 0; };
refreshMeta();

// --- dual export from one state graph
const kindTag = k => "[" + k.toUpperCase() + "]";
const toEnvelope = () => ({
  kind: "deck", version: 1,
  artifact: { id: "deck." + themeKey.slice(6), title: state.meta.title, baseline: "b-" + state.slides.length },
  decision: { status: flagged().length ? "approve_with_notes" : "comment", at: new Date().toISOString() },
  decisions: [], changes: [], annotations: annotations(),
  state: { outline: state.slides.map((s, i) => ({ id: s.id, kind: s.kind, title: s.title, order: i + 1, weight: s.weight, over: s.over })) },
});
const validate = env => env.kind === "deck" && !!env.artifact?.id && Array.isArray(env.annotations) && typeof env.decision?.at === "string";
const toMarkdown = () => {
  const L = [`# Deck: ${state.meta.title}`, "", `Owner: ${state.meta.owner}, ${state.meta.date}, ${state.slides.length} slides`, "", "## Outline", ""];
  state.slides.forEach((s, i) => L.push(`${i + 1}. ${kindTag(s.kind)} ${s.title}${s.over ? ` (dense ${s.weight}/${BUDGET})` : ""}`));
  L.push("", "## Flagged slides", "");
  const f = flagged();
  if (!f.length) L.push("None flagged.");
  else f.forEach(s => { const c = state.captures[s.id]; L.push(`- [${(c.flag === "none" ? "note" : c.flag).toUpperCase()}] ${s.title} (${s.id}): ${c.note.trim() || "(no note)"}`); });
  return L.join("\n");
};

const download = (name, mime, text) => { const url = URL.createObjectURL(new Blob([text], { type: mime })); Object.assign(document.createElement("a"), { href: url, download: name }).click(); setTimeout(() => URL.revokeObjectURL(url), 0); };
const toast = $("#toast"); let toastTimer;
const flash = msg => { if (!toast.showPopover) return; toast.textContent = msg; try { toast.showPopover(); } catch { /* popover already open */ } clearTimeout(toastTimer); toastTimer = setTimeout(() => { try { toast.hidePopover(); } catch { /* already hidden */ } }, 1600); };
const markExported = () => { flagged().forEach(s => { state.captures[s.id].exported = true; }); };
const copy = text => { const p = navigator.clipboard?.writeText(text); if (p) p.then(() => { state.copies++; markExported(); refreshMeta(); flash("Copied"); }).catch(() => flash("Copy blocked, use the box")); else flash("Copy unavailable, use the box"); };
const egress = $("#egress");
const doExport = which => {
  const env = toEnvelope();
  if (!validate(env)) { egress.value = "[BLOCKED] envelope failed validation"; flash("Export blocked"); return; }
  if (which === "json") { const text = JSON.stringify(env, null, 2); egress.value = text; download("deck-" + themeKey.slice(6) + ".json", "application/json", text); markExported(); refreshMeta(); flash("Downloaded JSON"); return; }
  if (which === "flagged") { const anns = env.annotations; if (!anns.length) { flash("Nothing flagged"); return; } const text = JSON.stringify({ ...env, state: { flagged: anns } }, null, 2); egress.value = text; copy(text); return; }
  egress.value = toMarkdown(); copy(egress.value);
};

// --- one listener per concern
document.addEventListener("click", e => {
  const nav = e.target.closest("[data-nav]"); if (nav) { show(index + Number(nav.dataset.nav)); return; }
  const notes = e.target.closest("[data-toggle-notes]"); if (notes) { const on = document.body.dataset.mode === "present"; document.body.dataset.mode = on ? "notes" : "present"; notes.setAttribute("aria-pressed", String(on)); return; }
  const theme = e.target.closest("[data-toggle-theme]"); if (theme) { const next = root.dataset.theme === "dark" ? "light" : "dark"; try { localStorage.setItem(themeKey, root.dataset.theme = next); } catch { root.dataset.theme = next; } return; }
  const exp = e.target.closest("[data-export]"); if (exp) doExport(exp.dataset.export);
});
document.addEventListener("keydown", e => {
  if (e.target.matches("input,textarea,select")) return;
  const step = { ArrowRight: 1, ArrowLeft: -1, PageDown: 1, PageUp: -1 }[e.key]; if (!step) return;
  e.preventDefault(); show(index + step);
});
const captureInput = e => {
  const fl = e.target.closest("[data-flag]"); if (fl) { state.captures[fl.dataset.flag].flag = fl.value; state.captures[fl.dataset.flag].exported = false; refreshMeta(); return; }
  const nt = e.target.closest("[data-note]"); if (nt) { state.captures[nt.dataset.note].note = nt.value; state.captures[nt.dataset.note].exported = false; refreshMeta(); }
};
document.addEventListener("input", captureInput);
document.addEventListener("change", captureInput);
</script>
