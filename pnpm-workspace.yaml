catalogMode: strict

cleanupUnusedCatalogs: false

fetchRetries: 3

fetchRetryFactor: 2

fetchRetryMaxtimeout: 60000

fetchRetryMintimeout: 10000

linkWorkspacePackages: deep

overrides:
  axios: 1.17.0
  jiti: 2.7.0
  koa: 3.2.1
  minimatch: 10.2.5
  node-forge: 1.4.0
  rollup: 4.62.0
  svgo: 4.0.1
  tar: 7.5.16

peerDependencyRules:
  allowedVersions:
    # Ahead-of-peer pins the workspace vetted: the one installed version leads the dependent's declared range.
    '@effect/experimental': 0.61.0
    '@effect/platform': 0.97.0
    '@effect/rpc': 0.76.0
    '@nx/devkit': 23.1.0
    three: 0.185.1
    typescript: 7.0.2
    # @effect/vitest 0.30.x declares peer vitest ^3.2; suites are written v4-forward against installed 4.1.x.
    vitest: 4.1.10

allowBuilds:
  '@ast-grep/cli': true
  '@datadog/pprof': true
  '@biomejs/biome': true
  '@bufbuild/buf': true
  '@parcel/watcher': true
  '@pulumi/command': true
  '@pulumi/docker': true
  '@pulumi/kubernetes': true
  '@swc/core': true
  '@node-rs/argon2': true
  better-sqlite3: true
  core-js: true
  cpu-features: true
  esbuild: true
  msgpackr-extract: true
  nx: true
  protobufjs: true
  sharp: true
  ssh2: true
  unrs-resolver: true
  '@pulumi/docker-build': true
  cbor-extract: true
  puppeteer: false

preferWorkspacePackages: true

saveExact: true

strictSsl: true

verifyDepsBeforeRun: warn
