    "flox; python_version<'3.15'",                 # data: vectorized/parallel grouped reductions xarray defers to; scipy-gated, companion until scipy ships cp315
    "igraph",                                      # data: C-core Leiden/Louvain/Infomap community detection rustworkx lacks
