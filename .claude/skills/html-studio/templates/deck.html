"use strict";
const NOCTURNE = (() => {

  const $$ = (sel, root = document) => [...root.querySelectorAll(sel)];
  const esc = value => { const node = document.createElement("span"); node.textContent = String(value); return node.innerHTML; };
  const el = (tag, attrs, ...kids) => {
    const node = document.createElement(tag);
    if (attrs) for (const key in attrs) {
      const value = attrs[key];
      if (value == null || value === false) continue;
      if (key === "text") node.textContent = value;
      else if (value === true) node.setAttribute(key, "");

    if (fills) for (const key in fills) { const slot = node.querySelector(`[data-cell="${CSS.escape(key)}"]`); if (slot) slot.textContent = fills[key]; }

  const slug = document.title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
  const themeKey = "theme:" + slug;
  const root = document.documentElement;
  const storedTheme = (() => { try { return localStorage.getItem(themeKey); } catch { return null; } })();
  if (storedTheme) root.dataset.theme = storedTheme;
  const toggleTheme = () => {
    const dark = root.dataset.theme ? root.dataset.theme === "dark" : !matchMedia("(prefers-color-scheme: light)").matches;

    catch { flash("Clipboard denied — mirror selected, copy manually"); return false; }

    setTimeout(() => URL.revokeObjectURL(url), 1000);

    /AKIA[0-9A-Z]{16}/g, /ghp_[A-Za-z0-9]{36,}/g, /xox[baprs]-[A-Za-z0-9-]{10,}/g, /sk-[A-Za-z0-9]{20,}/g,
    /-----BEGIN [A-Z ]*PRIVATE KEY-----[\s\S]*?-----END [A-Z ]*PRIVATE KEY-----/g,
    /eyJ[A-Za-z0-9_-]{8,}\.eyJ[A-Za-z0-9_-]{8,}\.[A-Za-z0-9_-]+/g,
    /(\b(?:password|passwd|secret|token|api[_-]?key)\b['"]?\s*[:=]\s*['"]?)[^\s'",;]{6,}/gi,
    /(:\/\/[^\/\s:@]+):[^\/\s@]+@/g,
  ];
  const redact = text => {
    let hits = 0;
    const out = REDACT.reduce((acc, pattern) => acc.replace(pattern, (all, keep) => { hits += 1; return (keep && all.startsWith(keep) ? keep : "") + `«REDACTED:${hits}»`; }), text);
    return { text: out, hits };
  };

  const VOCAB = ["approve", "approve_with_notes", "reject", "defer", "edit", "comment", "dismiss"];
  const validateEnvelope = (env, kind) => {
    const errs = [];
    if (env.kind !== kind) errs.push("kind");
    if (env.version !== 1) errs.push("version");
    if (!env.artifact?.id || !env.artifact?.title) errs.push("artifact");
    if (!VOCAB.includes(env.decision?.status)) errs.push("decision.status");
    for (const key of ["decisions", "changes", "annotations"]) { if (!Array.isArray(env[key])) errs.push(key); }
    (env.decisions ?? []).forEach(row => { if (!row.id || !VOCAB.includes(row.verdict)) errs.push("decision:" + row.id); });
    return errs;
  };

  const returnMeta = document.querySelector('meta[name="artifact-return"]');
  const tokenMeta = document.querySelector('meta[name="artifact-token"]');
  const served = Boolean(returnMeta);
  const send = async env => {
    const res = await fetch(returnMeta.content, {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Artifact-Token": tokenMeta?.content ?? "" },
      body: JSON.stringify({ kind: env.kind, artifact: env.artifact.id, version: env.version, data: env }),
    });
    if (!res.ok) throw new Error("submit " + res.status);
    return res.json();
  };

  const view = {
    read: () => { try { return Object.fromEntries(new URLSearchParams(location.hash.slice(1))); } catch { return {}; } },
    write: patch => {
      const params = new URLSearchParams(location.hash.slice(1));
      for (const [key, value] of Object.entries(patch)) { if (value == null || value === "") params.delete(key); else params.set(key, value); }
      history.replaceState(null, "", "#" + params);
    },
  };

    const anchors = $$(".toc a[href^='#']"); if (!anchors.length) return;
    const forId = id => $(`.toc a[href="#${CSS.escape(id)}"]`);
    const watcher = new IntersectionObserver(entries => {
      entries.forEach(entry => { if (entry.isIntersecting) { $$(".toc a.on").forEach(a => a.classList.remove("on")); forId(entry.target.id)?.classList.add("on"); } });

    anchors.forEach(anchor => { const target = document.getElementById(anchor.hash.slice(1)); if (target) watcher.observe(target); });
  };

  const boot = config => {
    const { kind, envelope, toMarkdown, filename = slug || kind, isChanged, onExported = () => {}, redactPayload = false, narrative = false } = config;
    addEventListener("beforeprint", () => $$("details").forEach(d => { d.dataset.wasOpen = String(d.open); d.open = true; }));
    addEventListener("afterprint", () => $$("details").forEach(d => { d.open = d.dataset.wasOpen === "true"; }));
    if (narrative) $('[data-export="send"]')?.closest("section")?.remove();
    else if (served) { const sendBtn = $('[data-export="send"]'); if (sendBtn) sendBtn.hidden = false; }
    else $('[data-export="send"]')?.closest("section")?.setAttribute("hidden", "");

    const changedNow = isChanged ?? (() => false);
    const outbound = text => (redactPayload ? redact(text) : { text, hits: 0 });

      const env = envelope(mode === "changed");
      const errs = validateEnvelope(env, kind);
      if (errs.length) { mirror("[BLOCKED] invalid payload: " + errs.join(", ")); flash("Export blocked"); return; }
      if (mode === "send") {
        control.disabled = true;
        try { await send(env); control.textContent = "Sent"; flash("Sent to agent"); onExported("sent"); }
        catch {
          control.textContent = "Send failed — copied instead";
          const { text } = outbound(JSON.stringify(env, null, 2));
          if (await copyText(text)) onExported("copied");
        }

        return;
      }
      const payload = mode === "md" ? toMarkdown(env) : JSON.stringify(env, null, 2);
      const { text, hits } = outbound(payload);
      if (hits) flash(`${hits} value${hits > 1 ? "s" : ""} redacted`);
      if (mode === "json") { mirror(text); download(filename + ".json", "application/json", text); onExported("downloaded"); }
      else if (await copyText(text)) onExported("copied");

    };
    const refresh = () => { const changed = $('[data-export="changed"]'); if (changed) changed.disabled = !changedNow(); };

      if (event.target.closest("[data-toggle-theme]")) { toggleTheme(); return; }

      if (hit && !hit.disabled) doExport(hit.dataset.export, hit);
    });
    spy();
    refresh();
    return { refresh, flash, copyText };
  };

  return { $, $$, el, esc, clone, fmt, slug, flash, copyText, download, redact, VOCAB, validateEnvelope, served, send, view, boot };
})();

// --- [TEMPLATE_LOCAL] --- model, render, actions, wire
(() => {
"use strict";
const { $, $$, el } = NOCTURNE;

// --- model
const model = JSON.parse($("#payload").textContent);
const BUDGET = 6;
const WEIGHT = { paragraph: () => 1, list: b => b.items.length, code: () => 2, "stat-row": b => b.stats.length, "chip-line": b => b.chips.length };
const weigh = s => s.blocks.reduce((sum, b) => sum + (WEIGHT[b.type]?.(b) ?? 1), 0);
const slides = model.slides.map((s, i) => ({ ...s, n: i + 1, weight: weigh(s) }));
const state = { captures: {} };
const cap = id => (state.captures[id] ??= { flag: "", note: "", ann: "active" });

const envelope = changedOnly => ({
  kind: "deck", version: 1,
  artifact: { id: model.meta.id, title: model.meta.title, baseline: model.meta.baseline },
  decision: { status: isChanged() ? "approve_with_notes" : "comment", at: new Date().toISOString() },
  decisions: [], changes: [], annotations: annotations(),
  state: changedOnly
    ? { flagged: flaggedRows().map(s => s.id) }
    : { outline: slides.map(s => ({ id: s.id, order: s.n, kind: s.kind, title: s.title, weight: s.weight, dense: s.weight > BUDGET })) },
  ...(changedOnly ? { extensions: { diffBaseline: model.meta.baseline } } : {}),

  const L = ["# Deck: " + model.meta.title, "",
    "Owner: " + model.meta.owner + " · Date: " + model.meta.date + " · " + slides.length + " slides", "", "## Outline"];
  slides.forEach(s => L.push(s.n + ". [" + s.kind.toUpperCase() + "] " + s.title + (s.weight > BUDGET ? " — dense " + s.weight + "/" + BUDGET : "")));
  L.push("", "## Flagged slides");
  if (!env.annotations.length) L.push("_Nothing flagged._");
  else env.annotations.forEach(a => L.push("- [" + a.intent.toUpperCase() + "] " + a.itemId + ": " + (a.text || "(no note)")));
  return L.join("\n") + "\n";

const chip = (tone, text) => el("span", { class: "chip " + tone, text });
const BLOCKS = {
  paragraph: b => el("p", { text: b.text }),
  list: b => el("ul", { class: "slide__list" }, b.items.map(t => el("li", { text: t }))),
  code: b => el("pre", {}, el("code", { text: b.text })),
  "stat-row": b => el("div", { class: "stat-row" }, b.stats.map(v => el("div", { class: "card stat" }, el("b", { class: "num", text: v.n }), el("small", { text: v.label })))),
  "chip-line": b => el("p", { class: "chip-line" }, b.chips.map(c => chip(c.tone, c.mark + " " + c.text))),

const renderBlock = b => BLOCKS[b.type]?.(b) ?? el("p", { class: "chip-line" }, chip("warn", "[UNKNOWN-BLOCK] " + b.type));

const flagSeg = id => {
  const seg = el("div", { class: "seg", role: "group", "aria-label": "Flag slide " + id });

    const input = el("input", { type: "radio", name: "flag-" + id, value: v, "data-flag-for": id, "aria-label": v + " flag for " + id });

};
const noteControl = id => {
  const pid = "note-" + id;
  return el("span", { class: "rowline" },
    el("button", { type: "button", class: "btn ghost", popovertarget: pid, "data-note-btn": id, "aria-label": "Note for " + id }, cap(id).note ? "note*" : "note"),
    el("div", { id: pid, class: "pop notepop no-print", popover: "auto" },
      el("span", { class: "eyebrow", text: "Annotation" }),
      el("textarea", { "data-note-for": id, "aria-label": "Annotation text for " + id, placeholder: "Anchored to " + id }, cap(id).note || "")));
};

const stage = $("#deck-main");
const renderSlide = s => el("section", { class: "slide", id: s.id, "data-kind": s.kind, "aria-label": "Slide " + s.n + ": " + s.title },
  el("div", { class: "slide__inner" },
    el("p", { class: "kicker" },
      el("span", { class: "eyebrow", text: String(s.n).padStart(2, "0") + " · " + s.kind }),
      s.weight > BUDGET ? chip("warn", "[DENSE] " + s.weight + "/" + BUDGET + " — split this slide") : null),
    el(s.kind === "title" ? "h1" : "h2", { class: "slide__lead", text: s.title }),
    el("div", { class: "slide__body" }, s.blocks.map(renderBlock)),
    el("div", { class: "cap no-print" }, flagSeg(s.id), noteControl(s.id)),
    el("aside", { class: "speaker", "aria-label": "Presenter aside for slide " + s.n },
      el("span", { class: "eyebrow", text: "Presenter" }), s.speaker)));
stage.replaceChildren(...slides.map(renderSlide));
const nodes = $$(".slide", stage);

// --- position: the observer is the one authority over counter, hairline, and fragment
const counter = $("#counter"), progress = $("#progress");
const reduced = matchMedia("(prefers-reduced-motion: reduce)");
let index = 0;
const paintPos = () => {
  counter.textContent = (index + 1) + " / " + nodes.length;
  progress.style.setProperty("--p", String((index + 1) / nodes.length * 100));
  try { history.replaceState(null, "", "#" + (index + 1)); } catch { /* file:// best-effort */ }
};
const watcher = new IntersectionObserver(entries => {
  entries.forEach(en => { if (en.isIntersecting) { index = nodes.indexOf(en.target); paintPos(); } });
}, { rootMargin: "-45% 0px -45% 0px" });
nodes.forEach(n => watcher.observe(n));
const show = next => {
  index = Math.max(0, Math.min(nodes.length - 1, next));
  nodes[index].scrollIntoView({ behavior: reduced.matches ? "instant" : "smooth" });
  paintPos();
};
const restore = () => {
  const n = Number(location.hash.slice(1));
  if (Number.isInteger(n) && n >= 1 && n <= nodes.length) { index = n - 1; nodes[index].scrollIntoView({ behavior: "instant" }); paintPos(); }
};

const paintMeta = () => {
  $("#egress-meta").textContent = flaggedRows().length + " flagged · " + annotations().filter(a => a.status === "active").length + " unsent";
};

// --- actions
const wire = NOCTURNE.boot({ kind: "deck", envelope, toMarkdown, filename: model.meta.id, isChanged,
  onExported: () => { Object.values(state.captures).forEach(c => { if (c.flag || c.note.trim()) c.ann = "exported"; }); paintMeta(); } });

document.addEventListener("click", e => {
  const nav = e.target.closest("[data-nav]");
  if (nav) { show(index + Number(nav.dataset.nav)); return; }
  const notes = e.target.closest("[data-toggle-notes]");
  if (notes) {
    const on = document.body.dataset.mode !== "notes";
    document.body.dataset.mode = on ? "notes" : "present";
    notes.setAttribute("aria-pressed", String(on));
  }
});
document.addEventListener("change", e => {
  const f = e.target.closest("[data-flag-for]");
  if (f) { const c = cap(f.dataset.flagFor); c.flag = f.value; c.ann = "active"; wire.refresh(); paintMeta(); }
});
document.addEventListener("input", e => {
  const n = e.target.closest("[data-note-for]");
  if (n) {
    const id = n.dataset.noteFor, c = cap(id);
    c.note = n.value; c.ann = "active";
    $$('[data-note-btn="' + CSS.escape(id) + '"]').forEach(b => { b.textContent = n.value ? "note*" : "note"; });
    wire.refresh(); paintMeta();
  }
});
document.addEventListener("keydown", e => {
  if (e.target.matches("input, textarea, select")) return;
  if (e.key === "?") { e.preventDefault(); $("#keys")?.togglePopover(); return; }
  if (e.key === "n" || e.key === "N") { $("[data-toggle-notes]")?.click(); return; }
  if (e.key === "Home") { e.preventDefault(); show(0); return; }
  if (e.key === "End") { e.preventDefault(); show(nodes.length - 1); return; }
  const step = { ArrowRight: 1, ArrowDown: 1, " ": 1, PageDown: 1, j: 1, ArrowLeft: -1, ArrowUp: -1, PageUp: -1, k: -1 }[e.key];
  if (step) { e.preventDefault(); show(index + step); }
});
addEventListener("hashchange", restore);

// --- wire
$("#bar-slug").textContent = model.meta.id.split(".").join(" · ");
paintMeta(); restore(); paintPos();
})();
</script>
</body>
</html>
