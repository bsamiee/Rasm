<body>
<a class="skip" href="#main">Skip to content</a>
<div class="wrap">
  <header class="head">
    <div>
      <p class="eyebrow" id="doc-eyebrow">Wargame · Testkit</p>
      <h1 id="doc-title">…</h1>
      <p class="deck" id="doc-sub"></p>
    </div>
    <div class="rowline no-print">
      <small id="doc-date" class="mono"></small>
      <button type="button" class="btn ghost" data-toggle-theme aria-label="Toggle color theme">Theme</button>
    </div>
  </header>

  <section class="criteria no-print" id="criteria" aria-label="Criterion weights"></section>

  <section class="verdict-pane" id="verdict-pane" aria-live="polite"></section>

  <main id="main" tabindex="-1">
    <section class="section">
      <h2 id="matrix-h">Scoring matrix</h2>
      <div class="twrap"><table class="matrix" aria-labelledby="matrix-h">
        <thead><tr id="matrix-head"></tr></thead>
        <tbody id="matrix-body"></tbody>
      </table></div>
      <small class="muted">Cell intensity tracks the score; a zero on a disqualifier criterion excludes the option from winning.</small>
    </section>
    <section class="section">
      <h2 id="risks-h">Option risks</h2>
      <div class="risks" id="risks-body"></div>
    </section>
  </main>

  <footer class="export-bar no-print" aria-label="Export bar">
    <button type="button" class="btn primary" data-export="send" hidden>Send to agent</button>
    <label class="rowline">Final call <select id="final-call" aria-label="Chosen option"></select></label>
    <label class="rowline">Verdict <select id="global-verdict" aria-label="Global verdict"></select></label>
    <button type="button" class="btn" data-export="md">Copy markdown</button>
    <button type="button" class="btn" data-export="json">Download JSON</button>
    <button type="button" class="btn ghost" data-export="changed" disabled>Copy changed-only</button>
    <small id="egress-meta" class="mono right"></small>
    <label class="rowline" style="flex:1 1 100%">Dissent <textarea id="dissent" class="egress" aria-label="Dissent note" placeholder="Dissent from the computed winner"></textarea></label>
    <textarea class="egress" id="egress" readonly placeholder="Exported payload mirrors here." aria-label="Exported payload"></textarea>
  </footer>
</div>
<output id="toast" popover="manual" role="status" aria-live="polite"></output>
<script type="application/json" id="payload">{
  "meta": {
    "id": "wargame.rasm-testkit",
    "title": "Wargame: Geometry-Kernel Test Isolation",
    "subtitle": "Weights and scores are live; the verdict pane, heatmap, and sensitivity recompute on every change.",
    "date": "2026-07-06",
    "owner": "testkit",
    "baseline": "b-0",
    "weightMax": 9,
    "scoreMax": 5
  },
  "criteria": [
    { "id": "crit-fidelity", "name": "Host fidelity", "weight": 4, "disqualifier": false },
    { "id": "crit-determinism", "name": "Determinism", "weight": 3, "disqualifier": false },
    { "id": "crit-speed", "name": "Feedback speed", "weight": 2, "disqualifier": false },
    { "id": "crit-maint", "name": "Maintenance burden", "weight": 3, "disqualifier": false },
    { "id": "crit-license", "name": "License compliance", "weight": 3, "disqualifier": true }
  ],
  "options": [
    {
      "id": "opt-fake",
      "name": "In-process fake host",
      "cells": {
        "crit-fidelity": { "score": 2, "rationale": "A fake RhinoCommon surface diverges from real tolerance and meshing behavior." },
        "crit-determinism": { "score": 5, "rationale": "Pure in-process fixtures; zero host scheduling variance." },
        "crit-speed": { "score": 5, "rationale": "Millisecond unit runs inside the normal test loop." },
        "crit-maint": { "score": 2, "rationale": "Every RhinoCommon surface the kernel touches needs a maintained fake." },
        "crit-license": { "score": 5, "rationale": "No Rhino process runs; nothing to license." }
      }
    },
    {
      "id": "opt-headless",
      "name": "Headless Rhino scenario runner",
      "cells": {
        "crit-fidelity": { "score": 5, "rationale": "Real RhinoCommon in a real host; tolerance and meshing match production." },
        "crit-determinism": { "score": 4, "rationale": "Host startup ordering varies; scenario seeds pin the rest." },
        "crit-speed": { "score": 3, "rationale": "Host boot dominates; scenario batching amortizes it." },
        "crit-maint": { "score": 4, "rationale": "Scenarios ride the existing rhino-bridge rail; no parallel harness." },
        "crit-license": { "score": 5, "rationale": "The runner rides the licensed workstation seat." }
      }
    },
    {
      "id": "opt-golden",
      "name": "Golden-geometry snapshot suite",
      "cells": {
        "crit-fidelity": { "score": 4, "rationale": "Goldens capture real host output; drift shows as a diff, never a crash." },
        "crit-determinism": { "score": 5, "rationale": "Byte-stable serialized goldens; Verify owns the diff." },
        "crit-speed": { "score": 4, "rationale": "Compare-only runs are fast; regeneration needs the host." },
        "crit-maint": { "score": 3, "rationale": "Golden churn on intentional geometry changes needs review discipline." },
        "crit-license": { "score": 5, "rationale": "Regeneration uses the licensed workstation; CI compares bytes only." }
      }
    },
    {
      "id": "opt-compute",
      "name": "Containerized Rhino.Compute farm",
      "cells": {
        "crit-fidelity": { "score": 5, "rationale": "The same compute geometry branch the product calls." },
        "crit-determinism": { "score": 3, "rationale": "Farm scheduling and version skew across containers." },
        "crit-speed": { "score": 2, "rationale": "Container spin-up plus a network round-trip per case." },
        "crit-maint": { "score": 3, "rationale": "Farm images, auth, and versioning are their own surface." },
        "crit-license": { "score": 0, "rationale": "Core-hour licensing for containerized Rhino is unresolved; CI is barred from running it." }
      }
    }
  ],
  "risks": {
    "opt-fake": ["Fake drift ships a green suite over broken geometry", "New kernel surfaces silently bypass the fake"],
    "opt-headless": ["Workstation-bound runs cap CI parallelism", "A host crash reads as a test failure"],
    "opt-golden": ["Golden regeneration becomes a rubber stamp under churn", "Large goldens bloat the repo without LFS discipline"],
    "opt-compute": ["The license posture blocks the whole lane", "Farm version skew invalidates comparisons"]
  }
}</script>
<script>
(() => {
"use strict";
const $ = (s, r = document) => r.querySelector(s);
const el = (tag, attrs, ...kids) => {
  const n = document.createElement(tag);
  if (attrs) for (const k in attrs) { const v = attrs[k];
    if (v == null || v === false) continue;
    if (k === "text") n.textContent = v; else if (v === true) n.setAttribute(k, ""); else n.setAttribute(k, v); }
  for (const kid of kids) { if (kid == null || kid === false) continue; n.append(kid.nodeType ? kid : document.createTextNode(String(kid))); }
  return n;
};
const VOCAB = ["approve", "approve_with_notes", "reject", "defer", "edit", "comment", "dismiss"];

// theme stamp: stored choice wins; unstored follows the system preference
const themeKey = "theme:" + document.title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
const root = document.documentElement;
try { const s = localStorage.getItem(themeKey); if (s) root.dataset.theme = s; } catch {}
document.addEventListener("click", e => {
  if (!e.target.closest("[data-toggle-theme]")) return;
  const dark = root.dataset.theme ? root.dataset.theme === "dark" : !matchMedia("(prefers-color-scheme: light)").matches;
  const next = dark ? "light" : "dark";
  try { localStorage.setItem(themeKey, root.dataset.theme = next); } catch { root.dataset.theme = next; }
});

const model = JSON.parse($("#payload").textContent);
const BASE_ID = model.meta.baseline;
const WMAX = model.meta.weightMax, SMAX = model.meta.scoreMax;
document.documentElement.style.setProperty("--score-max", SMAX);
const baseModel = structuredClone(model);
const state = { captures: {}, global: { status: "", choice: "", note: "" }, copies: 0 };

const num = v => Number(v) || 0;
const weight = c => num(c.weight);
const cellOf = (o, cid) => (o.cells[cid] ??= { score: 0, rationale: "" });
const scoreOf = (o, cid) => num(cellOf(o, cid).score);
const maxTotal = () => model.criteria.reduce((a, c) => a + weight(c) * SMAX, 0);
const totals = () => model.options.map(o => {
  let total = 0, dq = false;
  for (const c of model.criteria) { const s = scoreOf(o, c.id); total += s * weight(c); if (c.disqualifier && s === 0) dq = true; }
  return { id: o.id, name: o.name, total, dq };
});
const winnerOf = ts => { const q = ts.filter(t => !t.dq).slice().sort((a, b) => b.total - a.total); return q[0] || null; };

function sensitivity() {
  const base = totals(), win = winnerOf(base);
  const qualified = base.filter(t => !t.dq);
  if (!win || qualified.length < 2) return null;
  const optById = Object.fromEntries(model.options.map(o => [o.id, o]));
  let best = null;
  const take = (delta, desc) => { if (delta >= 0 && Number.isFinite(delta) && (!best || delta < best.delta - 1e-9)) best = { delta, desc }; };
  for (const c of model.criteria) {
    const w = weight(c);
    for (const t of qualified) {
      if (t.id === win.id) continue;
      const gap = win.total - t.total;
      if (w > 0) {
        const ds = gap / w;
        if (scoreOf(optById[win.id], c.id) - ds >= -1e-9) take(ds, "lower " + win.name + " " + c.name + " score by " + ds.toFixed(2) + " to tie " + t.name);
        if (scoreOf(optById[t.id], c.id) + ds <= SMAX + 1e-9) take(ds, "raise " + t.name + " " + c.name + " score by " + ds.toFixed(2) + " to tie " + win.name);
      }
      const slope = scoreOf(optById[win.id], c.id) - scoreOf(optById[t.id], c.id);
      if (Math.abs(slope) > 1e-12) {
        const dw = gap / Math.abs(slope), dir = slope > 0 ? -1 : 1, target = w + dir * dw;
        if (target >= -1e-9 && target <= WMAX + 1e-9) take(dw, (dir < 0 ? "lower " : "raise ") + c.name + " weight by " + dw.toFixed(2) + " to tie " + win.name + " and " + t.name);
      }
    }
  }
  return best;
}

const cap = id => (state.captures[id] ??= { verdict: "", note: "", ann: "active" });
const decisionsOut = () => Object.entries(state.captures).filter(([, c]) => c.verdict).map(([id, c]) => ({ id, verdict: c.verdict, ...(c.note ? { note: c.note } : {}) }));
const annotations = () => Object.entries(state.captures).filter(([, c]) => c.note).map(([id, c], i) => ({ id: "a-" + (i + 1), itemId: id, intent: "note", status: c.ann, text: c.note }));
function changesOut() {
  const out = [];
  model.criteria.forEach(c => { const b = baseModel.criteria.find(x => x.id === c.id); if (num(c.weight) !== num(b.weight)) out.push({ itemId: c.id, path: "/criteria/" + c.id + "/weight", from: b.weight, to: num(c.weight) }); });
  model.options.forEach(o => { const bo = baseModel.options.find(x => x.id === o.id);
    model.criteria.forEach(c => { const cur = cellOf(o, c.id), bc = bo.cells[c.id] || { score: 0, rationale: "" };
      if (num(cur.score) !== num(bc.score)) out.push({ itemId: o.id + "/" + c.id, path: "/options/" + o.id + "/cells/" + c.id + "/score", from: bc.score, to: num(cur.score) });
      if ((cur.rationale || "") !== (bc.rationale || "")) out.push({ itemId: o.id + "/" + c.id, path: "/options/" + o.id + "/cells/" + c.id + "/rationale", from: bc.rationale || "", to: cur.rationale || "" });
    }); });
  return out;
}
const isChanged = () => changesOut().length || decisionsOut().length || annotations().length || state.global.status || state.global.choice || state.global.note;

const verdictSelect = (id, current) => {
  const sel = el("select", { "aria-label": "Verdict for " + id, "data-verdict-for": id });
  ["", "approve", "reject", "defer"].forEach(v => sel.append(el("option", { value: v, ...(current === v ? { selected: true } : {}) }, v || "—")));
  return sel;
};

function render() {
  $("#doc-title").textContent = model.meta.title;
  $("#doc-sub").textContent = model.meta.subtitle;
  $("#doc-date").textContent = model.meta.date;

  $("#criteria").replaceChildren(...model.criteria.map(c => el("div", { class: "crit" },
    el("div", { class: "rowline" },
      el("span", { class: "chip " + (c.disqualifier ? "fail" : "info"), text: c.name + (c.disqualifier ? " [DQ]" : "") }),
      el("output", { text: "w " + weight(c) })),
    el("input", { type: "range", "data-weight": c.id, value: weight(c), min: 0, max: WMAX, step: 1, "aria-label": c.name + " weight" }))));

  const ts = totals(), win = winnerOf(ts), sens = sensitivity(), mt = maxTotal() || 1;
  $("#verdict-pane").replaceChildren(
    el("div", { class: "rail " + (win ? "ok" : "fail") },
      el("strong", {}, win ? "Winner: " + win.name + " — " + win.total.toFixed(1) : "No winner — every option disqualified"),
      el("div", {}, el("small", { class: "muted", text: sens ? "Sensitivity: " + sens.delta.toFixed(2) + " — " + sens.desc : "Sensitivity: not defined (fewer than two qualified options)" }))),
    el("div", { class: "standing" }, ...ts.flatMap(t => {
      const meter = el("div", { class: "meter", role: "img", "aria-label": t.name + " " + t.total.toFixed(1) + " of " + mt });
      meter.append(el("span", { style: "width:" + (t.total / mt * 100).toFixed(1) + "%" }));
      return [
        el("span", { text: t.name }),
        meter,
        el("b", { text: t.total.toFixed(1) }),
        t.dq ? el("span", { class: "chip fail", text: "[DISQUALIFIED]" })
             : (win && win.id === t.id ? el("span", { class: "chip ok", text: "[WINNER]" }) : el("span", { class: "chip", text: "[QUALIFIED]" })),
      ];
    })));

  const head = $("#matrix-head");
  head.replaceChildren(el("th", { scope: "col", text: "Option" }));
  model.criteria.forEach(c => head.append(el("th", { scope: "col", text: c.name + " · w" + weight(c) })));
  head.append(el("th", { scope: "col", class: "num", text: "Total" }), el("th", { scope: "col", text: "Verdict" }));

  $("#matrix-body").replaceChildren(...model.options.map(o => {
    const t = ts.find(x => x.id === o.id);
    const tr = el("tr", { class: (t.dq ? "dq" : (win && win.id === o.id ? "best" : "")), "data-option": o.id });
    tr.append(el("td", {}, el("strong", { text: o.name }),
      t.dq ? el("div", {}, el("span", { class: "chip fail", text: "[DISQUALIFIED]" })) : null));
    model.criteria.forEach(c => {
      const cell = cellOf(o, c.id), pid = "rat-" + o.id + "-" + c.id, has = !!(cell.rationale && cell.rationale.trim());
      tr.append(el("td", { class: "heat", style: "--score:" + scoreOf(o, c.id) },
        el("div", { class: "cell" },
          el("input", { type: "number", class: "mono", "data-score": o.id + "|" + c.id, value: scoreOf(o, c.id), min: 0, max: SMAX, "aria-label": o.name + " " + c.name + " score" }),
          el("button", { type: "button", class: "btn ghost dot no-print " + (has ? "filled" : "hollow"), popovertarget: pid, "aria-label": (has ? "Rationale for " : "Missing rationale for ") + o.name + " " + c.name }),
          el("div", { id: pid, class: "pop no-print", popover: "auto" },
            el("strong", { text: o.name + " · " + c.name }),
            el("textarea", { "data-rationale-for": o.id + "|" + c.id, "aria-label": "Rationale for " + o.name + " " + c.name, placeholder: "Rationale (empty renders a hollow marker)" }, cell.rationale || "")))));
    });
    tr.append(el("td", { class: "total num", text: t.total.toFixed(1) }),
      el("td", {}, verdictSelect(o.id, cap(o.id).verdict)));
    return tr;
  }));

  $("#risks-body").replaceChildren(...model.options.map(o => {
    const art = el("article", { class: "card", "aria-label": "Risks for " + o.name }, el("h3", { text: o.name }));
    const ul = el("ul"); (model.risks[o.id] || []).forEach(r => ul.append(el("li", { text: r }))); art.append(ul); return art;
  }));

  const fc = $("#final-call");
  if (!fc.options.length) { fc.append(el("option", { value: "" }, "—")); model.options.forEach(o => fc.append(el("option", { value: o.id }, o.name))); }
  fc.value = state.global.choice;
  const gv = $("#global-verdict");
  if (!gv.options.length) ["", ...VOCAB].forEach(v => gv.append(el("option", { value: v }, v || "—")));
  gv.value = state.global.status;
  $("#dissent").value = state.global.note;

  $("#egress-meta").textContent = "copies: " + state.copies + " · unresolved notes: " + annotations().filter(a => a.status === "active").length;
  $("[data-export='changed']").disabled = !isChanged();
}

function envelope(changedOnly) {
  const ts = totals(), win = winnerOf(ts), sens = sensitivity();
  return {
    kind: "wargame", version: 1,
    artifact: { id: model.meta.id, title: model.meta.title, baseline: BASE_ID },
    decision: { status: state.global.status || "comment", at: new Date().toISOString(), ...(state.global.note ? { note: state.global.note } : {}) },
    decisions: decisionsOut(), changes: changesOut(), annotations: annotations(),
    state: {
      matrix: model.options.map(o => ({ id: o.id, total: ts.find(t => t.id === o.id).total, disqualified: ts.find(t => t.id === o.id).dq })),
      criteria: model.criteria, options: model.options, captures: state.captures, global: state.global
    },
    extensions: { choice: state.global.choice || null, winner: win ? win.id : null, sensitivity: sens ? { delta: Number(sens.delta.toFixed(4)), desc: sens.desc } : null, ...(changedOnly ? { diffBaseline: BASE_ID } : {}) }
  };
}
function validate(env) {
  const errs = [];
  if (env.kind !== "wargame") errs.push("kind");
  if (env.version !== 1) errs.push("version");
  if (!env.artifact || !env.artifact.id || !env.artifact.title) errs.push("artifact");
  if (!VOCAB.includes(env.decision.status)) errs.push("decision.status");
  env.decisions.forEach(d => { if (!d.id || !VOCAB.includes(d.verdict)) errs.push("decision:" + d.id); });
  ["decisions", "changes", "annotations"].forEach(k => { if (!Array.isArray(env[k])) errs.push(k); });
  return errs;
}
function toMarkdown(env) {
  const ts = totals(), win = winnerOf(ts), sens = sensitivity();
  const choice = model.options.find(o => o.id === state.global.choice);
  const L = ["# " + model.meta.title, "",
    "**Final call:** " + (choice ? choice.name : "(none)") + " · verdict " + (env.decision.status || "(none)") + (state.global.note ? " · dissent: " + state.global.note : ""),
    "Winner (computed): " + (win ? win.name + " — " + win.total.toFixed(1) : "none"),
    "Sensitivity: " + (sens ? sens.delta.toFixed(2) + " — " + sens.desc : "not defined"), "", "## Scored matrix"];
  L.push("| Option | " + model.criteria.map(c => c.name + " (w" + weight(c) + ")").join(" | ") + " | Total | Status |");
  L.push("| " + Array(model.criteria.length + 3).fill("---").join(" | ") + " |");
  model.options.forEach(o => {
    const t = ts.find(x => x.id === o.id);
    L.push("| " + o.name + " | " + model.criteria.map(c => String(scoreOf(o, c.id))).join(" | ") + " | " + t.total.toFixed(1) + " | " + (t.dq ? "DISQUALIFIED" : (win && win.id === o.id ? "WINNER" : "")) + " |");
  });
  if (env.decisions.length) { L.push("", "## Option verdicts", "| Option | Verdict | Note |", "| --- | --- | --- |"); env.decisions.forEach(d => L.push("| " + d.id + " | " + d.verdict + " | " + (d.note || "") + " |")); }
  return L.join("\n") + "\n";
}

let toastTimer;
const flash = msg => { const t = $("#toast"); t.textContent = msg; t.showPopover?.(); clearTimeout(toastTimer); toastTimer = setTimeout(() => t.hidePopover?.(), 1600); };
const markExported = () => { Object.values(state.captures).forEach(c => { if (c.note) c.ann = "exported"; }); };
const copyText = async text => {
  try { await navigator.clipboard.writeText(text); }
  catch {
    const t = Object.assign(document.createElement("textarea"), { value: text, style: "position:fixed;left:-9999px" });
    document.body.append(t); t.select(); document.execCommand("copy"); t.remove();
  }
};
const download = (name, mime, text) => {
  const url = URL.createObjectURL(new Blob([text], { type: mime }));
  Object.assign(document.createElement("a"), { href: url, download: name }).click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
};

// return channel: the injected meta is the protocol switch — absent means file:// and export-only
const returnMeta = document.querySelector('meta[name="artifact-return"]');
if (returnMeta) $("[data-export='send']").hidden = false;
const sendToAgent = async env => {
  const res = await fetch(returnMeta.content, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(env) });
  if (!res.ok) throw new Error("submit " + res.status);
  return res.json();
};

document.addEventListener("click", async e => {
  const b = e.target.closest("[data-export]"); if (!b) return;
  const mode = b.dataset.export, env = envelope(mode === "changed"), errs = validate(env), eg = $("#egress");
  if (errs.length) { eg.value = "BLOCKED — invalid payload: " + errs.join(", "); flash("Export blocked"); return; }
  if (mode === "send") {
    b.disabled = true;
    try { await sendToAgent(env); state.copies++; markExported(); flash("Sent to agent"); }
    catch { eg.value = JSON.stringify(env, null, 2); await copyText(eg.value); flash("Send failed — copied instead"); }
    finally { b.disabled = false; render(); }
    return;
  }
  const out = mode === "md" ? toMarkdown(env) : JSON.stringify(env, null, 2);
  eg.value = out;
  if (mode === "json") { download(model.meta.id + ".json", "application/json", out); flash("Downloaded"); }
  else { await copyText(out); markExported(); flash("Copied"); }
  state.copies++; render();
});
document.addEventListener("input", e => {
  const w = e.target.closest("[data-weight]");
  if (w) { const c = model.criteria.find(x => x.id === w.dataset.weight); c.weight = num(w.value); render(); }
  const s = e.target.closest("[data-score]");
  if (s) { const [oid, cid] = s.dataset.score.split("|"); cellOf(model.options.find(o => o.id === oid), cid).score = Math.max(0, Math.min(SMAX, num(s.value))); render(); }
  const r = e.target.closest("[data-rationale-for]");
  if (r) { const [oid, cid] = r.dataset.rationaleFor.split("|"); cellOf(model.options.find(o => o.id === oid), cid).rationale = r.value; $("[data-export='changed']").disabled = !isChanged(); }
  if (e.target.id === "dissent") { state.global.note = e.target.value; $("[data-export='changed']").disabled = !isChanged(); }
});
document.addEventListener("change", e => {
  const v = e.target.closest("[data-verdict-for]");
  if (v) { cap(v.dataset.verdictFor).verdict = v.value; render(); }
  if (e.target.id === "final-call") { state.global.choice = e.target.value; render(); }
  if (e.target.id === "global-verdict") { state.global.status = e.target.value; render(); }
});
render();
})();
</script>
