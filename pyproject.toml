# --- [UV] ------------------------------------------------------------------

[tool.uv.sources]
# 0.22.9 imports typing.no_type_check_decorator (removed in 3.15); the pinned rev carries the fix, unreleased as of 0.22.9.
beartype = { git = "https://github.com/beartype/beartype.git", rev = "f370a0b1733413681e7a72bf36fbe839e60b3c85" }

[tool.uv]
package =        false
default-groups = ["dev", "mutation"]
config-settings-package = {
    python-flint = { setup-args = "-Dflint_version_check=false" },
    scipy =        { setup-args = "-Duse-pythran=false" },
}
# grimp's pyo3 pin caps at 3.14 (no cp315 wheel): skip the version check and restore the macOS extension link mode the skip drops.
extra-build-variables = {
    grimp = { UNSAFE_PYO3_SKIP_VERSION_CHECK = "1", RUSTFLAGS = "-C link-arg=-undefined -C link-arg=dynamic_lookup" },
}

# colour-cxf 0.1.1 declares Requires-Python <3.14 (no 3.15 support): corrected static metadata drops the spurious cap so it resolves on the >=3.15 floor with its runtime deps intact.
[[tool.uv.dependency-metadata]]
name =            "colour-cxf"
version =         "0.1.1"
requires-python = ">=3.10"
requires-dist =   ["typing-extensions<5,>=4", "xsdata>25.4"]

# --- [TY] ------------------------------------------------------------------

[tool.ty.environment]
python-platform = "all"
python-version = "3.15"

[tool.ty.analysis]
respect-type-ignore-comments = false

[tool.ty.src]
exclude = [
    ".archive",
    ".artifacts",
    ".cache",
    ".claude/worktrees",
    ".history",
    ".nx",
    ".scratch",
    ".tmp",
    ".venv",
    "_archive",
    "_tmp",
    "coverage",
    "dist",
    "node_modules",
    "scratch",
    "test-results",
    "tmp",
]

[tool.ty.rules]
all = "error"

[tool.ty.terminal]
error-on-warning = true

# --- [MYPY] ----------------------------------------------------------------

# `ty` is the binding type gate; mypy is advisory for `tools/assay` and `tests`.
# Mypy-only divergences stay in overrides because `ty` rejects inline type-ignore comments.
[tool.mypy]
files =                   ["tools/assay", "tests"]
python_version =          "3.15"
cache_dir =               ".cache/mypy"
strict =                  true
pretty =                  true
warn_unreachable =        true
explicit_package_bases =  true
warn_unused_configs =     true
disallow_any_explicit =   true
disallow_any_unimported = true
plugins =                 ["pydantic.mypy"]
enable_error_code = [
    "exhaustive-match",
    "explicit-override",
    "ignore-without-code",
    "redundant-self",
    "truthy-bool",
    "truthy-iterable",
    "unused-awaitable",
]
exclude = [
    "(^|/)(\\.archive|_archive|scratch|\\.scratch|_tmp|\\.tmp|\\.cache|\\.history)/",
    "^\\.artifacts/",
    "^\\.claude/worktrees/",
    "^\\.git/",
    "^\\.nx/",
    "^\\.venv/",
    "^build/",
    "^dist/",
    "^coverage/",
    "^test-results/",
    "^node_modules/",
    "^tmp/",
]

[tool.pydantic-mypy]
init_typed =                    true
init_forbid_extra =             true
warn_required_dynamic_aliases = true
warn_untyped_fields =           true

# `tests/**` stays `ty`-clean; these relaxations isolate strict-mypy lag around TypeForm, sentinel, Callable, match, and ctor narrowing.
[[tool.mypy.overrides]]
module =                  "tests.*"
disallow_any_explicit =   false
disallow_any_unimported = false
warn_unreachable =        false
disable_error_code =      ["func-returns-value", "attr-defined", "type-arg", "override", "arg-type"]

[[tool.mypy.overrides]]
module =                 ["boto3", "boto3.*", "fsspec", "fsspec.*", "s3fs"]  # backend imports lack py.typed coverage
ignore_missing_imports = true

# --- [PYTEST] --------------------------------------------------------------

# `pytest-benchmark` and `pytest-xdist` stay in separate sessions under `filterwarnings = ["error"]`.
# Do not add `-n` to default `addopts`; parallel runs must unload benchmark config explicitly.
[tool.pytest]
minversion =               "9.0"
strict =                   true
cache_dir =                ".cache/pytest"
testpaths =                ["tests"]
pythonpath =               ["."]
python_files =             ["test_*.py", "*_test.py", "bench_*.py"]
python_functions =         ["test_*", "bench_*"]
collect_imported_tests =   false
empty_parameter_set_mark = "fail_at_collect"
addopts = [
    "-p",
    "tests.python._testkit.runtime",  # testkit runtime plugin: profiles register at import; OTel wiring and marker auto-application ride session fixtures and collection hooks
    "-x",
    "--tb=short",
    "--import-mode=importlib",
    "-m",
    "not benchmark",
    "--disable-socket",
    "--allow-unix-socket",
    "--benchmark-storage=file://.artifacts/python/benchmarks",  # benchmark artifacts route through the Assay catalog URI
    "--benchmark-autosave",                                     # feeds the sustained-regression series; writes only when benchmarks ran
    "--hypothesis-profile=rasm",
]
filterwarnings = [
    "error",
    "ignore:Not saving anything:pytest_benchmark.logger.PytestBenchmarkWarning",  # autosave no-op in sessions whose benchmarks are deselected
]
timeout = "30"  # pytest-timeout registers this option as a string; pytest 9 TOML mode rejects a native int
required_plugins = [
    "anyio",
    "hypothesis",
    "inline-snapshot",
    "pytest-benchmark",
    "pytest-cov",
    "pytest-randomly",
    "pytest-socket",
    "pytest-timeout",
    "pytest-xdist",
]
markers = [
    "benchmark: benchmark measurement tests",
    "mutation: mutation-testing acceptance and survivor-triage tests",
    "network: tests that need real INET sockets lifted (loopback servers or egress); excluded from mutation lanes",
    "property: property-based tests",
    "subprocess: tests that spawn the real CLI in a child interpreter; excluded from mutation lanes (children run the unmutated tree)",
]

# --- [INLINE_SNAPSHOT] -----------------------------------------------------

[tool.inline-snapshot]
default-flags = ["short-report"]  # reports mismatches without mutating snapshots
storage-dir =   ".cache/inline-snapshot"

# --- [COVERAGE] ------------------------------------------------------------

[tool.coverage.run]
branch =          true
relative_files =  true            # subprocess coverage combines through relative repo paths
source =          ["tools/assay"]
data_file =       ".cache/coverage/.coverage"
core =            "sysmon"        # CPython 3.15 beta lacks coverage's compiled C tracer
patch =           ["subprocess"]  # children auto-measure via COVERAGE_PROCESS_CONFIG + shipped pth; forces parallel data files, so reporting requires a combine step

[tool.coverage.report]
fail_under =    90  # sysmon captures fewer arcs than the unavailable C core; 90 keeps the floor real instead of binding on precision-0 rounding
show_missing =  true
skip_covered =  true
exclude_also = [
    "if TYPE_CHECKING:",
    "assert_never\\(",
    "\\.\\.\\.$",
    "if __name__ == .__main__.:",
]

[tool.coverage.json]
output = ".artifacts/python/coverage/coverage.json"
pretty_print = true

[tool.coverage.html]
directory = ".artifacts/python/coverage/html"

[tool.coverage.xml]
output = ".artifacts/python/coverage/coverage.xml"

[tool.coverage.lcov]
output = ".artifacts/python/coverage/coverage.lcov"

# --- [MUTMUT] --------------------------------------------------------------

[tool.mutmut]
source_paths = ["tools/assay"]                                    # Mutation runs through the Assay-staged workdir; retired `.cache/mut-venv` and requirements fallbacks stay retired.
pytest_add_cli_args_test_selection = ["tests/python/tools/assay"] # `type_check_command` stays unset: the prefilter aborts on any pre-existing checker diagnostic; tests are the kill mechanism.
pytest_add_cli_args = [
    "--hypothesis-profile=rasm-mutation",
    "-o",
    "required_plugins=",                                          # mutmut disables pytest-randomly, so this invocation waives the required-plugins guard
    "-m",
    "not benchmark and not network and not subprocess",           # subprocess tests execute the unmutated CLI outside mutmut's copied tree
]
do_not_mutate = ["tools/assay/__init__.py", "tools/assay/rails/mutation_gate.py"]
mutate_only_covered_lines = true  # mutation run supplies absolute-keyed coverage data for mutmut's covered-line map
max_stack_depth = -1              # disables mutmut's strict stack walk over importlib pseudo-filenames
# Per-mutant wall/CPU cap = (estimated suite time + timeout_constant) * timeout_multiplier, replacing the lax 15x default.
# Concurrency has no config key: --max-children is CLI-only (assay-governed); a bare run defaults to cpu_count.
timeout_multiplier = 4.0
timeout_constant = 5.0

# --- [IMPORT_LINTER] -------------------------------------------------------

# Canonical invocation: `lint-imports --cache-dir .cache/grimp` — import-linter has no config-file cache option, and the default litters the repo root.
[tool.importlinter]
root_packages = ["tools.assay"]
# TYPE_CHECKING-only edges (e.g. store's AssaySettings annotation) are not runtime layer violations.
exclude_type_checking_imports = true

[[tool.importlinter.contracts]]
name = "assay strata: model -> diagnostics -> store -> settings/aspect -> _logging -> catalog -> routing -> govern -> remote -> exec -> oracle -> rails -> registry -> automation -> __main__"
type = "layers"
containers = ["tools.assay"]
layers = [
    "__main__",
    "automation",
    "composition.registry",
    "rails",
    "oracle",
    "core.exec",
    "core.remote",
    "core.govern",
    "core.routing",
    "composition.catalog",
    "_logging",
    "composition.settings | core.aspect",
    "composition.store",
    "diagnostics",
    "core.model",
]

[[tool.importlinter.contracts]]
name = "rails are peer-independent"
type = "independence"
modules = [
    "tools.assay.rails.api",
    "tools.assay.rails.bridge",
    "tools.assay.rails.code",
    "tools.assay.rails.docs",
    "tools.assay.rails.health",
    "tools.assay.rails.mutation_gate",
    "tools.assay.rails.package",
    "tools.assay.rails.provision",
    "tools.assay.rails.static",
    "tools.assay.rails.test",
]
# Named debt: package rides bridge's apphost lease/client seam until a neutral client owner exists.
ignore_imports = ["tools.assay.rails.package -> tools.assay.rails.bridge"]

# --- [RUFF] ----------------------------------------------------------------

[tool.ruff]
cache-dir =        ".cache/ruff"
preview =          true
line-length =      150
required-version = ">=0.15.20,<0.16"
target-version =   "py315"
extend-exclude = [
    "**/.archive/**",
    "**/.artifacts/**",
    "**/.cache/**",
    "**/.claude/worktrees/**",
    "**/.history/**",
    "**/.scratch/**",
    "**/.tmp/**",
    "**/_archive/**",
    "**/_tmp/**",
    "**/coverage/**",
    "**/scratch/**",
    "**/test-results/**",
]

[tool.ruff.format]
exclude =                   ["*.md"] # Markdown fences: the linter skips *.md natively; fence layout is design-doc law, so the formatter skips them too.
line-ending =               "lf"
docstring-code-format =     true
skip-magic-trailing-comma = true

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    # --- [FORMATTER]
    "COM812",  # ruff format owns trailing commas
    "ISC001",  # ruff format owns implicit string concatenation
    # --- [MATCH_DISPATCH]
    "RET504",  # named intermediates keep flow pipelines readable
    "RET505",  # explicit match dispatch keeps exhaustive arms visible
    "RET506",  # explicit error branches keep ROP rails visible
    "SIM108",  # match/case owns dispatch, not ternaries
    "SIM114",  # match/case owns dispatch, not merged if arms
    # --- [DENSITY]
    "PLR0912", # one dispatch surface owns every branch; a branch cap pressures arm extraction
    "PLR0914", # dense dispatch surfaces own their locals; a variable cap pressures fragmentation
    "PLR0915", # one surface owns every arm; a statement cap never justifies splitting a closed union
    "PLR0916", # dense dispatch predicates stay on the owning surface; a boolean-expression cap pressures fragmentation
    # --- [ERROR_RAILS]
    "EM101",   # frozen errors carry inline messages
    "EM102",   # error constructors carry formatted context
    "TRY003",  # domain errors carry descriptive messages
    "TRY301",  # `@safe` ROP boundaries may raise inside the guarded call
    "TRY400",  # structlog `.error()` is valid outside exception handlers
    # --- [DOCSTRINGS]
    "DOC502",  # Raises sections may document propagated helper exceptions; DOC501 still requires direct raises
    # --- [SEMANTIC_ORDER]
    "RUF022",  # semantic public-surface order beats alphabetical `__all__`
    "RUF023",  # semantic slot order beats alphabetical `__slots__`
    # --- [WORKFLOW]
    "TD003",   # TODO links are not required for local maintenance notes
    "FIX002",  # TODO comments are accepted source markers
    "INP001",  # monorepo packages may be implicit namespaces
    "CPY001",  # top-level LICENSE owns copyright notice
    # --- [SECTION_DIVIDERS]
    "ERA001",  # compact `# --- [LABEL]` subsection dividers are source structure
]

[tool.ruff.lint.per-file-ignores]
"__init__.py"      = ["F401"]
"**/.claude/**" = [
    "TC003",
    "ANN001",
    "ANN401",
    "B905",
    "C901",
    "E501",
    "ERA001",
    "EXE001",
    "FBT001",
    "PLC0415",
    "PLC2701",
    "PLC3002",
    "PLR0911",
    "PLR6201",
    "PLW1510",
    "PTH109",
    "S105",
    "S310",
    "S404",
    "S603",
    "S607",
    "TID251",
    "TRY300",
]
"tests/**"         = ["S101", "PT018", "PLR2004", "PLR0913", "ARG001", "ARG002", "ANN201", "ANN401", "D101", "D102", "D103", "SLF001", "PLC2701"]  # PLC2701: specs import the private-by-design _testkit package
"**/adapters/**"   = ["ANN401"]
"**/conftest.py"   = ["E402", "F401", "ARG001"]
"tests/python/_testkit/runtime.py" = ["E402"]  # Hypothesis environment gates must precede imports

[tool.ruff.lint.flake8-annotations]
allow-star-arg-any =      false
mypy-init-return =        true
suppress-dummy-args =     true
suppress-none-returning = true

[tool.ruff.lint.flake8-bandit]
check-typed-exception = true

[tool.ruff.lint.flake8-bugbear]
extend-immutable-calls = [
    "beartype.BeartypeConf",
    "msgspec.Meta",
    "msgspec.field",
    "pydantic.ConfigDict",
    "pydantic.Field",
    "pydantic.PrivateAttr",
    "stamina.retry",
]

[tool.ruff.lint.flake8-builtins]
ignorelist = ["id", "type", "input", "format", "hash"]

[tool.ruff.lint.flake8-import-conventions.extend-aliases]
"dask.array" =     "da"
"dask.dataframe" = "dd"
"scipy" =          "sp"
"sympy" =          "sym"
"xarray" =         "xr"

[tool.ruff.lint.flake8-pytest-style]
parametrize-names-type =          "csv"
raises-extend-require-match-for = ["AttributeError", "KeyError", "RuntimeError", "TypeError", "msgspec.ValidationError", "pydantic.ValidationError",]

[tool.ruff.lint.flake8-self]
extend-ignore-names = ["_validate", "_disc", "_check", "_value_"]

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports =        "all"
banned-module-level-imports = [
  "adbc_driver_flightsql", "daft", "dataframely", "datafusion", "fastexcel",
  "geoarrow.rust.compute", "h3ronpy", "igraph", "laszip", "lazrs",
  "odc.stac", "planetary_computer", "pointblank", "polars_st",
  "pystac", "pystac_client", "stac_geoparquet", "tensorstore", "xarray", "xrspatial",
]

