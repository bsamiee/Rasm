    "csvkit",                                        # [DATA]: CSV CLI suite for the tabular subprocess boundary
    # --- [SCIENTIFIC]
    "adbc-driver-manager",                           # [DATA]: ADBC driver manager for Arrow Flight SQL and DuckDB
    "arro3-core",                                    # [DATA]: Arrow core bridge
    "arviz<1.0",                                     # [COMPUTE]: Bayesian diagnostics
    "awkward",                                       # [DATA]: ragged arrays
