language: en-US
tone_instructions: "Senior-to-senior register. Dense, declarative, evidence-anchored findings. No praise, no emojis, no hedging. Doctrine violations (CLAUDE.md, docs/stacks) are defects, not suggestions. Prefer polymorphic collapse over additive patches."
early_access: false
enable_free_tier: true
inheritance: false
reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_instructions: >-
    Lead with contract-surface and behavior deltas, one dense paragraph. No restated
    diff statistics, no methodology narration.
  high_level_summary_placeholder: "@coderabbitai summary"
  high_level_summary_in_walkthrough: false
  auto_title_placeholder: "@coderabbitai"
  auto_title_instructions: ""
  review_status: true
  review_details: true
  commit_status: true
  fail_commit_status: false
  collapse_walkthrough: true
  changed_files_summary: true
  sequence_diagrams: true
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: true
  labeling_instructions: []
  mutually_exclusive_groups: {}
  auto_apply_labels: true
  suggested_reviewers: true
  auto_assign_reviewers: true
  suggested_reviewers_instructions: []
  in_progress_fortune: false
  poem: false
  enable_prompt_for_ai_agents: true
  abort_on_close: true
  disable_cache: false
  slop_detection:
    enabled: true
  path_filters:
    - "!**/pnpm-lock.yaml"
    - "!**/uv.lock"
    - "!**/packages.lock.json"
    - "!**/obj/**"
    - "!**/bin/**"
    - "!**/goldens/**"
    - "!**/*.verified.*"
    - "!**/*.har"
  path_instructions:
    - path: "**"
      instructions: >-
        Universal bar: anticipate 10x functionality growth — surfaces absorb new modalities
        as rows, cases, or dispatch arms, never as new files, flags, or knobs. Defects:
        knob/param/flag spam, hardcoded values, fragile string plumbing, naive happy-path
        logic, hand-rolled reimplementations of capability the ecosystem already provides.
        External packages are first-class implementation material used at full power, newest
        stable versions. Everything is agent-first: composable, receipt-bearing,
        self-describing, no interactive-only paths. Collapse spam relentlessly.
    - path: "**/*.cs"
      instructions: >-
        The C# doctrine lives in docs/stacks/csharp — review against it, not generic
        convention. Functional-first: monadic result rails over exceptions for domain logic,
        polymorphic dispatch surfaces over method proliferation, one entry point
        discriminating on input shape over get/getMany/getById spam. Language and framework
        floor per global.json and Directory.Packages.props. Aggressive API breaking beats
        compat wrappers; no [Obsolete] aliases.
    - path: "**/{*.csproj,*.props,*.targets,package.json,pyproject.toml,global.json}"
      instructions: >-
        Manifests carry structure and centrally owned versions: Directory.Packages.props
        for NuGet, hand-edited — a Version attribute on a PackageReference outside central
        management is a defect, as is any dotnet-add-shaped drift; package.json with the
        committed pnpm lockfile for TypeScript; pyproject.toml with uv for Python. Version
        movement is forward-only — a downgrade or stale floor without a recorded reason is
        a defect.
    - path: "**/*.py"
      instructions: >-
        The Python doctrine lives in docs/stacks/python — review against it, not generic
        convention. Version floor per pyproject.toml; uv-managed, ruff and ty clean, anyio
        for async. Typed result/effect rails; expression-shaped logic; no bare exceptions
        crossing domain boundaries. Singleton helper modules where an owning surface exists
        are defects.
    - path: "**/*.ts"
      instructions: >-
        The TypeScript doctrine lives in docs/stacks/typescript — review against it, not
        generic convention. Version floor per package.json and tsconfig. Effect rails with
        tagged faults, Config.redacted for secret-bearing config, Schema decodes at every
        boundary, no any, no class-based services, pnpm with committed lockfile, registry
        dependencies only — vendored SDKs and nested src/ trees are defects.
    - path: "libs/**"
      instructions: >-
        Design pages under .planning follow the campaign method: code fences are the work
        product, transcription-complete — external members verified against the folder's
        .api/ catalogue; abstract sketches, pseudo-code fences, and hand-waved contracts
        are defects. Root-up rebuild law applies to planning prose exactly as to source;
        wrappers and grab-bag abstractions in fences are defects. Strata depend only
        upward; geometry, meshing, and IFC each keep exactly one owner per runtime;
        branches couple only through wire contracts and companion seams.
    - path: "tools/**"
      instructions: >-
        Repo tooling: each GritQL pattern encodes one doctrine defect with a precise match
        shape — patterns overlapping an existing pattern's territory are defects. Bridge and
        manifest changes keep deterministic proof rails intact; analyzer and assay surfaces
        stay parameterized, never hardcoded to a fixture.
    - path: ".claude/workflows/**"
      instructions: >-
        Workflow scripts are deterministic orchestration: plain control flow, schema-typed
        agent outputs, bounded loops and harvest rounds, every stage writing its product to
        disk and returning a path receipt. Defects: bare promises without await ownership,
        unbounded polling, branching on wall clock, subagents asked to wait — codex wrappers
        are launch-only and the orchestrator owns time.
    - path: "**/*.md"
      instructions: >-
        Review prose and structure against docs/standards/style-guide.md,
        docs/standards/formatting.md, and docs/standards/information-structure.md — the
        docgen discipline. Defects: no-op sentences that change no reader decision, leading
        filler words, meta-commentary, provenance/freshness tails, checklist tails, heading
        proliferation for short content, tables carrying explanations instead of enumerable
        facts, duplicated content an owning doc already carries, drift from the [UPPER_CASE]
        label convention, quality ladders (good/better/best tiers) where a contract gate
        belongs, restated obligations the instruction chain already carries (follow
        CLAUDE.md, use available tools), and defensive caveats softening settled rules.
    - path: ".claude/skills/**"
      instructions: >-
        Skill bundles under the docgen skill-craft law. Defects: first- or second-person
        voice in frontmatter descriptions — quoted user-utterance trigger phrases are not
        voice; over-broad triggers spanning unrelated domains or keyword-stuffed synonym
        lists; SKILL.md over 500 lines or carrying reference
        banks, troubleshooting ledgers, or example floods that belong one hop down;
        references that only route to other references; no-op intensifiers with no owner,
        action, or gate; filler lead-ins (note that, make sure to, remember to);
        good/better/best quality ladders instead of contract gates; command catalogs
        without task triggers; generic think/plan/implement lifecycle steps; closing
        checklists with no machine-checkable gate; deterministic multi-step procedures
        narrated in prose where a bundled script belongs; three or more abstract guidance
        bullets with no paired rejected/accepted example or gate; one mandated output
        skeleton regardless of consumer; instructed network fetches or global installs
        inside skill bodies, except an owned install surface naming exact source, scope,
        and verification.
  auto_review:
    enabled: true
    description_keyword: ""
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 0
    ignore_title_keywords: []
    labels: []
    drafts: true
    base_branches: []
    ignore_usernames: []
  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: false
    simplify:
      enabled: false
    autofix:
      enabled: true
    custom: []
  pre_merge_checks:
    override_requested_reviewers_only: false
    docstrings:
      mode: "off"
      threshold: 80
    title:
      mode: "off"
      requirements: ""
    description:
      mode: "off"
    issue_assessment:
      mode: "off"
    custom_checks: []
  tools:
    ast-grep:
      essential_rules: true
      rule_dirs: []
      util_dirs: []
      packages: []
    shellcheck:
      enabled: true
    ruff:
      enabled: true
    markdownlint:
      enabled: false
    github-checks:
      enabled: true
