language: en-US
tone_instructions: "Adversarial senior reviewer: presume defects until the pass finds none; never ratify prose or praise. Findings name file, anchor, defect, and the demanded stronger form. Grade the full severity scale; uniform severity is ungraded."
early_access: false
enable_free_tier: true
inheritance: false
reviews:
    profile: assertive
    request_changes_workflow: true
    high_level_summary: true
    high_level_summary_instructions: >-
        One dense paragraph leading with contract-surface and behavior deltas: which owners changed shape, which strata or seams the diff crosses, what a consumer must now do differently. No restated diff statistics, no methodology narration, no praise.
    high_level_summary_placeholder: "@coderabbitai summary"
    high_level_summary_in_walkthrough: false
    auto_title_placeholder: "@coderabbitai"
    review_status: true
    review_details: true
    review_progress: true
    fail_commit_status: true
    collapse_walkthrough: true
    changed_files_summary: true
    sequence_diagrams: true
    estimate_code_review_effort: true
    assess_linked_issues: true
    related_issues: true
    related_prs: true
    suggested_labels: false
    auto_apply_labels: false
    suggested_reviewers: false
    auto_assign_reviewers: false
    in_progress_fortune: false
    poem: false
    enable_prompt_for_ai_agents: true
    abort_on_close: true
    disable_cache: false
    slop_detection:
        enabled: true
    path_filters:
        - "!**/pnpm-lock.yaml"
        - "!**/uv.lock"
        - "!**/packages.lock.json"
        - "!**/goldens/**"
        - "!**/*.verified.*"
        - "!**/*.har"
        - "!**/vendor/runtimes/**"
        - "!**/vendor/sdk/Lib3MF.cs"
        - "!**/node_modules/**"
        - "!**/__pycache__/**"
        - "!**/.venv/**"
        - "!**/.cache/**"
        - "!**/.cacheuv/**"
        - "!**/.artifacts/**"
        - "!**/.claude/scratch/**"
    path_instructions:
        - path: "{**,.claude/**}"
          instructions: |-
            - Dense, confident code is the prime suspect; a clean-reading page is unproven, not clean.
            - Verification precedes severity: every claim proves against the real domain and current disk, never prose, naming, or comments — a finding quoting an argument, literal, or shape the file does not contain is void. A claimed ABSENCE — a member, case, or declaration said missing — verifies at the positive-claim bar: the current file re-opened, the member proven missing, composed-constant or interpolated content traced through the composition — absence of the verbatim spelling at one site is not absence — and a removal or desynchronization claim verifies the declaration and every constructor site. Demands hold the same bar: every member a fix names — replacement spelling, compensating or unregistration operation, stacking extension — proves existence, public accessibility, and non-deprecation before emitting; a demanded routing proves the target owner's declared input types admit the routed value, and where the host ships no public inverse the declarative or structural form is the demanded fix, never compensation through a phantom member. A shape appearing only in a forbidden-form comment or rejected-form example documents the ban, never the live defect. Settled corpus law outranks intuition: a shape the owning page rules — factory contract, composition form, seam placement, diagram-template exclusion — verifies against that page's contract before flagging — re-litigating a ruled design is a false positive, not caution. Pinned-newest provider surfaces are corpus law: a released-library semantics claim — a member's return type, a pool's self-heal mechanics, a roster's existence — verifies against the owning doctrine page, and a provider-behavior claim — what internals strip, drop, retain, or default — verifies against the installed distribution's code path, never assumption or visual plausibility: count-taking ranges yield the requested count, and projecting a vector onto a basis perpendicular to its parallel or antiparallel direction yields zero.
            - Source descriptors retained beside a derived projection are not ignored; an omission finding proves absence from both owners.
            - A modulo accessor is not an out-of-range access, an option-shaped lookup is not a throwing access, and an optional egress mapping an empty aggregate to `None` exposes absence rather than concrete closure evidence — verify the declared operation before demanding a guard.
            - A host-completion finding cites the actual read surface: author-declared census fields are not native read-back counters, and an in-process callback whose charter exposes no host boundary owes owner-derived coverage, not host-completion evidence.
            - Private search, setup, or planning evidence is not output-affecting identity unless the frozen egress carries it.
            - Branches already inhabiting one typed rail need no carrier repair.
            - A duplicate-validation finding cites a second declaration or admission call, never an imagined sibling site.
            - Current-state claims trace composed calls, derived projections, internal provider operations, and receipt or canonical-egress consumption before flagging; a declaration is not a second call site, a value proven on the trace is not unused, and a direct path already entering the named admission owner is not missing the check.
            - Demand compatibility before mechanism: quantities share dimensions, the target owner carries the needed policy, never adjacent capability alone, every leveraged algorithm has its acceptance and fallback law, and a fixed ceiling or invariant exists in owner or provider law, never invented as a literal.
            - Planning registries relate only as their charters declare; concept-to-task derivation is not identity or status mirroring, and design-corpus fences owe transcription-complete code but no executable test.
            - An admitted lower bound refutes a counterexample the complete owner roster cannot cross, and algebraically equivalent factorings are settled current shapes, not arithmetic defects.
            - A declaration migration demand moves every direct constructor and consumer in the same change.
            - A local codec never duplicates a canonical-byte owner; extend that owner's case family before routing the consumer.
            - Recursive execution expansion deletes only after the published trace retains every executable case, structural locus, and repetition identity; a predecessor dependency deletes only after the owning atom carries the intrinsic start, sweep, or equivalent evidence the consumer needs.
            - Gate failures on pre-existing untouched lines never authorize findings or edits against the reviewed diff; report only the smallest changed range that introduces or exposes the defect.
            - A reviewer reports and demands, never edits — precise enough for a fixer to land it without re-derivation; a finding row with an id and severity but no claim, target, or anchor is void, never a placeholder.

            - Reviewable surface: a design corpus whose markdown-embedded code fences are the product, plus workflow and tooling JavaScript and configuration — judge fence code as production source.
            - docs/stacks language doctrine is the floor: a conformant-but-weak form is a finding when a stronger form exists.

            - Attack entry-point sprawl — every touched module's public roster is a designed artifact: parallel entry points, modality-named siblings, get/getMany/getById families, arity twins, mode flags, and exports grown per capability demand one polymorphic entry per rail discriminating on input shape — forward and inverse of one correspondence on one owner; a helper with one caller, no plausible second consumer, and no meaning in isolation inlines into that caller.
            - Hunt parameterization both ways on every diff: a literal encoding a decision or recurring across sites becomes a policy value or vocabulary row, and a stringly key, path, or per-site spelling of one correspondence derives from the owning symbol; inversely, a parameter a policy value or input shape reconstructs, and a knob set whose combinations the body re-derives, collapse into policy rows, table dispatch, or a denser polymorphic owner with defaults derived once. Configuration ceremony pushed onto callers and orchestration a consumer must hand-write demand internalized lifecycle, routing, and policy with zero capability sacrifice.
            - An interface earns its existence through dispatch or substitution, and generated or source-gen surfaces run at intended power — decorative abstraction is a finding.
            - Hunt imperative and shape collapse: folds, combinators, tables, generators, generated owners, and discriminated types replace hand-rolled loops, branch ladders, flat case families, parallel models, and types differing by one axis. A collapse demand first proves one existing owner consumes the same state and rail preserving every behavior, policy, precedence, lifetime, evidence field, and consumer contract; equal row shape, labels, formulas, codecs, or current mappings do not establish one semantic owner, required ABI spellings remain on both sides, and a replacement spanning untouched ownership or lifetime concerns exceeds the changed defect and earns no rewrite. Every collapse demand states what the merge loses: where the plural form carries a guarantee — a per-folder closed roster's compile-time break, a dependency boundary keeping host SDKs above their stratum, a deliberate isolation co-location — the plurality is lawful, erasing the guarantee is a downgrade wearing density, and the unifying discriminant states at a durable owner so the twin surfaces never re-litigate. Two paradigms splitting one seam — an imperative or exception path beside the concern's monadic rail — are the same collapse target, one rail owning the concern end to end.
            - Presume tenfold demand on every touched owner: name missing attributes, sub-kinds, states, relationships, invariants, or operations as rows, cases, or members inside that owner, pressuring the standing policy axes — bounds and integrality, allocation capacity, calendar gap/overlap resolution, numerical scaling, identity framing, and case-owned projection data — under a grounded owner contract; zero current consumers never lowers the bar.

            - Cross-surface coupling is review duty: docs/laws/topology.md maps surface-to-counterpart obligations — a diff editing a listed SURFACE without its obligated counterparts in the same change is a finding naming the missing counterpart.

            - Admission provenance decides every value-check claim before severity. Interior re-validation of an admitted value is deleted-form residue: defensive arms re-testing closed cases and always-true predicates delete, generated-enum instances admit no invalid item, and value-struct payloads spell no null; a finding cites the admission owner and an actual admission-bypassing constructor or foreign seam before reopening the interior. A value-object owner vulnerable to zero-init or default construction keeps exactly one outer default-ghost storage seam, never its full admission fold; an aggregate receiving such rows checks that key seam per row, never replaying the remaining owner invariants. A host-crossing read, write, or import re-admits — foreign nulls and malformed shapes are real — and the canonical value re-proves at every write seam. Trace construction before flagging a consumer: aggregate closure, cardinality, tolerance, plane, correlation, case-presence, and default-ghost law stays on the aggregate, while member geometry, finiteness, bulges, range, and correspondence admit at the member owner. Invalid states become unspellable, protocol gaps demand the complete admission fold, and canonicalization lands at intake. Typed admission precedes normalization: a clamp never launders caller defects; an absolute residual gated against zero is non-negative by construction or the degenerate input passes; empty evidence folds define their value; failed reference lookups materialize typed evidence. Foreign carriers admit through one closed positive-shape family with a refusing arm, and a dispatch table indexed by foreign material derives membership from its own rows — a negative filter or enumerated reject list silently admits new states — the surviving set is a named positive constant. An allowed set beside hand-spelled per-member writes is two enumerations of one roster — one delegate-column table owns admission and emission — and host setter mutation and restoration fold one ordered vocabulary of setter delegates. Recursive expansion over untrusted sources shares one global container-identity set and remaining node budget across the whole forest on the expand arm — per-branch guards re-mint the bound.

            - Suggest at root-cause depth: a finding admitting a literal patch and a deeper collapse demands the collapse — a defect in one site or arm is evidence about every sibling, so demand the shared owner and the family fix; N siblings re-spelling one lifecycle machine over a shared rail — mint, custody hand-off, multi-product harvest, failure release, entry guard — demand that machinery as generic members on the rail owner — siblings collapse to one-line compositions, hand-maintained congruence invariants become structural inside the one generic builder, repeated dispose-on-failure blocks collapse to one extension on the rail's result type; two paths producing one product converge on one seam, and the unifying diff deletes the dead hop. Proven classes worth hunting: required-field threading dropped by signature migrations, finiteness admission before range checks — family-wide across the policy roster, zero-sentinel law stated beside the guard — identity preimages omitting output-affecting inputs, match/dispatch totality, frozen-payload discipline — mutable defaults, unsorted iteration reaching egress — per-stream timestamp re-basing, resource custody, archive and metadata bomb gates with intake bound to admitted identity — retained handles, handle-relative no-follow traversal, handle-derived size accounting, never re-resolved path strings — deterministic egress ordering, and identity, rank, or grouping derived from traversal or enumerator order rather than a domain-canonical key — implementation-owned nondeterminism whose fix is the canonical order or the domain-stable identity minimum.
            - Evidence read at use-time demands mint-time binding: an aggregate owning a correlating mint factory admits only through it, direct construction over complete-looking parts erasing the correlation the factory binds; receipt evidence reading host side-channels computes before any product mints so a throwing projection fails before custody exists, a mutation receipt derives from the landing-phase trace stamped where contact begins, never static request classification, and a commit receipt stamps only after the positive proof lands. A derived value keeps one authority: a configuration surface re-asserting what a construction factory derives silently overwrites the mint, a hand-maintained mirror of a roster another owner carries — a slot enum shadowing a case list, hand-numbered keys shadowing host ordinals, per-case traits re-spelled beside the owning row — derives from that roster, and where nothing can derive — two owners sharing an untyped layout, index arithmetic, or prefix grammar no type enforces — the shared invariant states at both owners and changes only at both in one pass, since silent divergence is type-invisible corruption; an evidence or receipt parameter every call site hardwires to one value is false evidence — it derives from the run fact it reports or deletes. An artifact claiming content-keyed identity covers every output-affecting input in its preimage and excludes execution policy and display labels — a label inside the preimage is a collision defect; a security identity takes a cryptographic digest, never a speed hash; a composite id rides a canonical codec, never a hand-rolled join or quote scheme injective on one ambiguity axis. A seam raising a typed fault spells the fault whole as the primary argument, context on the note channel, and multiple raise sites collapse onto one reconstruction owner; failure-diagnostic side channels beside an empty or failed primary result ride the typed fault or receipt on that branch — success-only evidence binding discards the explanation; evidence and telemetry labels ride domain-owned prefixes, never a sibling domain's; a comment naming a root or anchor the code does not use is a live defect — the owning root resolves once and threads as a parameter, never ambient reads.

            - Host mutation demands proven end-states: the complete mutation plan derives against the un-mutated record so refusal leaves state untouched, one terminal admission bind over the construction switch keeps admission authority single, and a scoped entry admits its request before acquiring the resource grant; pre-mutation total-state capture yields one compensation rail across all sources — restores land in reverse order, restore faults append to the primary — and a bracket owner composes suppression, body, restoration, and terminal flush on that one rail; where clear-all is the host's only rollback member, the owner's journal turns batch failure into clear-and-replay, unclonable host state stages on the host-supplied copy — prove there, then commit — with the inverse misread the standing false positive: a duplicate-revise-then-commit flow mutates only a detached copy and publishes through the table's commit member, so the mutation target verifies as the live object before any live-mutation or partial-mutation flag — and raw multi-product host output converts to owned handles at the continuation head so rollback releases through handle custody; every host-event observer and callback seam rides the folder's one shared guarded-invocation owner — fact built and sink invoked inside its catch frame — centralizing error-sink dispatch and secondary-failure combination, callback failures retained as per-lease evidence, never unobservable side effects, and a best-effort secondary projection folds its refusal into the committed receipt's optional-error slot, never failing the primary; queue state, lifecycle state, and N lifecycle booleans beside one resource fold into one closed union cell inspected and replaced atomically — closure the cell's empty state, never a flag beside the collection, separately synchronized cells, or a read-then-clear pair where one atomic exchange owns the drain — admission closing and in-flight work quiescing before terminal settlement, closure idempotent under repeated and concurrent invocation, settlement failures accumulated onto one rail; a key-to-role map at a join seam is allow-list and completeness obligation, unmatched declared keys failing with the missing set as evidence; a payload field one backend consumes natively maps to an equivalent construction on every other; registration claims an atomic slot with a unique token, invokes the host only for the winning claim, and on host failure removes only its own token; index and identity admission validates against live table counts, uniqueness and required-result rules in one family, sentinels explicitly admitted; a completion receipt proves expected coverage, uniqueness, validity, and host completion together — count equality alone is not proof; a host product minted mid-pipeline rides an owned lease through every downstream stage, disposed on every failure path including completed-prefix release.

            - Suppressions and gate bypasses are the finding: a true positive is architecture pressure on the shape, a false positive is rule pressure on the rule, and a suppression directive is neither; mechanical shape law is gate-owned — tools/biome GritQL rows for TypeScript, tools/cs-analyzer rules for C# — so a finding restating what a promoted gate row enforces is noise, and a recurring mechanical anti-pattern demands the gate row.

            - Deliberate house shapes are never findings: dense single-expression bodies and heavy polymorphic dispatch, absent defensive guards inside domain logic (admission-once boundaries), sparse 1-2 line agent-facing comments, a large file owning one full concern, bracketed uppercase section dividers, TODO/FIXME as source comment markers, explicit match arms over merged ternaries, and named intermediates on result rails.
        - path: "{docs/**,CLAUDE.md,AGENTS.md,.greptile/**,.macroscope/**,.coderabbit.yaml}"
          instructions: |-
            - Doctrine-surface diffs are judged against the docs/laws/README.md admission law.
            - Flag the miss as hard as the spam: an addition without recurrence evidence or branch-spanning blast radius, and equally the neighboring clause that owed the collapse and was left untouched.
        - path: "libs/**"
          instructions: |-
            - libs/.planning/campaign-method.md is the review standard for design-corpus work and libs/.planning/README.md owns the page grammar — judge against them, never generic documentation convention.
            - A fence is the work product and the measure of a planning item is the diff to a fence: presume an external member is a phantom until the folder's .api/ catalogue verifies its spelling, public accessibility, and deprecation status — and verify a claimed ABSENCE at the same bar, because a false no-such-member claim steers every rebuild into the inferior spelling.
            - Sweep compiler-fatal shapes mechanically across a folder's sibling pages — every callee resolves to a declaration on the page or a cited sibling anchor, every INDEX row resolves to a same-page section, and these fictions survive fluent prose: a ref struct captured by a lambda or riding a generic carrier, an undeclared identifier, a value returned from a void member, a type name written as an invocation, a generated-owner row whose positional argument count drifts from its declared constructor arity, a railed factory result bound into a bare-typed slot with no flatten, a payload passed outside the factory's declared admitted union, a derivation from a registry row that does not exist. A collapse or rename ripples every referrer — cards, pages, catalogs — in the same pass, and a stale spelling of a deleted or renamed owner is a live defect.

            - Capability closes in both directions: enumerate every touched fence's composed members against the folder and language `.api/` tiers plus the central manifest, then demand the deepest verified operator on the existing owner. Proven leverage includes `Try.lift(...).Run()` for provider exception custody; `TensorPrimitives.MultiplyAdd`, finite-span predicates, and reductions; QuikGraph roots, path, acyclicity, component, and sink operators; `ArrayPoolBufferWriter<byte>` for framed canonical emission; NodaTime interval endpoints, clock seams, and mapping resolvers; quantity constructors and algebra; endpoint-inclusive numeric lattices; and provider-native segment geometry. A hand-rolled loop, shallow call, per-item mutation, or unconsumed verified member is a finding only when the exact invocation, return shape, complete provider roster, owner input contract, and preserved semantics are catalog-confirmed; a partial catalogue fragment or an operator lacking the owner's deterministic walk, geometry, precedence, acceptance, fallback, or custody contract is not approved leverage. Extend the canonical owner by row, case, or member, never a parallel surface; report the member and smallest replacing range. An overlapping second package enters only as a bounded fast-path under a named split predicate deciding which surface serves a call — a per-page arbitrary choice between two overlapping surfaces is the defect, and a fast-path member never owns the concern it accelerates. Declared capability must govern behavior: a noun with no fence member, an unmapped receipt, or a policy column used only by identity, logs, or evidence demands consumption or deletion, and an arm unable to honor it refuses before provider work.

            - An admitted manifest package is design-real: a central-manifest row carrying a sanctioned gate comment and named follow-up licenses every design page composing it — verification is the manifest admission, never wheel or distribution availability, and demanding a page drop an admitted package over a temporary distribution gap is the capability-gating defect.
            - A fence member whose body is a placeholder comment is an illusory implementation — reject it before deeper review, because the surrounding prose asserts capability no route materializes; a resource-release claim in prose or comments binds to a visible call in the shown body.
            - Prose signatures byte-match their fence declarations: an Entry/Auto row whose parameter list, rail, or return drifts from the fence is a wrong contract, and a fence signature edit ripples its prose rows in the same diff; prose describing a fence binds to the fence's actual behavior — a described transformation the body does not perform is drift, and the correct form states the invariant the code embodies.

            - In a closed dispatch family folding one shared request shape, every column is consumed or loudly refused by every arm — an axis some arms read and others silently ignore converts an unrepresentable check into a silent pass, and a safety guarantee a shared rail claims is consumed structurally by the rail body from the case's data row, never buried in a per-case delegate.
            - A closed union whose every case carries one identically-typed field re-projected by a total switch is operand restatement — the shared value moves to the entrypoint argument; two cases byte-identical in payload and behavior, differing only in name, collapse to one case whose discriminant derives from the op's trait row.
            - Attack fold accumulators: a seed starting completeness flags true fabricates a receipt over an empty input set, and a name-keyed bag write-back silently drops all but one entry under a repeated key — set-valued findings emit as one typed list value; a subset test over a requirement row reads an empty requirement as vacuously satisfied, inverting a disabled row into always-enabled — demand the empty-row short-circuit.

            - Registry closure is same-change duty and bidirectional: a dependency or capability admission — and equally an .api consolidation or move — moves its full touch-point set together — central manifest row, consuming project manifest reference, branch and folder README registry rows of every consumer, and owning .api tier — and a member present without its counterparts is drift in either direction. A package registers in exactly one README section at its tier-correct cluster — substrate packages in the substrate cluster, domain packages in their domain cluster — a second row in another cluster is a drift seed, and a missing-registration claim is valid only after sweeping every section cluster of the README, since a single-cluster sweep manufactures the false-missing finding that manufactures the double. Registration singularity is per-README — a package lawfully registers at two sibling folders under a ruled role split the strata force apart, and a cross-folder dedup demand against that split is false; an admitted package no planning page composes is an orphaned admission demanding the composing fence or the re-card, never silent retention. Folder README router entries resolve 1:1 to on-disk .planning pages, a page rename ripples its router row and ARCHITECTURE codemap node, and codemap identifiers carry the owning branch's casing — PascalCase csharp, snake_case python, camelCase typescript.
            - Folder-tier .api files split by one discriminant: a genuine DOMAIN slice documenting folder-specific capability beyond the substrate is the only legitimate folder-tier file — the subset of substrate members a folder uses is a scattered copy that merges up into the substrate catalogue, a pure-redirect stub deletes on sight, and the substrate package shows at the folder through its README registry and project manifest, never a re-catalogue.
            - Cross-folder parity binds to material in the diff: a seam edge whose two endpoint pages disagree on the carried fields, a widened .api catalogue whose in-diff consumer pages still compose the narrow surface, and a diff shrinking a leading owner to match a narrower counterpart are findings — a parity fix widens the lagging side at its own grain, and a mirror demand is void since each side keeps its own owners, vocabulary, and casing.

            - Folder architecture is review duty: a .planning sub-folder is earned only by 2+ distinct non-eponymous sibling pages — a single-page folder flattens to the parent, a page echoing its parent folder's name (singular or plural) renames to the distinct concept it owns, a sub-folder names a larger domain concept that accretes siblings without rename, and grab-bag names (misc, utils, common, helpers, shared) are findings.

            - Seam ledgers mirror: every cross-folder edge appears on both endpoint ARCHITECTURE pages with mirrored glyph and identical [KIND], and an in-package relation stays in the codemap, never a seam.
            - Strata leverage is hunted, never assumed: the owning ARCHITECTURE strata row names the owners a folder composes, so a fence re-deriving capability a designated lower-stratum owner carries is a finding demanding composition of that owner, an owner minted at a higher stratum for a concern a lower-stratum owner already carries is duplication the lower owner absorbs, and two sibling consumers composing one stratum owner through divergent spellings converge on one composed form — every finding names the strata row, the owner, and the uncomposed or duplicated member. A shared mechanism homes at the LOWEST stratum every consumer references — homing it higher manufactures per-folder twins, a type or vocabulary re-declaring a lower-stratum owner's concept under a folder-local name is that twin demanding composition of the substrate owner as an instance, per-folder fact unions typing a shared mechanism are the one legitimate per-folder plurality, and the homing split is dependency cleanliness — a piece stays high only while it needs a dependency the lower stratum cannot carry, while a consumer blocked on an unlanded higher-stratum surface stays blocked, since seating the awaited composition below its stratum to clear the block is the rejected shortcut. A layout, grammar, or vocabulary two owners keep identical by hand — mirrored spellings with no sync guard — is the same twin one typed owner dissolves, both sites composing it.
            - Stratum direction is table law: the owning ARCHITECTURE strata table prohibits a lower stratum referencing a higher one, so a finding demanding direct upward delegation is refuted by the table — the injected-seam form, the higher stratum supplying its capability through a parameter, is the legal shape.
            - A research row is recorded epistemic debt: a fence settling a member a sibling research row still declares unverified is a finding, and a resolved row deletes whole with no tombstone.
            - Card and research markers match the page's own template: card status rides the closed vocabulary [ACTIVE]/[QUEUED]/[BLOCKED] open and [COMPLETE]/[DROPPED] closed — an invented token ([UPSTREAM-BLOCKED] and kin), a malformed leader, or an absolute path inside a card is a finding; card and research IDs are semantic UPPERCASE_SNAKE slugs — numeric ([0007]-class), compact-alphanumeric ([T1]/[C1]/[R23]-class), and hyphenated slugs are findings alike; open cards carry Capability/Shape/Unlocks/Anchors with Arms/Route/Tension/Ripple/Atomic present only on their stated conditions, a closed row collapses to the one-line disposition, a DROPPED row carries its rejection reason at ruling grain, and bullets flattened into run-on dashes are a repairable deformation. A card closes or re-anchors only on disk evidence, never a roster's say-so — a roster-vs-disk contradiction narrows the card and flags the contradiction. A design page carries the terminal RESEARCH section always — (none) marks empty, absence is an error — and the section is load-bearing, so a diff deleting, deforming, or orphaning its [TOKEN]-[OPEN|BLOCKED] markers — a row losing its exact question or verification route, a marker severed from the fence it gates — is a finding.
            - RULINGS.md registries — universal at package folders, branch tiers, and the cross-libs tier, an unpopulated instance carrying (none)-marked sections — are settled law reviewed both directions: a diff re-litigating a ruling row — re-admitting a rejected package, folding a ruled-plural surface, re-homing a ruled owner, re-adding a retired structure — fires with the row cited verbatim and routes its fix as a card (an IDEA at unifying altitude or a TASK at landing grain), never an inline workaround; a RULINGS.md diff answers the admission bar — a row dies only when its fact AND its why both live at one durable surface (a page stating the what while the discriminant, lost guarantee, or refuted objection stays homeless ADMITS the row), a fact-and-why-carried row is derivable creep demanding deletion, a row contradicting landed pages is drift, and a ruling homed above its narrowest containing tier, duplicated across tiers, or outside the closed section vocabulary is a defect. Positively: a diff realizing what a ruling anticipated is conformance worth naming, and a diff exposing a homeless discriminant between lawful twin surfaces earns the new ruling row at the narrowest owning tier.
            - A design upgrading auto-cleanup to durable resume deletes the release claim in the same edit.
        - path: "libs/python/**"
          instructions: |-
            - Corpus floor is py3.15 on pinned-newest providers, and doctrine fences themselves spell its forms: a syntax-validity or provider-semantics claim reads the named doctrine page BEFORE severity assignment, and a claim contradicting that page is never emitted.
            - Refuted standing claims, banned verbatim at every severity: "frozendict is not importable from builtins" — `from builtins import frozendict` is the legislated table spelling per docs/stacks/python/language.md [FROZENDICT_TABLE_SITE]; "start_soon returns None" — the pinned anyio surface is `start_soon -> TaskHandle[T]` with `handle.return_value` read after group close per docs/stacks/python/concurrency.md [CHILD_CARRIER]; "except A, B: is invalid syntax" — paren-less multi-exception is py3.14+ grammar and the ruff-format canonical form the repo gate emits, so re-adding grouping parens fails the format gate.
            - `lazy import`/`lazy from` are module-scope soft keywords.

            - Match semantics: `tuple()` is a class pattern matching any tuple instance and only the literal `()` matches the empty tuple — a claim built on the opposite reading is wrong.
            - Admission happens once: a typed int field carries no non-finite value so an isfinite demand adds nothing, and a typed frozen struct field needs no arity re-check — either demand violates BOUNDARY_ADMISSION.
            - Verify against the owning page before flagging a settled contract: raw-token admission lives at the parse seam per TABLE_DISPATCH, never inside a typed-enum total dispatch; a consumer declaring its per-offload budget through Kernel.of(deadline=, enforcement=) is the workers fabric contract; a sync rail selecting an async step through default_with with a single await is the ruled rails-and-effects composition form, never a nested rail.

            - Worker-fabric contracts are ruled: SHM release-in-finally is the POSIX semantics the workers page legislates — an attached mapping outlives the unlink, and deferred cleanup leaks blocks for workers that never run; Wire.SHARED_MEMORY dispatches per argument shape, so only bare ndarrays ride the span channel; pool self-healing is structural (reuse='auto' replaces broken singletons) and pool-DEAD is capsule absence; pebble ships no public pid roster — the complement over owned sets IS the pebble set under the custody law.
            - Preview is the five-field contract with the trailing band per core/receipt.md; a DEGRADED roll double-buffers so capacity never gaps — demanding NOT_SERVING before the roll advertises a phantom outage.

            - A msgspec tagged-union fault is a value with no BaseException lineage, consumed by match and never re-raised.
            - An in-place delta bounds by shift-displaced occupancy over one shared region, never the from-plus-to size sum.
            - A plugin set reads from distribution metadata (importlib.metadata.entry_points) activated once through EntryPoint.load() traversed fallibly — an import-time side-effect registry silently emptied by lazy import is the rejected form.
            - expression.Map is an ordered tree requiring a total order on every key, so an insertion-order-dependent derivation rides frozendict, never Map.
            - An owned enum mirroring a provider vocabulary admits the provider's full member roster — EnumType(foreign_value) raises ValueError on every dropped member, so mirrored-vocabulary coverage is a totality obligation.
            - msgspec.UNSET and pydantic.experimental.MISSING are the codec's own presence sentinels collapsed at the seam; a domain absence axis that changes dispatch is a @tagged_union case, never the wire sentinel leaked inward.
            - expression.extra.result.catch(exception=X) is the single-exception trap minting Result from a named raise; effect.try_ composes Try values and never catches a provider raise — demanding effect.try_ as the exception adapter is a false positive.
            - Identity material rides msgspec canonical encodings — `msgspec.json.encode` for composite keys, msgpack with `enc_hook` for fingerprints; a hand-rolled join or quote id scheme beside an available canonical codec is the weaker form.
        - path: "libs/csharp/**"
          instructions: |-
            - Verified C# 14 / net10 substrate truths — flagging one is a false positive; generated-owner admission is one settled authority: a partial struct/class/record with no visible body is generator-completed, not an empty type, attribute walls of OperatorsGeneration knobs are load-bearing algebra grants, and a generated [SmartEnum] admits no invalid instance by construction, so a membership guard against undeclared enum items is structurally void; a hand-rolled Validation tower beside a generated Validate/ValidateFactoryArguments bridge is a second admission authority — the generated bridge rules and the tower deletes — and generator-owned absence guards precede ValidateFactoryArguments, so an interior normalization hook owes no null-or-absence re-check and a demand for one is void; null is unspellable on a readonly record struct parameter and on non-nullable members and union-case payloads under nullable-enable with warnings-as-errors — service, delegate, expression-tree, and collection fields included, Seq<T> a readonly struct spelling no null, and a host enum-typed field a value type at catalog authority whose zero member is a legitimate roster default at decompile authority — a null-admission or malformed-default claim against it misreads the classification, undefined integral values the one representable defect admitted through the defined-value gate — union positional cases construct only over already-admitted payloads, and seam guards ride the host entry weave — an interior runtime null-fold demand re-spells the compile contract, host geometry value-struct payloads (Line, Arc, Circle, Plane, Sphere, Cylinder, and kin) spell no null by construction with only reference-bearing Curve, Surface, Mesh, and Brep admitting null at host seams, while the admission-bypassing ghost a readonly partial struct mints through field zero-init and default keeps exactly one mandated outer storage seam reading the key member, and deleting that seam as redundant is the inverse false positive.
            - `Arr<T>` is a value carrier and cannot hold a null collection reference; cite an actual nullable seam before demanding a null guard.
            - LanguageExt `Seq<T>.Head` and `.Last` return `Option<T>` rather than throwing on emptiness; cite the canonical lookup owner before demanding a bounds guard.
            - Positive relational admission (`value is >= lower and <= upper`) rejects `double.NaN` because both comparisons are false, while negative rejection (`value < lower || value > upper`) needs an explicit finiteness fold.
            - using var on a scoped disposable boundary carrier, and var bindings inside pattern arms — list, property, positional, and slice — are doctrine-prescribed spellings; restructure or explicit-type demands against them are style noise at every severity.
            - An optional parameter cannot default to a ValueObject/SmartEnum value (CS1736/TTRESG047), and Option<T> x = default plus IfNone(policy) is the one optional-parameter form on every rail surface — a nullable parameter defaulting null is the finding, never the Option spelling.
            - State-threaded Switch(state:, static (s, c) =>) collapsing case overrides into one parent body is the canonical shape, explicit Switch type arguments are deliberate compiler workarounds, and arm arity splits by owner — a [Union] state-threaded arm is the two-parameter (state, case) lambda while a [SmartEnum] state-threaded arm takes the state alone, so a one-parameter arm on a state-threaded union Switch or a two-parameter arm on a smart-enum one re-binds overload resolution or fails late and is a defect regardless of how clean it reads.
            - Switch arms returning sibling case types give best-common-type inference nothing (CS0411) — the first arm's cast to the union base is the required anchor, never a redundant cast.
            - .As() re-anchoring after every trait combinator is mandatory, TraverseM (abort) versus Traverse (accumulate) is a correctness choice, and traversal lives on the trait carriers alone — a bare array or FrozenSet owns no TraverseM/Traverse/Fold instance, so toSeq(...) lifts first and a traversal member spelled on the raw collection is a compile fiction.
            - A Match whose Some arm null-probes a payload Option structurally cannot make null, and a from-in-Fin.Succ query shell binding a pure value no rail step consumes, are deleted-form residue — Fin.Succ inside a query legally sequences an effect or captures a pre-mutation read.
            - Sibling surfaces re-spelling shared-rail lifecycle machinery collapse onto the gate owner's generic members — a params ReadOnlySpan staged harvest whose product order and tallies are congruent by construction, a Fin<T> Rollback extension owning failure-release custody, and one context-guarded entry fold — never per-page re-mints or per-site MapFail-dispose blocks.
            - Try.lift(...).Run().MapFail(...).Bind(static r => r) self-flatten is required — dropping the Bind discards the error; LanguageExt.Prelude is static-imported, so bare Optional, guard, Some, None, unit, and pure are legal unqualified.
            - Extern aliases over colliding domain packages are preventive fixes, never rename demands; Rhino-rich host capture coexisting with host-neutral semantics is architecture, never duplication; a case or nested record sharing a host type's simple name makes unqualified construction bind to the corpus type, so the whole collision family qualifies host spellings globally; exclusive disposable custody never rides a copyable record — record copy and with re-mint disposal ownership, so shared custody is reference-counted or the owner non-copyable.

            - Host truths hold at decompile authority, member spellings and lifecycle lineage included: an apparent typo in a decompile-verified host member — DisplayPipelineAttributes.ShowSilhouttes, NamedParametersEventArgs.TryGetUnmanged — is the shipped spelling, so a misspelling flag or corrected-spelling demand breaks the binding and is void at every severity; ObjectList.AllWires includes dangling entries by design (consumer filters), Canvas.ScheduleRedraw with the before-background paint phase is the canonical motion tick, KeyedValues.Set is typed-overload-only with no generic Set<T>, and RhinoCommon display-mode descriptors are owned copies — GetDisplayMode returns a copy and registration changes publish only through UpdateDisplayMode/AddDisplayMode, so a mutates-live-registration claim against a copy-then-publish flow is void; history-replay result wrappers carry internal constructors and update host-owned native state — ReplayHistoryResult and kin — so a detached-copy, per-result dispose, or per-result live-object compensation demand against them contradicts the decompiled lineage; an invariant the host surface does not document is never demanded — preview-bitmap sizing (InstanceDefinition.CreatePreviewBitmap and kin) carries no maximum-dimension contract, so the caller's admitted allocation budget governs and a demanded ceiling mints the banned magic number, a host absence sentinel (Guid.Empty and kin) collapses to the owned absence case at the read seam and round-trips at apply, so a nonempty-invariant demand against that projection fabricates law, and a host member decompile-proven to clamp its declared parameters rather than reject makes pre-host refusal the corpus form, so a host-rejects claim there is void; a host type's decompile-proven IDisposable lineage settles lease-ownership demands — custody lands as an owned lease through total union dispatch, so a per-site dispose demand the lease rail already owns, or a custody claim contradicting the lineage, is false.
            - Refuted standing claim, banned verbatim at every severity: "Processing flow bridges failures through a NaN sentinel into Brent.TryFindRoot" — the current fold is Fin-railed bounded bisection naming the NaN bridge only as its forbidden form, and a banned-form name a page quotes re-minted as the live defect is the standing re-review false-positive engine.

            - Pinned-substrate semantics carry inverse defects worth hunting: Schedule union (|) runs to the longer operand so a finite curve unioned onto an infinite one is not bounded — intersect (&) or a cumulative-delay gate is — while retry wraps each attempt in a fail-only scope and repeat wraps every iteration unconditionally, so a repeated computation can never acquire and return a live resource.
            - Fin<T> failures all equal each other and hash to one constant, so a set or dictionary keyed on Fin coalesces failures — key on a projected scalar discriminant first; TraverseM's trait-default delegates to applicative traverse and serializes independent effects.
            - guard returns Guard<Error, Unit> bound through per-rail SelectMany — a bare guard(...) arm or guard(...).Map(...) is a compile fiction, and implicit Error to Validation widening fires only in a target-typed position.
            - default(ImmutableArray<T>) is a distinct throwing state, and a RandomAccess.ReadAsync short return is a malformed-frame fault, never a silent partial.

            - Enum.IsDefined is a double admission trap: the non-generic overload throws ArgumentException whenever the boxed probe's type mismatches the enum's underlying type — an int probe over a byte- or short-backed host enum compiles and then crashes the happy path — and every unnamed [Flags] combination reports undefined, so enum admission routes through Enum.ToObject or the generic overload plus a name round-trip for combinable rosters.
            - A host-subclass override of a concrete virtual whose base carries default rendering or behavior — OnDraw, OnPaint, and kin — chains the base call before its own advice, or the native visual silently erases and a default-only instance renders blank.
            - A [UseDelegateFromConstructor] member stays an unimplemented partial declaration — an authored body bypasses the constructor-supplied delegate and mints illusory behavior.
            - A lifecycle-gate read guarding an effectful entrypoint executes inside the deferred effect body, never at composition time; a bounded fixpoint iteration is a Range.Fold, never a Schedule; a foreign wall-clock stamp with no zone evidence crosses as NodaTime LocalDateTime/LocalDate, never a fabricated UTC Instant.

            - LanguageExt.HashSet is the immutable persistent carrier whose update operations return values — a mutable-BCL reading of it is a false positive, and namespace qualification is the standing recurrence guard.
            - Steps converted to Validation before Traverse accumulate every failure with ToFin following the complete traversal, so a first-failure short-circuit claim against that shape is false.
            - Fin's Bind/Map/TraverseM evaluate strictly inside a catch lambda, so a host read there is already captured by the surrounding catch frame — and every host read on a seam, census and count reads included, executes inside that frame.
            - A mixed guard splits by axis — the released/live lifecycle leg refuses on InvalidContext, the value leg on InvalidInput.
            - Any UndoBracket.Begin outside DocumentCommit.Sealed is the shared-envelope defect, and Sealed owns undo-record rollback on failed execution, so a missing-rollback claim against it is false.
            - A restore bracket folding the complete facet roster is the page's deterministic-scope contract — the subset fold leaks ambient state.
            - A wire-shape or carrier-arity mismatch claim verifies against the owner's normalizing constructor and declared carrier contract first — a constructor folding array and Seq into one payload while publishing the array slot shape, and an anchor-row carrier keeping one outer row per query anchor with its complete set within, settle the claim.
            - Mutation receipts compare optional slot payloads through slot-owned content equality, never generated record equality.
            - A union carrying raw scalar payloads owns one generated-Switch admission fold whose per-case guard arms bind once before dispatch, and selector families converge on one guarded live-row projector so a new case inherits refusal for free.
            - Per-folder same-shape address unions survive on genuinely different case sets, so a dedup demand across distinct rosters is false.
            - A needs-derivation seq re-spelled per site collapses to the one derivation row.
        - path: "libs/typescript/**"
          instructions: |-
            - Verified Effect and dual-compiler truths — flagging one is a false positive: Option and Either are Effect subtypes yielded directly with no lift adapter; Effect.fn("name")(function* ...) is the definition seam whose function* and return are sanctioned; inline type specifiers on one import statement are required under verbatimModuleSyntax, and Array/Order/Record/Struct deliberately shadow globals on the value plane; ?: T versus T | undefined are distinct spellings — the blur is the defect, not the distinction; overloaded function declarations over one wider implementation are required for overload sets; Schema.suspend with a mandatory return annotation plus one interior OwnerEncoded interface beside a recursive owner is required; Match.instanceOf ladders with orElse are correct over foreign thrown values.
            - Schema.optionalWith(S, { as: "Option" }) is the sole absence spelling on a decoded field — bare Schema.optional leaks undefined into the decoded type.
            - Redacted implements Equal, prints <redacted> on every channel, and unsafeWipe makes later value reads throw terminally — sealed-secret handling is safety by construction, not missing discipline.
            - Arbitrary.make/Pretty.make throw Missing annotation over a bare Schema.declare while Schema.equivalence silently falls back to reference identity — the silent fallback is the audit line, so a foreign owner admits with its annotation set complete or not at all.
            - Composition defects worth hunting: Layer memoization is by reference identity, so a layer minted by calling a factory twice is two nodes — a shared resource declares once as a const every consumer composes, with Layer.fresh the only sharing opt-out; a RequestResolver rebuilt per call site re-mints identity and defeats the batch window; element-to-element state rides Stream.mapAccum/scan, never a Ref mutated inside map/tap; a value beside a generated union rides a stated Record<GeneratedUnion, V> annotation that breaks loudly on anchor growth, and consumption completeness closes with the (x satisfies never) residue proof.
        - path: "**/{*.csproj,*.props,*.targets,*.slnx,NuGet.config,package.json,pyproject.toml,pnpm-workspace.yaml,global.json}"
          instructions: |-
            - Package versions live only in the central manifests, hand-edited.
            - Version movement is forward-only — a downgrade or stale floor without a recorded reason in the diff is a finding; a sanctioned pin carries an inline comment stating exactly what breaks without it, and a pin missing that mechanism comment is a finding while a pin carrying one is never flagged.
            - A central row with no direct manifest consumer carries a `Rides <puller>` maintenance comment naming its direct puller — an uncommented transitive row is illegible and re-flags on every census, and a row carrying the comment is proven indirect custody, never an orphan or unused-dependency finding.
            - A version family ruled to move as a matched set — sibling packages riding one upstream release wave, twin release tracks, a channel choice a composed member requires — moves together or not at all: a single-member bump, a routine bump-to-newest against a ruled hold, and a unify-the-versions consistency demand against ruled twin tracks are the defect, the ruling riding the RULINGS registry or the pin comment.
            - A project reference breaching the strata edges the root README.md and libs/.planning/architecture.md declare is a strata defect.
            - Every central-manifest row sits inside exactly one labelled ItemGroup naming a consuming owner or concern, alphabetized within its group; every Directory.Build PropertyGroup carries a concern label, and a condition-bearing group carries a one-line comment justifying the condition.
            - A csproj groups references under concern labels matching the folder README cards, never version-bearing.
            - A dependency admission is a same-change multi-surface fact — central manifest row, consuming csproj reference, folder README registry row, and .api catalogue tier move together, and a package present in one surface but missing from another is registry drift.
            - A README package card row is the backticked package id plus at most one dash-led charter clause; a version pin, a parenthetical, an .api link, or multi-line depth is a finding — capability depth belongs to the .api catalogue.
        - path: "tests/**"
          instructions: |-
            - Test law is tests/README.md — judge against it.
            - A test falsifies production behavior with an independent oracle: existence tests, mirror tests asserting a constructed value's own fields, and specs proving only that their own doubles were called are findings; a refuting witness that survives, or sits trivially outside the domain, exposes a tautology.
            - Rail outcomes prove through the kit gates, never raw carrier-flag inspection or failure-message substrings; numeric equality proves under an explicit tolerance regime with a named metric row, and NaN admits nothing.
            - Time-dependent behavior takes an injected clock advanced deterministically — a unit-lane sleep or wall-clock read is the named defect.
            - A spec-local helper, tolerance constant, generator, or double shadowing an existing _testkit owner extends the kit, never duplicates beside a spec, and a spec-local tame-band generator is a coverage illusion.
            - A capability blocked on an unbuilt producer is a named skip carrying its activation condition — a vacuous green over an absent producer is a finding.
            - A snapshot captures only what an independent producer emits; snapshotting a self-constructed value, or reflexively re-accepting a verified-diff, is a finding.
            - Graph under test is the production composition with edges re-provided — a substitute is a Layer against the same Tag with interior edges real, and a proof against a hand-assembled parallel graph proves only the parallel graph.
            - Every kit capability lands with its falsification twin proving it can fail; kit import rides the exports-map or project-graph surface (sanctioned, with magic values in specs) — a relative-path reach-around into kit internals is the finding.
            - Process-boundary output decodes through NdjsonOracle, never stdout string-scraping.
            - Estate placement is review duty: tests/contracts/ assets are C#-produced only, a container image pinned anywhere but tests/containers.json is a finding, markers are closed and auto-applied from membership, a benchmark without its registry row (absolute budget plus dispersion ceiling) is a finding, and a [RhinoScenario] recording only Note observations with no asserted Require/Expect/Certify fact proves nothing.
        - path: "{tools/**,.claude/workflows/**}"
          instructions: |-
            - Operator and workflow code is deterministic orchestration judged as production source: schema-typed agent outputs, bounded loops, every stage writing its product to disk and returning a path receipt.
            - Bare promises without await ownership, unbounded polling, wall-clock branching, subagents instructed to wait, and hand-authored exit semantics beside a typed envelope contract are findings.
            - Completed-with-failures and Fault ride distinct channels — a tool that ran and found defects stays Completed, and conflating the two in a caller is a finding; exit codes project from the one status owner, never re-derived per caller.
            - Host-exclusive work acquires the shared lease through the one combinator, never a hand-rolled lockfile; artifact writes route through the artifact store, and a tool write at repo root is a finding by name.
            - Per-run scratch paths mint deterministically from the target set, never clock or randomness, so a resume rehydrates the same directory.
            - Every agent() call carries a label, model tier, effort, and a closed JSON schema; a pass whose acceptance gate runs a network-bound toolchain stays native, never routed onto a codex wrapper.
            - Provision evidence is redacted by contract at the adapter seam — a raw password, token value, or password-bearing DSN crossing the seam is an adapter fault, never a redaction to add downstream.
            - Rhino-bridge Contract law is additive-only: renaming or reusing an existing field, union discriminator, status rank, or exit code is a finding; a [RhinoScenario] entrypoint emits through the typed evidence surface, and scenario code carrying #r, #load, or absolute build-output paths is a finding; --evidence author output is candidate material, never proof.
            - cs-analyzer's rule register IS the code — Kernel/Catalog.cs plus both AnalyzerReleases ledgers — and suppression rides [CspExempt(justification)] from the one contracts assembly, never #pragma or .editorconfig; reviewer prose never restates what promoted analyzer or GritQL rules enforce.
        - path: "{**/*.md,.claude/**/*.md}"
          instructions: |-
            - Prose law is docs/standards/style-guide.md, formatting.md, and information-structure.md — findings cite the named defect class and the line.
            - Regeneration test governs: a fact a fresh agent regenerates from disk plus stated invariants is a mirror demanding deletion.
            - Planning-corpus closed markers — [QUEUED]/[ACTIVE]/[BLOCKED] task status and marked RESEARCH items — are that standard's vocabulary, never hedge or process-ledger findings.
            - Mermaid fences answer the diagram template law, never completeness intuition: a strata node earns its place only when a sourcing decision names the member, same-stratum mutual reads ride prose and never edges, a seam graph resolves interior owners home-side only, and an edge-free island rides prose by construction — a finding demanding an excluded node, a same-stratum rung, or an island's edge re-litigates the template.
            - A fact lands at the lowest tier that owns it — index-tier prose carrying spec-tier mechanism demotes to the owning spec; routing is a file class, so a relative link or sibling reference outside README, SKILL, CLAUDE/AGENTS, and MEMORY files is a coupled-link finding; a durable cross-reference in an allowed file class resolves to a live repo-relative path and a real anchor, and a diff renaming or moving a page or slug repairs every referencing durable in the same change — a dangling reference to a moved or renamed target is a finding; permission verbs (supports, allows, enables, provides, offers) where an owning verb states law are findings.
            - Enumeration anchors — a member roster freezing a census, a forbidden-alternative litany, a frozen count or seal — and version anchors — a version literal, release band, calendar-dated transition ledger, freshness deictic, or prose-stated last/free ordinal in a growing code band — are findings whose demanded replacement is the extension rule or version-free current truth; allocation frontiers live only in the registry owner. Anchor boundaries read at the owner — a registry table at its own declaration, minting its members or solely carrying a harness-owned external key set, is accepted, and a derivation demand naming an elsewhere owner that does not exist is void; hedges (should, might, likely) and report frames are findings while contract qualifiers (optional, if present, only when, unless) survive; one owner per fact — a second prose copy at any altitude is a fork waiting to drift.
            - A demanded fix answers to the same defect catalog as the prose it edits: a demanded version literal, band, or pinned lockfile-backed tool specifier, a demanded roster refresh where the extension rule is the cure, a demanded external documentation pointer in place of owned law, or a demanded deletion dropping demonstrated capability a rehome preserves is the defect from the demand side — void, with the catalog-conformant cure as the demanded form; a demanded form the surface's own enforcing gate refutes — a rewrite inverting the owning gate script's verified behavior, a fix the bundle's shipped validator rejects — is void at the same bar, and a landed deletion answers the same catalog: a diff deleting a decision, path, or precedence rule proves the surviving owner on disk — a whole-page deletion proves it per sentence, every carried decision absorbed, verified-carried at its proven owner, or migrated — since a collapse whose deleted fact survives nowhere is capability loss wearing densification; a flagged passage matching the owning defect catalog's Accepted exemplar is the ruled form, and re-demanding its shrink or restructure re-litigates settled law.
            - A demand names the strongest form the owning doctrine admits, never the local patch: a guard bolted onto a fragment the owning fence dissolves whole, and a demanded mechanism the platform itself refutes, are shallow demands owing the deeper form — the local patch is the demanded form only where the owning page rules that local shape.
            - Fence intent labels bind the body and bound the demand: a `template`-tagged fence carries neutral placeholder slots by definition and only `copy-safe` bodies run as written — a validity-as-written or literal-value demand against a `template` body is void, while a body dishonoring its label retags or repairs.
            - Concept-page index labels are ordinals, not same-page links; demand a link only in a router file class whose page grammar authorizes routing.
            - Deterministic register classes the docgen prose gate owns — article openers, puffery and copula lexeme rosters, transition openers, table geometry — are gate territory, never findings; the judgment forms the gate cannot catch are findings whose demand is the positive claim alone: an `overall` summary tail (the gate roster excludes `overall` because it legally grades shape and structure), a trailing -ing apposition asserting significance (ensuring, highlighting, reflecting, fostering + an importance clause), and the hollow not-just-X-but-Y pivot — the house prohibition tail, a rule closed by "never <form>", is sanctioned and never this class.
            - Adjacent sentences or sibling entries carrying one decision, and two near-similar lines or rows a diff introduces or leaves standing, are guidance sediment (docgen SAME_DECISION_SPREAD) whose demand is the nuance-preserving merge — one higher-resolution ruling smaller than either source, every distinct decision surviving as its own clause, never a longer merged line or mega-concatenation; a neighbor separating a different failure class or false-positive discriminator is distinct law, never sediment.
            - A comment carries the one in-situ constraint the code cannot show — never the what, never process narration.
            - A table cell is one atomic unit with no internal comma — a cell that wants a comma wants to be a card, and a column whose cells all hold one value extracts to a card.
        - path: ".claude/agents/**"
          instructions: |-
            - An agent definition is a self-contained worker contract: frontmatter carries a third-person description stating when to delegate, and the body names objective, territory, and the receipt shape the caller parses.
            - A body clause telling the worker to re-read root instructions, load skills, or run checks the active instruction chain already carries is dead weight whose deletion is the demand.
