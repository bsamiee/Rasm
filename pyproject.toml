"socket.create_server".msg =         "Use anyio networking with explicit lifecycle ownership — direct sockets bypass boundary policy."
"socket.socket".msg =                "Use anyio networking or a marked boundary adapter — raw sockets bypass deadline and observability policy."
"subprocess.call".msg =              "Use anyio.run_process() — async, cancellation-aware, structured concurrency."
