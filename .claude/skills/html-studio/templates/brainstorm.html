<body>
<a class="skip" href="#board">Skip to directions</a>
<div class="wrap">
  <header class="head">
    <div>
      <!-- replace: eyebrow scope line -->
      <p class="eyebrow">Brainstorm · Shape Owner</p>
      <h1 id="doc-title">…</h1>
      <p class="deck" id="doc-sub"></p>
    </div>
    <div class="rowline no-print">
      <span class="chip info" id="dir-count"></span>
      <small id="doc-date" class="mono"></small>
      <button type="button" class="btn ghost" data-toggle-theme aria-label="Toggle color theme">Theme</button>
    </div>
  </header>

  <div class="toolbar no-print">
    <label>Lift criterion
      <select data-compare><option value="none">none</option></select>
    </label>
    <search><label>Filter <input type="search" data-filter-box placeholder="narrow directions"></label></search>
  </div>

  <section class="distinct" id="distinct" aria-label="Distinctness warnings"></section>

  <main id="board" tabindex="-1" class="grid board"></main>

  <article class="card hybrid" id="hybrid" aria-label="Composed hybrid direction"></article>

  <section class="card capbar" aria-label="Leaning and flip trigger">
    <label class="capbar__field">Leaning direction
      <select data-leaning><option value="">none</option></select>
    </label>
    <label class="capbar__field">Flip trigger
      <input type="text" data-flip placeholder="Evidence that flips the lean">
    </label>
  </section>

  <footer class="export-bar no-print">
    <button type="button" class="btn primary" data-export="send" hidden>Send to agent</button>
    <button type="button" class="btn" data-export="md">Copy markdown</button>
    <button type="button" class="btn" data-export="json">Download JSON</button>
    <button type="button" class="btn ghost" data-export="changed" disabled>Copy changed-only</button>
    <small class="mono right num" id="egress-meta">0 stolen, 0 verdicts</small>
    <textarea class="egress" id="egress" readonly placeholder="Exported payload mirrors here." aria-label="Exported payload"></textarea>
  </footer>
</div>
<output id="toast" popover="manual" role="status" aria-live="polite"></output>
<!-- replace: brainstorm model payload; each direction stages its call-site shape as a rendered fragment -->
<script type="application/json" id="payload">{
  "meta": {
    "title": "Brainstorm: Shape Directions",
    "subtitle": "Four generated directions for the Shape owner; steal fragments across cards to compose the hybrid.",
    "date": "2026-07-06"
  },
  "criteria": [
    { "id": "c-surface", "name": "Surface density" },
    { "id": "c-callsite", "name": "Call-site ergonomics" },
    { "id": "c-boundary", "name": "Boundary clarity" },
    { "id": "c-evolve", "name": "Independent evolution" }
  ],
  "directions": [
    {
      "id": "d-absorb", "name": "A, Absorb into Shape", "posture": "collapse",
      "thesis": "One polymorphic owner discriminates on input shape.",
      "stage": "let receipt = Shape.dispatch(req);\n// req.arity selects single | batch | stream",
      "optimizes": ["c-surface", "c-boundary"], "costs": ["c-callsite"],
      "kills": ["Modality-named exports", "Duplicated boundary mapping"],
      "fragments": [
        { "id": "f-a1", "text": "Single dispatch(req) entry discriminating on req.arity." },
        { "id": "f-a2", "text": "Closed arity vocabulary, no runtime-supplied kinds." },
        { "id": "f-a3", "text": "Boundary mapping runs once at ingress." }
      ]
    },
    {
      "id": "d-unify", "name": "B, Unify under one owner", "posture": "collapse",
      "thesis": "A single owner absorbs every modality behind one door.",
      "stage": "let receipt = Owner.run({ kind, payload, policy });\n// provider and retries resolve inside",
      "optimizes": ["c-surface", "c-boundary"], "costs": ["c-callsite"],
      "kills": ["Sibling export drift"],
      "fragments": [
        { "id": "f-b1", "text": "Provider selection folds into a policy value on the request." },
        { "id": "f-b2", "text": "Batch and stream collapse into one input-shape detector." },
        { "id": "f-b3", "text": "Telemetry and retries internalized on the owner." }
      ]
    },
    {
      "id": "d-split", "name": "C, Split by variant", "posture": "diverge",
      "thesis": "Each variant keeps its own surface and call site.",
      "stage": "let a = getOne(id);\nlet b = getMany(ids);\nlet c = getStream(cursor);",
      "optimizes": ["c-callsite"], "costs": ["c-surface", "c-boundary"],
      "kills": ["Density target"],
      "fragments": [
        { "id": "f-c1", "text": "Flat per-variant call sites, no dispatch body." },
        { "id": "f-c2", "text": "Each export owns its own boundary mapping." },
        { "id": "f-c3", "text": "A new modality is a new sibling export." }
      ]
    },
    {
      "id": "d-edge", "name": "D, Adapter at the edge", "posture": "layer",
      "thesis": "PRIMARY maps once at the boundary, internals stay canonical.",
      "stage": "let canonical = Ingress.map(primary);\nlet receipt = Core.run(canonical);",
      "optimizes": ["c-boundary", "c-evolve"], "costs": ["c-surface"],
      "kills": ["Stringly boundary logic"],
      "fragments": [
        { "id": "f-d1", "text": "Thin ingress adapter translates PRIMARY once." },
        { "id": "f-d2", "text": "Internals read canonical names only." },
        { "id": "f-d3", "text": "Boundary evolves independently of the owner." }
      ]
    }
  ]
}</script>
<script>
(() => {
"use strict";
const $ = (sel, root = document) => root.querySelector(sel);
const el = (tag, cls, txt) => { const n = document.createElement(tag); if (cls) n.className = cls; if (txt != null) n.textContent = txt; return n; };

// theme stamp: stored choice wins; unstored follows the system preference
const themeKey = "theme:" + document.title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
const root = document.documentElement;
try { const s = localStorage.getItem(themeKey); if (s) root.dataset.theme = s; } catch {}

const model = JSON.parse($("#payload").textContent);
const critName = Object.fromEntries(model.criteria.map(c => [c.id, c.name]));
const dirById = Object.fromEntries(model.directions.map(d => [d.id, d]));
const fragMeta = {};
model.directions.forEach(d => d.fragments.forEach(f => { fragMeta[f.id] = { text: f.text, from: d.name, fromId: d.id }; }));
const shortName = name => name.split(",")[0].trim();
const state = { compare: "none", hybrid: [], verdicts: {}, leaning: "", flipTrigger: "", flipExported: false, distinctness: [] };

// --- direction card projection: each card stages its call-site shape as a rendered fragment
const facet = (label, items, isCrit) => {
  const wrap = el("div", "facet"); wrap.append(el("h4", "dir__sub", label));
  const ul = el("ul", "facet__list");
  items.forEach(x => { const li = el("li", "facet__item"); if (isCrit) { li.dataset.criterion = x; li.textContent = critName[x] || x; } else li.textContent = x; ul.append(li); });
  wrap.append(ul); return wrap;
};
const board = $("#board");
model.directions.forEach(d => {
  const card = el("article", "card dir"); card.dataset.id = d.id; card.dataset.filter = ""; card.dataset.posture = d.posture;
  const head = el("div", "dir__head"); head.append(el("h3", null, d.name), el("span", "chip info", d.posture.toUpperCase())); card.append(head);
  card.append(el("p", "thesis", d.thesis));
  if (d.stage) { const stage = el("div", "stage"); const pre = el("pre"); pre.append(el("code", "mono", d.stage)); stage.append(pre); card.append(stage); }
  card.append(facet("Optimizes", d.optimizes, true), facet("Costs", d.costs, true), facet("Kills", d.kills, false));
  card.append(el("h4", "dir__sub", "Stealable fragments"));
  const fl = el("ul", "frags");
  d.fragments.forEach(f => {
    const li = el("li", "frag"); li.dataset.frag = f.id; li.append(el("span", "frag__text", f.text));
    const steal = el("button", "btn btn--mini", "Steal"); steal.type = "button"; steal.dataset.steal = f.id; steal.setAttribute("aria-pressed", "false");
    li.append(steal); fl.append(li);
  });
  card.append(fl);
  const vl = el("label", "dir__verdict"); vl.append(el("span", null, "Verdict"));
  const vs = el("select"); vs.dataset.verdict = d.id;
  [["none", "none"], ["approve", "approve"], ["approve_with_notes", "approve with notes"], ["reject", "reject"], ["defer", "defer"]].forEach(([v, t]) => { const o = el("option", null, t); o.value = v; vs.append(o); });
  vl.append(vs); card.append(vl);
  board.append(card);
});

const cmpSel = $("[data-compare]"); model.criteria.forEach(c => { const o = el("option", null, c.name); o.value = c.id; cmpSel.append(o); });
const leanSel = $("[data-leaning]"); model.directions.forEach(d => { const o = el("option", null, d.name); o.value = d.id; leanSel.append(o); });
$("#dir-count").textContent = model.directions.length + " DIRECTIONS";
$("#doc-title").textContent = model.meta.title;
$("#doc-sub").textContent = model.meta.subtitle;
$("#doc-date").textContent = model.meta.date;

// --- pairwise distinctness readout
const eqSet = (a, b) => a.length === b.length && [...a].sort().join("|") === [...b].sort().join("|");
const distinct = $("#distinct");
const renderDistinct = () => {
  const dirs = model.directions, warns = [];
  for (let i = 0; i < dirs.length; i++) for (let j = i + 1; j < dirs.length; j++) { const a = dirs[i], b = dirs[j]; if (a.posture === b.posture && eqSet(a.optimizes, b.optimizes)) warns.push({ a, b }); }
  state.distinctness = warns.map(w => ({ a: w.a.id, b: w.b.id }));
  distinct.replaceChildren();
  warns.forEach(w => {
    const c = el("div", "rail warn"); const p = el("p");
    p.append(el("span", "chip warn", "[COLLAPSE]"), document.createTextNode(" " + w.a.name + " and " + w.b.name + " share posture \"" + w.a.posture + "\" and optimize the same axes (" + w.a.optimizes.map(x => critName[x]).join(", ") + "). Collapse these into one direction."));
    p.style.margin = "0"; c.append(p); distinct.append(c);
  });
};

// --- hybrid assembly card
const hybrid = $("#hybrid");
const renderHybrid = () => {
  hybrid.replaceChildren(el("h2", null, "Composed hybrid"));
  if (!state.hybrid.length) { hybrid.append(el("p", "muted", "Steal fragments from any direction to compose a hybrid here.")); hybrid.removeAttribute("data-live"); return; }
  hybrid.setAttribute("data-live", "");
  const ul = el("ul", "frags");
  state.hybrid.forEach(fid => {
    const f = fragMeta[fid]; const li = el("li", "frag");
    li.append(el("span", "chip info", shortName(f.from)), el("span", "frag__text", f.text));
    const drop = el("button", "btn btn--mini", "Remove"); drop.type = "button"; drop.dataset.drop = fid; li.append(drop); ul.append(li);
  });
  hybrid.append(ul);
};
const paintSteals = () => {
  document.querySelectorAll("[data-steal]").forEach(b => {
    const on = state.hybrid.includes(b.dataset.steal);
    b.setAttribute("aria-pressed", on);
    b.closest("[data-frag]").toggleAttribute("data-stolen", on);
    b.textContent = on ? "Stolen" : "Steal";
  });
};
const paintCards = () => {
  document.querySelectorAll(".dir").forEach(c => {
    const v = state.verdicts[c.dataset.id];
    c.dataset.state = state.leaning === c.dataset.id ? "lean" : (v || "");
  });
};

// --- export meta + changed-only gate
const meta = $("#egress-meta");
const changedBtn = $('[data-export="changed"]');
const changed = () => !!(state.leaning || state.flipTrigger.trim() || state.hybrid.length || Object.keys(state.verdicts).length);
const refreshMeta = () => { meta.textContent = state.hybrid.length + " stolen, " + Object.keys(state.verdicts).length + " verdicts"; changedBtn.disabled = !changed(); };

// --- dual export from one state graph
const nameOf = id => dirById[id]?.name || id;
const toEnvelope = () => ({
  kind: "brainstorm", version: 1,
  artifact: { id: "brainstorm." + themeKey.slice(6), title: model.meta.title, baseline: "b-" + model.directions.length },
  decision: { status: state.leaning ? "approve_with_notes" : "comment", at: new Date().toISOString() },
  decisions: Object.entries(state.verdicts).map(([id, verdict]) => ({ id, verdict })),
  changes: [],
  annotations: state.flipTrigger.trim() ? [{ id: "a-flip", itemId: state.leaning || null, intent: "comment", status: state.flipExported ? "exported" : "active", text: state.flipTrigger.trim() }] : [],
  state: { leaning: state.leaning, flipTrigger: state.flipTrigger.trim(), hybrid: state.hybrid.map(fid => ({ id: fid, from: fragMeta[fid].fromId, text: fragMeta[fid].text })), directions: model.directions.map(d => ({ id: d.id, name: d.name, posture: d.posture, optimizes: d.optimizes })), distinctness: state.distinctness },
});
const validate = env => env.kind === "brainstorm" && !!env.artifact?.id && Array.isArray(env.decisions) && typeof env.decision?.at === "string";
const toMarkdown = () => {
  const L = ["# " + model.meta.title, "", "Leaning: " + (state.leaning ? nameOf(state.leaning) : "(undecided)"), "Flip trigger: " + (state.flipTrigger.trim() || "(none)"), "", "## Direction verdicts", ""];
  const vs = Object.entries(state.verdicts);
  if (!vs.length) L.push("No verdicts recorded."); else vs.forEach(([id, v]) => L.push("- " + nameOf(id) + ": " + v));
  L.push("", "## Hybrid, stolen fragments", "");
  if (!state.hybrid.length) L.push("None stolen."); else state.hybrid.forEach(fid => { const f = fragMeta[fid]; L.push("- [" + shortName(f.from) + "] " + f.text); });
  L.push("", "## Distinctness warnings", "");
  if (!state.distinctness.length) L.push("Directions are distinct."); else state.distinctness.forEach(p => L.push("- Collapse: " + nameOf(p.a) + " plus " + nameOf(p.b) + " (same posture and optimized axes)."));
  return L.join("\n");
};

const download = (name, mime, text) => { const url = URL.createObjectURL(new Blob([text], { type: mime })); Object.assign(document.createElement("a"), { href: url, download: name }).click(); setTimeout(() => URL.revokeObjectURL(url), 1000); };
const toast = $("#toast"); let toastTimer;
const flash = msg => { toast.textContent = msg; toast.showPopover?.(); clearTimeout(toastTimer); toastTimer = setTimeout(() => toast.hidePopover?.(), 1600); };
const markExported = () => { state.flipExported = !!state.flipTrigger.trim(); };
const copyText = async text => {
  try { await navigator.clipboard.writeText(text); }
  catch {
    const t = Object.assign(document.createElement("textarea"), { value: text, style: "position:fixed;left:-9999px" });
    document.body.append(t); t.select(); document.execCommand("copy"); t.remove();
  }
};

// return channel: the injected meta is the protocol switch — absent means file:// and export-only
const returnMeta = document.querySelector('meta[name="artifact-return"]');
if (returnMeta) $("[data-export='send']").hidden = false;
const sendToAgent = async env => {
  const res = await fetch(returnMeta.content, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(env) });
  if (!res.ok) throw new Error("submit " + res.status);
  return res.json();
};

const egress = $("#egress");
const doExport = async which => {
  const env = toEnvelope();
  if (!validate(env)) { egress.value = "[BLOCKED] envelope failed validation"; flash("Export blocked"); return; }
  if (which === "send") {
    const btn = $("[data-export='send']"); btn.disabled = true;
    try { await sendToAgent(env); markExported(); flash("Sent to agent"); }
    catch { egress.value = JSON.stringify(env, null, 2); await copyText(egress.value); flash("Send failed — copied instead"); }
    finally { btn.disabled = false; }
    return;
  }
  if (which === "json") { const text = JSON.stringify(env, null, 2); egress.value = text; download("brainstorm-" + themeKey.slice(6) + ".json", "application/json", text); markExported(); flash("Downloaded JSON"); return; }
  if (which === "changed") { if (!changed()) { flash("Nothing captured"); return; } const text = JSON.stringify({ kind: env.kind, version: env.version, artifact: env.artifact, baselineRef: "b-" + model.directions.length, decisions: env.decisions, state: { leaning: env.state.leaning, flipTrigger: env.state.flipTrigger, hybrid: env.state.hybrid } }, null, 2); egress.value = text; await copyText(text); markExported(); flash("Copied changed-only"); return; }
  egress.value = toMarkdown(); await copyText(egress.value); markExported(); flash("Copied");
};

// --- one listener per concern
document.addEventListener("click", e => {
  const st = e.target.closest("[data-steal]"); if (st) { const id = st.dataset.steal; state.hybrid = state.hybrid.includes(id) ? state.hybrid.filter(x => x !== id) : [...state.hybrid, id]; renderHybrid(); paintSteals(); refreshMeta(); return; }
  const rm = e.target.closest("[data-drop]"); if (rm) { state.hybrid = state.hybrid.filter(x => x !== rm.dataset.drop); renderHybrid(); paintSteals(); refreshMeta(); return; }
  const theme = e.target.closest("[data-toggle-theme]"); if (theme) { const dark = root.dataset.theme ? root.dataset.theme === "dark" : !matchMedia("(prefers-color-scheme: light)").matches; const next = dark ? "light" : "dark"; try { localStorage.setItem(themeKey, root.dataset.theme = next); } catch { root.dataset.theme = next; } return; }
  const exp = e.target.closest("[data-export]"); if (exp) doExport(exp.dataset.export);
});
document.addEventListener("change", e => {
  const cmp = e.target.closest("[data-compare]"); if (cmp) { state.compare = cmp.value; document.querySelectorAll("[data-criterion]").forEach(li => li.classList.toggle("hl", state.compare !== "none" && li.dataset.criterion === state.compare)); return; }
  const v = e.target.closest("[data-verdict]"); if (v) { if (v.value === "none") delete state.verdicts[v.dataset.verdict]; else state.verdicts[v.dataset.verdict] = v.value; paintCards(); refreshMeta(); return; }
  const lean = e.target.closest("[data-leaning]"); if (lean) { state.leaning = lean.value; paintCards(); refreshMeta(); }
});
document.addEventListener("input", e => {
  const box = e.target.closest("[data-filter-box]"); if (box) { const q = box.value.trim().toLowerCase(); document.querySelectorAll("#board [data-filter]").forEach(c => { c.hidden = q !== "" && !c.textContent.toLowerCase().includes(q); }); return; }
  const flip = e.target.closest("[data-flip]"); if (flip) { state.flipTrigger = flip.value; state.flipExported = false; refreshMeta(); }
});

renderDistinct(); renderHybrid(); paintSteals(); paintCards(); refreshMeta();
})();
</script>
</body>
</html>
