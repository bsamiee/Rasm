[project]
name = "workspace-foundation-python"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "anyio>=4.13.0",
    "beartype>=0.22.2",
    "cyclopts>=4.16.1",
    "msgspec>=0.21.1",
    "opentelemetry-api>=1.41.1",
    "opentelemetry-exporter-otlp-proto-http>=1.41.1",
    "opentelemetry-instrumentation-httpx>=0.62b1",
    "opentelemetry-instrumentation-logging>=0.62b1",
    "opentelemetry-sdk>=1.41.1",
    "pydantic>=2.13.3",
    "pydantic-settings>=2.14.0",
    "expression>=5.6.0",
    "stamina>=26.1.0",
    "structlog>=25.5.0",
    "httpx>=0.28.1",
    "psutil>=7.2.2",
    "fsspec>=2026.4.0",
    "watchfiles>=1.2.0",
    "aiocron>=2.1",
    "universal-pathlib>=0.0.22",
    "asyncssh>=2.23.0",
    "tree-sitter>=0.25.2",
    "tree-sitter-python>=0.25.0",
    "tree-sitter-typescript>=0.23.2",
]

[dependency-groups]
dev = [
    "coverage>=7.14.1",
    "dirty-equals",
    "hypothesis>=6.155.1",
    "inline-snapshot",
    "libcst",
    "mutmut>=3.5.0",
    "mypy",
    "pytest>=9.0.3",
    "pytest-benchmark>=5.2.3",
    "pytest-cov>=7.1.0",
    "pytest-deadfixtures>=3.1.0",
    "pytest-randomly>=4.1.0",
    "pytest-socket",
    "pytest-timeout",
    "pytest-xdist>=3.8.0",
    "ruff",
    "time-machine>=3.2.0",
    "ty",
    "types-psutil>=7.2.2",
    "validate-pyproject[all]",
]
scientific = ["dask", "numpy", "pandas", "pandas-stubs", "polars", "scipy", "scipy-stubs", "sympy", "xarray"]

# --- [UV] ------------------------------------------------------------------

[tool.uv]
package =   false
cache-dir = ".cache/uv"

# --- [TY] ------------------------------------------------------------------

[tool.ty.environment]
python-version = "3.14"
python-platform = "all"

[tool.ty.analysis]
respect-type-ignore-comments = false

[tool.ty.src]
exclude = [
    ".approval_tests_temp",
    ".artifacts",
    ".benchmarks",
    ".cache",
    ".claude/skills/**/.cache",
    ".claude/worktrees",
    ".nx",
    ".venv",
    "coverage",
    "mutants",
    "node_modules",
    "test-results",
    "tests/tools/ast-grep/fail/**",
    "tmp",
]

[tool.ty.rules]
all = "error"

[tool.ty.terminal]
error-on-warning = true

# --- [MYPY] ----------------------------------------------------------------

[tool.mypy]
python_version =   "3.14"
cache_dir =        ".cache/mypy"
strict =           true
pretty =           true
warn_unreachable = true
plugins = ["pydantic.mypy"]
enable_error_code = [
    "exhaustive-match",
    "explicit-override",
    "ignore-without-code",
    "redundant-self",
    "truthy-bool",
    "truthy-iterable",
    "unused-awaitable",
]
exclude = [
    "^\\.approval_tests_temp/",
    "^\\.artifacts/",
    "^\\.benchmarks/",
    "^\\.cache/",
    "^\\.claude/skills/.*/\\.cache/",
    "^\\.claude/worktrees/",
    "^\\.git/",
    "^\\.nx/",
    "^\\.venv/",
    "^build/",
    "^dist/",
    "^coverage/",
    "^mutants/",
    "^test-results/",
    "^node_modules/",
    "^tests/tools/ast-grep/fail/",
    "^tmp/",
]

[tool.pydantic-mypy]
init_typed =                    true
init_forbid_extra =             true
warn_required_dynamic_aliases = true
warn_untyped_fields =           true

# --- [PYTEST] --------------------------------------------------------------

[tool.pytest]
minversion = "9.0"
strict =     true
cache_dir =  ".cache/pytest"
testpaths =  ["tests"]
pythonpath = ["."]
collect_imported_tests = false
empty_parameter_set_mark = "fail_at_collect"
addopts = [
    "-x",
    "--tb=short",
    "--import-mode=importlib",
    "--disable-socket",
    "--allow-unix-socket",
    "--benchmark-storage=file://.artifacts/python/benchmarks",
    "--randomly-seed=20260603",
    "--hypothesis-profile=rasm",
]
filterwarnings = ["error"]
timeout = "30"
required_plugins = [
    "anyio",
    "hypothesis>=6.155.1",
    "inline-snapshot",
    "pytest-benchmark>=5.2.3",
    "pytest-cov>=7.1.0",
    "pytest-randomly>=4.1.0",
    "pytest-socket",
    "pytest-timeout",
    "pytest-xdist>=3.8.0",
    "time-machine>=3.2.0",
]
markers = [
    "integration: external boundary and integration tests",
    "mutation: mutation-testing acceptance and survivor-triage tests",
    "network: tests that intentionally use external network sockets",
    "property: property-based tests",
    "serial: tests that must not run concurrently",
    "slow: long-running validation tests",
]

# --- [INLINE_SNAPSHOT] -----------------------------------------------------

[tool.inline-snapshot]
# CI-safe default (short-report: fails on mismatch, never mutates files); external snapshot storage routed under cache.
default-flags = ["short-report"]
storage-dir =   ".cache/inline-snapshot"

# --- [COVERAGE] ------------------------------------------------------------

[tool.coverage.run]
branch =          true
relative_files =  true
source =          ["tools/quality"]
dynamic_context = "test_function"
data_file =       ".cache/coverage/.coverage"
core =            "ctrace"

[tool.coverage.report]
fail_under =    100
show_missing =  true
skip_covered =  true
exclude_also = [
    "case _ as unreachable:",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "assert_never\\(",
    "@(abc\\.)?abstractmethod",
    "\\.\\.\\.$",
    "if __name__ == .__main__.:",
]

[tool.coverage.json]
output = ".artifacts/python/coverage/coverage.json"
pretty_print = true

[tool.coverage.html]
directory = ".artifacts/python/coverage/html"
show_contexts = true

[tool.coverage.xml]
output = ".artifacts/python/coverage/coverage.xml"

[tool.coverage.lcov]
output = ".artifacts/python/coverage/coverage.lcov"

# --- [MUTMUT] --------------------------------------------------------------

[tool.mutmut]
paths_to_mutate = ["tools/quality"]
# Cheap pre-filter: ty checks the mutated copy (cwd=mutants/) and kills type-invalid mutants before any test runs; gitlab JSON is mutmut-native.
type_check_command = ["uv", "run", "ty", "check", "--output-format", "gitlab", "tools/quality"]
pytest_add_cli_args_test_selection = ["tests/tools/quality"]
pytest_add_cli_args = [
    "-x",
    "--tb=short",
    "--disable-socket",
    "--allow-unix-socket",
    "--import-mode=importlib",
    "--hypothesis-profile=rasm-mutation",
    "--randomly-dont-reorganize",
    "--randomly-dont-reset-seed",
    "-p",
    "no:randomly",
    "-p",
    "no:random-order",
]
do_not_mutate = ["tools/quality/__init__.py"]
mutate_only_covered_lines = true
max_stack_depth = 10

# --- [RUFF] ----------------------------------------------------------------

[tool.ruff]
cache-dir =      ".cache/ruff"
target-version = "py314"
preview =        true
force-exclude =  true
line-length =    150
extend-exclude = [
    "**/.approval_tests_temp/**",
    "**/.artifacts/**",
    "**/.benchmarks/**",
    "**/.cache/**",
    "**/.claude/skills/**/.cache/**",
    "**/.claude/worktrees/**",
    "**/test-results/**",
    "**/coverage/**",
    "**/mutants/**",
    "**/.history/**",
]

[tool.ruff.format]
quote-style =               "double"
line-ending =               "lf"
docstring-code-format =     true
skip-magic-trailing-comma = true

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    # -- Formatter-handled (redundant with ruff format) ---------------------
    "COM812",  # trailing-comma (conflicts with formatter)
    "ISC001",  # implicit-string-concat (conflicts with formatter)
    # -- Docstring policy ----------------------------------------------------
    "D100",    # missing-docstring-in-public-module (section separators replace)
    "D104",    # missing-docstring-in-public-package (__init__.py noise)
    "D105",    # missing-docstring-in-magic-method (class docstring suffices)
    "D107",    # missing-docstring-in-init (schema IS the documentation)
    "DOC201",  # docstring-missing-returns (@safe/@maybe wraps return behavior)
    "DOC501",  # docstring-missing-exception (@safe converts raise to Failure)
    # -- Match/case + FP style conflicts ------------------------------------
    "RET504",  # unnecessary-assign (named intermediates in flow() pipelines)
    "RET505",  # superfluous-else-return (exhaustive match dispatch)
    "RET506",  # superfluous-else-raise (explicit else in ROP error handling)
    "SIM108",  # use-ternary-operator (match/case is sole dispatch mechanism)
    "SIM114",  # combine-if-arms (no if/else — match/case only)
    # -- Error messaging (expression Result / TaggedError patterns) ---------
    "EM101",   # raw-string-in-exception (inline error messages in frozen errors)
    "EM102",   # f-string-in-exception (f-string error constructors)
    "TRY003",  # raise-vanilla-args (descriptive domain error messages)
    "TRY301",  # raise-within-try (ROP @safe boundary patterns)
    "TRY400",  # error-instead-of-exception (structlog .error() outside handlers)
    # -- Sorting rules (semantic section ordering preferred) ----------------
    "RUF022",  # unsorted-dunder-all (semantic > alphabetical)
    "RUF023",  # unsorted-dunder-slots (semantic > alphabetical)
    # -- Development workflow -----------------------------------------------
    "TD003",   # missing-todo-link (git blame provides context)
    "FIX002",  # todo-found (CI gate, not editor noise)
    "INP001",  # implicit-namespace-package (monorepo structure)
    "CPY001",  # missing-copyright-notice (top-level LICENSE)
]

[tool.ruff.lint.per-file-ignores]
"__init__.py"      = ["F401"]
"tools/quality/**" = ["D101", "D102", "D103", "PLR0904", "PLR0912", "PLR0913", "PLR0914", "TC001", "TC002", "TC003", "PLW0108"]
"tests/tools/quality/**" = ["S101", "PLR2004", "TC002"]
"**/.claude/skills/**/scripts/**" = [
    "ANN001",
    "ANN401",
    "B905",
    "C901",
    "E501",
    "ERA001",
    "EXE001",
    "FBT001",
    "PLC0415",
    "PLC2701",
    "PLC3002",
    "PLR0911",
    "PLR0912",
    "PLR0914",
    "PLR0915",
    "PLR6201",
    "PLW1510",
    "PTH109",
    "S105",
    "S310",
    "S404",
    "S603",
    "S607",
    "TID251",
    "TRY300",
]
"tests/**"         = ["S101", "PLR2004", "PLR0913", "ARG001", "ARG002", "ANN201", "ANN401", "D101", "D102", "D103", "SLF001"]
"**/adapters/**"   = ["ANN401"]
"**/conftest.py"   = ["E402", "F401", "ARG001"]

[tool.ruff.lint.flake8-annotations]
allow-star-arg-any =      false
mypy-init-return =        true
suppress-dummy-args =     true
suppress-none-returning = true

[tool.ruff.lint.flake8-bandit]
check-typed-exception = true

[tool.ruff.lint.flake8-bugbear]
extend-immutable-calls = [
    "beartype.BeartypeConf",
    "msgspec.Meta",
    "msgspec.field",
    "pydantic.ConfigDict",
    "pydantic.Field",
    "pydantic.PrivateAttr",
    "stamina.retry",
]

[tool.ruff.lint.flake8-builtins]
ignorelist = ["id", "type", "input", "format", "hash"]

[tool.ruff.lint.flake8-import-conventions.extend-aliases]
"dask.array" =     "da"
"dask.dataframe" = "dd"
"scipy" =          "sp"
"sympy" =          "sym"
"xarray" =         "xr"

[tool.ruff.lint.flake8-pytest-style]
parametrize-names-type =          "csv"
raises-extend-require-match-for = ["AttributeError", "KeyError", "RuntimeError", "TypeError", "msgspec.ValidationError", "pydantic.ValidationError",]

[tool.ruff.lint.flake8-self]
extend-ignore-names = ["_validate", "_disc", "_check", "_value_"]

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports =        "all"
banned-module-level-imports = ["dask", "numpy", "pandas", "polars", "scipy", "sympy", "xarray"]

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"concurrent.futures.ProcessPoolExecutor".msg = "Use anyio.to_process.run_sync() — structured concurrency with cancellation support."
"concurrent.futures.ThreadPoolExecutor".msg =  "Use anyio.to_thread.run_sync() with CapacityLimiter — structured concurrency."
