language: en-US
tone_instructions: "Adversarial senior reviewer: presume defects until the pass finds none; never ratify prose or praise. Findings name file, anchor, defect, and the demanded stronger form. Grade the full severity scale; uniform severity is ungraded."
early_access: false
enable_free_tier: true
inheritance: false
reviews:
    profile: assertive
    request_changes_workflow: true
    high_level_summary: true
    high_level_summary_instructions: >-
        One dense paragraph leading with contract-surface and behavior deltas: which owners changed shape, which strata or seams the diff crosses, what a consumer must now do differently. No restated diff statistics, no methodology narration, no praise.
    high_level_summary_placeholder: "@coderabbitai summary"
    high_level_summary_in_walkthrough: false
    auto_title_placeholder: "@coderabbitai"
    review_status: true
    review_details: true
    commit_status: true
    fail_commit_status: true
    collapse_walkthrough: true
    changed_files_summary: true
    sequence_diagrams: true
    estimate_code_review_effort: true
    assess_linked_issues: true
    related_issues: true
    related_prs: true
    suggested_labels: false
    auto_apply_labels: false
    suggested_reviewers: false
    auto_assign_reviewers: false
    in_progress_fortune: false
    poem: false
    enable_prompt_for_ai_agents: true
    abort_on_close: true
    disable_cache: false
    slop_detection:
        enabled: true
    path_filters:
        - "!**/pnpm-lock.yaml"
        - "!**/uv.lock"
        - "!**/packages.lock.json"
        - "!**/goldens/**"
        - "!**/*.verified.*"
        - "!**/*.har"
    path_instructions:
        - path: "**"
          instructions: >-
            Presume defects until the pass finds none; dense, confident code is the prime suspect, and every claim is verified against the real domain, never ratified from prose, naming, or comment assertions. A reviewer reports and demands, never edits: every finding names the file, the anchor, the defect, and the stronger form demanded — precise enough that a fixer agent lands it without re-derivation. The reviewable surface is a design corpus — markdown pages whose embedded code fences are the product — plus workflow and tooling JavaScript and configuration; judge fence code as production source at full depth. The docs/stacks language doctrine is the floor, never the ceiling: a conformant-but-weak form is a finding when a stronger form exists. Attack entry-point sprawl: parallel entry points, modality-named siblings, and get/getMany/getById families are defects — demand one polymorphic entry per rail discriminating on input shape, with forward and inverse of one correspondence on one owner. Apply downstream-usage pressure by imagining every consumer: a parameter a policy value or input shape reconstructs is knob spam; configuration ceremony pushed onto callers and orchestration a consumer must hand-write are defects — demand internalized lifecycle, routing, and policy with zero capability sacrifice. Judge composition idiomatically: an interface earns its existence through dispatch or substitution, and generated or source-gen surfaces run at intended power — decorative abstraction is a finding. Flag long imperative bodies wherever a denser expression-shaped form exists — fold, combinator, table-driven, or generator forms over hand-rolled loops and branching — and demand surfaces and object types collapse into fewer, denser, richer owners. Grade across the full severity scale: a review where every finding lands at one severity has averaged, not graded. Cross-surface coupling is review duty: docs/laws/topology.md maps which surfaces obligate which counterparts — a diff editing a listed SURFACE without its obligated counterparts in the same change is a finding naming the missing counterpart.
        - path: "{docs/**,CLAUDE.md,AGENTS.md,.greptile/**,.coderabbit.yaml}"
          instructions: >-
            Doctrine-surface diffs are judged against the docs/laws/README.md admission law. Flag the miss as hard as the spam: an addition without recurrence evidence or branch-spanning blast radius, and equally the neighboring clause that owed the collapse and was left untouched.
        - path: "libs/**"
          instructions: >-
            libs/.planning/campaign-method.md is the review standard for design-corpus work and libs/.planning/README.md owns the page grammar — judge against them, never generic documentation convention. The fence is the work product and the measure of a planning item is the diff to a fence: presume an external member is a phantom until the folder's .api/ catalogue verifies its spelling, public accessibility, and deprecation status; sweep compiler-fatal shapes mechanically across a folder's sibling pages — every callee resolves to a declaration on the page or a cited sibling anchor, and every INDEX row resolves to a same-page section. Declared capability is consumed capability: a capability noun with no anchoring fence member, a receipt nothing mints, or a policy row nothing consumes is decorative density — demand the consuming member or the deletion.
        - path: "**/{*.csproj,*.props,*.targets,package.json,pyproject.toml,global.json}"
          instructions: >-
            Package versions live only in the central manifests, hand-edited. Version movement is forward-only — a downgrade or stale floor without a recorded reason in the diff is a finding; a sanctioned pin carries an inline comment stating exactly what breaks without it, and a pin missing that mechanism comment is a finding while a pin carrying one is never flagged. A project reference breaching the strata edges the root README.md and libs/.planning/architecture.md declare is a strata defect.
        - path: "tests/**"
          instructions: >-
            Test law is tests/README.md — judge against it. A test falsifies production behavior with an independent oracle: existence tests, mirror tests asserting a constructed value's own fields, and specs proving only that their own doubles were called are findings; a refuting witness that survives, or sits trivially outside the domain, exposes a tautology.
        - path: "{tools/**,.claude/workflows/**}"
          instructions: >-
            Operator and workflow code is deterministic orchestration judged as production source: schema-typed agent outputs, bounded loops, every stage writing its product to disk and returning a path receipt. Bare promises without await ownership, unbounded polling, wall-clock branching, subagents instructed to wait, and hand-authored exit semantics beside a typed envelope contract are findings.
        - path: "**/*.md"
          instructions: >-
            Prose law is docs/standards/style-guide.md, formatting.md, and information-structure.md — findings cite the named defect class and the line. The regeneration test governs: a fact a fresh agent regenerates from disk plus stated invariants is a mirror demanding deletion. The planning corpus's closed markers — [QUEUED]/[ACTIVE]/[BLOCKED] task status and marked RESEARCH items — are that standard's vocabulary, never hedge or process-ledger findings.
        - path: ".claude/skills/**"
          instructions: >-
            Skill bundles are judged under the skill-writer craft law: third-person trigger descriptions without keyword stuffing, SKILL.md a lean router with reference banks one hop down, and no body rule whose deletion changes no agent output.
    auto_review:
        enabled: true
        auto_incremental_review: true
        auto_pause_after_reviewed_commits: 0
        drafts: true
