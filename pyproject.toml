"pydantic.validator".msg =           "Use @field_validator or @model_validator — pydantic.validator is deprecated v1 API."
"requests".msg =                     "Use httpx behind a typed adapter — direct requests imports are not an approved transport surface."
"returns".msg =                      "Use expression.Result / expression.Option — returns is not an approved rail surface."
"returns.maybe".msg =                "Use expression.Result / expression.Option — returns is not an approved rail surface."
"returns.result".msg =               "Use expression.Result / expression.Option — returns is not an approved rail surface."
"socket.create_connection".msg =     "Use anyio networking or httpx adapters with explicit deadlines — direct sockets bypass boundary policy."
"socket.create_server".msg =         "Use anyio networking with explicit lifecycle ownership — direct sockets bypass boundary policy."
"socket.socket".msg =                "Use anyio networking or a marked boundary adapter — raw sockets bypass deadline and observability policy."
"subprocess.call".msg =              "Use anyio.run_process() — async, cancellation-aware, structured concurrency."
"subprocess.check_call".msg =        "Use anyio.run_process() — async, cancellation-aware, structured concurrency."
"subprocess.check_output".msg =      "Use anyio.run_process() — async, cancellation-aware, structured concurrency."
"subprocess.Popen".msg =             "Use anyio.open_process() — async process handle with structured teardown."
"subprocess.run".msg =               "Use anyio.run_process() — async, cancellation-aware, structured concurrency."
"time.sleep".msg =                   "Use anyio.sleep() — time.sleep blocks the event loop thread."
"traceback.print_exc".msg =          "Use structlog.get_logger().exception() — traceback.print_exc leaks to stderr."
"typing.Any".msg =                   "Use precise type parameters or object at validated boundaries; Any requires explicit boundary justification."
"typing.ParamSpec".msg =             "Use PEP 695 decorator parameters (**P) — legacy ParamSpec imports drift from Python 3.14 type syntax."
"typing.TypeAlias".msg =             "Use PEP 695 type aliases (`type Name = ...`) — TypeAlias is legacy syntax."
"typing.TypeGuard".msg =             "Use TypeIs — complement-safe narrowing in both branches is required."
