[project]
name = "workspace-foundation-python"
version = "0.1.0"
requires-python = ">=3.15"
dependencies = [
    "anyio>=4.13.0",
    "beartype>=0.22.2",
    "cyclopts>=4.16.1",
    "msgspec>=0.21.1",
    "opentelemetry-api>=1.41.1",
    "opentelemetry-exporter-otlp-proto-http>=1.41.1",
    "opentelemetry-instrumentation-logging>=0.62b1",
    "opentelemetry-sdk>=1.41.1",
    "pydantic>=2.13.3",
    "pydantic-settings>=2.14.0",
    "expression>=5.6.0",
    "stamina>=26.1.0",
    "structlog>=25.5.0",
    "psutil>=7.2.2",
    "fsspec>=2026.4.0",
    "httpx>=0.28.1",    # Retain; never remove regardless of consumers existing or not
    "watchfiles>=1.2.0",
    "aiocron>=2.1",
    "universal-pathlib>=0.0.22",
    "asyncssh>=2.23.0",
    "tree-sitter>=0.25.2",
    "tree-sitter-python>=0.25.0",
    "tree-sitter-typescript>=0.23.2",
]

[dependency-groups]
dev = [
    "coverage>=7.14.1",
    "dirty-equals",
    "hypothesis>=6.155.2",
    "inline-snapshot",
    "mypy>=2.1.0",
    "pytest>=9.0.3",
    "pytest-benchmark>=5.2.3",
    "pytest-cov>=7.1.0",
    "pytest-deadfixtures>=3.1.0",
    "pytest-randomly>=4.1.0",
    "pytest-socket",
    "pytest-timeout",
    "pytest-xdist>=3.8.0",
    "ruff>=0.15.12,<0.16",
    "ty>=0.0.44",
    "types-psutil>=7.2.2",
    "validate-pyproject[all]",
]
mutation = ["mutmut>=3.6.0"]
scientific = ["dask", "numpy", "pandas", "pandas-stubs", "polars", "scipy", "scipy-stubs", "sympy", "xarray"]

# --- [UV] ------------------------------------------------------------------

[tool.uv]
package =   false
cache-dir = ".cache/uv"

[tool.uv.sources]
beartype = { git = "https://github.com/beartype/beartype.git", rev = "f370a0b1733413681e7a72bf36fbe839e60b3c85" }

# --- [TY] ------------------------------------------------------------------

[tool.ty.environment]
python-platform = "all"
python-version = "3.15"

[tool.ty.analysis]
respect-type-ignore-comments = false

[tool.ty.src]
exclude = [
    ".approval_tests_temp",
    ".artifacts",
    ".cache",
    ".claude/skills/**/.cache",
    ".claude/worktrees",
    ".nx",
    ".venv",
    "coverage",
    "mutants",
    "node_modules",
    "test-results",
    "tests/tools/ast-grep/fail/**",
    "tests/tools/ast-grep/pass/**",  # ast-grep probes; excluded from ty/mypy/ruff — negative verification is the ast-grep VERIFY catalog row
    "tmp",
]

[tool.ty.rules]
all = "error"

[tool.ty.terminal]
error-on-warning = true

# --- [MYPY] ----------------------------------------------------------------

[tool.mypy]
python_version =          "3.15"
cache_dir =               ".cache/mypy"
strict =                  true
pretty =                  true
warn_unreachable =        true
explicit_package_bases =  true
warn_unused_configs =     true
disallow_any_explicit =   true
disallow_any_unimported = true
plugins =                 ["pydantic.mypy"]
enable_error_code = [
    "exhaustive-match",
    "explicit-override",
    "ignore-without-code",
    "redundant-self",
    "truthy-bool",
    "truthy-iterable",
    "unused-awaitable",
]
exclude = [
    "^\\.approval_tests_temp/",
    "^\\.artifacts/",
    "^\\.cache/",
    "^\\.claude/skills/.*/\\.cache/",
    "^\\.claude/worktrees/",
    "^\\.git/",
    "^\\.nx/",
    "^\\.venv/",
    "^build/",
    "^dist/",
    "^coverage/",
    "^mutants/",
    "^test-results/",
    "^node_modules/",
    "^tests/tools/ast-grep/fail/",
    "^tests/tools/ast-grep/pass/",
    "^tmp/",
]

[tool.pydantic-mypy]
init_typed =                    true
init_forbid_extra =             true
warn_required_dynamic_aliases = true
warn_untyped_fields =           true

# --- [PYTEST] --------------------------------------------------------------

# Session-separation policy: under `filterwarnings = ["error"]`, loading pytest-benchmark and pytest-xdist in the
# same session raises an xdist worker INTERNALERROR. `-n` is deliberately NOT in addopts; the main suite runs serially
# and benchmarks run in their own session via `-m benchmark --benchmark-only`. Keep these invocations separate; do not
# add `-n` here. Parallel runs must opt in per-invocation AND exclude benchmarks (e.g. `-n auto -m "not benchmark"`).
[tool.pytest]
minversion =               "9.0"
strict =                   true
cache_dir =                ".cache/pytest"
testpaths =                ["tests"]
pythonpath =               ["."]
python_files =             ["test_*.py", "*_test.py", "bench_*.py"]
python_functions =         ["test_*", "bench_*"]
collect_imported_tests =   false
empty_parameter_set_mark = "fail_at_collect"
addopts = [
    "-x",
    "--tb=short",
    "--import-mode=importlib",
    "-m",
    "not benchmark",
    "--disable-socket",
    "--allow-unix-socket",
    "--benchmark-storage=file://.artifacts/python/benchmarks",  # canonical owner: tools.assay.composition.catalog.BENCHMARK_STORAGE_URI
    "--hypothesis-profile=rasm",
]
filterwarnings = ["error"]
# pytest-timeout registers `timeout` via `addini(..., type=<string default>)`; pytest 9 TOML mode strictly enforces
# the declared option type and raises INTERNALERROR on a native int. The string form is required here.
timeout = "30"
required_plugins = [
    "anyio",
    "hypothesis",
    "inline-snapshot",
    "pytest-benchmark",
    "pytest-cov",
    "pytest-randomly",
    "pytest-socket",
    "pytest-timeout",
    "pytest-xdist",
]
markers = [
    "benchmark: benchmark measurement tests",
    "mutation: mutation-testing acceptance and survivor-triage tests",
    "network: tests that intentionally use external network sockets",
    "property: property-based tests",
]

[tool.anyio]
asyncio_mode = "auto"

# --- [INLINE_SNAPSHOT] -----------------------------------------------------

[tool.inline-snapshot]
# CI-safe default (short-report: fails on mismatch, never mutates files); external snapshot storage routed under cache.
default-flags = ["short-report"]
storage-dir =   ".cache/inline-snapshot"

# --- [COVERAGE] ------------------------------------------------------------

# Canonical coverage command: `uv run coverage run -m pytest tests/tools/assay -q && uv run coverage report`.
# Per-test contexts are opt-in and xdist-safe via pytest-cov's hook: `uv run pytest tests/tools/assay --cov=tools/assay --cov-context=test -q`.
# `dynamic_context = "test_function"` is intentionally absent: coverage's own dynamic context hard-errors under `pytest --cov`
# (and blocks `-n auto`), and it mis-attributes property-test lines to the Hypothesis internal frame.
[tool.coverage.run]
branch =          true
relative_files =  true
source =          ["tools/assay"]
data_file =       ".cache/coverage/.coverage"
# CPython 3.15.0b1 ships no compiled C tracer (`coverage.tracer.CTracer` absent); `sys.monitoring` (PEP 669) is the only
# working core. Verified to record branch arcs + per-test contexts (coarser than the pure-Python core, but contexts are
# diagnostic — the law-coverage gate reads the law MANIFEST, not coverage contexts).
core =            "sysmon"

[tool.coverage.report]
# 95 floor: sysmon's PEP 669 core captures slightly fewer arcs than the (absent) C core on this beta interpreter; the
# line+branch rail is one of three (law-coverage manifest gate + mutation survivors are the compensating rails).
fail_under =    95
show_missing =  true
skip_covered =  true
exclude_also = [
    "if TYPE_CHECKING:",
    "assert_never\\(",
    "\\.\\.\\.$",
    "if __name__ == .__main__.:",
]

[tool.coverage.json]
output = ".artifacts/python/coverage/coverage.json"
pretty_print = true
show_contexts = true

[tool.coverage.html]
directory = ".artifacts/python/coverage/html"
show_contexts = true

[tool.coverage.xml]
output = ".artifacts/python/coverage/coverage.xml"

[tool.coverage.lcov]
output = ".artifacts/python/coverage/coverage.lcov"

# --- [MUTMUT] --------------------------------------------------------------

# libcst (mutmut's mutator) has no cp315 wheel and the build host lacks a Rust toolchain, so mutation runs on a 3.14.5
# sidecar interpreter. `requires-python = ">=3.15"` forbids `uv run --python 3.14`; the working invocation ignores the
# project env and supplies a locked dependency set (single-owner command lives in `tools.assay.composition.catalog`):
#   uv export --no-emit-project --group mutation --group dev -o .cache/mutation-requirements.txt
#   uv run --no-project --python 3.14.5 --with-requirements .cache/mutation-requirements.txt mutmut run
# Flip to native 3.15 (`uv run --group mutation mutmut run`) by changing one catalog setting when cp315 libcst ships.
[tool.mutmut]
source_paths = ["tools/assay"]
# Cheap pre-filter: ty checks the mutated copy (cwd=mutants/) and kills type-invalid mutants before any test runs; gitlab JSON is mutmut-native.
type_check_command = ["uv", "run", "ty", "check", "--output-format", "gitlab", "tools/assay"]
pytest_add_cli_args_test_selection = ["tests/tools/assay"]
pytest_add_cli_args = [
    "--hypothesis-profile=rasm-mutation",
    "--randomly-dont-reorganize",
    "--randomly-dont-reset-seed",
    "-p",
    "no:randomly",
]
do_not_mutate = ["tools/assay/__init__.py"]
mutate_only_covered_lines = true
max_stack_depth = 10

# --- [RUFF] ----------------------------------------------------------------

[tool.ruff]
cache-dir =        ".cache/ruff"
preview =          true
line-length =      150
required-version = ">=0.15.12,<0.16"
target-version =   "py315"
extend-exclude = [
    "**/.approval_tests_temp/**",
    "**/.artifacts/**",
    "**/.cache/**",
    "**/.claude/skills/**/.cache/**",
    "**/.claude/worktrees/**",
    "**/test-results/**",
    "**/coverage/**",
    "**/mutants/**",
    "**/.history/**",
    "**/tests/tools/ast-grep/**",
]

[tool.ruff.format]
line-ending =               "lf"
docstring-code-format =     true
skip-magic-trailing-comma = true

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    # -- Formatter-handled (redundant with ruff format) ---------------------
    "COM812",  # trailing-comma (conflicts with formatter)
    "ISC001",  # implicit-string-concat (conflicts with formatter)
    # -- Match/case + FP style conflicts ------------------------------------
    "RET504",  # unnecessary-assign (named intermediates in flow() pipelines)
    "RET505",  # superfluous-else-return (exhaustive match dispatch)
    "RET506",  # superfluous-else-raise (explicit else in ROP error handling)
    "SIM108",  # use-ternary-operator (match/case is sole dispatch mechanism)
    "SIM114",  # combine-if-arms (no if/else — match/case only)
    # -- Error messaging (expression Result / TaggedError patterns) ---------
    "EM101",   # raw-string-in-exception (inline error messages in frozen errors)
    "EM102",   # f-string-in-exception (f-string error constructors)
    "TRY003",  # raise-vanilla-args (descriptive domain error messages)
    "TRY301",  # raise-within-try (ROP @safe boundary patterns)
    "TRY400",  # error-instead-of-exception (structlog .error() outside handlers)
    # -- Sorting rules (semantic section ordering preferred) ----------------
    "RUF022",  # unsorted-dunder-all (semantic > alphabetical)
    "RUF023",  # unsorted-dunder-slots (semantic > alphabetical)
    # -- Development workflow -----------------------------------------------
    "TD003",   # missing-todo-link (git blame provides context)
    "FIX002",  # todo-found (CI gate, not editor noise)
    "INP001",  # implicit-namespace-package (monorepo structure)
    "CPY001",  # missing-copyright-notice (top-level LICENSE)
]

[tool.ruff.lint.per-file-ignores]
"__init__.py"      = ["F401"]
"tools/quality/**" = ["D101", "D102", "D103", "PLR0904", "PLR0912", "PLR0913", "PLR0914", "TC001", "TC002", "TC003", "PLW0108"]
"tests/tools/quality/**" = ["S101", "PLR2004", "TC002"]
"**/.claude/skills/**/scripts/**" = [
    "TC003",
    "ANN001",
    "ANN401",
    "B905",
    "C901",
    "E501",
    "ERA001",
    "EXE001",
    "FBT001",
    "PLC0415",
    "PLC2701",
    "PLC3002",
    "PLR0911",
    "PLR0912",
    "PLR0914",
    "PLR0915",
    "PLR6201",
    "PLW1510",
    "PTH109",
    "S105",
    "S310",
    "S404",
    "S603",
    "S607",
    "TID251",
    "TRY300",
]
"tools/py_analyzer/**" = ["PLR0912", "TC003"]
"tests/**"         = ["S101", "PLR2004", "PLR0913", "ARG001", "ARG002", "ANN201", "ANN401", "D101", "D102", "D103", "SLF001"]
"**/adapters/**"   = ["ANN401"]
"**/conftest.py"   = ["E402", "F401", "ARG001"]

[tool.ruff.lint.flake8-annotations]
allow-star-arg-any =      false
mypy-init-return =        true
suppress-dummy-args =     true
suppress-none-returning = true

[tool.ruff.lint.flake8-bandit]
check-typed-exception = true

[tool.ruff.lint.flake8-bugbear]
extend-immutable-calls = [
    "beartype.BeartypeConf",
    "msgspec.Meta",
    "msgspec.field",
    "pydantic.ConfigDict",
    "pydantic.Field",
    "pydantic.PrivateAttr",
    "stamina.retry",
]

[tool.ruff.lint.flake8-builtins]
ignorelist = ["id", "type", "input", "format", "hash"]

[tool.ruff.lint.flake8-import-conventions.extend-aliases]
"dask.array" =     "da"
"dask.dataframe" = "dd"
"scipy" =          "sp"
"sympy" =          "sym"
"xarray" =         "xr"

[tool.ruff.lint.flake8-pytest-style]
parametrize-names-type =          "csv"
raises-extend-require-match-for = ["AttributeError", "KeyError", "RuntimeError", "TypeError", "msgspec.ValidationError", "pydantic.ValidationError",]

[tool.ruff.lint.flake8-self]
extend-ignore-names = ["_validate", "_disc", "_check", "_value_"]

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports =        "all"
banned-module-level-imports = ["dask", "numpy", "pandas", "polars", "scipy", "sympy", "xarray"]
ban-lazy =                    "all"

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"concurrent.futures.ProcessPoolExecutor".msg = "Use anyio.to_process.run_sync() — structured concurrency with cancellation support."
"concurrent.futures.ThreadPoolExecutor".msg =  "Use anyio.to_thread.run_sync() with CapacityLimiter — structured concurrency."
"abc.ABC".msg =                        "Use typing.Protocol — structural subtyping, no inheritance hierarchies."
"abc.abstractmethod".msg =             "Use typing.Protocol — structural subtyping replaces nominal."
"asyncio".msg =                        "Use anyio — run/sleep/gather/Lock/Event/Semaphore/Queue all have anyio equivalents."
"collections.namedtuple".msg =         "Use pydantic BaseModel(frozen=True) or msgspec.Struct(frozen=True) — namedtuple lacks runtime validation."
"contextlib.suppress".msg =            "Use Result rails or a marked boundary adapter — suppress hides fallibility."
"http.client".msg =                    "Use httpx behind a validated adapter — direct stdlib HTTP bypasses timeout, retry, and observability policy."
