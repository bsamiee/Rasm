# Mutmut-only coverage config, selected via COVERAGE_RCFILE on the mutmut invocation; the main
# suite and the fail_under=90 gate keep pyproject's `relative_files = true` untouched.
# Survives outside pyproject because mutmut keys covered lines by ABSOLUTE mutant path:
# CoverageData.lines(abs) is an exact-key lookup and [tool.coverage.paths] aliases apply only at
# combine, which mutmut's in-process gather never runs — relative keys collapse every covered set
# to empty and abort with "no covered mutants".
# INI format (NOT TOML): `source` is a whitespace-separated plain value. data_file keeps the
# gather's data off the repo root, distinct from the main suite's .cache/coverage/.coverage.
[run]
relative_files = false
branch = true
core = sysmon
data_file = .cache/coverage/.mutmut.coverage
source =
    tools/assay
