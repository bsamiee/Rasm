<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Artifact title</title>
<style>
@layer reset, tokens, base, components, utilities, print, overrides;

@property --tone { syntax: "<percentage>"; inherits: true; initial-value: 0% }
@property --raise { syntax: "<number>"; inherits: true; initial-value: 0 }

@layer reset {
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
  img, svg { display: block; max-width: 100% }
  button, input, select, textarea { font: inherit; color: inherit }
}

@layer tokens {
  @media (prefers-color-scheme: light) {
    :root:not([data-theme]) {
      color-scheme: light;
      --bg:oklch(0.975 0.008 85); --surface:oklch(0.945 0.012 85); --raised:oklch(1 0 0);
      --raised-2:oklch(1 0 0); --overlay:oklch(1 0 0);
      --line:oklch(0 0 0/.1); --line-strong:oklch(0 0 0/.16); --boundary:oklch(0.55 0.16 301);
      --text:oklch(0.21 0.012 290); --text-muted:oklch(0.43 0.02 290); --text-faint:oklch(0.54 0.02 290);
      --accent:oklch(0.52 0.19 292); --accent-hover:oklch(0.47 0.19 292); --accent-active:oklch(0.44 0.18 292);
      --accent-weak:oklch(0.52 0.19 292/.12); --on-accent:oklch(0.99 0 0);
      --editorial:oklch(0.55 0.12 55); --editorial-weak:oklch(0.55 0.12 55/.1);
      --ok:oklch(0.52 0.15 150); --warn:oklch(0.56 0.13 70); --fail:oklch(0.53 0.2 25); --info:oklch(0.52 0.12 235);
      --series-1:oklch(0.52 0.19 292); --series-2:oklch(0.54 0.17 350); --series-3:oklch(0.54 0.12 225);
      --series-4:oklch(0.55 0.13 150); --series-5:oklch(0.58 0.12 65); --series-6:oklch(0.6 0.11 110);
      --shadow-1:0 1px 2px oklch(0 0 0/.08),0 1px 1px oklch(0 0 0/.05);
      --shadow-2:0 6px 24px oklch(0 0 0/.12),0 2px 6px oklch(0 0 0/.08);
    }
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg:oklch(0.975 0.008 85); --surface:oklch(0.945 0.012 85); --raised:oklch(1 0 0);
    --raised-2:oklch(1 0 0); --overlay:oklch(1 0 0);
    --line:oklch(0 0 0/.1); --line-strong:oklch(0 0 0/.16); --boundary:oklch(0.55 0.16 301);
    --text:oklch(0.21 0.012 290); --text-muted:oklch(0.43 0.02 290); --text-faint:oklch(0.54 0.02 290);
    --accent:oklch(0.52 0.19 292); --accent-hover:oklch(0.47 0.19 292); --accent-active:oklch(0.44 0.18 292);
    --accent-weak:oklch(0.52 0.19 292/.12); --on-accent:oklch(0.99 0 0);
    --editorial:oklch(0.55 0.12 55); --editorial-weak:oklch(0.55 0.12 55/.1);
    --ok:oklch(0.52 0.15 150); --warn:oklch(0.56 0.13 70); --fail:oklch(0.53 0.2 25); --info:oklch(0.52 0.12 235);
    --series-1:oklch(0.52 0.19 292); --series-2:oklch(0.54 0.17 350); --series-3:oklch(0.54 0.12 225);
    --series-4:oklch(0.55 0.13 150); --series-5:oklch(0.58 0.12 65); --series-6:oklch(0.6 0.11 110);
    --shadow-1:0 1px 2px oklch(0 0 0/.08),0 1px 1px oklch(0 0 0/.05);
    --shadow-2:0 6px 24px oklch(0 0 0/.12),0 2px 6px oklch(0 0 0/.08);
  }
}

@layer print {
  @media print {
    :root {
      --bg:oklch(1 0 0); --surface:oklch(0.945 0.012 85); --raised:oklch(1 0 0); --raised-2:oklch(1 0 0); --overlay:oklch(1 0 0);
      --line:oklch(0 0 0/.14); --line-strong:oklch(0 0 0/.24); --boundary:oklch(0.55 0.16 301);
      --text:oklch(0.21 0.012 290); --text-muted:oklch(0.4 0.02 290); --text-faint:oklch(0.5 0.02 290);
      --accent:oklch(0.52 0.19 292); --editorial:oklch(0.55 0.12 55);
      --shadow-1:none; --shadow-2:none;
    }
    .toolbar, .export-bar, .drawer-tab, .skip { display: none !important }
    main { max-width: none }
    h1 { font-size: var(--fs-3xl) }
    .card, tr, figure, pre { break-inside: avoid }
    h2, h3 { break-after: avoid }
    * { print-color-adjust: exact }
  }
}

@layer tokens {
  :root {
    color-scheme: dark;
    --bg:oklch(0.16 0.022 290); --surface:oklch(0.205 0.024 290); --raised:oklch(0.245 0.026 290);
    --raised-2:oklch(0.295 0.028 290); --overlay:oklch(0.345 0.03 290);
    --line:oklch(1 0 0/.09); --line-strong:oklch(1 0 0/.16); --boundary:oklch(0.84 0.089 304);
    --text:oklch(0.965 0.008 290); --text-muted:oklch(0.78 0.03 290); --text-faint:oklch(0.66 0.032 290);
    --accent:oklch(0.72 0.185 292); --accent-hover:oklch(0.78 0.18 292); --accent-active:oklch(0.655 0.175 292);
    --accent-weak:oklch(0.72 0.185 292/.16); --on-accent:oklch(0.16 0.02 292); --focus:var(--accent);
    --editorial:oklch(0.71 0.13 55); --editorial-weak:oklch(0.71 0.13 55/.14);
    --ok:oklch(0.76 0.15 150); --warn:oklch(0.8 0.14 78); --fail:oklch(0.7 0.2 25); --info:oklch(0.79 0.12 225);
    --series-1:oklch(0.72 0.185 292); --series-2:oklch(0.72 0.17 350); --series-3:oklch(0.74 0.12 225);
    --series-4:oklch(0.74 0.15 150); --series-5:oklch(0.78 0.13 65); --series-6:oklch(0.8 0.11 110);
    --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:32px; --s7:48px; --s8:64px;
    --fs-2xs:.694rem; --fs-xs:.833rem; --fs-sm:.9rem; --fs-md:1rem; --fs-lg:1.2rem;
    --fs-xl:1.44rem; --fs-2xl:1.728rem; --fs-3xl:2.074rem;
    --fs-4xl:clamp(2.074rem, 1.6rem + 2.2cqi, 2.986rem);
    --lh-tight:1.15; --lh-heading:1.25; --lh-body:1.6; --lh-data:1.4;
    --font-display:ui-serif,Georgia,'Iowan Old Style',serif;
    --font-sans:ui-sans-serif,system-ui,'Segoe UI',Roboto,sans-serif;
    --font-mono:ui-monospace,'SF Mono',Menlo,'Cascadia Mono',Consolas,monospace;
    --dur-1:120ms; --dur-2:200ms; --dur-3:320ms; --dur-out-2:140ms; --dur-out-3:230ms;
    --ease-out:cubic-bezier(.16,1,.3,1); --ease-standard:cubic-bezier(.2,0,0,1);
    --ease-spring:cubic-bezier(.34,1.56,.64,1);
    --r-1:6px; --r-2:10px; --r-3:16px; --r-full:999px; --measure:1100px;
    --shadow-1:0 1px 2px oklch(0 0 0/.45),0 1px 1px oklch(0 0 0/.3);
    --shadow-2:0 6px 24px oklch(0 0 0/.55),0 2px 6px oklch(0 0 0/.4);
  }
  @media (prefers-reduced-motion:reduce){:root{--dur-1:0ms;--dur-2:0ms;--dur-3:0ms;--dur-out-2:0ms;--dur-out-3:0ms}}
}

@layer base {
  html { scroll-behavior: smooth }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font-sans); font-size: var(--fs-md); line-height: var(--lh-body);
    padding-block-end: var(--s8);
  }
  h1 { font-family: var(--font-display); font-weight: 600; font-size: var(--fs-4xl); line-height: var(--lh-tight); text-wrap: balance }
  h2 { font-family: var(--font-display); font-weight: 600; font-size: var(--fs-xl); line-height: var(--lh-heading); text-wrap: balance }
  h3 { font-weight: 600; font-size: var(--fs-lg); line-height: var(--lh-heading) }
  p, li { text-wrap: pretty; max-inline-size: 70ch }
  a { color: var(--accent) }
  code { font-family: var(--font-mono); font-size: var(--fs-xs); background: var(--surface); padding: 1px var(--s1); border-radius: var(--r-1); overflow-wrap: anywhere }
  small { font-size: var(--fs-xs); color: var(--text-muted) }
  ::selection { background: var(--accent-weak) }
  :focus-visible { outline: none; box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--focus) }
  button { cursor: pointer }
  button:disabled { cursor: default; color: var(--text-faint) }
}

@layer components {
  .skip { position: absolute; inset-inline-start: var(--s4); inset-block-start: -3rem; z-index: 10; background: var(--accent); color: var(--on-accent); padding: var(--s2) var(--s4); border-radius: var(--r-1) }
  .skip:focus-visible { inset-block-start: var(--s4) }

  .masthead { max-inline-size: var(--measure); margin-inline: auto; padding: var(--s7) var(--s5) var(--s5); container-type: inline-size }
  .eyebrow { font-family: var(--font-mono); font-size: var(--fs-2xs); font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--editorial) }
  .rowline { display: flex; align-items: baseline; gap: var(--s3); flex-wrap: wrap }
  .deck { font-size: var(--fs-lg); color: var(--text-muted); max-inline-size: 60ch; margin-block-start: var(--s2) }

  .chip { display: inline-flex; align-items: center; gap: var(--s1); block-size: 20px; padding-inline: var(--s2); border-radius: var(--r-1);
    font-family: var(--font-mono); font-size: var(--fs-2xs); font-weight: 600; letter-spacing: .06em; background: var(--surface); color: var(--text-muted);
    transition: background var(--dur-1) var(--ease-standard) }
  .chip.ok { background: color-mix(in oklch, var(--ok) 14%, transparent); color: var(--ok) }
  .chip.warn { background: color-mix(in oklch, var(--warn) 14%, transparent); color: var(--warn) }
  .chip.fail { background: color-mix(in oklch, var(--fail) 14%, transparent); color: var(--fail) }
  .chip.info { background: color-mix(in oklch, var(--info) 14%, transparent); color: var(--info) }

  .toolbar { position: sticky; inset-block-start: 0; z-index: 5; display: flex; align-items: center; gap: var(--s2); block-size: 48px;
    padding-inline: var(--s5); background: color-mix(in oklch, var(--bg) 88%, transparent); backdrop-filter: blur(8px); border-block-end: 1px solid var(--line) }
  .toolbar .right { margin-inline-start: auto; display: flex; gap: var(--s2) }

  main { max-inline-size: var(--measure); margin-inline: auto; padding-inline: var(--s5); display: grid; gap: var(--s6); counter-reset: sec }
  .section > h2 { margin-block-end: var(--s4) }
  .section > h2::before { counter-increment: sec; content: "0" counter(sec) " "; font-family: var(--font-mono); font-size: var(--fs-sm); font-weight: 600; letter-spacing: .06em; color: var(--editorial) }

  .keyline { border-inline-start: 3px solid var(--editorial); background: var(--editorial-weak); border-radius: 0 var(--r-1) var(--r-1) 0; padding: var(--s3) var(--s4); margin-block-end: var(--s4) }
  .keyline.verdict { border-inline-start-color: var(--ok); background: color-mix(in oklch, var(--ok) 10%, transparent) }
  .keyline.killed { border-inline-start-color: var(--fail); background: color-mix(in oklch, var(--fail) 8%, transparent) }

  .kv { display: grid; grid-template-columns: max-content 1fr; gap: var(--s1) var(--s4); line-height: var(--lh-data); align-items: baseline }
  .kv dt { font-family: var(--font-mono); font-size: var(--fs-2xs); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted) }
  .kv dd { font-size: var(--fs-sm) }

  .card { container-type: inline-size;
    background: color-mix(in oklch, var(--raised), var(--accent) var(--tone));
    box-shadow: var(--shadow-1), 0 calc(var(--raise) * var(--s1)) calc(var(--raise) * var(--s4)) oklch(0 0 0/.28);
    border: 1px solid var(--line); border-radius: var(--r-2); padding: var(--s4); display: grid; gap: var(--s3); align-content: start;
    transition: --tone var(--dur-out-2) var(--ease-standard), --raise var(--dur-out-2) var(--ease-standard) }
  .card:has(:is(input, textarea, select):focus-visible) { --tone: 10%; --raise: 1; border-color: var(--line-strong); transition-duration: var(--dur-2); transition-timing-function: var(--ease-out) }
  .card .kv { border-block-start: 1px solid var(--line); padding-block-start: var(--s3) }

  .seg { display: inline-flex; border: 1px solid var(--line-strong); border-radius: var(--r-1); overflow: hidden }
  .seg label { display: inline-flex; align-items: center; block-size: 32px; padding-inline: var(--s3);
    font-family: var(--font-mono); font-size: var(--fs-2xs); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted);
    transition: background var(--dur-1) var(--ease-standard) }
  .seg label:has(input:checked) { background: var(--accent-weak); color: var(--text) }
  .seg label:has(input:focus-visible) { box-shadow: inset 0 0 0 2px var(--focus) }
  .seg input { position: absolute; opacity: 0; pointer-events: none }
  .seg label + label { border-inline-start: 1px solid var(--line) }

  .twrap { overflow-x: auto; border: 1px solid var(--line-strong); border-radius: var(--r-2) }
  table { border-collapse: collapse; inline-size: 100%; font-size: var(--fs-sm); line-height: var(--lh-data) }
  caption { text-align: start; padding: var(--s3) var(--s4); font-size: var(--fs-xs); color: var(--text-muted) }
  th { font-family: var(--font-mono); font-size: var(--fs-2xs); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted);
    background: var(--surface); text-align: start; padding: var(--s2) var(--s4) }
  td { padding: var(--s2) var(--s4); border-block-start: 1px solid var(--line) }
  td.num, th.num { text-align: end; font-family: var(--font-mono); font-variant-numeric: tabular-nums; letter-spacing: -.01em }
  tfoot td { background: var(--raised-2); border-block-start: 1px solid var(--line-strong); font-weight: 600 }

  .stat { display: flex; align-items: baseline; gap: var(--s3) }
  .stat output { font-family: var(--font-mono); font-size: var(--fs-2xl); font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: -.01em }

  figure { border: 1px solid var(--line-strong); border-radius: var(--r-3); padding: var(--s4); display: grid; gap: var(--s3) }
  figcaption { font-size: var(--fs-xs); color: var(--editorial) }
  .fig-scroll { overflow-x: auto }

  .cx { font-family: var(--font-mono); font-size: 11px; fill: var(--text-muted) }
  .cx-val { font-family: var(--font-mono); font-size: 11px; fill: var(--text) }
  .cx-title { font-family: var(--font-sans); font-size: 12px; fill: var(--text-muted) }
  .grid-line { stroke: var(--line); shape-rendering: crispEdges }
  .grid-zero { stroke: var(--line-strong); shape-rendering: crispEdges }
  .bar { fill: var(--series-1) }
  .edge { stroke: var(--line-strong); stroke-width: 1.5; fill: none; stroke-linejoin: round }
  .edge.planned { stroke: var(--accent); stroke-width: 2; stroke-dasharray: 6 6 }
  .node { fill: var(--raised); stroke: var(--line-strong); stroke-width: 1.5 }
  .node.fail { stroke: var(--fail); stroke-width: 2 }
  .zone { fill: var(--surface); stroke: var(--boundary); stroke-width: 1; stroke-dasharray: 5 4 }
  .zlabel { font-family: var(--font-mono); font-size: 11px; fill: var(--boundary); letter-spacing: .06em }
  .nlabel { font-family: var(--font-mono); font-size: 12px; fill: var(--text); text-anchor: middle }
  .chipback { fill: var(--surface) }
  .elabel { font-family: var(--font-mono); font-size: 11px; fill: var(--text-muted); text-anchor: middle }

  .btn { display: inline-flex; align-items: center; gap: var(--s2); block-size: 32px; padding-inline: var(--s3);
    background: var(--raised); border: 1px solid var(--line-strong); border-radius: var(--r-1);
    font-family: var(--font-mono); font-size: var(--fs-2xs); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text);
    transition: background var(--dur-1) var(--ease-standard), border-color var(--dur-1) var(--ease-standard) }
  .btn:hover { background: var(--overlay) }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: var(--on-accent) }
  .btn.primary:hover { background: var(--accent-hover) }
  .btn.primary:active { background: var(--accent-active) }
  .btn.ghost { background: transparent; border-color: var(--line) }
  .btn[data-copied] { transform: scale(1.04); transition: transform var(--dur-2) var(--ease-spring) }

  details { border: 1px solid var(--line); border-radius: var(--r-2); padding: var(--s3) var(--s4); background: var(--raised) }
  summary { cursor: pointer; font-weight: 600; transition: color var(--dur-1) var(--ease-standard) }
  summary:hover { color: var(--accent) }
  details pre { background: var(--surface); border-radius: var(--r-1); padding: var(--s3); overflow-x: auto; margin-block-start: var(--s3) }
  details pre code { background: none; padding: 0 }

  .drawer-tab { position: fixed; inset-inline-end: var(--s5); inset-block-end: var(--s5); z-index: 6;
    border-radius: var(--r-full); box-shadow: var(--shadow-2); padding-inline: var(--s4); block-size: 36px;
    background: var(--accent); border: none; color: var(--on-accent);
    font-family: var(--font-mono); font-size: var(--fs-2xs); font-weight: 600; letter-spacing: .06em; text-transform: uppercase }
  .export-bar { position: fixed; inset-inline-end: var(--s5); inset-block-end: 72px; inset-inline-start: auto; inset-block-start: auto;
    inline-size: min(26rem, calc(100vw - 2 * var(--s5))); max-block-size: 60vh; overflow: auto;
    background: var(--overlay); border: 1px solid var(--line-strong); border-radius: var(--r-3); box-shadow: var(--shadow-2);
    padding: var(--s4); display: none; gap: var(--s3);
    opacity: 0; translate: 0 var(--s3);
    transition: opacity var(--dur-out-3) var(--ease-standard), translate var(--dur-out-3) var(--ease-standard), display var(--dur-out-3) allow-discrete }
  .export-bar:popover-open { display: grid; opacity: 1; translate: 0 0; transition-duration: var(--dur-3); transition-timing-function: var(--ease-out) }
  @starting-style { .export-bar:popover-open { opacity: 0; translate: 0 var(--s3) } }
  .export-bar header { display: flex; align-items: baseline; gap: var(--s3) }
  .export-bar .row { display: flex; flex-wrap: wrap; gap: var(--s2) }
  .export-bar textarea { min-block-size: 8rem; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-1);
    padding: var(--s3); font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--text-muted); resize: vertical }

  .toast { position: fixed; inset-inline-start: 50%; inset-block-end: var(--s6); inset-inline-end: auto; inset-block-start: auto; translate: -50% 0;
    background: var(--overlay); border: 1px solid var(--line-strong); border-radius: var(--r-1); box-shadow: var(--shadow-2);
    padding: var(--s2) var(--s4); font-family: var(--font-mono); font-size: var(--fs-xs) }
}

@layer utilities {
  .sr-only { position: absolute; inline-size: 1px; block-size: 1px; padding: 0; margin: -1px; overflow: hidden; clip-path: inset(50%); white-space: nowrap; border: 0 }
  .micro { font-family: var(--font-mono); font-size: var(--fs-2xs); letter-spacing: .06em }
}

@layer overrides {
  @media (forced-colors: active) {
    .card, .btn, .export-bar { box-shadow: none !important }
  }
  @media (prefers-contrast: more) {
    :root { --line: oklch(1 0 0/.16) }
    :focus-visible { box-shadow: 0 0 0 2px var(--bg), 0 0 0 5px var(--focus) !important }
  }
}
</style>
</head>
<body>
<a class="skip" href="#main">Skip to content</a>

<header class="masthead">
  <div class="rowline">
    <span class="eyebrow">Artifact kind</span>
    <span class="chip ok">[STATUS]</span>
    <time class="micro" datetime="2026-07">Jul 2026</time>
  </div>
  <h1>Artifact title</h1>
  <p class="deck">The one question this page answers for its reader.</p>
</header>

<div class="toolbar">
  <span class="micro" id="dirty-note" role="status">No pending judgment</span>
  <div class="right">
    <button type="button" class="btn ghost" data-undo disabled>Undo</button>
    <button type="button" class="btn ghost" data-theme-toggle aria-pressed="true">Dark</button>
  </div>
</div>

<main id="main">
  <!-- Compose the selected type's spine here; each section follows this shape. -->
  <section class="section" id="first-claim">
    <h2>First section claim</h2>
    <div class="keyline">
      <p>The bottom line the section argues, stated before its evidence.</p>
    </div>
    <dl class="kv">
      <dt>Owner</dt><dd>who answers for this fact</dd>
      <dt>Anchor</dt><dd><code>path/to/evidence:1</code></dd>
    </dl>
  </section>
</main>

<form id="capture-form"></form>

<button type="button" class="drawer-tab" popovertarget="drawer" data-tab-count>Export</button>
<aside id="drawer" class="export-bar" popover aria-label="Export">
  <header><h2>Export</h2><span class="micro" data-dirty></span></header>
  <div class="row" data-send hidden><button type="button" class="btn primary" data-export="send">Send to agent</button></div>
  <div class="row">
    <button type="button" class="btn" data-export="markdown">Copy markdown</button>
    <button type="button" class="btn" data-export="json">Download JSON</button>
    <button type="button" class="btn ghost" data-export="changed">Copy changed only</button>
  </div>
  <textarea readonly aria-label="Outgoing payload"></textarea>
</aside>

<div id="toast" class="toast" popover="manual" role="status"></div>

<script type="application/json" id="payload">
{
  "artifact": { "id": "kind.scope.slug", "title": "Artifact title", "baseline": "b-0001" },
  "rows": []
}
</script>

<script>
(() => {
  "use strict";

  // --- models -----------------------------------------------------------------------------
  const payload = JSON.parse(document.getElementById("payload").textContent);
  const state = { decisions: {}, changes: {}, annotations: [] };
  const draftKey = "draft:" + document.title;
  try {
    const saved = localStorage.getItem(draftKey);
    if (saved) Object.assign(state, JSON.parse(saved));
  } catch { /* file:// storage is best-effort */ }
  const baseline = structuredClone(state);
  const undoStack = [];

  // --- pure operations --------------------------------------------------------------------
  const esc = s => String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  const fmt = new Intl.NumberFormat("en", { maximumFractionDigits: 2 });
  const changedRows = () => Object.entries(state.changes)
    .filter(([path, value]) => JSON.stringify(value) !== JSON.stringify(baseline.changes[path]))
    .map(([path, value]) => ({ path, from: baseline.changes[path] ?? null, to: value }));
  const decisionRows = () => Object.entries(state.decisions).filter(([, verdict]) => verdict).map(([id, verdict]) => ({ id, verdict }));
  const dirtyCount = () => changedRows().length + decisionRows().length + state.annotations.filter(a => a.status === "active").length;
  const snapshotEnvelope = () => ({
    kind: "report",
    version: 1,
    artifact: payload.artifact,
    decision: { status: "open", at: new Date().toISOString() },
    decisions: decisionRows(),
    changes: changedRows(),
    annotations: state.annotations,
    state: {},
  });
  const validateEnvelope = env => [
    ...(typeof env.kind === "string" && env.kind ? [] : ["kind"]),
    ...(typeof env.artifact?.id === "string" && env.artifact.id ? [] : ["artifact.id"]),
    ...(Number.isInteger(env.version) && env.version >= 1 ? [] : ["version"]),
    ...(Array.isArray(env.decisions) && Array.isArray(env.changes) ? [] : ["rows"]),
  ];
  const markdown = () => {
    const env = snapshotEnvelope();
    const rows = env.decisions.map(d => `| ${d.id} | ${d.verdict} |`).join("\n");
    const changes = env.changes.map(c => `- \`${c.path}\`: ${JSON.stringify(c.from)} -> ${JSON.stringify(c.to)}`).join("\n");
    return [
      `# ${payload.artifact.title}`,
      rows ? `\n| id | verdict |\n| --- | --- |\n${rows}` : "",
      changes ? `\n**Edits (against ${payload.artifact.baseline})**\n${changes}` : "",
    ].filter(Boolean).join("\n");
  };

  // --- composition wiring -----------------------------------------------------------------
  const doc = document;
  const q = sel => doc.querySelector(sel);
  const qa = sel => [...doc.querySelectorAll(sel)];
  const toast = (() => {
    const node = q("#toast");
    let timer;
    return message => {
      node.textContent = message;
      node.showPopover?.();
      clearTimeout(timer);
      timer = setTimeout(() => node.hidePopover?.(), 2400);
    };
  })();

  const render = () => {
    // Project state into the type's own controls here; the shell renders the shared chrome.
    const dirty = dirtyCount();
    q("[data-dirty]").textContent = dirty ? `${dirty} unsent` : "nothing pending";
    q("[data-tab-count]").textContent = dirty ? `Export (${dirty})` : "Export";
    q("#dirty-note").textContent = dirty ? `${dirty} pending judgment${dirty === 1 ? "" : "s"}` : "No pending judgment";
    q("[data-export='changed']").disabled = changedRows().length === 0;
    q("[data-undo]").disabled = undoStack.length === 0;
    q(".export-bar textarea").value = JSON.stringify(snapshotEnvelope(), null, 2);
    try { localStorage.setItem(draftKey, JSON.stringify(state)); } catch { /* file:// storage is best-effort */ }
  };

  const commit = mutate => {
    undoStack.push(structuredClone(state));
    mutate(state);
    render();
  };
  const undoLast = () => {
    if (!undoStack.length) return;
    Object.assign(state, undoStack.pop());
    render();
  };

  const download = (name, text) => {
    const url = URL.createObjectURL(new Blob([text], { type: "application/json" }));
    Object.assign(doc.createElement("a"), { href: url, download: name }).click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };
  const copyText = async (button, text, what) => {
    const mirror = q(".export-bar textarea");
    mirror.value = text;
    try {
      await navigator.clipboard.writeText(text);
      button.setAttribute("data-copied", "");
      setTimeout(() => button.removeAttribute("data-copied"), 400);
      toast(`${what} copied`);
    } catch {
      mirror.focus();
      mirror.select();
      toast(`Clipboard blocked — ${what} selected in the mirror`);
    }
  };

  const returnMeta = doc.querySelector('meta[name="artifact-return"]');
  const tokenMeta = doc.querySelector('meta[name="artifact-token"]');
  const sendToAgent = async envelope => {
    const res = await fetch(returnMeta.content, {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Artifact-Token": tokenMeta?.content ?? "" },
      body: JSON.stringify({ kind: envelope.kind, artifact: envelope.artifact.id, version: envelope.version, data: envelope }),
    });
    if (!res.ok) throw new Error(`submit ${res.status}`);
    return res.json();
  };

  const egress = async button => {
    const env = snapshotEnvelope();
    const faults = validateEnvelope(env);
    if (faults.length) { toast(`Export blocked: ${faults.join(", ")}`); return; }
    const mode = button.dataset.export;
    if (mode === "markdown") await copyText(button, markdown(), "Markdown");
    if (mode === "json") { download(`${env.artifact.id}.json`, JSON.stringify(env, null, 2)); toast("JSON downloaded"); }
    if (mode === "changed") await copyText(button, JSON.stringify({ ...env, state: undefined, annotations: undefined }, null, 2), "Changed-only envelope");
    if (mode === "send") {
      button.disabled = true;
      try { await sendToAgent(env); button.textContent = "Sent"; toast("Receipt accepted"); }
      catch { button.textContent = "Send failed — copied instead"; await copyText(button, JSON.stringify(env, null, 2), "Envelope"); }
      finally { button.disabled = false; }
    }
  };

  const themeKey = "theme:" + document.title;
  const applyTheme = mode => {
    doc.documentElement.dataset.theme = mode;
    const toggle = q("[data-theme-toggle]");
    toggle.setAttribute("aria-pressed", String(mode === "dark"));
    toggle.textContent = mode === "dark" ? "Dark" : "Light";
  };
  try {
    const savedTheme = localStorage.getItem(themeKey);
    applyTheme(savedTheme === "light" || savedTheme === "dark" ? savedTheme : matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
  } catch { applyTheme(matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark"); }

  const ROUTES = {
    change: [
      // Route each capture control by its data-* hook into a commit() mutation.
    ],
    click: [
      ["[data-export]", hit => { egress(hit); }],
      ["[data-undo]", () => undoLast()],
      ["[data-theme-toggle]", hit => {
        const next = hit.getAttribute("aria-pressed") === "true" ? "light" : "dark";
        applyTheme(next);
        try { localStorage.setItem(themeKey, next); } catch { /* file:// storage is best-effort */ }
      }],
    ],
  };
  Object.entries(ROUTES).forEach(([type, routes]) => doc.addEventListener(type, event => {
    routes.forEach(([sel, fn]) => { const hit = event.target.closest(sel); if (hit) fn(hit, event); });
  }));
  doc.addEventListener("keydown", event => {
    if ((event.metaKey || event.ctrlKey) && event.key === "z") { event.preventDefault(); undoLast(); }
  });

  if (returnMeta) q("[data-send]").hidden = false;

  const detailStates = new Map();
  addEventListener("beforeprint", () => {
    qa("details").forEach(node => { detailStates.set(node, node.open); node.open = true; });
  });
  addEventListener("afterprint", () => {
    detailStates.forEach((open, node) => { node.open = open; });
    detailStates.clear();
  });

  void esc; void fmt; void commit;
  render();
})();
</script>
</body>
</html>
