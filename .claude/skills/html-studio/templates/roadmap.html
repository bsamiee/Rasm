:root{--warn-fill:color-mix(in oklch,var(--warn) 14%,transparent);--drop-fill:color-mix(in oklch,var(--accent) 12%,transparent)}
}
@layer components{
main{counter-reset:sec}
.masthead{display:grid;gap:var(--s2);margin-block-end:var(--s5);
&>.top{display:flex;flex-wrap:wrap;gap:var(--s3);align-items:center;justify-content:space-between}}
.timeline{container:tl/inline-size;padding:var(--s4);margin:0;
& svg{display:block;inline-size:100%;color:var(--text)}}
.tl .band{fill:color-mix(in oklch,var(--text) 6%,transparent)}
.tl .grid-m{stroke:var(--line)}
.tl .bound{stroke:var(--line-strong)}
.tl text{font-family:var(--font-mono);font-size:11px;fill:var(--text-muted)}
.tl .hlab{font-weight:600;letter-spacing:.06em}
.tl .rlab{transition:fill var(--dur-1) var(--ease-standard)}
.tl a{text-decoration:none;&:hover .rlab{fill:var(--text)}&:focus-visible{outline:2px solid var(--focus);outline-offset:1px}}
.tl .bar{stroke:var(--line-strong);stroke-width:1.5;
&.done{fill:color-mix(in oklch,var(--ok) 20%,transparent)}
&.active{fill:color-mix(in oklch,var(--accent) 20%,transparent)}
&.open{fill:color-mix(in oklch,var(--text) 8%,transparent)}
&.at-risk{fill:color-mix(in oklch,var(--warn) 22%,transparent)}
&.crit{stroke:var(--accent);stroke-width:2}}
.tl .slack{fill:color-mix(in oklch,var(--accent) 12%,transparent)}
.tl .dep{fill:none;stroke:var(--info);stroke-width:1.5;stroke-dasharray:4 6;pointer-events:none;
&.back{stroke:var(--fail);stroke-width:2}}
.tl .arw-dep{fill:var(--info)}
.tl .arw-back{fill:var(--fail)}
.tl .dia{stroke-width:1.5;
&.done{fill:var(--ok);stroke:var(--ok)}
&.active{fill:var(--accent);stroke:var(--accent)}
&.open{fill:var(--surface);stroke:var(--line-strong)}
&.at-risk{fill:var(--warn);stroke:var(--warn)}}
.tl .today{stroke:var(--accent);stroke-width:2}
.tl .tlab{fill:var(--accent);font-weight:600;letter-spacing:.06em}
.legend{display:flex;flex-wrap:wrap;gap:var(--s2) var(--s4);margin-block-start:var(--s3);font-family:var(--font-mono);font-size:var(--fs-2xs);font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text-muted);
&>span{display:inline-flex;align-items:center;gap:var(--s1)}
& i{display:inline-block;inline-size:9px;block-size:9px;rotate:45deg;border-radius:2px;border:1.5px solid transparent;
&.done{background:var(--ok)}&.active{background:var(--accent)}&.open{background:var(--surface);border-color:var(--line-strong)}&.at-risk{background:var(--warn)}}
& b{display:inline-block;inline-size:18px;border-block-start:2px dashed var(--info);
&.back{border-color:var(--fail)}&.crit{border-block-start:3px solid var(--accent)}&.slack{border-block-start:5px solid color-mix(in oklch,var(--accent) 25%,transparent)}&.today{inline-size:2px;block-size:11px;border:0;background:var(--accent)}}}
.tl-stack{display:none;gap:var(--s4)}
.tl-h{display:grid;gap:var(--s2);
&>b{font-family:var(--font-mono);font-size:var(--fs-2xs);font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted)}}
.tl-row{display:flex;gap:var(--s2);margin:0;font-size:var(--fs-xs);align-items:baseline;
& time{font-family:var(--font-mono);font-variant-numeric:tabular-nums;color:var(--text-muted);min-inline-size:3.4rem}
& .mark{font-family:var(--font-mono);font-size:var(--fs-2xs);font-weight:600;letter-spacing:.05em;
&.done{color:var(--ok)}&.active{color:var(--accent)}&.at-risk{color:var(--warn)}&.open{color:var(--text-muted)}}}
.tl-today{margin:0;font-family:var(--font-mono);font-size:var(--fs-2xs);font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);border-block-start:2px solid var(--accent);padding-block-start:2px}
.rollup>.card{display:grid;gap:var(--s2);align-content:start;
& h3{margin:0;font-size:var(--fs-lg)}
& .win{font-family:var(--font-mono);font-size:var(--fs-2xs);color:var(--text-muted)}}
#horizons{container:lanes/inline-size}
.lanes{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:var(--s4);align-items:start;margin-block-start:var(--s4)}
.lane{display:grid;gap:var(--s3);padding:var(--s3);border:1px solid var(--line);border-radius:var(--r-2);background:var(--surface);min-block-size:9rem;transition:background var(--dur-1) var(--ease-standard),border-color var(--dur-1) var(--ease-standard);
&>h3{margin:0;font-size:var(--fs-lg);display:flex;justify-content:space-between;align-items:baseline;
& small{font-family:var(--font-mono);font-variant-numeric:tabular-nums}}
&[data-over]{background:var(--drop-fill);border-color:var(--accent)}}
.ms{display:grid;gap:var(--s2);cursor:grab;scroll-margin-block-start:var(--s6);
&:active{cursor:grabbing}
&.dragging{opacity:.5;rotate:1.5deg}
&:target{outline:2px solid var(--accent);outline-offset:2px}}
.ms-head{display:flex;justify-content:space-between;gap:var(--s2);align-items:baseline;
& h4{margin:0;font-size:var(--fs-md);line-height:var(--lh-heading)}
& small{font-family:var(--font-mono);font-variant-numeric:tabular-nums;white-space:nowrap}}
.ms .kv{grid-template-columns:minmax(3.2rem,max-content) minmax(0,1fr);row-gap:var(--s1);
&>dd{font-size:var(--fs-xs)}}
.ms-risk{margin:0;font-size:var(--fs-xs);color:var(--warn);background:var(--warn-fill);padding:var(--s1) var(--s2);border-radius:var(--r-1);
& b{font-family:var(--font-mono);font-size:var(--fs-2xs);font-weight:600;letter-spacing:.05em}}
.ms-note{margin:0;font-size:var(--fs-xs);color:var(--text-muted);border-inline-start:3px solid var(--editorial);padding-inline-start:var(--s2)}
.ms.dim{background:var(--surface);border-color:var(--line);box-shadow:none;
& :is(h4,dt,dd,.ms-head small,.ms-note){color:var(--text-faint)}
& .ms-risk{background:transparent;color:var(--text-faint)}}
.cap{display:flex;flex-wrap:wrap;gap:var(--s2);align-items:center;
& .seg{block-size:28px;& label{font-family:var(--font-mono);font-size:var(--fs-2xs);font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding-inline:var(--s2)}}
& .btn{block-size:28px;font-family:var(--font-mono);font-size:var(--fs-2xs);letter-spacing:.05em;text-transform:uppercase}}
.notepop{inset:auto;position-area:block-start span-inline-start;position-try-fallbacks:flip-block,flip-inline;margin-block-end:var(--s1);inline-size:min(92vw,19rem);
& textarea{inline-size:100%;min-block-size:4rem;margin-block-start:var(--s2)}}
.tools{display:flex;flex-wrap:wrap;gap:var(--s3);align-items:center;margin-block-start:var(--s4);
& label{flex:1;display:flex;gap:var(--s2);align-items:center;min-inline-size:16rem;font-size:var(--fs-sm);color:var(--text-muted);
& input{flex:1}}
& output{font-family:var(--font-mono);font-size:var(--fs-xs);color:var(--text-muted)}}
}
@layer utilities{
@container tl (inline-size < 48rem){.timeline svg,.timeline .legend{display:none}.tl-stack{display:grid}}
@container lanes (inline-size < 48rem){.lanes{grid-template-columns:1fr}}
}
@layer print{
@media print{
.tools{display:none!important}
.tl-stack{display:none!important}
.timeline svg{display:block!important}
.lanes{grid-template-columns:1fr}
.ms,.lane,.rollup>.card,.timeline{break-inside:avoid}
}}
@layer overrides{
@media (forced-colors:active){.lane[data-over]{border:2px solid Highlight}}
}
</style>
</head>

</div>
<template id="ms-tpl">
  <article class="card ms" draggable="true" tabindex="0" aria-keyshortcuts="ArrowLeft ArrowRight">
    <div class="ms-head">
      <h4 data-cell="title"></h4>
      <small data-cell="window"></small>
    </div>
    <dl class="kv">
      <dt>owner</dt><dd data-cell="owner"></dd>
      <dt>deps</dt><dd data-cell="deps"></dd>
    </dl>
    <p class="ms-risk" data-risk hidden></p>
    <p class="ms-note" data-note-line hidden></p>
    <div class="cap no-print"></div>
  </article>
</template>

<header><span class="eyebrow">[EXPORT]</span><button type="button" class="btn ghost" popovertarget="export-drawer" popovertargetaction="hide" aria-label="Close export drawer">&#x2715;</button></header>
<section aria-label="Send to agent">
<button type="button" class="btn primary" data-export="send" hidden>Send to agent</button>
</section>
<section aria-label="Disk egress">
<button type="button" class="btn" data-export="md">Copy markdown</button>
<button type="button" class="btn" data-export="json">Download JSON</button>
<button type="button" class="btn ghost" data-export="changed" disabled>Copy changed-only</button>

"use strict";
const NOCTURNE = (() => {
  const $ = (sel, root = document) => root.querySelector(sel);
  const $$ = (sel, root = document) => [...root.querySelectorAll(sel)];
  const esc = value => { const node = document.createElement("span"); node.textContent = String(value); return node.innerHTML; };
  const el = (tag, attrs, ...kids) => {
    const node = document.createElement(tag);
    if (attrs) for (const key in attrs) {

      else if (value === true) node.setAttribute(key, "");
      else node.setAttribute(key, value);
    }
    for (const kid of kids.flat(2)) { if (kid != null && kid !== false) node.append(kid.nodeType ? kid : document.createTextNode(String(kid))); }

  };
  const clone = (template, fills) => {
    const node = template.content.cloneNode(true);
    if (fills) for (const key in fills) { const slot = node.querySelector(`[data-cell="${CSS.escape(key)}"]`); if (slot) slot.textContent = fills[key]; }
    return node;
  };
  const fmt = { num: new Intl.NumberFormat(), pct: new Intl.NumberFormat(undefined, { style: "percent", maximumFractionDigits: 0 }) };

  const slug = document.title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
  const themeKey = "theme:" + slug;
  const root = document.documentElement;
  const storedTheme = (() => { try { return localStorage.getItem(themeKey); } catch { return null; } })();

  const toggleTheme = () => {

  let toastTimer = 0;
  const flash = message => {
    const toast = $("#toast"); if (!toast?.showPopover) return;

    toastTimer = setTimeout(() => { try { toast.hidePopover(); } catch { /* already hidden */ } }, 1600);
  };

  const copyText = async text => {

    try { await navigator.clipboard.writeText(text); flash("Copied"); return true; }

  };
  const download = (name, mime, text) => {

    Object.assign(document.createElement("a"), { href: url, download: name }).click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);

  const REDACT = [
    /AKIA[0-9A-Z]{16}/g, /ghp_[A-Za-z0-9]{36,}/g, /xox[baprs]-[A-Za-z0-9-]{10,}/g, /sk-[A-Za-z0-9]{20,}/g,

    /eyJ[A-Za-z0-9_-]{8,}\.eyJ[A-Za-z0-9_-]{8,}\.[A-Za-z0-9_-]+/g,
    /(\b(?:password|passwd|secret|token|api[_-]?key)\b['"]?\s*[:=]\s*['"]?)[^\s'",;]{6,}/gi,
    /(:\/\/[^\/\s:@]+):[^\/\s@]+@/g,

    let hits = 0;
    const out = REDACT.reduce((acc, pattern) => acc.replace(pattern, (all, keep) => { hits += 1; return (keep && all.startsWith(keep) ? keep : "") + `«REDACTED:${hits}»`; }), text);
    return { text: out, hits };
  };

  const VOCAB = ["approve", "approve_with_notes", "reject", "defer", "edit", "comment", "dismiss"];
  const validateEnvelope = (env, kind) => {
    const errs = [];
    if (env.kind !== kind) errs.push("kind");
    if (env.version !== 1) errs.push("version");
    if (!env.artifact?.id || !env.artifact?.title) errs.push("artifact");
    if (!VOCAB.includes(env.decision?.status)) errs.push("decision.status");
    for (const key of ["decisions", "changes", "annotations"]) { if (!Array.isArray(env[key])) errs.push(key); }
    (env.decisions ?? []).forEach(row => { if (!row.id || !VOCAB.includes(row.verdict)) errs.push("decision:" + row.id); });
    return errs;
  };

  const returnMeta = document.querySelector('meta[name="artifact-return"]');
  const tokenMeta = document.querySelector('meta[name="artifact-token"]');
  const served = Boolean(returnMeta);

    }, { rootMargin: "-20% 0px -70% 0px" });
    anchors.forEach(anchor => { const target = document.getElementById(anchor.hash.slice(1)); if (target) watcher.observe(target); });

      const env = envelope(mode === "changed");
      const errs = validateEnvelope(env, kind);
      if (errs.length) { mirror("[BLOCKED] invalid payload: " + errs.join(", ")); flash("Export blocked"); return; }

        control.disabled = true;
