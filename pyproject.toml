"typing_extensions.TypeAlias".msg =  "Use PEP 695 type aliases (`type Name = ...`) — TypeAlias is legacy syntax."
"typing_extensions.TypeGuard".msg =  "Use TypeIs — complement-safe narrowing in both branches is required."
"typing_extensions.TypeVar".msg =    "Use PEP 695 type parameters — TypeVar is legacy generic syntax."
"typing_extensions.TypeVarTuple".msg = "Use PEP 695 variadic type parameters — TypeVarTuple is legacy syntax."
"urllib.request".msg =               "Use httpx behind a typed adapter — direct urllib imports bypass transport policy."
"urllib3".msg =                      "Use httpx behind a typed adapter — urllib3 remains a transitive implementation detail."
"warnings.catch_warnings".msg =      "Deprecation/workaround warning flows are forbidden — refactor immediately."
"warnings.deprecated".msg =          "Deprecation decorators are forbidden — refactor APIs immediately."
