.masthead{display:grid;gap:var(--s2);margin-block-end:var(--s5);
&>.top{display:flex;flex-wrap:wrap;gap:var(--s3);align-items:center;justify-content:space-between}}
.prompt{display:grid;gap:var(--s1);padding:var(--s3) var(--s4);background:var(--surface);border:1px solid var(--line);border-radius:var(--r-2);
&>p{margin:0;font-size:var(--fs-sm);color:var(--text-muted)}}
.sechead{display:flex;flex-wrap:wrap;align-items:baseline;gap:var(--s3);justify-content:space-between;
&>h2::before{content:counter(sec,decimal-leading-zero);font-family:var(--font-mono);font-size:var(--fs-sm);font-weight:500;color:var(--editorial);margin-right:var(--s3);letter-spacing:.06em}}
.filterbox{display:inline-flex;align-items:baseline;gap:var(--s2);font-family:var(--font-mono);font-size:var(--fs-2xs);font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);
& input{font-family:var(--font-sans);font-size:var(--fs-sm);font-weight:400;letter-spacing:0;text-transform:none;min-block-size:28px}}
.tlabel{font-family:var(--font-mono);font-size:var(--fs-2xs);font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--editorial)}
.board{grid-template-columns:repeat(auto-fit,minmax(min(100%,26rem),1fr));margin-block-start:var(--s4)}
.dir{--lift:0;display:grid;gap:var(--s3);align-content:start;background:color-mix(in oklch,var(--raised),var(--accent) var(--tone));transform:translateY(calc(var(--lift)*-1*var(--s1)));transition:--lift var(--dur-2) var(--ease-out),--tone var(--dur-2) var(--ease-standard),border-color var(--dur-1) var(--ease-standard),box-shadow var(--dur-2) var(--ease-out);
&:hover{--lift:1;box-shadow:var(--shadow-2)}
&[data-verdict="approve"]{--tone:6%;border-color:var(--ok)}
&[data-verdict="reject"]{--tone:8%;border-color:var(--fail)}
&[data-lean]{box-shadow:inset 0 0 0 1px var(--accent),var(--shadow-1)}}
.dir__head{display:flex;flex-wrap:wrap;align-items:baseline;gap:var(--s2);
& h3{margin:0;flex:1 1 auto}}
.dir__label{font-family:var(--font-mono);font-size:var(--fs-sm);font-weight:600;letter-spacing:.06em;color:var(--editorial)}
.dir__sub{margin:var(--s1) 0 0;font-family:var(--font-mono);font-size:var(--fs-2xs);font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted)}
.thesis{margin:0}
.render{margin:0;display:grid;gap:var(--s2);padding:var(--s3);background:var(--surface);border:1px solid var(--line);border-radius:var(--r-1);
&>figcaption{font-family:var(--font-mono);font-size:var(--fs-2xs);font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted)}
& pre{margin:0;padding:0;border:0;background:none}}
.demo{display:grid;gap:var(--s2);
& output{display:block;font-family:var(--font-mono);font-size:var(--fs-xs);color:var(--text)}
& .scrub{display:flex;align-items:center;gap:var(--s2);
& input{flex:1 1 auto;min-block-size:0;padding:0;border:0;background:none;appearance:auto;accent-color:var(--accent)}}}
.tl{display:grid;grid-template-columns:max-content max-content minmax(0,1fr);gap:var(--s1) var(--s3);align-items:baseline;
& .at{font-family:var(--font-mono);font-size:var(--fs-2xs);color:var(--text-muted)}
& .tdot{inline-size:10px;block-size:10px;border-radius:50%;background:var(--text-faint);align-self:center;
&.done{background:var(--ok)}&.warn{background:var(--warn)}&.fail{background:var(--fail)}
&.active{background:var(--accent);box-shadow:0 0 0 3px var(--accent-weak)}}
& .lbl{font-size:var(--fs-xs);
& small{font-family:var(--font-mono);font-size:var(--fs-2xs)}}}
.trade{margin:0;font-size:var(--fs-xs);color:var(--text-muted);
& .tlabel{margin-inline-end:var(--s2)}}
.ledg{list-style:none;margin:0;padding:0;display:grid;gap:var(--s1);
& li{display:grid;grid-template-columns:1rem minmax(7rem,max-content) minmax(0,1fr);gap:var(--s2);align-items:baseline;padding:2px var(--s1);border-radius:var(--r-1);transition:background-color var(--dur-1) var(--ease-standard)}
& .g{font-family:var(--font-mono);font-weight:600;text-align:center;
&.win{color:var(--ok)}&.pay{color:var(--fail)}&.even{color:var(--text-muted)}}
& .cn{font-family:var(--font-mono);font-size:var(--fs-2xs);font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted)}
& .st{font-size:var(--fs-xs);color:var(--text-muted)}
& li.hl{background:var(--accent-weak);box-shadow:inset 0 0 0 1px var(--accent)}
& li.dim :is(.g,.cn,.st){color:var(--text-faint)}}
.frags{list-style:none;margin:0;padding:0;display:grid;gap:var(--s2)}
.frag{display:flex;flex-wrap:wrap;align-items:center;gap:var(--s2);padding:var(--s2);border:1px solid var(--line);border-radius:var(--r-1);background:var(--surface);font-size:var(--fs-sm);
&>span:not(.chip){flex:1 1 12rem}
&[data-stolen]{border-color:var(--accent);background:var(--accent-weak)}
& .btn{block-size:24px;font-family:var(--font-mono);font-size:var(--fs-2xs);font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding-inline:var(--s2)}}
.cap{display:flex;flex-wrap:wrap;gap:var(--s2);align-items:center;
& .seg{flex-wrap:wrap;block-size:auto;
& label{block-size:28px;font-family:var(--font-mono);font-size:var(--fs-2xs);font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding-inline:var(--s2)}}
& .btn{block-size:28px;font-family:var(--font-mono);font-size:var(--fs-2xs);letter-spacing:.05em;text-transform:uppercase}}
.notepop{position:fixed;inset:auto var(--s4) var(--s4) auto;
& textarea{inline-size:100%;min-block-size:4rem;margin-block-start:var(--s2)}}
.hybrid{margin-block-start:var(--s4);
&[data-live]{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent),var(--shadow-1)}
& h3{margin-block-start:0}}
.verdictbar{display:grid;gap:var(--s4);grid-template-columns:repeat(auto-fit,minmax(min(100%,20rem),1fr));margin-block-start:var(--s4)}
.lean{display:grid;gap:var(--s2);align-content:start;justify-items:start;
& output{font-size:var(--fs-sm);color:var(--text-muted)}}
}
@layer print{@media print{
.board{display:block}
.dir,.hybrid,.verdictbar{break-inside:avoid}
.dir{margin-block-end:var(--s4)}
.scrub,.filterbox,.notepop{display:none}
}}
</style>
</head>

<div class="wrap">
  <header class="masthead">
    <div class="top">
      <!-- replace: eyebrow scope line -->
      <span class="eyebrow" id="doc-eyebrow">Brainstorm &middot; tools-platform</span>
      <div class="rowline">
        <span class="chip info" id="doc-count"></span>
        <small id="doc-date" class="mono"></small>
        <button type="button" class="btn ghost no-print" data-toggle-theme aria-label="Toggle color theme">Theme</button>
      </div>
    </div>
    <h1 id="doc-title">&hellip;</h1>
    <p class="deck" id="doc-deck"></p>
    <div class="prompt"><span class="eyebrow">Prompt</span><p id="doc-prompt"></p></div>
  </header>
  <main id="main" tabindex="-1">
    <section class="section" id="directions" aria-labelledby="directions-h">
      <div class="sechead">
        <h2 id="directions-h">Directions</h2>
        <search class="no-print"><label class="filterbox">Filter <input type="search" data-action="filter" placeholder="narrow directions"></label></search>
      </div>
      <div class="grid board" id="board"></div>
    </section>
    <section class="section" id="compare" aria-labelledby="compare-h">
      <h2 id="compare-h">Comparison</h2>
      <p class="muted">Lift one criterion to read its stance across every card at once; the lift is view-only and exports nothing.</p>
      <div class="cap no-print" id="crit-host"></div>
      <div id="distinct" class="flow" hidden></div>
    </section>
    <section class="section" id="verdict" aria-labelledby="verdict-h">
      <h2 id="verdict-h">Verdict</h2>
      <article class="card hybrid" id="hybrid" aria-label="Composed hybrid direction">
        <h3>Composed hybrid</h3>
        <div id="hybrid-body"></div>
      </article>
      <div class="card verdictbar">
        <div class="lean">
          <span class="tlabel" id="lean-label">Leaning</span>
          <div class="cap" id="lean-host"></div>
          <output id="lean-out" aria-live="polite"></output>
        </div>
        <div class="field">
          <label for="flip">Flip trigger</label>
          <input type="text" id="flip" data-action="flip" placeholder="The observation that reverses this leaning">
          <small>Exports as an annotation anchored to the leaning direction.</small>
        </div>
      </div>
    </section>
  </main>
</div>
<!-- --- [NOCTURNE_DRAWER:BEGIN] --- -->
<!-- --- [NOCTURNE_DRAWER] --- assembler-stamped byte canon; per-type controls append into [data-drawer-fields] at render time -->
<button type="button" class="drawer-tab no-print" popovertarget="export-drawer" aria-label="Open export drawer">Export</button>
<aside id="export-drawer" class="export-bar no-print" popover="auto" aria-label="Export drawer">
<header><span class="eyebrow">[EXPORT]</span><button type="button" class="btn ghost" popovertarget="export-drawer" popovertargetaction="hide" aria-label="Close export drawer">&#x2715;</button></header>
<section aria-label="Send to agent">
<button type="button" class="btn primary" data-export="send" hidden>Send to agent</button>
</section>
<section aria-label="Disk egress">
<button type="button" class="btn" data-export="md">Copy markdown</button>
<button type="button" class="btn" data-export="json">Download JSON</button>
<button type="button" class="btn ghost" data-export="changed" disabled>Copy changed-only</button>
</section>
<section aria-label="Export fields" data-drawer-fields>
<small id="egress-meta" class="mono"></small>
<textarea id="egress" readonly placeholder="Exported payload appears here." aria-label="Exported payload mirror"></textarea>
</section>
</aside>
<output id="toast" class="toast no-print" role="status" popover="manual"></output>

  "meta": {
    "id": "brainstorm.gate-progress-surface",
    "title": "Gate Progress Surface",
    "deck": "Four genuinely distinct directions for how a long-running assay gate reports progress; steal fragments across cards to compose a hybrid.",
    "date": "2026-07-06",
    "owner": "tools-platform",
    "baseline": "b-0",
    "prompt": "The static gate runs four to nine minutes silent between the banner and the verdict. Propose distinct progress surfaces for the terminal run — what does the operator see while the gate works?"

    { "id": "c-failure", "name": "Failure locality" }

    {

      "thesis": "Keep the line stream the gate already emits; make every line a typed event row the eye can skim.",

      "stances": {
        "c-glance":  { "mark": "pay",  "text": "a wall of rows; position read by scrolling" },
        "c-machine": { "mark": "win",  "text": "each row already parses as a typed event" },
        "c-cost":    { "mark": "win",  "text": "one key schema on the logger that exists" },
        "c-failure": { "mark": "even", "text": "failures surface in-stream with context above" }
      },
      "fragments": [
        { "id": "f-a1", "text": "Typed event rows: gate, stage, status, dur as fixed keys." },
        { "id": "f-a2", "text": "Warn rows carry their counter (survivors=2), never prose." },
        { "id": "f-a3", "text": "The final row is the verdict line, machine-parsed as emitted." }
      ]
    },
    {
      "id": "d-meter", "label": "B", "name": "Stage meter strip", "posture": "intermediate",
      "thesis": "One fixed strip at the cursor line: a meter fills per completed stage while the current stage names itself.",
      "tradeoff": "Position reads in one glance, but the strip needs a TTY redraw path the logs never needed.",
      "render": { "mode": "live", "caption": "Live variant — drag to simulate a run",
        "stages": ["restore", "analyze", "tests", "mutate", "bridge"], "value": 62 },
      "stances": {

        "c-machine": { "mark": "pay",  "text": "a redrawn strip is invisible to log scrapers" },

      },
      "fragments": [
        { "id": "f-b1", "text": "Segment-per-stage fill: progress is stages done, never wall time." },
        { "id": "f-b2", "text": "The current stage names itself beside the meter, no scrolling." },
        { "id": "f-b3", "text": "The meter latches red on the stage that broke and stops there." }
      ]
    },
    {
      "id": "d-stream", "label": "C", "name": "Receipt timeline stream", "posture": "novel",
      "thesis": "No live paint at all: each stage emits one receipt row, and the timeline the run leaves behind is the surface.",
      "tradeoff": "The run becomes a durable artifact, but the operator watches dots, not causes.",
      "render": { "mode": "mock", "caption": "Layout mock — the trail a finished run leaves",

          { "at": "14:02:07", "state": "done",   "label": "restore — lockfile clean",         "dur": "1.8s" },
          { "at": "14:02:11", "state": "done",   "label": "analyze — 0 new findings",         "dur": "3.4s" },
          { "at": "14:02:19", "state": "warn",   "label": "mutate — 2 survivors in loader.py", "dur": "8.2s" },
          { "at": "14:02:27", "state": "active", "label": "bridge — certificate pending",      "dur": "…" }
        ] },
      "stances": {
        "c-glance":  { "mark": "win",  "text": "state-colored dots scan faster than any text" },
        "c-machine": { "mark": "win",  "text": "the timeline is the receipts JSONL, rendered" },
        "c-cost":    { "mark": "pay",  "text": "a second consumer of the receipt stream to version" },

      },
      "fragments": [
        { "id": "f-c1", "text": "Every stage emits one typed receipt row; the UI is a fold over them." },
        { "id": "f-c2", "text": "The finished timeline persists beside the artifact index." },

    const { kind, envelope, toMarkdown, filename = slug || kind, isChanged, onExported = () => {}, redactPayload = false, narrative = false } = config;
    addEventListener("beforeprint", () => $$("details").forEach(d => { d.dataset.wasOpen = String(d.open); d.open = true; }));
    addEventListener("afterprint", () => $$("details").forEach(d => { d.open = d.dataset.wasOpen === "true"; }));
    if (narrative) $('[data-export="send"]')?.closest("section")?.remove();
    else if (served) { const sendBtn = $('[data-export="send"]'); if (sendBtn) sendBtn.hidden = false; }
    else $('[data-export="send"]')?.closest("section")?.setAttribute("hidden", "");
    if (narrative || !isChanged) $('[data-export="changed"]')?.remove();
    const changedNow = isChanged ?? (() => false);
    const outbound = text => (redactPayload ? redact(text) : { text, hits: 0 });
    const doExport = async (mode, control) => {
      const env = envelope(mode === "changed");
      const errs = validateEnvelope(env, kind);
      if (errs.length) { mirror("[BLOCKED] invalid payload: " + errs.join(", ")); flash("Export blocked"); return; }
      if (mode === "send") {
        control.disabled = true;
        try { await send(env); control.textContent = "Sent"; flash("Sent to agent"); onExported("sent"); }
        catch {
          control.textContent = "Send failed — copied instead";
          const { text } = outbound(JSON.stringify(env, null, 2));
          if (await copyText(text)) onExported("copied");
        }
        finally { control.disabled = false; refresh(); }
        return;
      }
      const payload = mode === "md" ? toMarkdown(env) : JSON.stringify(env, null, 2);
      const { text, hits } = outbound(payload);
      if (hits) flash(`${hits} value${hits > 1 ? "s" : ""} redacted`);
      if (mode === "json") { mirror(text); download(filename + ".json", "application/json", text); onExported("downloaded"); }
      else if (await copyText(text)) onExported("copied");
      refresh();
    };
    const refresh = () => { const changed = $('[data-export="changed"]'); if (changed) changed.disabled = !changedNow(); };
    document.addEventListener("click", event => {
      if (event.target.closest("[data-toggle-theme]")) { toggleTheme(); return; }
      const hit = event.target.closest("[data-export]");
      if (hit && !hit.disabled) doExport(hit.dataset.export, hit);
    });
    spy();
    refresh();
    return { refresh, flash, copyText };
  };

  return { $, $$, el, esc, clone, fmt, slug, flash, copyText, download, redact, VOCAB, validateEnvelope, served, send, view, boot };
})();
// --- [NOCTURNE_RUNTIME:END] ---
// --- [TEMPLATE_LOCAL] --- model, render, actions, wire
(() => {
"use strict";
const { $, $$, el } = NOCTURNE;

// --- model
const model = JSON.parse($("#payload").textContent);
const state = { captures: {}, hybrid: [], leaning: "", flip: "", flipAnn: "active" };
const cap = id => (state.captures[id] ??= { verdict: "", note: "", ann: "active" });

const dirIndex = Object.fromEntries(model.directions.map(d => [d.id, d]));
const fragIndex = {};
model.directions.forEach(d => d.fragments.forEach(f => { fragIndex[f.id] = { ...f, dir: d.id }; }));
const POSTURE = { conservative: ["", "[CONSERVATIVE]"], intermediate: ["info", "[INTERMEDIATE]"], novel: ["warn", "[NOVEL]"] };
const GLYPH = { win: "+", pay: "−", even: "·" };
const KEEP = new Set(["approve", "approve_with_notes"]);

const decisionsOut = () => Object.entries(state.captures).filter(([, c]) => c.verdict).map(([id, c]) => ({ id, verdict: c.verdict, ...(c.note ? { note: c.note } : {}) }));
const annotationsOut = () => [
  ...Object.entries(state.captures).filter(([, c]) => c.note).map(([id, c]) => ({ id: "a-" + id, itemId: id, intent: "note", status: c.ann, text: c.note })),
  ...(state.flip.trim() ? [{ id: "a-flip", itemId: dirIndex[state.leaning] ? state.leaning : null, intent: "flip-trigger", status: state.flipAnn, text: state.flip.trim() }] : []),
];
const isChanged = () => Boolean(decisionsOut().length || annotationsOut().length || state.hybrid.length || state.leaning);
const leanName = () => state.leaning === "hybrid"
  ? "Hybrid — " + state.hybrid.length + " stolen fragment" + (state.hybrid.length === 1 ? "" : "s")
  : dirIndex[state.leaning] ? dirIndex[state.leaning].label + " — " + dirIndex[state.leaning].name + " (" + dirIndex[state.leaning].posture + ")" : "Undecided";

const envelope = changedOnly => ({
  kind: "brainstorm", version: 1,
  artifact: { id: model.meta.id, title: model.meta.title, baseline: model.meta.baseline },
  decision: { status: state.leaning ? "approve_with_notes" : "comment", at: new Date().toISOString() },
  decisions: decisionsOut(), changes: [], annotations: annotationsOut(),
  state: {
    leaning: state.leaning, flipTrigger: state.flip.trim(),
    kept: decisionsOut().filter(d => KEEP.has(d.verdict)).map(d => d.id),
    hybrid: state.hybrid.map(fid => ({ id: fid, from: fragIndex[fid].dir, text: fragIndex[fid].text })),
  },
  ...(changedOnly ? { extensions: { diffBaseline: model.meta.baseline } } : {}),
});
const mdLine = s => String(s).replace(/\n/g, " ");
const toMarkdown = env => {
  const L = ["# " + model.meta.title, "",
    "**Leaning:** " + leanName(), "**Flip trigger:** " + (env.state.flipTrigger || "(none)"), "", "## Kept directions"];
  const kept = env.decisions.filter(d => KEEP.has(d.verdict));
  if (kept.length) kept.forEach(d => L.push("- **" + dirIndex[d.id].label + " — " + dirIndex[d.id].name + "**" + (d.note ? " — " + mdLine(d.note) : "")));
  else L.push("_None kept._");
  const rest = env.decisions.filter(d => !KEEP.has(d.verdict));
  if (rest.length) { L.push("", "## Set aside"); rest.forEach(d => L.push("- " + dirIndex[d.id].label + " — " + dirIndex[d.id].name + ": " + d.verdict + (d.note ? " — " + mdLine(d.note) : ""))); }
  L.push("", "## Hybrid fragments");
  if (env.state.hybrid.length) env.state.hybrid.forEach(h => L.push("- [" + dirIndex[h.from].label + "] " + h.text));
  else L.push("_None stolen._");
  return L.join("\n") + "\n";
};

// --- render (build once; paint functions own the dynamic bits)
const verdictSeg = id => {
  const seg = el("div", { class: "seg no-print", role: "group", "aria-label": "Verdict for " + id });
  ["approve", "reject", "defer"].forEach(v => {
    const input = el("input", { type: "radio", name: "v-" + id, value: v, "data-action": "verdict", "data-id": id, "aria-label": v });
    if (cap(id).verdict === v) input.setAttribute("checked", "");
    seg.append(el("label", {}, input, v));
  });
  return seg;
};
const noteControl = id => {
  const pid = "note-" + id;
  return el("span", { class: "rowline" },
    el("button", { type: "button", class: "btn ghost no-print", popovertarget: pid, "data-note-btn": id, "aria-label": "Note for " + id }, cap(id).note ? "note*" : "note"),
    el("div", { id: pid, class: "pop notepop no-print", popover: "auto" },
      el("span", { class: "eyebrow", text: "Annotation" }),
      el("textarea", { "data-action": "note", "data-id": id, "aria-label": "Annotation text for " + id, placeholder: "Anchored to " + id }, cap(id).note || "")));
};

const RENDER_MODES = {
  code: r => el("pre", {}, el("code", { text: r.code })),
  live: (r, d) => el("div", { class: "demo", "data-demo": d.id },
    el("div", { class: "meter", role: "img", "aria-label": "Simulated stage meter for " + d.name }, el("span")),
    el("output", { class: "num" }),
    el("div", { class: "scrub no-print" },
      el("span", { class: "tlabel", text: "simulate" }),
      el("input", { type: "range", min: "0", max: "100", value: String(r.value), "data-action": "scrub", "data-id": d.id, "aria-label": "Simulate gate progress for " + d.name }))),
  mock: r => el("div", { class: "tl", role: "img", "aria-label": "Receipt timeline mock" },
    r.events.flatMap(ev => [
      el("span", { class: "at num", text: ev.at }),
      el("span", { class: "tdot " + ev.state, "aria-hidden": "true" }),
      el("span", { class: "lbl" }, ev.label + " ", el("small", { text: ev.dur })),
    ])),
};
const paintDemo = (id, value) => {
  const host = $(`[data-demo="${CSS.escape(id)}"]`); if (!host) return;
  const stages = dirIndex[id].render.stages;
  const done = Math.floor(value / 100 * stages.length);
  host.querySelector(".meter > span").style.setProperty("--value", String(value));
  host.querySelector("output").textContent = done >= stages.length
    ? "all " + stages.length + " stages · 100%"
    : "stage " + (done + 1) + "/" + stages.length + " " + stages[done] + " · " + value + "%";
};

const buildCard = d => {
  const [chipCls, chipTxt] = POSTURE[d.posture];
  return el("article", { class: "card dir", id: d.id, "data-filter": "", "aria-label": "Direction " + d.label + ": " + d.name },
    el("header", { class: "dir__head" },
      el("span", { class: "dir__label", "aria-hidden": "true", text: d.label }),
      el("h3", { text: d.name }),
      el("span", { class: "chip " + chipCls, text: chipTxt })),
    el("p", { class: "thesis", text: d.thesis }),
    el("figure", { class: "render" },
      el("figcaption", { text: d.render.caption }),
      RENDER_MODES[d.render.mode](d.render, d)),
    el("p", { class: "trade" }, el("span", { class: "tlabel", text: "tradeoff" }), d.tradeoff),
    el("ul", { class: "ledg", "aria-label": "Criteria stances for " + d.name }, model.criteria.map(c => {
      const s = d.stances[c.id];
      return el("li", { "data-crit": c.id },
        el("span", { class: "g " + s.mark, "aria-hidden": "true", text: GLYPH[s.mark] }),
        el("span", { class: "cn", text: c.name }),
        el("span", { class: "st", text: s.text }));
    })),
    el("h4", { class: "dir__sub", text: "Stealable fragments" }),
    el("ul", { class: "frags" }, d.fragments.map(f => el("li", { class: "frag", "data-frag": f.id },
      el("span", { text: f.text }),
      el("button", { type: "button", class: "btn no-print", "data-action": "steal", "data-id": f.id, "aria-pressed": "false" }, "Steal")))),
    el("div", { class: "cap" }, verdictSeg(d.id), noteControl(d.id)));
};

const renderHeader = () => {
  $("#doc-title").textContent = model.meta.title;
  $("#doc-deck").textContent = model.meta.deck || "";
  $("#doc-eyebrow").textContent = "Brainstorm · " + model.meta.owner;
  $("#doc-date").textContent = model.meta.date;
  $("#doc-count").textContent = model.directions.length + " DIRECTIONS";
  $("#doc-prompt").textContent = model.meta.prompt;
};
const renderBoard = () => {
  $("#board").replaceChildren(...model.directions.map(buildCard));
  model.directions.filter(d => d.render.mode === "live").forEach(d => paintDemo(d.id, d.render.value));
};
const renderCompare = () => {
  const seg = el("div", { class: "seg no-print", role: "group", "aria-label": "Lift one criterion across every card" });
  [{ id: "", name: "None" }, ...model.criteria].forEach(c => {
    const input = el("input", { type: "radio", name: "crit", value: c.id, "data-action": "crit", "aria-label": "Lift " + c.name });
    if (!c.id) input.setAttribute("checked", "");
    seg.append(el("label", {}, input, c.name));
  });
  $("#crit-host").replaceChildren(seg);
};
const renderDistinct = () => {
  const wins = d => model.criteria.filter(c => d.stances[c.id].mark === "win").map(c => c.id).join("|");
  const flags = model.directions.flatMap((a, i) => model.directions.slice(i + 1)
    .filter(b => a.posture === b.posture && wins(a) === wins(b)).map(b => [a, b]));
  $("#distinct").replaceChildren(...flags.map(([a, b]) => el("div", { class: "rail warn" },
    el("span", { class: "chip warn", text: "[COLLAPSE]" }),
    " " + a.label + " and " + b.label + " share the " + a.posture + " posture and win the same criteria — they sit on one axis; fold them into one direction.")));
  $("#distinct").hidden = !flags.length;
};
const renderLean = () => {
  const seg = el("div", { class: "seg no-print", role: "group", "aria-labelledby": "lean-label" });
  [{ v: "", t: "None" }, ...model.directions.map(d => ({ v: d.id, t: d.label })), { v: "hybrid", t: "Hybrid" }].forEach(o => {
    const input = el("input", { type: "radio", name: "lean", value: o.v, "data-action": "lean", "aria-label": "Leaning " + o.t });
    if (state.leaning === o.v) input.setAttribute("checked", "");
    seg.append(el("label", {}, input, o.t));
  });
  $("#lean-host").replaceChildren(seg);
};

const paintHybrid = () => {
  $("#hybrid").toggleAttribute("data-live", state.hybrid.length > 0);
  if (!state.hybrid.length) {
    $("#hybrid-body").replaceChildren(el("p", { class: "muted", text: "Steal fragments from any direction to compose a hybrid here." }));
    return;
  }
  $("#hybrid-body").replaceChildren(el("ul", { class: "frags" }, state.hybrid.map(fid => {
    const f = fragIndex[fid];
    return el("li", { class: "frag" },
      el("span", { class: "chip", text: dirIndex[f.dir].label }),
      el("span", { text: f.text }),
      el("button", { type: "button", class: "btn no-print", "data-action": "drop", "data-id": fid, "aria-label": "Remove fragment " + fid + " from hybrid" }, "Remove"));
  })));
};
const paintSteals = () => $$("[data-action='steal']").forEach(b => {
  const on = state.hybrid.includes(b.dataset.id);
  b.setAttribute("aria-pressed", String(on));
  b.textContent = on ? "Stolen" : "Steal";
  b.closest("[data-frag]").toggleAttribute("data-stolen", on);
});
const paintLean = () => {
  $("#lean-out").textContent = leanName();
  $$(".dir").forEach(c => c.toggleAttribute("data-lean", state.leaning === c.id));
};
const paintLift = critId => $$(".ledg li").forEach(li => {
  li.classList.toggle("hl", Boolean(critId) && li.dataset.crit === critId);
  li.classList.toggle("dim", Boolean(critId) && li.dataset.crit !== critId);
});
const paintMeta = () => {
  $("#egress-meta").textContent = decisionsOut().length + " verdicts · " + state.hybrid.length + " stolen · "
    + annotationsOut().filter(a => a.status === "active").length + " open notes";
};

// --- actions (one delegated verb table per event type)
const wire = NOCTURNE.boot({ kind: "brainstorm", envelope, toMarkdown, filename: model.meta.id, isChanged,
  onExported: () => { Object.values(state.captures).forEach(c => { if (c.note) c.ann = "exported"; }); if (state.flip.trim()) state.flipAnn = "exported"; paintMeta(); } });
const sync = () => { wire.refresh(); paintMeta(); };

const CLICK = {
  steal: hit => { const id = hit.dataset.id; state.hybrid = state.hybrid.includes(id) ? state.hybrid.filter(x => x !== id) : [...state.hybrid, id]; paintHybrid(); paintSteals(); paintLean(); sync(); },
  drop: hit => { state.hybrid = state.hybrid.filter(x => x !== hit.dataset.id); paintHybrid(); paintSteals(); paintLean(); sync(); },
};
const CHANGE = {
  verdict: hit => { cap(hit.dataset.id).verdict = hit.value; document.getElementById(hit.dataset.id)?.setAttribute("data-verdict", hit.value); sync(); },
  lean: hit => { state.leaning = hit.value; paintLean(); sync(); },
  crit: hit => { paintLift(hit.value); NOCTURNE.view.write({ crit: hit.value }); },
};
const INPUT = {
  note: hit => { const id = hit.dataset.id; cap(id).note = hit.value; cap(id).ann = "active";
    $$(`[data-note-btn="${CSS.escape(id)}"]`).forEach(b => { b.textContent = hit.value ? "note*" : "note"; }); sync(); },
  flip: hit => { state.flip = hit.value; state.flipAnn = "active"; sync(); },
  filter: hit => { const q = hit.value.trim().toLowerCase(); $$("#board [data-filter]").forEach(c => { c.hidden = q !== "" && !c.textContent.toLowerCase().includes(q); }); },
  scrub: hit => paintDemo(hit.dataset.id, Number(hit.value)),
};
const dispatch = table => event => { const hit = event.target.closest("[data-action]"); if (hit && !hit.disabled) table[hit.dataset.action]?.(hit, event); };
document.addEventListener("click", dispatch(CLICK));
document.addEventListener("change", dispatch(CHANGE));
document.addEventListener("input", dispatch(INPUT));

// --- wire
renderHeader(); renderBoard(); renderCompare(); renderDistinct(); renderLean();
paintHybrid(); paintSteals(); paintLean(); paintMeta();
const restored = NOCTURNE.view.read();
if (restored.crit && model.criteria.some(c => c.id === restored.crit)) {
  const input = $(`[data-action="crit"][value="${CSS.escape(restored.crit)}"]`);
  if (input) { input.checked = true; paintLift(restored.crit); }
}
})();
</script>
</body>
</html>
