language: en-US
tone_instructions: "Adversarial senior reviewer: presume defects until the pass finds none; never ratify prose or praise. Findings name file, anchor, defect, and the demanded stronger form. Grade the full severity scale; uniform severity is ungraded."
early_access: false
enable_free_tier: true
inheritance: false
reviews:
    profile: assertive
    request_changes_workflow: true
    high_level_summary: true
    high_level_summary_instructions: >-
        One dense paragraph leading with contract-surface and behavior deltas: which owners changed shape, which strata or seams the diff crosses, what a consumer must now do differently. No restated diff statistics, no methodology narration, no praise.
    high_level_summary_placeholder: "@coderabbitai summary"
    high_level_summary_in_walkthrough: false
    auto_title_placeholder: "@coderabbitai"
    review_status: true
    review_details: true
    commit_status: true
    fail_commit_status: true
    collapse_walkthrough: true
    changed_files_summary: true
    sequence_diagrams: true
    estimate_code_review_effort: true
    assess_linked_issues: true
    related_issues: true
    related_prs: true
    suggested_labels: false
    auto_apply_labels: false
    suggested_reviewers: false
    auto_assign_reviewers: false
    in_progress_fortune: false
    poem: false
    enable_prompt_for_ai_agents: true
    abort_on_close: true
    disable_cache: false
    slop_detection:
        enabled: true
    path_filters:
        - "!**/pnpm-lock.yaml"
        - "!**/uv.lock"
        - "!**/packages.lock.json"
        - "!**/goldens/**"
        - "!**/*.verified.*"
        - "!**/*.har"
        - "!**/vendor/runtimes/**"
        - "!**/vendor/sdk/Lib3MF.cs"
        - "!**/node_modules/**"
        - "!**/__pycache__/**"
        - "!**/.venv/**"
        - "!**/.cache/**"
        - "!**/.cacheuv/**"
        - "!**/.artifacts/**"
    path_instructions:
        - path: "**"
          instructions: >-
            Presume defects until the pass finds none; dense, confident code is the prime suspect, and every claim is verified against the real domain, never ratified from prose, naming, or comment assertions. A reviewer reports and demands, never edits: every finding names the file, the anchor, the defect, and the stronger form demanded — precise enough that a fixer agent lands it without re-derivation. The reviewable surface is a design corpus — markdown pages whose embedded code fences are the product — plus workflow and tooling JavaScript and configuration; judge fence code as production source at full depth. The docs/stacks language doctrine is the floor, never the ceiling: a conformant-but-weak form is a finding when a stronger form exists. Attack entry-point sprawl: parallel entry points, modality-named siblings, and get/getMany/getById families are defects — demand one polymorphic entry per rail discriminating on input shape, with forward and inverse of one correspondence on one owner. Apply downstream-usage pressure by imagining every consumer: a parameter a policy value or input shape reconstructs is knob spam; configuration ceremony pushed onto callers and orchestration a consumer must hand-write are defects — demand internalized lifecycle, routing, and policy with zero capability sacrifice. Judge composition idiomatically: an interface earns its existence through dispatch or substitution, and generated or source-gen surfaces run at intended power — decorative abstraction is a finding. Flag long imperative bodies wherever a denser expression-shaped form exists — fold, combinator, table-driven, or generator forms over hand-rolled loops and branching — and demand surfaces and object types collapse into fewer, denser, richer owners. Grade across the full severity scale: a review where every finding lands at one severity has averaged, not graded. Cross-surface coupling is review duty: docs/laws/topology.md maps which surfaces obligate which counterparts — a diff editing a listed SURFACE without its obligated counterparts in the same change is a finding naming the missing counterpart. Settled corpus law outranks reviewer intuition: before flagging a shape the owning page rules — a factory contract, a composition form, a seam placement, a diagram template's exclusions — read that page and verify the claim against its stated contract; a finding re-litigating a ruled design is a false positive, not caution. Pinned-newest provider surfaces are corpus law, so a released-library semantics claim — a member's return type, a pool's self-heal mechanics, a roster's existence — verifies against the owning doctrine page before flagging. A typed field's admission evidence is settled at its boundary: demanding re-validation of what the type already carries is the defect, never the finding. An artifact claiming content-keyed identity covers every output-affecting input in its preimage and excludes execution policy and display labels — a timeout or retry budget changes when work fails, never the bytes a success produces, and a label inside the preimage is a collision defect; a security identity takes a cryptographic digest, never a speed hash; a composite id rides a canonical codec, never a hand-rolled join or quote scheme injective on one ambiguity axis; egress orders deterministically, and resources close on every exit path. Suggest at root-cause depth: when a finding admits a literal patch and a deeper collapse, demand the collapse — a guard fixed at one site signals the same guard missing at every sibling site, so demand the shared owner, never the local check; a defect in one arm of a family is evidence about every arm, so demand the family fix; evidence read at use-time belongs at construction, so demand mint-time binding; an invalid state becomes unspellable rather than guarded at each use; two paths producing one product converge on one seam, and the unifying diff deletes the dead hop; a missing check on a protocol surface signals the incomplete fold, so demand the whole admission; a provider-behavior claim — including what a member's internals strip, drop, retain, or default — verifies against the installed distribution's actual code path, never assumption; canonicalization lands at intake so every consumer reads one regime; a residual gated against a zero ceiling is non-negative by construction — absolute deviation from target — or a degenerate input passes the clamp; a clamp over a caller defect launders it into false evidence, so typed admission precedes normalization and a shared evidence fold defines its empty-input value explicitly; a comment naming a root or anchor the code does not use marks a live defect — the owning root resolves once and threads as a parameter, never ambient reads; a dispatch table indexed by foreign material derives its membership admission from the table itself, never an enumerated reject-list; recursive expansion over untrusted sources carries container-identity cycle rejection and a node budget on the expand arm; a seam raising a typed fault spells the fault whole as the primary argument with context on the note channel, and multiple raise sites collapse onto one reconstruction owner; evidence and telemetry labels ride domain-owned prefixes, never a sibling domain's; a filter defined by negation silently admits new states, so the surviving set is a named positive constant. Suppressions and gate bypasses are the finding, never the mechanics the gates already own: a true positive is architecture pressure to fix the shape, a false positive is rule pressure to refine the rule, and a suppression directive is neither; mechanical shape law is gate-owned — tools/biome GritQL rows for TypeScript, tools/cs-analyzer rules for C# — so a finding restating what a promoted gate row enforces is noise, and a recurring mechanical anti-pattern demands the gate row. Deliberate house shapes are never findings: dense single-expression bodies and heavy polymorphic dispatch, absent defensive guards inside domain logic (admission-once boundaries), sparse 1-2 line agent-facing comments, a large file owning one full concern, bracketed uppercase section dividers, TODO/FIXME as source comment markers, explicit match arms over merged ternaries, and named intermediates on result rails. Proven classes worth hunting: required-field threading dropped by signature migrations, finiteness admission before range checks, identity preimages omitting output-affecting inputs, match/dispatch totality, frozen-payload discipline — mutable defaults, unsorted iteration reaching egress — per-stream timestamp re-basing, resource custody, archive and metadata bomb gates, deterministic egress ordering.
        - path: "{docs/**,CLAUDE.md,AGENTS.md,.greptile/**,.coderabbit.yaml}"
          instructions: >-
            Doctrine-surface diffs are judged against the docs/laws/README.md admission law. Flag the miss as hard as the spam: an addition without recurrence evidence or branch-spanning blast radius, and equally the neighboring clause that owed the collapse and was left untouched.
        - path: "libs/**"
          instructions: >-
            libs/.planning/campaign-method.md is the review standard for design-corpus work and libs/.planning/README.md owns the page grammar — judge against them, never generic documentation convention. The fence is the work product and the measure of a planning item is the diff to a fence: presume an external member is a phantom until the folder's .api/ catalogue verifies its spelling, public accessibility, and deprecation status — and verify a claimed ABSENCE at the same bar, because a false no-such-member claim steers every rebuild into the inferior spelling; sweep compiler-fatal shapes mechanically across a folder's sibling pages — every callee resolves to a declaration on the page or a cited sibling anchor, every INDEX row resolves to a same-page section, and these fictions survive fluent prose: a ref struct captured by a lambda or riding a generic carrier, an undeclared identifier, a value returned from a void member, a type name written as an invocation, a generated-owner row whose positional argument count drifts from its declared constructor arity, a railed factory result bound into a bare-typed slot with no flatten, a payload passed outside the factory's declared admitted union, a derivation from a registry row that does not exist. Declared capability is consumed capability: a capability noun with no anchoring fence member, a receipt nothing mints, or a policy row nothing consumes is decorative density — demand the consuming member or the deletion, and a policy column consumed only by a cache key, receipt, or log annotates rather than governs — demand the governing arm; an arm that cannot honor a policy field refuses the combination loudly before provider work — silent weakening is the finding. An admitted manifest package is design-real: a central-manifest row carrying a sanctioned gate comment and named follow-up licenses every design page composing it — verification is the manifest admission, never wheel or distribution availability, and demanding a page drop an admitted package over a temporary distribution gap is the capability-gating defect. A fence member whose body is a placeholder comment is an illusory implementation — reject it before deeper review, because the surrounding prose asserts capability no route materializes; a resource-release claim in prose or comments binds to a visible call in the shown body. Prose signatures byte-match their fence declarations: an Entry/Auto row whose parameter list, rail, or return drifts from the fence is a wrong contract, and a fence signature edit ripples its prose rows in the same diff. In a closed dispatch family folding one shared request shape, every column is consumed or loudly refused by every arm — an axis some arms read and others silently ignore converts an unrepresentable check into a silent pass, and a safety guarantee a shared rail claims is consumed structurally by the rail body from the case's data row, never buried in a per-case delegate. A closed union whose every case carries one identically-typed field re-projected by a total switch is operand restatement — the shared value moves to the entrypoint argument. Attack fold accumulators: a seed starting completeness flags true fabricates a receipt over an empty input set, and a name-keyed bag write-back silently drops all but one entry under a repeated key — set-valued findings emit as one typed list value; a subset test over a requirement row reads an empty requirement as vacuously satisfied, inverting a disabled row into always-enabled — demand the empty-row short-circuit. Registry closure is same-change duty: folder README router entries resolve 1:1 to on-disk .planning pages, a page rename ripples its router row and ARCHITECTURE codemap node, a folder consuming a shared-substrate package carries a pointer overlay to the language-tier .api owner rather than a duplicate catalogue, and codemap identifiers carry the owning branch's casing — PascalCase csharp, snake_case python, camelCase typescript. Folder architecture is review duty: a .planning sub-folder is earned only by 2+ distinct non-eponymous sibling pages — a single-page folder flattens to the parent, a page echoing its parent folder's name (singular or plural) renames to the distinct concept it owns, a sub-folder names a larger domain concept that accretes siblings without rename, and grab-bag names (misc, utils, common, helpers, shared) are findings. Seam ledgers mirror: every cross-folder edge appears on both endpoint ARCHITECTURE pages with mirrored glyph and identical [KIND], and an in-package relation stays in the codemap, never a seam. A research row is recorded epistemic debt: a fence settling a member a sibling research row still declares unverified is a finding, and a resolved row deletes whole with no tombstone. A design upgrading auto-cleanup to durable resume deletes the release claim in the same edit.
        - path: "libs/python/**"
          instructions: >-
            Corpus floor is py3.15 on pinned-newest providers, and doctrine fences themselves spell its forms: a syntax-validity or provider-semantics claim reads the named doctrine page BEFORE severity assignment, and a claim contradicting that page is never emitted. Refuted standing claims, banned verbatim at every severity: "frozendict is not importable from builtins" — `from builtins import frozendict` is the legislated table spelling per docs/stacks/python/language.md [FROZENDICT_TABLE_SITE]; "start_soon returns None" — the pinned anyio surface is `start_soon -> TaskHandle[T]` with `handle.return_value` read after group close per docs/stacks/python/concurrency.md [CHILD_CARRIER]; "except A, B: is invalid syntax" — paren-less multi-exception is py3.14+ grammar and the ruff-format canonical form the repo gate emits, so re-adding grouping parens fails the format gate. `lazy import`/`lazy from` are module-scope soft keywords. Match semantics: `tuple()` is a class pattern matching any tuple instance and only the literal `()` matches the empty tuple — a claim built on the opposite reading is wrong. Admission happens once: a typed int field carries no non-finite value so an isfinite demand adds nothing, and a typed frozen struct field needs no arity re-check — either demand violates BOUNDARY_ADMISSION. Verify against the owning page before flagging a settled contract: raw-token admission lives at the parse seam per TABLE_DISPATCH, never inside a typed-enum total dispatch; a consumer declaring its per-offload budget through Kernel.of(deadline=, enforcement=) is the workers fabric contract; a sync rail selecting an async step through default_with with a single await is the ruled rails-and-effects composition form, never a nested rail. Worker-fabric contracts are ruled: SHM release-in-finally is the POSIX semantics the workers page legislates — an attached mapping outlives the unlink, and deferred cleanup leaks blocks for workers that never run; Wire.SHARED_MEMORY dispatches per argument shape, so only bare ndarrays ride the span channel; pool self-healing is structural (reuse='auto' replaces broken singletons) and pool-DEAD is capsule absence; pebble ships no public pid roster — the complement over owned sets IS the pebble set under the custody law. Preview is the five-field contract with the trailing band per core/receipt.md. A DEGRADED roll double-buffers so capacity never gaps — demanding NOT_SERVING before the roll advertises a phantom outage. A msgspec tagged-union fault is a value with no BaseException lineage, consumed by match and never re-raised. An in-place delta bounds by shift-displaced occupancy over one shared region, never the from-plus-to size sum. A plugin set reads from distribution metadata (importlib.metadata.entry_points) activated once through EntryPoint.load() traversed fallibly — an import-time side-effect registry silently emptied by lazy import is the rejected form. expression.Map is an ordered tree requiring a total order on every key, so an insertion-order-dependent derivation rides frozendict, never Map. An owned enum mirroring a provider vocabulary admits the provider's full member roster — EnumType(foreign_value) raises ValueError on every dropped member, so mirrored-vocabulary coverage is a totality obligation. msgspec.UNSET and pydantic.experimental.MISSING are the codec's own presence sentinels collapsed at the seam; a domain absence axis that changes dispatch is a @tagged_union case, never the wire sentinel leaked inward. expression.extra.result.catch(exception=X) is the single-exception trap minting Result from a named raise; effect.try_ composes Try values and never catches a provider raise — demanding effect.try_ as the exception adapter is a false positive. Identity material rides msgspec canonical encodings — `msgspec.json.encode` for composite keys, msgpack with `enc_hook` for fingerprints; a hand-rolled join or quote id scheme beside an available canonical codec is the weaker form.
        - path: "libs/csharp/**"
          instructions: >-
            Verified C# 14 / net10 substrate truths — flagging one is a false positive: a partial struct/class/record with no visible body is generator-completed, not an empty type, and attribute walls of OperatorsGeneration knobs are load-bearing algebra grants; an optional parameter cannot default to a ValueObject/SmartEnum value (CS1736/TTRESG047) — Option<TVo> = default plus IfNone is the fix, never a smell; state-threaded Switch(state:, static (s, c) =>) collapsing case overrides into one parent body is the canonical shape, and explicit Switch type arguments are deliberate compiler workarounds; .As() re-anchoring after every trait combinator is mandatory, and TraverseM (abort) versus Traverse (accumulate) is a correctness choice; Try.lift(...).Run().MapFail(...).Bind(static r => r) self-flatten is required — dropping the Bind discards the error; LanguageExt.Prelude is static-imported, so bare Optional, guard, Some, None, unit, and pure are legal unqualified; extern aliases over colliding domain packages are preventive fixes, never rename demands; Rhino-rich host capture coexisting with host-neutral semantics is architecture, never duplication. GH2 truths hold: ObjectList.AllWires includes dangling entries by design (consumer filters), Canvas.ScheduleRedraw with the before-background paint phase is the canonical motion tick, and KeyedValues.Set is typed-overload-only with no generic Set<T>. Pinned-substrate semantics carry inverse defects worth hunting: Schedule union (|) runs to the longer operand so a finite curve unioned onto an infinite one is not bounded — intersect (&) or a cumulative-delay gate is; retry wraps each attempt in a fail-only scope while repeat wraps every iteration unconditionally, so a repeated computation can never acquire and return a live resource; Fin<T> failures all equal each other and hash to one constant, so a set or dictionary keyed on Fin coalesces failures — key on a projected scalar discriminant first; TraverseM's trait-default delegates to applicative traverse and serializes independent effects; guard returns Guard<Error, Unit> bound through per-rail SelectMany — a bare guard(...) arm or guard(...).Map(...) is a compile fiction, and implicit Error to Validation widening fires only in a target-typed position; default(ImmutableArray<T>) is a distinct throwing state, and a RandomAccess.ReadAsync short return is a malformed-frame fault, never a silent partial. A lifecycle-gate read guarding an effectful entrypoint executes inside the deferred effect body, never at composition time; a bounded fixpoint iteration is a Range.Fold, never a Schedule; a foreign wall-clock stamp with no zone evidence crosses as NodaTime LocalDateTime/LocalDate, never a fabricated UTC Instant.
        - path: "libs/typescript/**"
          instructions: >-
            Verified Effect and dual-compiler truths — flagging one is a false positive: Option and Either are Effect subtypes yielded directly with no lift adapter; Effect.fn("name")(function* ...) is the definition seam whose function* and return are sanctioned; inline type specifiers on one import statement are required under verbatimModuleSyntax, and Array/Order/Record/Struct deliberately shadow globals on the value plane; ?: T versus T | undefined are distinct spellings — the blur is the defect, not the distinction; overloaded function declarations over one wider implementation are required for overload sets; Schema.suspend with a mandatory return annotation plus one interior OwnerEncoded interface beside a recursive owner is required; Match.instanceOf ladders with orElse are correct over foreign thrown values. Schema.optionalWith(S, { as: "Option" }) is the sole absence spelling on a decoded field — bare Schema.optional leaks undefined into the decoded type. Redacted implements Equal, prints <redacted> on every channel, and unsafeWipe makes later value reads throw terminally — sealed-secret handling is safety by construction, not missing discipline; Arbitrary.make/Pretty.make throw Missing annotation over a bare Schema.declare while Schema.equivalence silently falls back to reference identity — the silent fallback is the audit line, so a foreign owner admits with its annotation set complete or not at all. Composition defects worth hunting: Layer memoization is by reference identity, so a layer minted by calling a factory twice is two nodes — a shared resource declares once as a const every consumer composes, with Layer.fresh the only sharing opt-out; a RequestResolver rebuilt per call site re-mints identity and defeats the batch window; element-to-element state rides Stream.mapAccum/scan, never a Ref mutated inside map/tap; a value beside a generated union rides a stated Record<GeneratedUnion, V> annotation that breaks loudly on anchor growth, and consumption completeness closes with the (x satisfies never) residue proof.
        - path: "**/{*.csproj,*.props,*.targets,*.slnx,NuGet.config,package.json,pyproject.toml,pnpm-workspace.yaml,global.json}"
          instructions: >-
            Package versions live only in the central manifests, hand-edited. Version movement is forward-only — a downgrade or stale floor without a recorded reason in the diff is a finding; a sanctioned pin carries an inline comment stating exactly what breaks without it, and a pin missing that mechanism comment is a finding while a pin carrying one is never flagged. A project reference breaching the strata edges the root README.md and libs/.planning/architecture.md declare is a strata defect. Every central-manifest row sits inside exactly one labelled ItemGroup naming a consuming owner or concern, alphabetized within its group; every Directory.Build PropertyGroup carries a concern label, and a condition-bearing group carries a one-line comment justifying the condition. A csproj groups references under concern labels matching the folder README cards, never version-bearing. A dependency admission is a same-change multi-surface fact — central manifest row, consuming csproj reference, folder README registry row, and .api catalogue tier move together, and a package present in one surface but missing from another is registry drift. A README package card row is the backticked package id plus at most one dash-led charter clause; a version pin, a parenthetical, an .api link, or multi-line depth is a finding — capability depth belongs to the .api catalogue.
        - path: "tests/**"
          instructions: >-
            Test law is tests/README.md — judge against it. A test falsifies production behavior with an independent oracle: existence tests, mirror tests asserting a constructed value's own fields, and specs proving only that their own doubles were called are findings; a refuting witness that survives, or sits trivially outside the domain, exposes a tautology. Rail outcomes prove through the kit gates, never raw carrier-flag inspection or failure-message substrings; numeric equality proves under an explicit tolerance regime with a named metric row, and NaN admits nothing. Time-dependent behavior takes an injected clock advanced deterministically — a unit-lane sleep or wall-clock read is the named defect. A spec-local helper, tolerance constant, generator, or double shadowing an existing _testkit owner extends the kit, never duplicates beside a spec, and a spec-local tame-band generator is a coverage illusion. A capability blocked on an unbuilt producer is a named skip carrying its activation condition — a vacuous green over an absent producer is a finding. A snapshot captures only what an independent producer emits; snapshotting a self-constructed value, or reflexively re-accepting a verified-diff, is a finding. Graph under test is the production composition with edges re-provided — a substitute is a Layer against the same Tag with interior edges real, and a proof against a hand-assembled parallel graph proves only the parallel graph. Every kit capability lands with its falsification twin proving it can fail; kit import rides the exports-map or project-graph surface (sanctioned, with magic values in specs) — a relative-path reach-around into kit internals is the finding. Process-boundary output decodes through NdjsonOracle, never stdout string-scraping. Estate placement is review duty: tests/contracts/ assets are C#-produced only, a container image pinned anywhere but tests/containers.json is a finding, markers are closed and auto-applied from membership, a benchmark without its registry row (absolute budget plus dispersion ceiling) is a finding, and a [RhinoScenario] recording only Note observations with no asserted Require/Expect/Certify fact proves nothing.
        - path: "{tools/**,.claude/workflows/**}"
          instructions: >-
            Operator and workflow code is deterministic orchestration judged as production source: schema-typed agent outputs, bounded loops, every stage writing its product to disk and returning a path receipt. Bare promises without await ownership, unbounded polling, wall-clock branching, subagents instructed to wait, and hand-authored exit semantics beside a typed envelope contract are findings. Completed-with-failures and Fault ride distinct channels — a tool that ran and found defects stays Completed, and conflating the two in a caller is a finding; exit codes project from the one status owner, never re-derived per caller. Host-exclusive work acquires the shared lease through the one combinator, never a hand-rolled lockfile; artifact writes route through the artifact store, and a tool write at repo root is a finding by name. Per-run scratch paths mint deterministically from the target set, never clock or randomness, so a resume rehydrates the same directory. Every agent() call carries a label, model tier, effort, and a closed JSON schema; a pass whose acceptance gate runs a network-bound toolchain stays native, never routed onto a codex wrapper. Provision evidence is redacted by contract at the adapter seam — a raw password, token value, or password-bearing DSN crossing the seam is an adapter fault, never a redaction to add downstream. The rhino-bridge Contract is additive-only: renaming or reusing an existing field, union discriminator, status rank, or exit code is a finding; a [RhinoScenario] entrypoint emits through the typed evidence surface, and scenario code carrying #r, #load, or absolute build-output paths is a finding; --evidence author output is candidate material, never proof. cs-analyzer's rule register IS the code — Kernel/Catalog.cs plus both AnalyzerReleases ledgers — and suppression rides [CspExempt(justification)] from the one contracts assembly, never #pragma or .editorconfig; reviewer prose never restates what promoted analyzer or GritQL rules enforce.
        - path: "**/*.md"
          instructions: >-
            Prose law is docs/standards/style-guide.md, formatting.md, and information-structure.md — findings cite the named defect class and the line. The regeneration test governs: a fact a fresh agent regenerates from disk plus stated invariants is a mirror demanding deletion. The planning corpus's closed markers — [QUEUED]/[ACTIVE]/[BLOCKED] task status and marked RESEARCH items — are that standard's vocabulary, never hedge or process-ledger findings. Mermaid fences answer the diagram template law, never completeness intuition: a strata node earns its place only when a sourcing decision names the member, same-stratum mutual reads ride prose and never edges, a seam graph resolves interior owners home-side only, and an edge-free island rides prose by construction — a finding demanding an excluded node, a same-stratum rung, or an island's edge re-litigates the template. A fact lands at the lowest tier that owns it — index-tier prose carrying spec-tier mechanism demotes to the owning spec; routing is a file class, so a relative link or sibling reference outside README, SKILL, CLAUDE/AGENTS, and MEMORY files is a coupled-link finding; permission verbs (supports, allows, enables, provides, offers) where an owning verb states law are findings. Enumeration anchors — a member roster freezing a census, a forbidden-alternative litany, a frozen count or seal — are findings whose demanded replacement is the extension rule; hedges (should, might, likely) and report frames are findings while contract qualifiers (optional, if present, only when, unless) survive; one owner per fact — a second prose copy at any altitude is a fork waiting to drift. A sentence or list entry opening on the definite article buries the subject, and lowercasing The to the is the dodge, not the fix. A comment carries the one in-situ constraint the code cannot show — never the what, never process narration. A table cell is one atomic unit with no internal comma — a cell that wants a comma wants to be a card, and a column whose cells all hold one value extracts to a card.
        - path: ".claude/skills/**"
          instructions: >-
            Skill bundles are judged under the skill-writer craft law: third-person trigger descriptions without keyword stuffing, SKILL.md a lean router with reference banks one hop down, and no body rule whose deletion changes no agent output.
