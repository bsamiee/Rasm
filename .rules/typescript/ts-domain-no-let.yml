id: ts-domain-no-let
language: Tsx
severity: error
message: Use const, Effect Ref, or explicit immutable state instead of let in domain/application source.
files:
  - apps/**/src/**/domain/**/*.{ts,tsx,mts,cts}
  - apps/**/src/**/application/**/*.{ts,tsx,mts,cts}
  - libs/**/src/**/domain/**/*.{ts,tsx,mts,cts}
  - libs/**/src/**/application/**/*.{ts,tsx,mts,cts}
  - tools/**/src/**/domain/**/*.{ts,tsx,mts,cts}
  - tools/**/src/**/application/**/*.{ts,tsx,mts,cts}
  - tests/tools/ast-grep/**/*.{ts,tsx,mts,cts}
rule:
  pattern: let $DECL
