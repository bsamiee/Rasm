# Subprocess-lane coverage config. Selected via `COVERAGE_PROCESS_START=.config/coverage-subprocess.ini`,
# injected by the `cli(isolate=True)` spawn seam (`tests/python/tools/assay/conftest.py`) ONLY when the parent
# session itself runs under `coverage run` (detected via the `COVERAGE_RUN` env var that coverage's
# `do_run` exports). Plain `uv run pytest` sessions spawn with no coverage overhead.
#
# How the child starts measuring: site-packages ships `a1_coverage.pth`, which calls
# `coverage.process_startup()` in EVERY interpreter whose env carries `COVERAGE_PROCESS_START` — the
# `uv run python -m tools.assay` grandchild resolves the same `.venv`, so no Popen patching is needed.
# `parallel = true` makes each child write a `.coverage.<host>.<pid>.<rand>` sibling next to the main
# suite's `.cache/coverage/.coverage`; the canonical command's `coverage combine --append` step folds
# those siblings into the parent data file. `relative_files`/`branch`/`core` MUST mirror pyproject's
# [tool.coverage.run] — combine refuses to merge branch data into line data, and relative keys must
# match for the per-file merge to land on the same measured files.
# INI format (NOT TOML): `source` is a newline/whitespace-separated plain value, never a JSON/TOML list.
[run]
parallel = true
relative_files = true
branch = true
core = sysmon
data_file = .cache/coverage/.coverage
source =
    tools/assay
