  const names = makeSvg("g", { "font-family": MONO, "font-size": "11", fill: "var(--text-muted)", "text-anchor": "middle" });
  const xOf = i => F.l + (DAYS.length > 1 ? i / (DAYS.length - 1) * innerW : innerW / 2);
  DAYS.forEach((d, i) => names.append(makeSvg("text", { x: xOf(i).toFixed(1), y: F.h - F.b + 18 }, d.slice(5))));
  svg.append(names);
  const pts = DAYS.map((d, i) => {
    const rs = vis.filter(r => r.day === d);
    return rs.length ? { i, d, rate: Math.round(rs.filter(r => r.status === "pass").length / rs.length * 100) } : null;
  });
  const segs = []; let run = [];
  pts.forEach(p => { if (p) run.push(p); else { if (run.length) segs.push(run); run = []; } });
  if (run.length) segs.push(run);
  segs.filter(seg => seg.length > 1).forEach(seg =>
    svg.append(makeSvg("polyline", { points: seg.map(p => `${xOf(p.i).toFixed(1)},${yOf(p.rate, 100).toFixed(1)}`).join(" "), fill: "none", stroke: "var(--accent)", "stroke-width": "2" })));
  pts.filter(Boolean).forEach(p =>
    svg.append(makeSvg("circle", { cx: xOf(p.i).toFixed(1), cy: yOf(p.rate, 100).toFixed(1), r: 3.5, fill: "var(--accent)" }, makeSvg("title", null, `${p.d}: ${p.rate}%`))));
  if (!pts.some(Boolean)) emptyNote(svg);
  return svg;
};

const paintSpark = vis => {
  const counts = DAYS.map(d => vis.filter(r => r.day === d).length);
  const max = Math.max(1, ...counts), n = counts.length;
  const pts = counts.map((c, i) => [2 + (n > 1 ? i * (116 / (n - 1)) : 58), 22 - c / max * 18]);
  $("[data-spark]").replaceChildren(
    makeSvg("polyline", { points: pts.map(p => p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" "), fill: "none", stroke: "var(--accent)", "stroke-width": "1.25" }),
    makeSvg("circle", { cx: pts.at(-1)[0].toFixed(1), cy: pts.at(-1)[1].toFixed(1), r: 2.5, fill: "var(--accent)" }));
};

const renderHeader = () => {
  $("#doc-title").textContent = model.meta.title;
  $("#doc-deck").textContent = model.meta.deck || "";
  $("#doc-eyebrow").textContent = "Dashboard · " + model.meta.owner;
  $("#doc-date").textContent = model.meta.date;
  const fails = ROWS.filter(r => r.status === "fail").length;
  const skips = ROWS.filter(r => r.status === "skip").length;
  const chip = $("#doc-status");
  chip.className = "chip " + (fails ? "fail" : skips ? "warn" : "ok");
  chip.textContent = fails ? "[" + fails + " FAIL]" : skips ? "[" + skips + " SKIP]" : "[ALL-PASS]";
};

const trById = new Map();
const mountRows = () => {
  const frag = document.createDocumentFragment();
  ROWS.forEach(r => {
    const tr = el("tr", { "data-id": r.id },
      el("td", { class: "mono num", text: r.id }),
      el("td", { text: r.suite }),
      el("td", { class: "mono", text: r.case }),
      el("td", {}, el("span", { class: "chip " + STATUS_CHIP[r.status], text: "[" + r.status.toUpperCase() + "]" })),
      el("td", { class: "num", text: ms(r) }),
      el("td", { class: "num mono", text: r.day }),
      el("td", {}, el("span", { class: "chip", "data-cell": "flag", hidden: true })),
      el("td", { class: "act" }, el("button", { type: "button", class: "btn ghost mini", "data-detail": r.id, "aria-label": "Detail for " + r.id, text: "open" })));
    trById.set(r.id, tr);
    frag.append(tr);
  });
  $("#rows").replaceChildren(frag);
};

const mountFacets = () => {
  const btn = (group, value) => el("button", { type: "button", class: "facet", "data-facet": group, "data-value": value, "aria-pressed": "false" },
    el("span", { text: value }), el("span", { class: "fc num" }));
  $("#facet-suites").append(...SUITES.map(s => btn("suites", s)));
  $("#facet-statuses").append(...STATUSES.map(s => btn("statuses", s)));
};

const drawerFields = () => {
  const sel = el("select", { id: "global-verdict", "aria-label": "Global verdict" });
  ["", ...NOCTURNE.VOCAB].forEach(v => sel.append(el("option", { value: v }, v || "(no global verdict)")));
  $("[data-drawer-fields]").prepend(el("label", { class: "rowline" }, "Global verdict ", sel));
};

const paintRows = () => ROWS.forEach(r => trById.get(r.id).classList.toggle("dim", !matches(r)));
const paintFlag = id => {
  const chip = trById.get(id)?.querySelector('[data-cell="flag"]'); if (!chip) return;
  const f = state.flags[id], verdict = f?.verdict, note = f?.note;
  if (verdict || note) { chip.hidden = false; chip.className = "chip " + (verdict ? FLAG_CHIP[verdict] : "info"); chip.textContent = verdict ? "[" + verdict.toUpperCase() + "]" : "[NOTE]"; }
  else chip.hidden = true;
};
const paintFacets = () => $$(".facet").forEach(b => {
  const group = b.dataset.facet, field = FACETS[group], value = b.dataset.value;
  b.querySelector(".fc").textContent = String(ROWS.filter(r => matches(r, group) && r[field] === value).length);
  b.setAttribute("aria-pressed", String(state[group].includes(value)));
});
const paintTally = vis => {
  $("[data-tally]").textContent = vis.length + " / " + ROWS.length + " in view";
  $("[data-clear]").disabled = !filterOn();
};
const paintKpis = vis => {
  const pass = vis.filter(r => r.status === "pass").length, fail = vis.filter(r => r.status === "fail").length;
  $('[data-kpi="total"]').textContent = fmt.num.format(vis.length);
  $('[data-kpi="pass"]').textContent = fmt.num.format(pass);
  $('[data-kpi="fail"]').textContent = fmt.num.format(fail);
  $('[data-kpi="rate"]').textContent = vis.length ? Math.round(pass / vis.length * 100) + "%" : "—";
  const stat = d => {
    const rs = vis.filter(r => r.day === d); if (!rs.length) return null;
    const p = rs.filter(r => r.status === "pass").length;
    return { pass: p, fail: rs.filter(r => r.status === "fail").length, rate: Math.round(p / rs.length * 100) };
  };
  const cur = stat(DAYS.at(-1)), prev = DAYS.length > 1 ? stat(DAYS.at(-2)) : null;
  const paintDelta = (key, goodUp, unit) => {
    const out = $(`[data-delta="${key}"]`);
    if (!cur || !prev) { out.textContent = ""; out.className = "delta"; return; }
    const d = cur[key] - prev[key];
    out.textContent = (d > 0 ? "+" : d < 0 ? "−" : "±") + Math.abs(d) + unit + " vs " + DAYS.at(-2).slice(5);
    out.className = "delta " + (d === 0 ? "" : (d > 0) === goodUp ? "up" : "down");
  };
  paintDelta("pass", true, ""); paintDelta("fail", false, ""); paintDelta("rate", true, "pt");
  paintSpark(vis);
};
const paintMeta = () => {
  const open = annotationsOut().filter(a => a.status === "active").length;
  $("#egress-meta").textContent = decisionsOut().length + " flags · " + open + " open notes · " + visible().length + " / " + ROWS.length + " in view";
  const sendSec = $('[data-export="send"]')?.closest("section");
  if (sendSec) sendSec.hidden = !(NOCTURNE.served && isChanged());
  wire.refresh();
};
const paint = () => {
  const vis = visible();
  paintRows(); paintFacets(); paintTally(vis); paintKpis(vis);
  $('[data-chart="suite"]').replaceChildren(buildSuiteChart(vis));
  $('[data-chart="rate"]').replaceChildren(buildRateChart(vis));
  paintMeta();
};

const CMP = { id: r => r.id, suite: r => r.suite, case: r => r.case, status: r => STATUS_RANK[r.status], ms: r => r.duration_ms, day: r => r.day };
const sortRows = () => {
  const { key, dir } = state.sort, get = CMP[key], body = $("#rows");
  [...ROWS].sort((a, b) => { const av = get(a), bv = get(b); return (typeof av === "number" ? av - bv : String(av).localeCompare(String(bv))) * dir; })
    .forEach(r => body.append(trById.get(r.id)));
  $$(".th-sort").forEach(b => b.closest("th").setAttribute("aria-sort", b.dataset.sort === key ? (dir > 0 ? "ascending" : "descending") : "none"));
};

const openDetail = id => {
  const r = rowById.get(id); if (!r) return;
  state.detail = id;
  $("#detail-title").textContent = r.id;
  $('[data-d="suite"]').textContent = r.suite;
  $('[data-d="case"]').textContent = r.case;
  $('[data-d="owner"]').textContent = r.owner;
  $('[data-d="day"]').textContent = r.day;
  $('[data-d="ms"]').textContent = r.status === "skip" ? "—" : fmt.num.format(r.duration_ms) + " ms";
  const sc = $('[data-d="status"]');
  sc.className = "chip " + STATUS_CHIP[r.status]; sc.textContent = "[" + r.status.toUpperCase() + "]";
  const msg = $('[data-d="msg"]');
  msg.hidden = !r.msg;
  if (r.msg) { msg.className = "rail " + (r.status === "fail" ? "fail" : "warn"); msg.textContent = r.msg; }
  const f = state.flags[id];
  $$("[data-flag-verdict]").forEach(i => { i.checked = i.value === (f?.verdict ?? ""); });
  $("#flag-note").value = f?.note ?? "";
  $("#detail").showModal();
};

// --- [OPERATIONS]
const wire = NOCTURNE.boot({ kind: "dashboard", envelope, toMarkdown, filename: model.meta.id, isChanged, redactPayload: true,
  onExported: () => { Object.values(state.flags).forEach(f => { if (f.note) f.ann = "exported"; }); paintMeta(); } });

let qTimer = 0;
document.addEventListener("input", e => {
  if (e.target.closest("[data-filter-box]")) {
    clearTimeout(qTimer);
    const q = e.target.value.trim().toLowerCase();
    qTimer = setTimeout(() => { state.q = q; paint(); }, 150);
    return;
  }
  if (e.target.closest("[data-flag-note]") && state.detail) {
    const f = flag(state.detail);
    f.note = e.target.value; f.ann = "active";
    paintFlag(state.detail); paintMeta();
  }
});
document.addEventListener("change", e => {
  const fv = e.target.closest("[data-flag-verdict]");
  if (fv && state.detail) { flag(state.detail).verdict = fv.value; paintFlag(state.detail); paintMeta(); return; }
  if (e.target.id === "global-verdict") { state.global.status = e.target.value; paintMeta(); }
});
document.addEventListener("click", e => {
  const fb = e.target.closest(".facet");
  if (fb) {
    const arr = state[fb.dataset.facet], i = arr.indexOf(fb.dataset.value);
    if (i >= 0) arr.splice(i, 1); else arr.push(fb.dataset.value);
    paint(); return;
  }
  if (e.target.closest("[data-clear]")) {
    state.q = ""; state.suites = []; state.statuses = [];
    $("[data-filter-box]").value = "";
    paint(); return;
  }
  const s = e.target.closest(".th-sort");
  if (s) { state.sort = { key: s.dataset.sort, dir: state.sort.key === s.dataset.sort ? -state.sort.dir : 1 }; sortRows(); return; }
  const d = e.target.closest("[data-detail]");
  if (d) { openDetail(d.dataset.detail); return; }
  if (e.target.closest("[data-flag-clear]") && state.detail) {
    delete state.flags[state.detail];
    $$("[data-flag-verdict]").forEach(i => { i.checked = false; });
    $("#flag-note").value = "";
    paintFlag(state.detail); paintMeta(); return;
  }
  const dl = e.target.closest("[data-dl]");
  if (dl) {
    const svg = $(`[data-chart="${dl.dataset.dl}"] svg`); if (!svg) return;
    const clone = svg.cloneNode(true);
    clone.setAttribute("xmlns", NS);
    const box = svg.viewBox.baseVal;
    clone.setAttribute("width", box.width); clone.setAttribute("height", box.height);
    const styles = getComputedStyle(svg);
    clone.querySelectorAll("[fill^='var('],[stroke^='var(']").forEach(n => {
      for (const attr of ["fill", "stroke"]) {
        const raw = n.getAttribute(attr);
        if (raw?.startsWith("var(")) n.setAttribute(attr, styles.getPropertyValue(raw.slice(4, -1).split(",")[0].trim()).trim() || raw);
      }
    });
    NOCTURNE.download(model.meta.id + "-" + dl.dataset.dl + ".svg", "image/svg+xml;charset=utf-8", new XMLSerializer().serializeToString(clone));
  }
});

// --- [COMPOSITION]
renderHeader(); mountFacets(); mountRows(); drawerFields(); sortRows(); paint();
})();
</script>
</body>
</html>
