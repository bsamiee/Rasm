const root = document.documentElement;
try { root.dataset.theme = localStorage.getItem(themeKey) ?? "dark"; } catch { root.dataset.theme = "dark"; }
document.addEventListener("click", e => {
  if (!e.target.closest("[data-toggle-theme]")) return;
  const next = root.dataset.theme === "dark" ? "light" : "dark";
  try { localStorage.setItem(themeKey, root.dataset.theme = next); } catch { root.dataset.theme = next; }
});

const model = JSON.parse($("#payload").textContent);
const BASE_ID = model.meta.baseline;
const state = { captures: {}, answers: {}, global: { status: "", note: "" }, copies: 0 };
model.questions.forEach(q => { state.answers[q.id] = ""; });
const baseline = structuredClone(state);

const phaseIndex = Object.fromEntries(model.phases.map(p => [p.id, p]));
const pct = p => p.stages.length ? Math.round(p.stages.filter(s => s.status === "done").length / p.stages.length * 100) : 0;
const phaseDone = p => p.stages.length > 0 && p.stages.every(s => s.status === "done");
const unmetDeps = p => (p.depends || []).filter(d => !(phaseIndex[d] && phaseDone(phaseIndex[d])));
const blocked = p => unmetDeps(p).length > 0;
const phaseState = p => blocked(p) ? "blocked" : phaseDone(p) ? "done" : p.stages.some(s => s.status === "active") ? "active" : "planned";
const CHIP = { done: "ok", active: "info", planned: "info", blocked: "fail" };
const MARK = { done: "[DONE]", active: "[ACTIVE]", planned: "[PLANNED]", blocked: "[BLOCKED]" };
const exposures = () => model.risks.map(r => ({ ...r, exp: r.likelihood * r.impact })).sort((a, b) => b.exp - a.exp);
const topRisk = () => exposures()[0];

const cap = id => (state.captures[id] ??= { verdict: "", note: "", ann: "active" });
const annotations = () => Object.entries(state.captures).filter(([, c]) => c.note).map(([id, c], i) => ({ id: "a-" + (i + 1), itemId: id, intent: "note", status: c.ann, text: c.note }));
const decisionsOut = () => Object.entries(state.captures).filter(([, c]) => c.verdict).map(([id, c]) => ({ id, verdict: c.verdict, ...(c.note ? { note: c.note } : {}) }));
const changesOut = () => Object.entries(state.answers).filter(([id, v]) => v !== (baseline.answers[id] || "")).map(([id, v]) => ({ itemId: id, path: "/questions/" + id + "/answer", from: baseline.answers[id] || "", to: v }));
const isChanged = () => decisionsOut().length || changesOut().length || annotations().length || state.global.status || state.global.note;

const verdictSelect = (id, onlyThree) => {
  const opts = onlyThree ? ["", "approve", "reject", "defer"] : ["", ...VOCAB];
  const sel = el("select", { class: "verdict", "aria-label": "Verdict for " + id, "data-verdict-for": id });
  opts.forEach(v => sel.append(el("option", { value: v, ...(cap(id).verdict === v ? { selected: true } : {}) }, v || "—")));
  sel.dataset.set = cap(id).verdict || "";
  return sel;
};
const noteButton = id => {
  const pid = "note-" + id;
  const btn = el("button", { type: "button", class: "btn pill no-print", popovertarget: pid, "aria-label": "Note for " + id }, cap(id).note ? "note*" : "note");
  const pop = el("div", { id: pid, class: "pop no-print", popover: "auto" },
    el("strong", { text: "Annotation" }),
    el("textarea", { "data-note-for": id, "aria-label": "Annotation text for " + id, placeholder: "Anchored to " + id }, cap(id).note || ""));
  return el("span", { class: "rowline" }, btn, pop);
};

function render() {
  $("#doc-title").textContent = model.meta.title;
  $("#doc-sub").textContent = "Owner: " + model.meta.owner;
  const anyBlocked = model.phases.some(blocked);
  const anyActive = model.phases.some(p => p.stages.some(s => s.status === "active"));
  const dst = $("#doc-status");
  dst.className = "chip " + (anyBlocked ? "warn" : anyActive ? "info" : "ok");
  dst.textContent = anyBlocked ? "[BLOCKED-EDGE]" : anyActive ? "[ACTIVE]" : "[DONE]";
  $("#doc-date").textContent = model.meta.date;

  const stages = model.phases.flatMap(p => p.stages);
  const tr = topRisk();
  const stats = [
    ["Phases done", model.phases.filter(phaseDone).length + " / " + model.phases.length],
    ["Stages done", stages.filter(s => s.status === "done").length + " / " + stages.length],
    ["Open questions", String(model.questions.length)],
    ["Top risk", tr.text, tr.exp]
  ];
  $("#stats").replaceChildren(...stats.map(([k, v, x]) => el("div", { class: "stat" },
    el("small", { text: k }),
    x != null ? el("span", {}, el("b", { text: String(x) }), el("small", { text: " " + v })) : el("b", { text: v }))));

  const toc = [["context", "Context"], ["decisions", "Decisions"], ["phases", "Phases"], ["risks", "Risk register"], ["questions", "Open questions"]];
  $("#toc").replaceChildren(...toc.map(([id, label]) => el("a", { href: "#" + id, text: label })));

  $("#context-body").replaceChildren(...model.context.map(t => el("p", { text: t })));

  $("#decisions-body").replaceChildren(...model.decisions.map(d => {
    const rowVerdict = el("div", { class: "cap" }, verdictSelect(d.id, true), noteButton(d.id));
    return el("tr", {},
      el("td", { text: d.topic }),
      el("td", { text: d.ruling }),
      el("td", { class: "t2", text: d.rationale }),
      el("td", {}, el("span", { class: "chip " + (d.status === "ruled" ? "ok" : "info"), text: "[" + d.status.toUpperCase() + "]" })),
      el("td", {}, rowVerdict));
  }));

  $("#phases-body").replaceChildren(...model.phases.map(p => {
    const ps = phaseState(p);
    const meta = el("div", { class: "phase__meta" },
      el("div", {}, el("span", { class: "chip " + CHIP[ps], text: MARK[ps] })),
      el("div", { class: "meter", "aria-label": "Completion " + pct(p) + " percent", role: "img" }, el("span", { style: "width:" + pct(p) + "%" })),
      el("small", { class: "mono", text: pct(p) + "% complete" }),
      ...(p.depends || []).map(d => {
        const met = phaseIndex[d] && phaseDone(phaseIndex[d]);
        return el("div", {}, el("span", { class: "chip " + (met ? "ok" : "fail"), text: (met ? "[DEP-MET] " : "[BLOCKED-BY] ") + (phaseIndex[d] ? phaseIndex[d].title : d) }));
      }));
    const body = el("div", {},
      el("p", { class: "muted", text: p.intent }),
      ...p.stages.map((s, i) => el("div", { class: "stage" },
        el("div", { class: "rowline" },
          el("strong", { text: s.title }),
          el("span", { class: "chip " + (s.status === "done" ? "ok" : s.status === "active" ? "info" : "warn"), text: "[" + s.status.toUpperCase() + "]" }),
          s.acceptance.length === 0 ? el("span", { class: "chip fail", text: "[NO-ACCEPTANCE]" }) : null),
        s.acceptance.length
          ? (() => { const d = el("details", {}, el("summary", { text: "Acceptance (" + s.acceptance.length + ")" })); const ul = el("ul"); s.acceptance.forEach(a => ul.append(el("li", { text: a }))); d.append(ul); return d; })()
          : el("small", { class: "muted", text: "Acceptance names no observable signal — unprovable stage." }),
        el("div", { class: "cap" }, verdictSelect(s.id, true), noteButton(s.id)))));
    return el("article", { class: "card phase", "aria-label": "Phase " + p.title },
      el("h3", { text: p.title }),
      el("div", { class: "phase__grid" }, body, meta));
  }));

  $("#risks-body").replaceChildren(...exposures().map((r, i) => el("tr", { class: i === 0 ? "rowhi" : "" },
    el("td", { text: r.text }),
    el("td", {}, el("small", { class: "mono t2", text: phaseIndex[r.phaseId] ? phaseIndex[r.phaseId].title : r.phaseId })),
    el("td", { class: "mono", text: "L" + r.likelihood }),
    el("td", { class: "mono", text: "I" + r.impact }),
    el("td", {}, el("span", { class: "expo" + (i === 0 ? " chip warn" : ""), text: String(r.exp) })),
    el("td", { class: "t2", text: r.mitigation }))));

  $("#questions-body").replaceChildren(...model.questions.map(q => el("div", { class: "qcard", "aria-label": "Question " + q.id },
    el("div", { class: "rowline" }, el("strong", { text: q.text }),
      el("span", { class: "chip info", text: "[OWNER " + q.owner + "]" }), el("small", { class: "mono", text: "due " + q.due })),
    el("textarea", { "data-answer-for": q.id, "aria-label": "Answer for " + q.id, placeholder: "Answer slot" }, state.answers[q.id] || ""))));

  const gv = $("#global-verdict");
  if (!gv.options.length) ["", ...VOCAB].forEach(v => gv.append(el("option", { value: v }, v || "—")));
  gv.value = state.global.status;

  $("#egress-meta").textContent = "copies: " + state.copies + " · unresolved notes: " + annotations().filter(a => a.status === "active").length;
  $("[data-export='changed']").disabled = !isChanged();
}

function envelope(changedOnly) {
  const env = {
    kind: "plan", version: 1,
    artifact: { id: model.meta.id, title: model.meta.title, baseline: BASE_ID },
    decision: { status: state.global.status || "comment", at: new Date().toISOString(), ...(state.global.note ? { note: state.global.note } : {}) },
    decisions: decisionsOut(), changes: changesOut(), annotations: annotations(),
    state: { captures: state.captures, answers: state.answers, global: state.global }
  };
  if (changedOnly) env.extensions = { diffBaseline: BASE_ID };
  return env;
}
function validate(env) {
  const errs = [];
  if (env.kind !== "plan") errs.push("kind");
  if (env.version !== 1) errs.push("version");
  if (!env.artifact || !env.artifact.id || !env.artifact.title) errs.push("artifact");
  if (!VOCAB.includes(env.decision.status)) errs.push("decision.status");
  env.decisions.forEach(d => { if (!d.id || !VOCAB.includes(d.verdict)) errs.push("decision:" + d.id); });
  ["decisions", "changes", "annotations"].forEach(k => { if (!Array.isArray(env[k])) errs.push(k); });
  return errs;
}
function toMarkdown(env) {
  const L = ["# " + model.meta.title, "",
    "**Verdict:** " + (env.decision.status || "(none)") + (env.decision.note ? " — " + env.decision.note : ""),
    "Owner: " + model.meta.owner + " · Date: " + model.meta.date, "", "## Decisions"];
  if (env.decisions.length) {
    L.push("| Item | Verdict | Note |", "| --- | --- | --- |");
    env.decisions.forEach(d => L.push("| " + d.id + " | " + d.verdict + " | " + (d.note || "") + " |"));
  } else L.push("_No item verdicts captured._");
  if (env.changes.length) { L.push("", "## Answers"); env.changes.forEach(c => L.push("- " + c.itemId + ": " + c.to)); }
  if (env.annotations.length) { L.push("", "## Annotations"); env.annotations.forEach(a => L.push("- [" + a.status + "] " + a.itemId + " (" + a.intent + "): " + a.text)); }
  return L.join("\n") + "\n";
}

let toastTimer;
const flash = msg => { const t = $("#toast"); t.textContent = msg; t.showPopover?.(); clearTimeout(toastTimer); toastTimer = setTimeout(() => t.hidePopover?.(), 1600); };
const markExported = () => { Object.values(state.captures).forEach(c => { if (c.note) c.ann = "exported"; }); };

document.addEventListener("click", e => {
  const b = e.target.closest("[data-export]"); if (!b) return;
  const mode = b.dataset.export;
  const env = envelope(mode === "changed");
  const errs = validate(env);
  const eg = $("#egress");
  if (errs.length) { eg.value = "BLOCKED — invalid payload: " + errs.join(", "); flash("Export blocked"); return; }
  const out = mode === "md" ? toMarkdown(env) : JSON.stringify(env, null, 2);
  eg.value = out;
  const done = () => { state.copies++; markExported(); flash("Copied"); render(); };
  navigator.clipboard?.writeText(out).then(done).catch(() => { flash("Clipboard denied — copy from the box"); render(); });
  if (!navigator.clipboard) render();
});
document.addEventListener("change", e => {
  const v = e.target.closest("[data-verdict-for]");
  if (v) { const id = v.dataset.verdictFor; cap(id).verdict = v.value; v.dataset.set = v.value; render(); }
  if (e.target.id === "global-verdict") { state.global.status = e.target.value; render(); }
});
document.addEventListener("input", e => {
  const n = e.target.closest("[data-note-for]");
  if (n) { const id = n.dataset.noteFor; cap(id).note = n.value; cap(id).ann = "active"; $("#egress-meta").textContent = "copies: " + state.copies + " · unresolved notes: " + annotations().filter(a => a.status === "active").length; $("[data-export='changed']").disabled = !isChanged(); }
  const a = e.target.closest("[data-answer-for]");
  if (a) { state.answers[a.dataset.answerFor] = a.value; $("[data-export='changed']").disabled = !isChanged(); }
});
addEventListener("beforeprint", () => document.querySelectorAll("details").forEach(d => { d.dataset.wasOpen = d.open; d.open = true; }));
addEventListener("afterprint", () => document.querySelectorAll("details").forEach(d => { d.open = d.dataset.wasOpen === "true"; }));
render();
})();
</script>
</body>
</html>
