# [REFUTED_CLASSES] — the machine-read guard roster review_rail.py compiles into its claim
# classifier, recurrence detector, and generated settled-rulings block. Runtime data:
# rows grow one per refuted class from the `harvest` feed's proposal block; a landed row is
# edited here, never in the script.
#
# Row schema (mirrors the RefutedClass struct):
#   class_id:          stable kebab-case id for the refuted claim class
#   corpus:            corpus selector — `code` or `prose`; slice draws only corpus-matched
#                      rows into a lane's settled-rulings roster (empty = every corpus)
#   matchers:          case-insensitive regex patterns over the finding claim text; an
#                      invalid pattern falls back to a literal case-insensitive match
#   refuting_citation: the ruling or evidence that refuted the class (doc path, ledger id),
#                      carrying the discriminator separating it from its true-positive neighbor
#   landed_surfaces:   reviewer-config paths that carry the do-not-flag guard
