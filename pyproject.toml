    "opentelemetry-api",
    "opentelemetry-exporter-otlp-proto-http",
    "opentelemetry-sdk",
    "opentelemetry-instrumentation-grpc",            # [RUNTIME]: gRPC server/client span instrumentation for server/serve
    "pydantic",
    "pydantic-settings",
    "expression",
    "stamina",
    "structlog",
    "psutil",
    "fsspec",
    "s3fs",                                          # [DATA]: S3 fsspec backend for shared-pull artifact reads
    "gcsfs",                                         # [DATA]: GCS fsspec backend for shared-pull artifact reads
    "obstore",                                       # [DATA]: object-store backend
    "obspec-utils",                                  # [DATA]: multi-store ObjectStoreRegistry companion to obstore
    "httpx",                                         # [TRANSPORT]: approved HTTP client surface for typed adapters
    "watchfiles",
    "apscheduler",                                   # [RUNTIME]: cron, interval, and date triggers
    "universal-pathlib",                             # [DATA]: UPath storage_options/protocol resolution for the fsspec artifact store
