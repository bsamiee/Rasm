@layer print{

  :root{
    color-scheme:light;
    --bg:#fff;--surface:oklch(0.945 0.012 85);--raised:#fff;--raised-2:#fff;--overlay:#fff;
    --line:oklch(0 0 0/.14);--line-strong:oklch(0 0 0/.2);

/* --- [DECK_LOCAL] --- appends into the floor's named layers; the floor owns the order */
@layer tokens{
  :root{--barh:52px;--slide-lead:clamp(2.2rem,1.4rem + 4.5vw,4rem)}
}
@layer components{
  html{scroll-snap-type:y mandatory;scroll-padding-top:var(--barh);scroll-behavior:smooth}
  .skip{position:absolute;left:-9999px}
  .skip:focus{left:var(--s4);top:calc(var(--barh) + var(--s2));position:fixed;z-index:6;background:var(--raised-2);padding:var(--s2) var(--s3);border:1px solid var(--line-strong);border-radius:var(--r-1)}
  .deckbar{position:fixed;inset:0 0 auto 0;z-index:5;display:flex;align-items:center;gap:var(--s3);justify-content:space-between;block-size:var(--barh);padding:0 var(--s4);background:color-mix(in oklch,var(--raised-2) 92%,transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--line-strong)}

  .controls{display:flex;flex-wrap:wrap;align-items:center;gap:var(--s2)}
  .controls .btn{font-size:var(--fs-2xs);padding:var(--s1) var(--s3)}
  #counter{min-width:5ch;text-align:center;color:var(--text-muted);font-family:var(--font-mono);font-size:var(--fs-2xs)}
  .progress{position:fixed;top:var(--barh);left:0;z-index:5;block-size:2px;inline-size:0;background:linear-gradient(90deg,var(--accent),var(--accent-active));transition:inline-size var(--dur-2) var(--ease-standard)}
  .slide{min-block-size:100svh;scroll-snap-align:start;scroll-snap-stop:always;display:grid;align-content:center;justify-items:start;padding:calc(var(--barh) + var(--s5)) var(--s5) var(--s7);position:relative}
  .slide__inner{max-inline-size:min(52rem,92vw);margin-inline:auto;inline-size:100%}
  .slide+.slide{border-top:1px solid var(--line)}
  .slide__lead{font-family:var(--font-display);font-size:var(--slide-lead);font-weight:600;letter-spacing:-.015em;line-height:1.08;margin:0 0 var(--s4)}
  .slide__body>*+*{margin-block-start:var(--s4)}
  .slide__list{margin:0;padding-inline-start:var(--s5)}
  .slide__list li{margin:var(--s2) 0;font-size:var(--fs-lg)}
  .slide__kicker{margin:0 0 var(--s2)}
  .chip-line{display:flex;flex-wrap:wrap;gap:var(--s2);margin:0}
  .chip__mark{font-weight:700}
  .dwarn{margin:0 0 var(--s3)}
  .stat-row{display:grid;gap:var(--s3);grid-template-columns:repeat(auto-fit,minmax(min(100%,11rem),1fr))}
  .slide[data-kind="decision"]{background:linear-gradient(135deg,var(--accent),var(--accent-active));color:var(--on-accent)}
  .slide[data-kind="decision"] .slide__kicker{color:var(--on-accent);opacity:.75}

  .speaker{margin-block-start:var(--s5);padding:var(--s3) var(--s4);border-inline-start:3px solid var(--editorial);background:var(--editorial-weak);border-radius:0 var(--r-1) var(--r-1) 0;font-size:var(--fs-sm)}

@layer print{

  html{scroll-snap-type:none}

<body data-mode="present">
<a class="skip" href="#deck-main">Skip to slides</a>
<header class="deckbar no-print">
  <!-- replace: deck title -->
  <div class="deckbar__title"><strong>Collapsing the Shape Surface</strong> <span class="chip info">[CASE]</span></div>
  <div class="controls">
    <button type="button" class="btn ghost" data-nav="-1" aria-label="Previous slide">Prev</button>
    <span id="counter" class="num" role="status" aria-live="polite">1 / 5</span>
    <button type="button" class="btn ghost" data-nav="1" aria-label="Next slide">Next</button>
    <button type="button" class="btn" data-toggle-notes aria-pressed="false">Notes</button>
    <button type="button" class="btn" data-toggle-theme>Theme</button>
  </div>
</header>
<div class="progress" id="progress" aria-hidden="true"></div>
<main id="deck-main" tabindex="-1"><!-- slides projected from payload --></main>
<footer class="export-bar no-print" aria-label="Export bar">
  <button type="button" class="btn primary" data-export="send" hidden>Send to agent</button>
  <button type="button" class="btn" data-export="md">Copy outline</button>
  <button type="button" class="btn" data-export="json">Download JSON</button>
  <button type="button" class="btn ghost" data-export="flagged" disabled>Copy flagged</button>
  <span class="muted num" id="egress-meta">0 flagged, 0 copied</span>
  <textarea id="egress" readonly rows="3" aria-label="Exported payload mirror"></textarea>
</footer>
<p class="helpline no-print"><span class="kbd">&larr;</span> <span class="kbd">&rarr;</span> navigate &middot; <span class="kbd">n</span> notes</p>
<output id="toast" popover="manual" role="status" aria-live="polite"></output>
<!-- replace: deck model payload -->
<script type="application/json" id="payload">{"meta":{"title":"Collapsing the Shape Surface","date":"2026-07-06","owner":"Platform / Shape owner"},"slides":[{"id":"sl-title","kind":"title","title":"Collapsing the Shape Surface","speaker":"Set the frame: this is a density decision, not a rewrite. The room owns the call sites.","blocks":[{"type":"paragraph","text":"One polymorphic owner replaces five parallel exports."}]},{"id":"sl-context","kind":"context","title":"Context","speaker":"Anchor the cost in the reviewers' own diffs: the last two modalities each touched all five sites.","blocks":[{"type":"paragraph","text":"The Shape concept ships five entry points, each re-deriving the same routing and boundary mapping."},{"type":"list","items":["Every new modality has added a sibling export, not a row.","Boundary translation is duplicated across three of the five.","Callers pick an entry by name, so arity leaks into the call site."]}]},{"id":"sl-evidence","kind":"evidence","title":"Evidence","speaker":"The minus figure is surface, not capability; every modality stays reachable through one door.","blocks":[{"type":"stat-row","stats":[{"n":"5 to 1","label":"public entry points"},{"n":"-214","label":"net lines of surface"},{"n":"1","label":"boundary mapping site"}]},{"type":"code","text":"def dispatch(self, req: Request) -> Result:\n    return _ROUTES[req.arity](self, req).fold(fail, ok)"},{"type":"paragraph","text":"Arity, filter, and provider move into the request shape; the owner dispatches on a closed vocabulary."},{"type":"chip-line","chips":[{"tone":"info","mark":"[MEASURED]","text":"surface delta from the branch"},{"tone":"ok","mark":"[REACHABLE]","text":"every modality preserved"}]}]},{"id":"sl-decision","kind":"decision","title":"Decision","speaker":"Name what is out of scope: the wire format is unchanged, so no downstream service moves this quarter.","blocks":[{"type":"chip-line","chips":[{"tone":"ok","mark":"[DECIDED]","text":"merge five exports into Shape.dispatch(req)"},{"tone":"info","mark":"[BOUNDARY]","text":"PRIMARY maps once at ingress"}]},{"type":"paragraph","text":"The owner discriminates on req.arity against a bounded vocabulary; internals read canonical names only."}]},{"id":"sl-asks","kind":"asks","title":"Asks","speaker":"Close on the Friday date and the one named owner; leave with a commitment, not a discussion.","blocks":[{"type":"list","items":["Approve the single-entry dispatch shape by Friday.","One reviewer owns the call-site migration audit.","Confirm the arity vocabulary is closed, no runtime-supplied kinds."]}]}]}</script>
<script>
const $ = (sel, root = document) => root.querySelector(sel);
const el = (tag, cls, txt) => { const n = document.createElement(tag); if (cls) n.className = cls; if (txt != null) n.textContent = txt; return n; };
const themeKey = "theme:" + document.title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
const root = document.documentElement;
const storedTheme = (() => { try { return localStorage.getItem(themeKey); } catch { return null; } })();
if (storedTheme) root.dataset.theme = storedTheme;
const returnMeta = document.querySelector('meta[name="artifact-return"]');

// --- model -> derived state
const model = JSON.parse($("#payload").textContent);
const BUDGET = 6;
const blockWeight = { paragraph: () => 1, list: b => b.items.length, "stat-row": b => b.stats.length, "chip-line": b => b.chips.length, code: () => 2 };
const slideWeight = s => s.blocks.reduce((w, b) => w + blockWeight[b.type](b), 0);
const state = {
  meta: model.meta,
  slides: model.slides.map(s => { const weight = slideWeight(s); return { ...s, weight, over: weight > BUDGET }; }),
  captures: Object.fromEntries(model.slides.map(s => [s.id, { flag: "none", note: "", exported: false }])),
  copies: 0,
};

// --- typed block renderer
const chipNode = (tone, mark, text) => { const c = el("span", "chip " + tone); c.append(el("span", "chip__mark", mark), document.createTextNode(" " + text)); return c; };
const renderBlock = b => {
  if (b.type === "paragraph") return el("p", null, b.text);
  if (b.type === "list") { const ul = el("ul", "slide__list"); b.items.forEach(i => ul.append(el("li", null, i))); return ul; }
  if (b.type === "code") { const pre = el("pre"); pre.append(el("code", null, b.text)); return pre; }
  if (b.type === "stat-row") { const d = el("div", "stat-row"); b.stats.forEach(s => { const cell = el("div", "card stat"); cell.append(el("b", "num", s.n), el("small", null, s.label)); d.append(cell); }); return d; }
  const p = el("p", "chip-line"); b.chips.forEach(c => p.append(chipNode(c.tone, c.mark, c.text))); return p;
};

// --- slide projection: full-viewport scroll-snap sections
const stage = $("#deck-main");
const renderSlide = (s, i) => {
  const sec = el("section", "slide");
  sec.id = s.id; sec.dataset.kind = s.kind;
  sec.setAttribute("aria-label", `Slide ${i + 1}: ${s.title}`);
  const inner = el("div", "slide__inner");
  inner.append(el("p", "eyebrow slide__kicker", `${String(i + 1).padStart(2, "0")} · ${s.kind}`));
  inner.append(el(s.kind === "title" ? "h1" : "h2", "slide__lead", s.title));
  if (s.over) { const w = el("p", "dwarn"); w.append(chipNode("warn", "[DENSE]", `${s.weight} units over the ${BUDGET}-unit budget, split this slide`)); inner.append(w); }
  const body = el("div", "slide__body"); s.blocks.forEach(b => body.append(renderBlock(b))); inner.append(body);
  const cap = el("div", "capture no-print");
  const fl = el("label", "capture__field"); fl.append(el("span", null, "Flag"));
  const sel = el("select"); sel.dataset.flag = s.id;
  [["none", "none"], ["question", "question"], ["objection", "objection"]].forEach(([v, t]) => { const o = el("option", null, t); o.value = v; sel.append(o); });
  fl.append(sel);
  const nl = el("label", "capture__field"); nl.append(el("span", null, "Note"));
  const ta = el("textarea"); ta.dataset.note = s.id; ta.rows = 2; ta.placeholder = "Reader note for this slide"; nl.append(ta);
  cap.append(fl, nl); inner.append(cap);
  const aside = el("aside", "speaker", s.speaker); aside.setAttribute("aria-label", `Speaker aside ${i + 1}`); inner.append(aside);
  sec.append(inner);
  return sec;
};
state.slides.forEach((s, i) => stage.append(renderSlide(s, i)));
const slides = [...stage.querySelectorAll(".slide")];

// --- position: IntersectionObserver drives counter, progress hairline, and hash
const counter = $("#counter"), progress = $("#progress");
let index = 0;
const paintPos = () => {
  counter.textContent = `${index + 1} / ${slides.length}`;
  progress.style.inlineSize = ((index + 1) / slides.length * 100) + "%";
};
const spy = new IntersectionObserver(entries => {
  entries.forEach(en => {
    if (!en.isIntersecting) return;
    index = slides.indexOf(en.target);
    try { history.replaceState(null, "", "#" + (index + 1)); } catch { /* file:// best-effort */ }
    paintPos();
  });
}, { threshold: 0.6 });
slides.forEach(s => spy.observe(s));
const show = next => { const t = Math.max(0, Math.min(slides.length - 1, next)); slides[t].scrollIntoView({ behavior: "smooth" }); };
const fromHash = () => { const n = parseInt(location.hash.slice(1), 10); if (n >= 1 && n <= slides.length) slides[n - 1].scrollIntoView(); };
fromHash(); paintPos();

// --- capture, annotations, export meta
const flagged = () => state.slides.filter(s => { const c = state.captures[s.id]; return c.flag !== "none" || c.note.trim(); });
const annotations = () => flagged().map(s => { const c = state.captures[s.id]; return { id: "a-" + s.id, itemId: s.id, intent: c.flag === "none" ? "comment" : c.flag, status: c.exported ? "exported" : "active", text: c.note.trim() }; });
const meta = $("#egress-meta");
const flaggedBtn = $('[data-export="flagged"]');
const refreshMeta = () => { const f = flagged().length; meta.textContent = `${f} flagged, ${state.copies} copied`; flaggedBtn.disabled = f === 0; };
refreshMeta();

// --- dual export from one state graph
const kindTag = k => "[" + k.toUpperCase() + "]";
const toEnvelope = () => ({
  kind: "deck", version: 1,
  artifact: { id: "deck." + themeKey.slice(6), title: state.meta.title, baseline: "b-" + state.slides.length },
  decision: { status: flagged().length ? "approve_with_notes" : "comment", at: new Date().toISOString() },
  decisions: [], changes: [], annotations: annotations(),
  state: { outline: state.slides.map((s, i) => ({ id: s.id, kind: s.kind, title: s.title, order: i + 1, weight: s.weight, over: s.over })) },
});
const validate = env => env.kind === "deck" && !!env.artifact?.id && Array.isArray(env.annotations) && typeof env.decision?.at === "string";
const toMarkdown = () => {
  const L = [`# Deck: ${state.meta.title}`, "", `Owner: ${state.meta.owner}, ${state.meta.date}, ${state.slides.length} slides`, "", "## Outline", ""];
  state.slides.forEach((s, i) => L.push(`${i + 1}. ${kindTag(s.kind)} ${s.title}${s.over ? ` (dense ${s.weight}/${BUDGET})` : ""}`));
  L.push("", "## Flagged slides", "");
  const f = flagged();
  if (!f.length) L.push("None flagged.");
  else f.forEach(s => { const c = state.captures[s.id]; L.push(`- [${(c.flag === "none" ? "note" : c.flag).toUpperCase()}] ${s.title} (${s.id}): ${c.note.trim() || "(no note)"}`); });
  return L.join("\n");
};

// --- egress: one clipboard recipe, download, send-to-agent
const download = (name, mime, text) => { const url = URL.createObjectURL(new Blob([text], { type: mime })); Object.assign(document.createElement("a"), { href: url, download: name }).click(); setTimeout(() => URL.revokeObjectURL(url), 1000); };
const toast = $("#toast"); let toastTimer;
const flash = msg => { if (!toast.showPopover) return; toast.textContent = msg; try { toast.showPopover(); } catch { /* open */ } clearTimeout(toastTimer); toastTimer = setTimeout(() => { try { toast.hidePopover(); } catch { /* hidden */ } }, 1600); };
const markExported = () => { flagged().forEach(s => { state.captures[s.id].exported = true; }); };
const copyText = async text => {
  try { await navigator.clipboard.writeText(text); return true; }
  catch {
    const t = Object.assign(document.createElement("textarea"), { value: text, style: "position:fixed;left:-9999px" });
    document.body.append(t); t.select(); const ok = document.execCommand("copy"); t.remove(); return ok;
  }
};
const sendToAgent = async env => {
  const res = await fetch(returnMeta.content, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(env) });
  if (!res.ok) throw new Error("submit " + res.status);
  return res.json();
};
if (returnMeta) $('[data-export="send"]').hidden = false;
const egress = $("#egress");
const doExport = async which => {
  const env = toEnvelope();
  if (!validate(env)) { egress.value = "[BLOCKED] envelope failed validation"; flash("Export blocked"); return; }
  if (which === "send") {
    const b = $('[data-export="send"]'); b.disabled = true;
    try { await sendToAgent(env); markExported(); refreshMeta(); flash("Sent to agent"); }
    catch { egress.value = JSON.stringify(env, null, 2); await copyText(egress.value); flash("Send failed — envelope copied instead"); }
    finally { b.disabled = false; }
    return;
  }
  if (which === "json") { const text = JSON.stringify(env, null, 2); egress.value = text; download("deck-" + themeKey.slice(6) + ".json", "application/json", text); markExported(); refreshMeta(); flash("Downloaded JSON"); return; }
  if (which === "flagged") { const anns = env.annotations; if (!anns.length) { flash("Nothing flagged"); return; } const text = JSON.stringify({ ...env, state: { flagged: anns } }, null, 2); egress.value = text; if (await copyText(text)) { state.copies++; markExported(); refreshMeta(); flash("Copied"); } return; }
  egress.value = toMarkdown();
  if (await copyText(egress.value)) { state.copies++; markExported(); refreshMeta(); flash("Copied"); }
};

// --- one listener per concern
document.addEventListener("click", e => {
  const nav = e.target.closest("[data-nav]"); if (nav) { show(index + Number(nav.dataset.nav)); return; }
  const notes = e.target.closest("[data-toggle-notes]"); if (notes) { const on = document.body.dataset.mode === "present"; document.body.dataset.mode = on ? "notes" : "present"; notes.setAttribute("aria-pressed", String(on)); return; }
  const theme = e.target.closest("[data-toggle-theme]"); if (theme) { const dark = root.dataset.theme ? root.dataset.theme === "dark" : !matchMedia("(prefers-color-scheme: light)").matches; const next = dark ? "light" : "dark"; try { localStorage.setItem(themeKey, root.dataset.theme = next); } catch { root.dataset.theme = next; } return; }
  const exp = e.target.closest("[data-export]"); if (exp && !exp.disabled) doExport(exp.dataset.export);
});
document.addEventListener("keydown", e => {
  if (e.target.matches("input,textarea,select")) return;
  if (e.key === "n") { $("[data-toggle-notes]").click(); return; }
  const step = { ArrowRight: 1, ArrowDown: 1, " ": 1, j: 1, PageDown: 1, ArrowLeft: -1, ArrowUp: -1, k: -1, PageUp: -1 }[e.key];
  if (!step) return;
  e.preventDefault(); show(index + step);
});
const captureInput = e => {
  const fl = e.target.closest("[data-flag]"); if (fl) { state.captures[fl.dataset.flag].flag = fl.value; state.captures[fl.dataset.flag].exported = false; refreshMeta(); return; }
  const nt = e.target.closest("[data-note]"); if (nt) { state.captures[nt.dataset.note].note = nt.value; state.captures[nt.dataset.note].exported = false; refreshMeta(); }
};
document.addEventListener("input", captureInput);
document.addEventListener("change", captureInput);
</script>
