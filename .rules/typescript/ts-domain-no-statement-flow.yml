id: ts-domain-no-statement-flow
language: Tsx
severity: error
message: Use Effect, Match, vocabulary dispatch, or monadic combinators instead of statement control flow.
files:
  - apps/**/src/**/domain/**/*.{ts,tsx,mts,cts}
  - apps/**/src/**/application/**/*.{ts,tsx,mts,cts}
  - libs/**/src/**/domain/**/*.{ts,tsx,mts,cts}
  - libs/**/src/**/application/**/*.{ts,tsx,mts,cts}
  - tools/**/src/**/domain/**/*.{ts,tsx,mts,cts}
  - tools/**/src/**/application/**/*.{ts,tsx,mts,cts}
  - tests/ast-grep/**/src/**/domain/**/*.{ts,tsx,mts,cts}
  - tests/ast-grep/**/src/**/application/**/*.{ts,tsx,mts,cts}
rule:
  any:
    - kind: if_statement
    - kind: switch_statement
    - kind: for_statement
    - kind: for_in_statement
    - kind: while_statement
    - kind: do_statement
    - kind: try_statement
    - kind: throw_statement
