language: en-US
tone_instructions: "Adversarial senior reviewer: presume defects until the pass finds none; never ratify prose or praise. Findings name file, anchor, defect, and the demanded stronger form. Grade the full severity scale; uniform severity is ungraded."
early_access: false
enable_free_tier: true
inheritance: false
reviews:
    profile: assertive
    request_changes_workflow: true
    high_level_summary: true
    high_level_summary_instructions: >-
        One dense paragraph leading with contract-surface and behavior deltas: which owners changed shape, which strata or seams the diff crosses, what a consumer must now do differently. No restated diff statistics, no methodology narration, no praise.
    high_level_summary_placeholder: "@coderabbitai summary"
    high_level_summary_in_walkthrough: false
    auto_title_placeholder: "@coderabbitai"
    review_status: true
    review_details: true
    commit_status: true
    fail_commit_status: true
    collapse_walkthrough: true
    changed_files_summary: true
    sequence_diagrams: true
    estimate_code_review_effort: true
    assess_linked_issues: true
    related_issues: true
    related_prs: true
    suggested_labels: false
    auto_apply_labels: false
    suggested_reviewers: false
    auto_assign_reviewers: false
    in_progress_fortune: false
    poem: false
    enable_prompt_for_ai_agents: true
    abort_on_close: true
    disable_cache: false
    slop_detection:
        enabled: true
    path_filters:
        - "!**/pnpm-lock.yaml"
        - "!**/uv.lock"
        - "!**/packages.lock.json"
        - "!**/goldens/**"
        - "!**/*.verified.*"
        - "!**/*.har"
    path_instructions:
        - path: "**"
          instructions: >-
            Presume defects until the pass finds none; dense, confident code is the prime suspect, and every claim is verified against the real domain, never ratified from prose, naming, or comment assertions. A reviewer reports and demands, never edits: every finding names the file, the anchor, the defect, and the stronger form demanded — precise enough that a fixer agent lands it without re-derivation. The reviewable surface is a design corpus — markdown pages whose embedded code fences are the product — plus workflow and tooling JavaScript and configuration; judge fence code as production source at full depth. The docs/stacks language doctrine is the floor, never the ceiling: a conformant-but-weak form is a finding when a stronger form exists. Attack entry-point sprawl: parallel entry points, modality-named siblings, and get/getMany/getById families are defects — demand one polymorphic entry per rail discriminating on input shape, with forward and inverse of one correspondence on one owner. Apply downstream-usage pressure by imagining every consumer: a parameter a policy value or input shape reconstructs is knob spam; configuration ceremony pushed onto callers and orchestration a consumer must hand-write are defects — demand internalized lifecycle, routing, and policy with zero capability sacrifice. Judge composition idiomatically: an interface earns its existence through dispatch or substitution, and generated or source-gen surfaces run at intended power — decorative abstraction is a finding. Flag long imperative bodies wherever a denser expression-shaped form exists — fold, combinator, table-driven, or generator forms over hand-rolled loops and branching — and demand surfaces and object types collapse into fewer, denser, richer owners. Grade across the full severity scale: a review where every finding lands at one severity has averaged, not graded. Cross-surface coupling is review duty: docs/laws/topology.md maps which surfaces obligate which counterparts — a diff editing a listed SURFACE without its obligated counterparts in the same change is a finding naming the missing counterpart. Settled corpus law outranks reviewer intuition: before flagging a shape the owning page rules — a factory contract, a composition form, a seam placement, a diagram template's exclusions — read that page and verify the claim against its stated contract; a finding re-litigating a ruled design is a false positive, not caution. A typed field's admission evidence is settled at its boundary: demanding re-validation of what the type already carries is the defect, never the finding. An artifact claiming content-keyed identity covers every output-affecting input in its preimage; egress orders deterministically, and resources close on every exit path. Suggest at root-cause depth: when a finding admits a literal patch and a deeper collapse, demand the collapse. Proven classes worth hunting: required-field threading dropped by signature migrations, finiteness admission before range checks, identity preimages omitting output-affecting inputs, match/dispatch totality, frozen-payload discipline — mutable defaults, unsorted iteration reaching egress — per-stream timestamp re-basing, resource custody, archive and metadata bomb gates, deterministic egress ordering.
        - path: "{docs/**,CLAUDE.md,AGENTS.md,.greptile/**,.coderabbit.yaml}"
          instructions: >-
            Doctrine-surface diffs are judged against the docs/laws/README.md admission law. Flag the miss as hard as the spam: an addition without recurrence evidence or branch-spanning blast radius, and equally the neighboring clause that owed the collapse and was left untouched.
        - path: "libs/**"
          instructions: >-
            libs/.planning/campaign-method.md is the review standard for design-corpus work and libs/.planning/README.md owns the page grammar — judge against them, never generic documentation convention. The fence is the work product and the measure of a planning item is the diff to a fence: presume an external member is a phantom until the folder's .api/ catalogue verifies its spelling, public accessibility, and deprecation status — and verify a claimed ABSENCE at the same bar, because a false no-such-member claim steers every rebuild into the inferior spelling; sweep compiler-fatal shapes mechanically across a folder's sibling pages — every callee resolves to a declaration on the page or a cited sibling anchor, every INDEX row resolves to a same-page section, and these fictions survive fluent prose: a ref struct captured by a lambda or riding a generic carrier, an undeclared identifier, a value returned from a void member, a type name written as an invocation, a generated-owner row whose positional argument count drifts from its declared constructor arity, a railed factory result bound into a bare-typed slot with no flatten, a payload passed outside the factory's declared admitted union, a derivation from a registry row that does not exist. Declared capability is consumed capability: a capability noun with no anchoring fence member, a receipt nothing mints, or a policy row nothing consumes is decorative density — demand the consuming member or the deletion, and a policy column consumed only by a cache key, receipt, or log annotates rather than governs — demand the governing arm; an arm that cannot honor a policy field refuses the combination loudly before provider work — silent weakening is the finding. A fence member whose body is a placeholder comment is an illusory implementation — reject it before deeper review, because the surrounding prose asserts capability no route materializes; a resource-release claim in prose or comments binds to a visible call in the shown body. Prose signatures byte-match their fence declarations: an Entry/Auto row whose parameter list, rail, or return drifts from the fence is a wrong contract, and a fence signature edit ripples its prose rows in the same diff. In a closed dispatch family folding one shared request shape, every column is consumed or loudly refused by every arm — an axis some arms read and others silently ignore converts an unrepresentable check into a silent pass, and a safety guarantee a shared rail claims is consumed structurally by the rail body from the case's data row, never buried in a per-case delegate. A closed union whose every case carries one identically-typed field re-projected by a total switch is operand restatement — the shared value moves to the entrypoint argument. Attack fold accumulators: a seed starting completeness flags true fabricates a receipt over an empty input set, and a name-keyed bag write-back silently drops all but one entry under a repeated key — set-valued findings emit as one typed list value; a subset test over a requirement row reads an empty requirement as vacuously satisfied, inverting a disabled row into always-enabled — demand the empty-row short-circuit.
        - path: "libs/python/**"
          instructions: >-
            The corpus floor is py3.15 — never flag its surface as invalid: `from builtins import frozendict` is the legislated table spelling and `lazy import`/`lazy from` are module-scope soft keywords. Match semantics: `tuple()` is a class pattern matching any tuple instance and only the literal `()` matches the empty tuple — a claim built on the opposite reading is wrong. Admission happens once: a typed int field carries no non-finite value so an isfinite demand adds nothing, and a typed frozen struct field needs no arity re-check — either demand violates BOUNDARY_ADMISSION. Verify against the owning page before flagging a settled contract: raw-token admission lives at the parse seam per TABLE_DISPATCH, never inside a typed-enum total dispatch; a consumer declaring its per-offload budget through Kernel.of(deadline=, enforcement=) is the workers fabric contract; a sync rail selecting an async step through default_with with a single await is the ruled rails-and-effects composition form, never a nested rail.
        - path: "**/{*.csproj,*.props,*.targets,package.json,pyproject.toml,global.json}"
          instructions: >-
            Package versions live only in the central manifests, hand-edited. Version movement is forward-only — a downgrade or stale floor without a recorded reason in the diff is a finding; a sanctioned pin carries an inline comment stating exactly what breaks without it, and a pin missing that mechanism comment is a finding while a pin carrying one is never flagged. A project reference breaching the strata edges the root README.md and libs/.planning/architecture.md declare is a strata defect.
        - path: "tests/**"
          instructions: >-
            Test law is tests/README.md — judge against it. A test falsifies production behavior with an independent oracle: existence tests, mirror tests asserting a constructed value's own fields, and specs proving only that their own doubles were called are findings; a refuting witness that survives, or sits trivially outside the domain, exposes a tautology.
        - path: "{tools/**,.claude/workflows/**}"
          instructions: >-
            Operator and workflow code is deterministic orchestration judged as production source: schema-typed agent outputs, bounded loops, every stage writing its product to disk and returning a path receipt. Bare promises without await ownership, unbounded polling, wall-clock branching, subagents instructed to wait, and hand-authored exit semantics beside a typed envelope contract are findings.
        - path: "**/*.md"
          instructions: >-
            Prose law is docs/standards/style-guide.md, formatting.md, and information-structure.md — findings cite the named defect class and the line. The regeneration test governs: a fact a fresh agent regenerates from disk plus stated invariants is a mirror demanding deletion. The planning corpus's closed markers — [QUEUED]/[ACTIVE]/[BLOCKED] task status and marked RESEARCH items — are that standard's vocabulary, never hedge or process-ledger findings. Mermaid fences answer the diagram template law, never completeness intuition: a strata node earns its place only when a sourcing decision names the member, same-stratum mutual reads ride prose and never edges, a seam graph resolves interior owners home-side only, and an edge-free island rides prose by construction — a finding demanding an excluded node, a same-stratum rung, or an island's edge re-litigates the template.
        - path: ".claude/skills/**"
          instructions: >-
            Skill bundles are judged under the skill-writer craft law: third-person trigger descriptions without keyword stuffing, SKILL.md a lean router with reference banks one hop down, and no body rule whose deletion changes no agent output.
    auto_review:
        enabled: true
        auto_incremental_review: true
        auto_pause_after_reviewed_commits: 0
        drafts: true
