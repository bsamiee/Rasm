# Mutmut-only coverage config. Selected via `COVERAGE_RCFILE=.config/coverage-mutmut.ini` on the
# mutmut invocation ONLY; the main suite + the 98% gate keep `relative_files = true` in pyproject's
# [tool.coverage.run] and are untouched.
#
# Why this file exists: mutmut's coverage-to-mutant map (`mutmut/code_coverage.py:gather_coverage`)
# keys covered lines by the ABSOLUTE mutant path `str((Path("mutants") / filename).absolute())`
# and then reads them back with `CoverageData.lines(abs_filename)`. Under the project default
# `relative_files = true`, coverage stores RELATIVE keys, so `data.lines(abs)` returns `None`,
# every covered-line set collapses to empty, and `mutate_only_covered_lines = true` produces the
# "no covered mutants" abort before any mutant runs. Forcing `relative_files = false` here restores
# absolute keys so the lookup matches. (Reproduced live on coverage 7.14.x: a CoverageData holding
# the relative key `tools/assay/x.py` yields `lines(abspath)=None`, `lines(rel)=[1,2,3]`.)
# INI format (NOT TOML): `source` is a newline/whitespace-separated plain value, never a
# JSON/TOML list. `data_file` routes the gather's `.coverage` away from the repo root into the
# centralized `.cache/coverage` home (the main suite owns `.cache/coverage/.coverage`; this lane
# owns the distinct `.mutmut.coverage` sibling so the two never collide).
[run]
relative_files = false
branch = true
core = sysmon
data_file = .cache/coverage/.mutmut.coverage
source =
    tools/assay
