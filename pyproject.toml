    "lark",                                    # [GEOMETRY]: IDS and selector parsing grammar
    "loky",                                    # [RUNTIME]: warm reusable crash-respawning process pool for the worker fabric
    "lxml",                                    # [ARTIFACTS]: XML processing
    "msgspec",
    "opentelemetry-api",
    "opentelemetry-exporter-otlp-proto-grpc",  # [RUNTIME]: daemon-selectable OTLP gRPC egress row beside the proto-http default
    "opentelemetry-exporter-otlp-proto-http",
