<body>
<a class="skip" href="#board">Skip to the board</a>
<div class="wrap">
  <header class="masthead">
    <div class="top">
      <!-- replace: eyebrow scope line -->
      <span class="eyebrow">Editor &middot; board</span>
      <div class="rowline no-print">
        <span class="chip info" id="state-chip">[CLEAN]</span>
        <!-- replace: date slot -->
        <small id="date-slot" class="mono">2026-07-06</small>
        <button type="button" class="btn ghost" data-toggle-theme aria-label="Toggle color theme">Theme</button>
      </div>
    </div>
    <h1 id="doc-title">&hellip;</h1>
    <p class="deck" id="doc-deck"></p>
  </header>

  <div class="toolbar no-print" aria-label="Board tools">
    <span class="rowline" id="tagbar" aria-label="Tag filters"></span>
    <button type="button" class="btn ghost" data-reset>Reset</button>
    <output class="counts" id="counts" aria-live="polite"></output>
  </div>

  <main id="board" tabindex="-1"><div class="board" id="board-body"></div></main>

  <section class="moves card" id="moves" aria-label="Moves against baseline"></section>

  <div class="egress-wrap no-print">
    <output class="export-status" id="egress-status" aria-live="polite"></output>
    <textarea id="egress" readonly aria-label="Exported payload mirror"></textarea>
  </div>
</div>

<footer class="export-bar no-print" aria-label="Export bar">
  <button type="button" class="btn primary" data-export="send" hidden>Send to agent</button>
  <button type="button" class="btn" data-export="md">Copy board markdown</button>
  <button type="button" class="btn" data-export="json">Download full JSON</button>
  <button type="button" class="btn ghost" data-export="changed" id="btn-changed" disabled>Copy changed-only</button>
</footer>
<output id="toast" popover="manual" aria-live="polite"></output>
<div id="drop-marker" hidden></div>

<!-- replace: board payload — meta, columns (id, title, edge?), tags, cards (id, title, tag, estimate, owner, col) -->
<script type="application/json" id="payload">{
  "meta": { "title": "Triage Board: Cycle 14", "deck": "Open tickets pre-sorted into a best guess; drag across Now / Next / Later / Cut until the cut feels right, then send the result back.", "date": "2026-07-06" },
  "artifactId": "editor.triage-cycle-14",
  "modality": "board",
  "columns": [
    { "id": "now", "title": "Now", "edge": "accent" },
    { "id": "next", "title": "Next", "edge": "info" },
    { "id": "later", "title": "Later", "edge": "warn" },
    { "id": "cut", "title": "Cut", "edge": "fail" }
  ],
  "tags": ["bug", "feat", "debt", "chore"],
  "cards": [
    { "id": "t-241", "title": "Fix sync conflict toast firing twice on reconnect", "tag": "bug", "estimate": 2, "owner": "ak", "col": "now" },
    { "id": "t-238", "title": "Comments lost when editing offline then reloading", "tag": "bug", "estimate": 3, "owner": "jm", "col": "now" },
    { "id": "t-219", "title": "Migrate workspace permissions to the new ACL table", "tag": "debt", "estimate": 5, "owner": "ak", "col": "now" },
    { "id": "t-244", "title": "Inline mention picker in doc comments", "tag": "feat", "estimate": 3, "owner": "jm", "col": "next" },
    { "id": "t-231", "title": "Bulk-archive completed projects from the sidebar", "tag": "feat", "estimate": 2, "owner": "el", "col": "next" },
    { "id": "t-236", "title": "Empty-state illustrations for new workspaces", "tag": "chore", "estimate": 1, "owner": "el", "col": "next" },
    { "id": "t-213", "title": "Dark mode pass on settings and billing pages", "tag": "chore", "estimate": 2, "owner": "el", "col": "later" },
    { "id": "t-221", "title": "Replace legacy date handling across web", "tag": "debt", "estimate": 4, "owner": "tn", "col": "later" },
    { "id": "t-263", "title": "Drag-to-reorder columns on the board view", "tag": "feat", "estimate": 3, "owner": "jm", "col": "later" },
    { "id": "t-198", "title": "Custom emoji reactions on comments", "tag": "feat", "estimate": 2, "owner": "el", "col": "cut" },
    { "id": "t-204", "title": "Native desktop wrapper", "tag": "feat", "estimate": 8, "owner": "tn", "col": "cut" }
  ]
}</script>
<script>
(() => {
"use strict";
const $ = (s, r = document) => r.querySelector(s);
const el = (tag, attrs, ...kids) => {
  const n = document.createElement(tag);
  if (attrs) for (const k in attrs) { const v = attrs[k];
    if (v == null || v === false) continue;
    if (k === "text") n.textContent = v; else if (v === true) n.setAttribute(k, ""); else n.setAttribute(k, v); }
  for (const kid of kids) { if (kid == null || kid === false) continue; n.append(kid.nodeType ? kid : document.createTextNode(String(kid))); }
  return n;
};
const themeKey = "theme:" + document.title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
const root = document.documentElement;
const storedTheme = (() => { try { return localStorage.getItem(themeKey); } catch { return null; } })();
if (storedTheme) root.dataset.theme = storedTheme;
document.addEventListener("click", e => {
  if (!e.target.closest("[data-toggle-theme]")) return;
  const dark = root.dataset.theme ? root.dataset.theme === "dark" : !matchMedia("(prefers-color-scheme: light)").matches;
  const next = dark ? "light" : "dark";
  try { localStorage.setItem(themeKey, root.dataset.theme = next); } catch { root.dataset.theme = next; }
});

const model = JSON.parse($("#payload").textContent);
const state = { cards: structuredClone(model.cards), activeTags: new Set() };
const baseline = structuredClone(state.cards);
const baseCol = Object.fromEntries(baseline.map(c => [c.id, c.col]));
const digest = s => { let h = 5381; for (let i = 0; i < s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) >>> 0; return "b-" + h.toString(36); };
const BASELINE_ID = digest(JSON.stringify(baseline));
const TAG_CHIP = { bug: "fail", feat: "info", debt: "warn", chore: "ok" };

const changes = () => state.cards.filter(c => c.col !== baseCol[c.id]).map(c => ({ itemId: c.id, path: "/cards/" + c.id + "/col", from: baseCol[c.id], to: c.col }));
const colCards = colId => state.cards.filter(c => c.col === colId);
const dimmed = c => state.activeTags.size > 0 && !state.activeTags.has(c.tag);

function cardNode(c) {
  return el("article", { class: "card tcard" + (dimmed(c) ? " dim" : ""), draggable: "true", "data-id": c.id, "aria-label": c.title },
    el("div", { class: "meta" },
      el("span", { class: "mid", text: c.id.toUpperCase() }),
      el("span", { class: "chip " + (TAG_CHIP[c.tag] || "info"), text: "[" + c.tag.toUpperCase() + "]" }),
      el("span", { class: "mid right", text: c.estimate + "pt" })),
    el("h4", { text: c.title }),
    el("small", { class: "mono", text: "owner " + c.owner }));
}

function render() {
  $("#doc-title").textContent = model.meta.title;
  $("#doc-deck").textContent = model.meta.deck || "";
  $("#date-slot").textContent = model.meta.date;
  $("#board-body").replaceChildren(...model.columns.map(col => {
    const cards = colCards(col.id);
    const pts = cards.reduce((s, c) => s + (c.estimate || 0), 0);
    const sec = el("section", { class: "col", "data-bucket": col.id, "aria-label": col.title + " column", style: "--col-edge:var(--" + (col.edge || "line-strong") + ")" },
      el("header", {}, el("h3", { text: col.title }), el("span", { class: "chip", text: String(cards.length) })),
      ...cards.map(cardNode),
      el("footer", {}, el("span", { text: cards.length + " cards" }), el("span", { class: "num", text: pts + " pts" })));
    return sec;
  }));
  $("#tagbar").replaceChildren(...model.tags.map(t =>
    el("button", { type: "button", class: "btn tagbtn", "data-tag": t, "aria-pressed": String(state.activeTags.has(t)) }, t)));
  const moved = changes();
  const chip = $("#state-chip");
  chip.className = "chip " + (moved.length ? "info" : "ok");
  chip.textContent = moved.length ? "[EDITED " + moved.length + "]" : "[CLEAN]";
  const shown = state.cards.filter(c => !dimmed(c)).length;
  $("#counts").textContent = shown + " of " + state.cards.length + " lit · " + moved.length + " moved";
  const mv = $("#moves");
  if (moved.length) {
    const ul = el("ul");
    moved.forEach(m => { const c = state.cards.find(x => x.id === m.itemId); ul.append(el("li", {}, el("span", { class: "chip info", text: "[MOVED]" }), " " + c.title + " — " + m.from + " → " + m.to)); });
    mv.replaceChildren(el("strong", { text: "Moves against baseline (" + moved.length + ")" }), ul);
    mv.hidden = false;
  } else { mv.replaceChildren(el("span", { class: "muted", text: "No moves against baseline " + BASELINE_ID + "." })); }
  $("#btn-changed").disabled = !moved.length;
}

// --- drag with midpoint drop marker; the model is the source, DOM never reads back ---
let dragId = null;
const marker = $("#drop-marker");
document.addEventListener("dragstart", e => {
  const c = e.target.closest(".tcard"); if (!c) return;
  dragId = c.dataset.id; c.classList.add("dragging");
  e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", dragId);
});
document.addEventListener("dragover", e => {
  const b = e.target.closest("[data-bucket]"); if (!b || dragId == null) return;
  e.preventDefault(); b.dataset.over = "";
  marker.hidden = false;
  const rows = [...b.querySelectorAll(".tcard:not(.dragging)")];
  const before = rows.find(r => e.clientY < r.getBoundingClientRect().top + r.offsetHeight / 2);
  (before ?? b.querySelector("footer")).insertAdjacentElement("beforebegin", marker);
});
document.addEventListener("dragleave", e => { const b = e.target.closest("[data-bucket]"); if (b && !b.contains(e.relatedTarget)) delete b.dataset.over; });
document.addEventListener("drop", e => {
  const b = e.target.closest("[data-bucket]"); if (!b || dragId == null) return;
  e.preventDefault(); delete b.dataset.over;
  const card = state.cards.find(c => c.id === dragId); if (!card) return;
  const siblings = [...b.querySelectorAll(".tcard:not(.dragging)")];
  const markerIdx = marker.parentElement === b ? siblings.filter(r => r.compareDocumentPosition(marker) & Node.DOCUMENT_POSITION_FOLLOWING).length : siblings.length;
  const from = state.cards.indexOf(card);
  state.cards.splice(from, 1);
  const inCol = state.cards.filter(c => c.col === b.dataset.bucket);
  const anchor = inCol[markerIdx];
  card.col = b.dataset.bucket;
  const at = anchor ? state.cards.indexOf(anchor) : state.cards.length;
  state.cards.splice(at, 0, card);
  render(); flash("moved to " + b.dataset.bucket);
});
document.addEventListener("dragend", () => { dragId = null; marker.hidden = true; marker.remove(); document.body.append(marker); document.querySelectorAll(".tcard.dragging").forEach(c => c.classList.remove("dragging")); });

document.addEventListener("click", e => {
  const t = e.target.closest("[data-tag]");
  if (t) { const tag = t.dataset.tag; state.activeTags.has(tag) ? state.activeTags.delete(tag) : state.activeTags.add(tag); render(); return; }
  if (e.target.closest("[data-reset]")) { state.cards = structuredClone(baseline); state.activeTags.clear(); render(); flash("reset to baseline"); }
});

// --- egress ---
let toastTimer;
const flash = msg => { const t = $("#toast"); t.textContent = msg; try { t.showPopover(); } catch {} clearTimeout(toastTimer); toastTimer = setTimeout(() => { try { t.hidePopover(); } catch {} }, 1600); };
const isoNow = () => new Date().toISOString().replace(/\.\d+Z$/, "Z");
const envelope = changedOnly => ({
  kind: "editor", version: 1,
  artifact: { id: model.artifactId, title: model.meta.title, baseline: BASELINE_ID },
  decision: { status: "edit", at: isoNow() },
  decisions: [], changes: changes(), annotations: [],
  state: changedOnly ? {} : { modality: model.modality, columns: model.columns, cards: state.cards }
});
const toMarkdown = () => {
  const L = ["# " + model.meta.title, "", "_" + changes().length + " moves vs baseline " + BASELINE_ID + "._"];
  model.columns.forEach(col => {
    const cards = colCards(col.id);
    const pts = cards.reduce((s, c) => s + (c.estimate || 0), 0);
    L.push("", "## " + col.title + " (" + cards.length + " · " + pts + " pts)");
    cards.forEach(c => L.push("- " + c.id.toUpperCase() + " [" + c.tag + ", " + c.estimate + "pt, " + c.owner + "] " + c.title));
  });
  return L.join("\n") + "\n";
};
const download = (name, mime, text) => {
  const url = URL.createObjectURL(new Blob([text], { type: mime }));
  Object.assign(document.createElement("a"), { href: url, download: name }).click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
};
const copyText = async text => {
  try { await navigator.clipboard.writeText(text); flash("copied"); }
  catch {
    const t = Object.assign(document.createElement("textarea"), { value: text, style: "position:fixed;left:-9999px" });
    document.body.append(t); t.select(); const ok = document.execCommand("copy"); t.remove();
    flash(ok ? "copied" : "clipboard blocked — copy from the mirror");
  }
};
const returnMeta = document.querySelector('meta[name="artifact-return"]');
const tokenMeta = document.querySelector('meta[name="artifact-token"]');
if (returnMeta) $('[data-export="send"]').hidden = false;
const sendToAgent = async env => {
  const res = await fetch(returnMeta.content, { method: "POST", headers: { "Content-Type": "application/json", "X-Artifact-Token": tokenMeta?.content ?? "" }, body: JSON.stringify({ kind: env.kind, artifact: env.artifact.id, version: env.version, data: env }) });
  if (!res.ok) throw new Error("submit " + res.status);
  return res.json();
};
document.addEventListener("click", async e => {
  const b = e.target.closest("[data-export]"); if (!b || b.disabled) return;
  const kind = b.dataset.export;
  const env = envelope(kind === "changed");
  if (kind === "changed" && !env.changes.length) { $("#egress-status").textContent = "changed-only export is empty — blocked"; return; }
  const eg = $("#egress");
  if (kind === "md") { eg.value = toMarkdown(); $("#egress-status").textContent = "board markdown"; await copyText(eg.value); return; }
  if (kind === "json") { const t = JSON.stringify(env, null, 2); eg.value = t; download("board-state.json", "application/json", t); $("#egress-status").textContent = "full state downloaded"; return; }
  if (kind === "send") {
    b.disabled = true;
    try { await sendToAgent(env); b.textContent = "Sent"; $("#egress-status").textContent = "sent to agent (" + env.changes.length + " moves)"; flash("sent to agent"); }
    catch { const t = JSON.stringify(env, null, 2); eg.value = t; await copyText(t); b.textContent = "Send failed — copied instead"; $("#egress-status").textContent = "send failed — envelope copied instead"; }
    finally { b.disabled = false; }
    return;
  }
  const t = JSON.stringify(env, null, 2); eg.value = t; $("#egress-status").textContent = "changed-only envelope"; await copyText(t);
});
render();
})();
</script>
</body>
</html>
