  const out = [];
  model.criteria.forEach(c => { const b = baseModel.criteria.find(x => x.id === c.id); if (num(c.weight) !== num(b.weight)) out.push({ itemId: c.id, path: "/criteria/" + c.id + "/weight", from: b.weight, to: num(c.weight) }); });
  model.options.forEach(o => { const bo = baseModel.options.find(x => x.id === o.id);
    model.criteria.forEach(c => { const cur = cellOf(o, c.id), bc = bo.cells[c.id] || { score: 0, rationale: "" };
      if (num(cur.score) !== num(bc.score)) out.push({ itemId: o.id + "/" + c.id, path: "/options/" + o.id + "/cells/" + c.id + "/score", from: bc.score, to: num(cur.score) });
      if ((cur.rationale || "") !== (bc.rationale || "")) out.push({ itemId: o.id + "/" + c.id, path: "/options/" + o.id + "/cells/" + c.id + "/rationale", from: bc.rationale || "", to: cur.rationale || "" });
    }); });
  return out;
}
const isChanged = () => changesOut().length || decisionsOut().length || annotations().length || state.global.status || state.global.choice || state.global.note;

const verdictSelect = (id, onlyThree, current) => {
  const opts = onlyThree ? ["", "approve", "reject", "defer"] : ["", ...VOCAB];
  const sel = el("select", { class: "verdict", "aria-label": "Verdict for " + id, "data-verdict-for": id });
  opts.forEach(v => sel.append(el("option", { value: v, ...(current === v ? { selected: true } : {}) }, v || "—")));
  return sel;
};

function render() {
  $("#doc-title").textContent = model.meta.title;
  $("#doc-sub").textContent = "Weights and scores are editable; totals, winner, and sensitivity recompute live.";
  $("#doc-date").textContent = model.meta.date;

  $("#legend").replaceChildren(...model.criteria.map(c => el("span", { class: "chip " + (c.disqualifier ? "fail" : "info") },
    c.name + " · w" + weight(c) + (c.disqualifier ? " · DISQUALIFIER" : ""))));

  const ts = totals(), win = winnerOf(ts), sens = sensitivity();
  const ro = $("#readout");
  ro.replaceChildren(
    el("div", {}, el("small", { text: "Winner (weighted, disqualifiers excluded): " }),
      win ? el("b", {}, win.name + " — " + win.total.toFixed(1)) : el("b", { text: "none — all options disqualified" })),
    el("div", {}, el("small", { text: "Sensitivity — smallest single change that unseats the winner: " }),
      sens ? el("b", {}, sens.delta.toFixed(2) + " — " + sens.desc) : el("b", { text: "not defined (fewer than two qualified options)" })),
    el("small", { class: "muted", text: "A zero on a disqualifier criterion renders the option DISQUALIFIED and excludes it from winning." }));

  const head = $("#matrix-head");
  head.replaceChildren(el("th", { scope: "col", text: "Option" }));
  model.criteria.forEach(c => {
    head.append(el("th", { scope: "col" },
      el("div", {}, c.name), c.disqualifier ? el("small", { class: "chip fail", text: "[DQ]" }) : null,
      el("div", {}, el("input", { type: "number", class: "mono", "data-weight": c.id, value: weight(c), min: 0, max: WMAX, "aria-label": c.name + " weight" }))));
  });
  head.append(el("th", { scope: "col", text: "Total" }), el("th", { scope: "col", text: "Verdict" }));

  $("#matrix-body").replaceChildren(...model.options.map(o => {
    const t = ts.find(x => x.id === o.id);
    const tr = el("tr", { class: (t.dq ? "dq" : (win && win.id === o.id ? "best" : "")), "data-option": o.id });
    tr.append(el("td", {}, el("strong", { text: o.name }), t.dq ? el("div", {}, el("span", { class: "chip fail", text: "[DISQUALIFIED]" })) : null));
    model.criteria.forEach(c => {
      const cell = cellOf(o, c.id), pid = "rat-" + o.id + "-" + c.id, has = !!(cell.rationale && cell.rationale.trim());
      const cellBox = el("div", { class: "cell" },
        el("input", { type: "number", class: "mono", "data-score": o.id + "|" + c.id, value: num(cell.score), min: 0, max: SMAX, "aria-label": o.name + " " + c.name + " score" }),
        el("button", { type: "button", class: "btn pill no-print " + (has ? "filled" : "hollow"), popovertarget: pid, "aria-label": (has ? "Rationale for " : "Missing rationale for ") + o.name + " " + c.name }),
        el("div", { id: pid, class: "pop no-print", popover: "auto" },
          el("strong", { text: o.name + " · " + c.name }),
          el("textarea", { "data-rationale-for": o.id + "|" + c.id, "aria-label": "Rationale for " + o.name + " " + c.name, placeholder: "Rationale (empty renders a hollow marker)" }, cell.rationale || "")));
      tr.append(el("td", {}, cellBox));
    });
    tr.append(el("td", { class: "total", text: t.dq ? t.total.toFixed(1) : t.total.toFixed(1) }),
      el("td", {}, verdictSelect(o.id, true, cap(o.id).verdict)));
    return tr;
  }));

  $("#risks-body").replaceChildren(...model.options.map(o => {
    const art = el("article", { class: "card", "aria-label": "Risks for " + o.name }, el("h3", { text: o.name }));
    const ul = el("ul"); (model.risks[o.id] || []).forEach(r => ul.append(el("li", { text: r }))); art.append(ul); return art;
  }));

  const fc = $("#final-call");
  if (!fc.options.length) { fc.append(el("option", { value: "" }, "—")); model.options.forEach(o => fc.append(el("option", { value: o.id }, o.name))); }
  fc.value = state.global.choice;
  const gv = $("#global-verdict");
  if (!gv.options.length) ["", ...VOCAB].forEach(v => gv.append(el("option", { value: v }, v || "—")));
  gv.value = state.global.status;
  $("#dissent").value = state.global.note;

  $("#egress-meta").textContent = "copies: " + state.copies + " · unresolved notes: " + annotations().filter(a => a.status === "active").length;
  $("[data-export='changed']").disabled = !isChanged();
}

function envelope(changedOnly) {
  const ts = totals(), win = winnerOf(ts), sens = sensitivity();
  const env = {
    kind: "wargame", version: 1,
    artifact: { id: model.meta.id, title: model.meta.title, baseline: BASE_ID },
    decision: { status: state.global.status || "comment", at: new Date().toISOString(), ...(state.global.note ? { note: state.global.note } : {}) },
    decisions: decisionsOut(), changes: changesOut(), annotations: annotations(),
    state: {
      matrix: model.options.map(o => ({ id: o.id, total: ts.find(t => t.id === o.id).total, disqualified: ts.find(t => t.id === o.id).dq })),
      criteria: model.criteria, options: model.options, captures: state.captures, global: state.global
    },
    extensions: { choice: state.global.choice || null, winner: win ? win.id : null, sensitivity: sens ? { delta: Number(sens.delta.toFixed(4)), desc: sens.desc } : null, ...(changedOnly ? { diffBaseline: BASE_ID } : {}) }
  };
  return env;
}
function validate(env) {
  const errs = [];
  if (env.kind !== "wargame") errs.push("kind");
  if (env.version !== 1) errs.push("version");
  if (!env.artifact || !env.artifact.id || !env.artifact.title) errs.push("artifact");
  if (!VOCAB.includes(env.decision.status)) errs.push("decision.status");
  env.decisions.forEach(d => { if (!d.id || !VOCAB.includes(d.verdict)) errs.push("decision:" + d.id); });
  ["decisions", "changes", "annotations"].forEach(k => { if (!Array.isArray(env[k])) errs.push(k); });
  return errs;
}
function toMarkdown(env) {
  const ts = totals(), win = winnerOf(ts), sens = sensitivity();
  const choice = model.options.find(o => o.id === state.global.choice);
  const L = ["# " + model.meta.title, "",
    "**Final call:** " + (choice ? choice.name : "(none)") + " · verdict " + (env.decision.status || "(none)") + (state.global.note ? " · dissent: " + state.global.note : ""),
    "Winner (computed): " + (win ? win.name + " — " + win.total.toFixed(1) : "none"),
    "Sensitivity: " + (sens ? sens.delta.toFixed(2) + " — " + sens.desc : "not defined"), "", "## Scored matrix"];
  L.push("| Option | " + model.criteria.map(c => c.name + " (w" + weight(c) + ")").join(" | ") + " | Total | Status |");
  L.push("| " + Array(model.criteria.length + 3).fill("---").join(" | ") + " |");
  model.options.forEach(o => {
    const t = ts.find(x => x.id === o.id);
    L.push("| " + o.name + " | " + model.criteria.map(c => String(scoreOf(o, c.id))).join(" | ") + " | " + t.total.toFixed(1) + " | " + (t.dq ? "DISQUALIFIED" : (win && win.id === o.id ? "WINNER" : "")) + " |");
  });
  if (env.decisions.length) { L.push("", "## Option verdicts", "| Option | Verdict | Note |", "| --- | --- | --- |"); env.decisions.forEach(d => L.push("| " + d.id + " | " + d.verdict + " | " + (d.note || "") + " |")); }
  return L.join("\n") + "\n";
}

let toastTimer;
const flash = msg => { const t = $("#toast"); t.textContent = msg; t.showPopover?.(); clearTimeout(toastTimer); toastTimer = setTimeout(() => t.hidePopover?.(), 1600); };
const markExported = () => { Object.values(state.captures).forEach(c => { if (c.note) c.ann = "exported"; }); };

document.addEventListener("click", e => {
  const b = e.target.closest("[data-export]"); if (!b) return;
  const mode = b.dataset.export, env = envelope(mode === "changed"), errs = validate(env), eg = $("#egress");
  if (errs.length) { eg.value = "BLOCKED — invalid payload: " + errs.join(", "); flash("Export blocked"); return; }
  const out = mode === "md" ? toMarkdown(env) : JSON.stringify(env, null, 2);
  eg.value = out;
  const done = () => { state.copies++; markExported(); flash("Copied"); render(); };
  navigator.clipboard?.writeText(out).then(done).catch(() => { flash("Clipboard denied — copy from the box"); render(); });
  if (!navigator.clipboard) render();
});
document.addEventListener("input", e => {
  const w = e.target.closest("[data-weight]");
  if (w) { const c = model.criteria.find(x => x.id === w.dataset.weight); c.weight = num(w.value); render(); }
  const s = e.target.closest("[data-score]");
  if (s) { const [oid, cid] = s.dataset.score.split("|"); cellOf(model.options.find(o => o.id === oid), cid).score = num(s.value); render(); }
  const r = e.target.closest("[data-rationale-for]");
  if (r) { const [oid, cid] = r.dataset.rationaleFor.split("|"); cellOf(model.options.find(o => o.id === oid), cid).rationale = r.value; $("[data-export='changed']").disabled = !isChanged(); }
  const n = e.target.closest("[data-note-for]");
  if (n) { cap(n.dataset.noteFor).note = n.value; cap(n.dataset.noteFor).ann = "active"; $("[data-export='changed']").disabled = !isChanged(); }
  if (e.target.id === "dissent") { state.global.note = e.target.value; $("[data-export='changed']").disabled = !isChanged(); }
});
document.addEventListener("change", e => {
  const v = e.target.closest("[data-verdict-for]");
  if (v) { cap(v.dataset.verdictFor).verdict = v.value; render(); }
  if (e.target.id === "final-call") { state.global.choice = e.target.value; render(); }
  if (e.target.id === "global-verdict") { state.global.status = e.target.value; render(); }
});
render();
})();
</script>
</body>
</html>
