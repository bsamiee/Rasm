<script>
// --- [RUNTIME_PRELUDE] ---
const themeKey = "theme:" + document.title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
const root = document.documentElement;
root.dataset.theme = localStorage.getItem(themeKey) ?? "dark";
document.addEventListener("click", e => {
  if (!e.target.closest("[data-toggle-theme]")) return;
  const next = root.dataset.theme === "dark" ? "light" : "dark";
  try { localStorage.setItem(themeKey, root.dataset.theme = next); } catch { root.dataset.theme = next; }
});
const esc = v => { const n = document.createElement("span"); n.textContent = v == null ? "" : String(v); return n.innerHTML; };

// --- [MODEL] ---
const model = JSON.parse(document.getElementById("payload").textContent);
const SEV = { fail: { rank: 0, weight: 8, cls: "fail" }, warn: { rank: 1, weight: 4, cls: "warn" }, info: { rank: 2, weight: 2, cls: "info" }, ok: { rank: 3, weight: 1, cls: "ok" } };
const POSTURE = {
  "approve": { label: "[APPROVE]", cls: "ok" },
  "approve_with_notes": { label: "[APPROVE-WITH-NOTES]", cls: "ok" },
  "request-changes": { label: "[REQUEST-CHANGES]", cls: "fail" },
  "review-incomplete": { label: "[REVIEW-INCOMPLETE]", cls: "warn" },
  "reject": { label: "[REJECT]", cls: "fail" },
  "defer": { label: "[DEFER]", cls: "info" },
};
const INTENT = { approve: "resolved", reject: "issue", defer: "deferred" };
const gutter = { add: "+", remove: "-", context: " " };
const findings = () => model.files.flatMap(f => f.hunks.flatMap(h => h.lines.filter(l => l.severity).map(l => ({ ...l, file: f.path, fileId: f.id, header: h.header }))));
const fileWeight = f => f.hunks.reduce((s, h) => s + h.lines.reduce((a, l) => a + (l.severity ? SEV[l.severity].weight : 0), 0), 0);
const rankedFiles = [...model.files].sort((a, b) => fileWeight(b) - fileWeight(a));

// State is the single source of truth; render projects it and the DOM is never read back as authority.
const state = {
  reviewed: Object.fromEntries(model.files.map(f => [f.id, f.reviewed])),
  decisions: {},
  override: null,
};
const baseline = structuredClone(state);
const digest = obj => { const s = JSON.stringify(obj); let h = 0; for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0; return "b-" + (h >>> 0).toString(36); };
const baselineDigest = digest(baseline);

// --- [COMPUTED] ---
const coverageOk = () => model.files.every(f => state.reviewed[f.id]);
const unresolvedFails = () => findings().filter(f => f.severity === "fail" && state.decisions[f.id]?.verdict !== "approve");
const computedPosture = () => !coverageOk() ? "review-incomplete" : unresolvedFails().length ? "request-changes" : "approve";
const effectivePosture = () => state.override?.posture || computedPosture();
const blockingList = () => {
  const out = [];
  model.files.filter(f => !state.reviewed[f.id]).forEach(f => out.push(`${f.path} — file left UNREVIEWED; approval withheld until coverage is complete.`));
  unresolvedFails().forEach(f => out.push(`${f.file} ${f.header} — ${f.note ?? f.text}`));
  return out;
};
const changed = () => {
  const changes = [], decisions = [], annotations = [];
  model.files.forEach(f => { if (state.reviewed[f.id] !== baseline.reviewed[f.id]) changes.push({ itemId: f.id, path: `/files/${f.id}/reviewed`, from: baseline.reviewed[f.id], to: state.reviewed[f.id] }); });
  if (state.override) changes.push({ itemId: "verdict", path: "/verdict/posture", from: computedPosture(), to: state.override.posture });
  findings().forEach(f => {
    const d = state.decisions[f.id];
    if (!d || (d.verdict == null && !d.note)) return;
    decisions.push({ id: f.id, verdict: d.verdict ?? null, note: d.note || "" });
    if (d.note) annotations.push({ id: "a-" + f.id, itemId: f.id, intent: INTENT[d.verdict] ?? "comment", status: d.status ?? "active", text: d.note });
  });
  return { changes, decisions, annotations };
};
const isChanged = () => { const c = changed(); return c.changes.length + c.decisions.length + c.annotations.length > 0; };

// --- [ENVELOPE] ---
const nowIso = () => new Date().toISOString().replace(/\.\d+Z$/, "Z");
const allDecisions = () => findings().map(f => ({ id: f.id, verdict: state.decisions[f.id]?.verdict ?? null, note: state.decisions[f.id]?.note || "" }));
const allAnnotations = () => findings().filter(f => state.decisions[f.id]?.note).map(f => ({ id: "a-" + f.id, itemId: f.id, intent: INTENT[state.decisions[f.id]?.verdict] ?? "comment", status: state.decisions[f.id]?.status ?? "active", text: state.decisions[f.id].note }));
const envelope = (scope) => {
  const c = changed();
  return {
    kind: "diff-review",
    version: 1,
    artifact: { id: model.artifactId, title: model.meta.title, baseline: baselineDigest },
    decision: { status: effectivePosture(), at: nowIso(), reason: state.override?.reason ?? null },
    decisions: scope === "changed" ? c.decisions : allDecisions(),
    changes: c.changes,
    annotations: scope === "changed" ? c.annotations : allAnnotations(),
    coverage: model.files.map(f => ({ id: f.id, path: f.path, reviewed: state.reviewed[f.id] })),
    state: { reviewed: state.reviewed, override: state.override },
  };
};
const toMarkdown = () => {
  const p = POSTURE[effectivePosture()];
  const cov = model.files.filter(f => state.reviewed[f.id]).length;
  const lines = [
    `## Review: ${model.meta.title}`,
    ``, model.meta.summary,
    ``, `**Verdict:** ${p.label}${state.override ? ` (override: ${state.override.reason})` : ""}`,
    `**Coverage:** ${cov}/${model.files.length} files reviewed`,
    ``, `### Findings`,
    ...findings().slice().sort((a, b) => SEV[a.severity].rank - SEV[b.severity].rank).map(f => {
      const d = state.decisions[f.id];
      const verdict = d?.verdict ? ` {${d.verdict}}` : " {undecided}";
      const reply = d?.note ? ` — reply: ${d.note}` : "";
      return `- [${f.severity.toUpperCase()}]${verdict} ${f.file} ${f.header} — ${f.note ?? f.text}${reply}`;
    }),
  ];
  const bl = blockingList();
  if (bl.length) { lines.push(``, `### Blocking`, ...bl.map(b => `- ${b}`)); }
  return lines.join("\n");
};

// --- [RENDER] ---
const renderRollup = () => {
  const counts = { fail: 0, warn: 0, info: 0, ok: 0 };
  findings().forEach(f => counts[f.severity]++);
  const cov = model.files.filter(f => state.reviewed[f.id]).length;
  document.getElementById("rollup").innerHTML =
    Object.entries(counts).map(([k, n]) => `<span class="chip ${SEV[k].cls}">${k.toUpperCase()} ${n}</span>`).join("") +
    `<span class="chip ${cov === model.files.length ? "ok" : "warn"}">COVERAGE ${cov}/${model.files.length}</span>`;
};
const renderLine = ln => {
  const g = gutter[ln.type] ?? " ";
  let fix = "";
  if (ln.severity) {
    fix = `<div class="fix" id="fix-${ln.id}">
      <div class="fix__tag"><span class="chip ${SEV[ln.severity].cls}">${ln.severity.toUpperCase()}</span> suggested fix</div>
      <div class="fix__note">${esc(ln.note ?? "")}</div>
      <div class="capture" data-finding="${ln.id}">
        <span class="vote" role="group" aria-label="Verdict for ${esc(ln.file ?? "")}">
          <button type="button" data-verdict="approve" aria-pressed="false">approve</button>
          <button type="button" data-verdict="reject" aria-pressed="false">reject</button>
          <button type="button" data-verdict="defer" aria-pressed="false">defer</button>
        </span>
        <input type="text" class="reply" data-reply="${ln.id}" placeholder="Reply note" aria-label="Reply note for finding ${esc(ln.id)}">
      </div>
    </div>`;
  }
  return `<span class="line ${ln.type}" id="${ln.id}"><span class="line__g" aria-hidden="true">${g}</span><span>${esc(ln.text)}</span></span>${fix}`;
};
const renderSpine = () => {
  document.getElementById("spine").innerHTML = rankedFiles.map(f => {
    const weight = fileWeight(f);
    return `<section class="file" data-file="${f.id}" aria-label="File ${esc(f.path)}">
      <div class="file__head">
        <span class="file__path">${esc(f.path)}</span>
        <span class="file__rank num">focus weight ${weight}</span>
        <label class="file__toggle no-print"><input type="checkbox" class="file__reviewed" data-file-reviewed="${f.id}"${state.reviewed[f.id] ? " checked" : ""}> reviewed</label>
      </div>
      <div class="file__band"><span class="chip warn">[UNREVIEWED]</span> approval is withheld while this file is unreviewed</div>
      ${f.hunks.map(h => `<div class="hunk"><div class="hunk__head">${esc(h.header)}</div>${h.lines.map(renderLine).join("")}</div>`).join("")}
    </section>`;
  }).join("");
  // reflect seeded decisions onto capture controls
  findings().forEach(f => syncCapture(f.id));
};
const renderRail = () => {
  const rows = findings().slice().sort((a, b) => SEV[a.severity].rank - SEV[b.severity].rank).map(f => {
    const d = state.decisions[f.id];
    const vChip = d?.verdict ? `<span class="chip ${d.verdict === "approve" ? "ok" : d.verdict === "reject" ? "fail" : "warn"}">${d.verdict.toUpperCase()}${d.status === "exported" ? " ·EXPORTED" : ""}</span>` : `<span class="chip info">UNDECIDED</span>`;
    return `<a class="finding" href="#${f.id}">
      <span class="finding__top"><span class="chip ${SEV[f.severity].cls}">${f.severity.toUpperCase()}</span>${vChip}</span>
      <span>${esc(f.note ?? f.text)}</span>
      <span class="finding__where">${esc(f.file)} · ${esc(f.header)}</span>
    </a>`;
  }).join("");
  document.getElementById("rail").innerHTML = `<h2>Findings</h2>${rows}`;
};
const renderVerdict = () => {
  const eff = effectivePosture(), p = POSTURE[eff];
  const cov = model.files.filter(f => state.reviewed[f.id]).length;
  const bl = blockingList();
  const src = state.override ? `overridden — computed was ${POSTURE[computedPosture()].label}` : "computed from coverage and unresolved failures";
  document.getElementById("verdict-readout").innerHTML =
    `<p><span class="chip ${p.cls}">${p.label}</span></p>
     <p class="muted">${esc(src)}. Coverage ${cov}/${model.files.length} files.</p>
     ${bl.length ? `<p class="muted">Blocking:</p><ul>${bl.map(b => `<li>${esc(b)}</li>`).join("")}</ul>` : `<p class="muted">No blocking findings; every file reviewed and every failure resolved.</p>`}`;
  const chip = document.getElementById("posture-chip");
  chip.className = "chip " + p.cls;
  chip.textContent = p.label;
};
const syncCapture = id => {
  const cap = document.querySelector(`.capture[data-finding="${id}"]`);
  if (!cap) return;
  const d = state.decisions[id];
  cap.querySelectorAll("[data-verdict]").forEach(b => b.setAttribute("aria-pressed", String(!!d && d.verdict === b.dataset.verdict)));
  const reply = cap.querySelector("[data-reply]");
  if (reply && reply.value !== (d?.note ?? "")) reply.value = d?.note ?? "";
};
const syncDerived = () => {
  renderRollup(); renderRail(); renderVerdict();
  document.getElementById("btn-changed").disabled = !isChanged();
};
const render = () => { renderSpine(); syncDerived(); document.getElementById("summary").textContent = model.meta.summary; document.getElementById("date-slot").textContent = model.meta.date; document.getElementById("doc-title").textContent = model.meta.title; };

// --- [CAPTURE] ---
const setDecision = (id, patch) => {
  const d = state.decisions[id] ?? (state.decisions[id] = { verdict: null, note: "", status: "active" });
  Object.assign(d, patch, { status: "active" });
  syncDerived();
};
document.addEventListener("click", e => {
  const vote = e.target.closest("[data-verdict]");
  if (vote) {
    const cap = vote.closest(".capture"), id = cap.dataset.finding;
    const cur = state.decisions[id]?.verdict;
    setDecision(id, { verdict: cur === vote.dataset.verdict ? null : vote.dataset.verdict });
    syncCapture(id);
  }
});
document.addEventListener("input", e => {
  const reply = e.target.closest("[data-reply]");
  if (reply) setDecision(reply.dataset.reply, { note: reply.value });
});
document.addEventListener("change", e => {
  const rv = e.target.closest("[data-file-reviewed]");
  if (rv) { state.reviewed[rv.dataset.fileReviewed] = rv.checked; syncDerived(); }
});

// --- [OVERRIDE] ---
document.getElementById("override-form").addEventListener("submit", e => {
  e.preventDefault();
  const posture = document.getElementById("ov-posture").value;
  const reason = document.getElementById("ov-reason").value.trim();
  if (!posture) { flash("Pick a posture to override"); return; }
  if (!reason) { flash("Override requires a reason"); return; }
  state.override = { posture, reason };
  syncDerived();
  flash("Override applied");
});
document.getElementById("ov-clear").addEventListener("click", () => {
  state.override = null;
  document.getElementById("ov-posture").value = "";
  document.getElementById("ov-reason").value = "";
  syncDerived();
});

// --- [EGRESS] ---
let toastTimer;
const flash = msg => { const t = document.getElementById("toast"); t.textContent = msg; try { t.showPopover(); } catch {} clearTimeout(toastTimer); toastTimer = setTimeout(() => { try { t.hidePopover(); } catch {} }, 1600); };
const egress = document.getElementById("egress");
const validEnvelope = env => { try { const s = JSON.stringify(env); const p = JSON.parse(s); return p && p.kind && p.version && p.artifact?.id ? s : null; } catch { return null; } };
const markExported = scope => {
  const set = scope === "changed" ? changed().annotations : allAnnotations();
  set.forEach(a => { if (state.decisions[a.itemId]) state.decisions[a.itemId].status = "exported"; });
  syncDerived();
};
document.addEventListener("click", e => {
  const b = e.target.closest("[data-export]");
  if (!b || b.disabled) return;
  const kind = b.dataset.export;
  if (kind === "md") {
    egress.value = toMarkdown();
    document.getElementById("egress-status").textContent = `markdown · ${findings().length} findings`;
    navigator.clipboard?.writeText(egress.value).then(() => flash("Review markdown copied")).catch(() => flash("Copy blocked; mirror holds the markdown"));
    return;
  }
  if (kind === "download") {
    const env = envelope("full"), s = validEnvelope(env);
    if (!s) { flash("Envelope failed validation; export blocked"); return; }
    const url = URL.createObjectURL(new Blob([JSON.stringify(env, null, 2)], { type: "application/json" }));
    Object.assign(document.createElement("a"), { href: url, download: "review-envelope.json" }).click();
    setTimeout(() => URL.revokeObjectURL(url), 0);
    egress.value = JSON.stringify(env, null, 2);
    document.getElementById("egress-status").textContent = "envelope downloaded";
    return;
  }
  const scope = kind === "changed" ? "changed" : "full";
  const env = envelope(scope), s = validEnvelope(env);
  if (!s) { flash("Envelope failed validation; export blocked"); return; }
  const pretty = JSON.stringify(env, null, 2);
  egress.value = pretty;
  document.getElementById("egress-status").textContent = scope === "changed" ? `changed-only · baseline ${baselineDigest}` : "full envelope";
  navigator.clipboard?.writeText(pretty).then(() => { markExported(scope); flash(scope === "changed" ? "Changed-only copied" : "Envelope copied"); }).catch(() => flash("Copy blocked; mirror holds the JSON"));
});

// --- [JUMP_ANCHORS] ---
document.addEventListener("click", e => {
  const a = e.target.closest(".finding");
  if (!a) return;
  e.preventDefault();
  const id = a.getAttribute("href").slice(1);
  document.getElementById(id)?.scrollIntoView({ block: "center" });
  history.replaceState(null, "", "#" + id);
});
addEventListener("beforeprint", () => document.querySelectorAll("details").forEach(d => { d.dataset.wasOpen = d.open; d.open = true; }));
addEventListener("afterprint", () => document.querySelectorAll("details").forEach(d => { d.open = d.dataset.wasOpen === "true"; }));

render();
</script>
</body>
</html>
