[project]
name = "workspace-foundation-python"
version = "0.1.0"
requires-python = ">=3.15"
dependencies = [
    "anyio>=4.13.0",
    "beartype>=0.22.2",
    "cyclopts>=4.16.1",
    "msgspec>=0.21.1",
    "opentelemetry-api>=1.41.1",
    "opentelemetry-exporter-otlp-proto-http>=1.41.1",
    "opentelemetry-sdk>=1.41.1",
    "pydantic>=2.13.3",
    "pydantic-settings>=2.14.0",
    "expression>=5.6.0",
    "stamina>=26.1.0",
    "structlog>=25.5.0",
    "psutil>=7.2.2",
    "fsspec>=2026.4.0",
    "s3fs>=2026.4.0",   # SHARED-pull cloud backend: agent reads the same s3 tree the remote tool wrote, zero byte transfer
    "gcsfs>=2026.4.0",  # SHARED-pull cloud backend: agent reads the same gs/gcs tree the remote tool wrote, zero byte transfer
    "httpx>=0.28.1",    # Retain; never remove regardless of consumers existing or not
    "watchfiles>=1.2.0",
    "aiocron>=2.1",
    "universal-pathlib>=0.3.10",  # UPath 0.3 storage_options/protocol= resolution is load-bearing for the fsspec artifact store
    "asyncssh>=2.23.0",
    "specklepy>=3.2.8",  # runtime TransportResource row: Speckle stream send/receive (remote AEC transport, never a durable store)
    "tree-sitter>=0.25.2",
    "tree-sitter-python>=0.25.0",
    "tree-sitter-typescript>=0.23.2",
]

[dependency-groups]
dev = [
    "coverage>=7.14.1",
    "dirty-equals",
    "hypothesis>=6.155.2",
    "inline-snapshot",
    "moto[server]>=5.2.2",
    "mypy>=2.1.0",
    "pytest>=9.0.3",
    "pytest-benchmark>=5.2.3",
    "pytest-cov>=7.1.0",
    "pytest-deadfixtures>=3.1.0",
    "pytest-randomly>=4.1.0",
    "pytest-socket",
    "pytest-timeout",
    "pytest-xdist>=3.8.0",
    "ruff>=0.15.12,<0.16",
    "ty>=0.0.44",
    "types-psutil>=7.2.2",
    "validate-pyproject[all]",
]
mutation = ["mutmut>=3.6.0"]
scientific = [
    "adbc-driver-manager",
    "connectorx",
    "dask",
    "deltalake",
    "duckdb",
    "geopandas",
    "h5py",
    "jax>=0.10.1; python_version<'3.15'",  # compute NumericIntent XLA accelerator row; jaxlib ships no cp315 wheel
    "meshio",
    "networkx",
    "numba>=0.65.1; python_version<'3.15'",  # compute NumericIntent LLVM JIT accelerator row; numba lags CPython, no cp315 wheel
    "numpy",
    "onnx>=1.22.0; python_version<'3.15'",  # compute ModelAsset graph IR; no cp315 wheel
    "onnxruntime>=1.27.0; python_version<'3.15'",  # compute ModelAsset runtime-check half; no cp315 wheel
    "pandas",
    "pandas-stubs",
    "pandera>=0.31.1",  # data ContractGate: schema/quality-rule (IDS-style) validation gate SchemaClaim records but does not enforce
    "pint",
    "polars",
    "pyarrow",
    "pyogrio",
    "pyproj",
    "rasterio>=1.5.0; python_version<'3.15'",  # data RasterGeoClaim axis (GDAL raster coverage); no cp315 wheel
    "rhino3dm",
    "scikit-learn>=1.9.0; python_version<'3.15'",  # compute ModelAsset classical-ML + sklearn->ONNX export; no cp315 wheel
    "scipy",
    "scipy-stubs",
    "shapely",
    "sympy",
    "trimesh",
    "uncertainties",
    "xarray",
]
artifacts = [
    "altair",
    "brotli",
    "jinja2>=3.1.6",  # artifacts ReportPlan: report-templating composition between VisualSpec outputs and DocumentPlan inputs
    "kaleido",
    "lxml",
    "lz4",
    "matplotlib",
    "openpyxl",
    "pikepdf",
    "pillow",
    "plotly",
    "py7zr",
    "pymupdf",
    "pypdf",
    "pypdfium2",
    "pyvista>=0.48.4; python_version<'3.13'",  # artifacts VisualSpec 3D scientific viz; rides the vtk native interpreter floor
    "python-docx",
    "python-magic",
    "python-pptx",
    "qrcode",
    "reportlab",
    "ruamel-yaml",
    "tomlkit",
    "vl-convert-python",
    "vtk>=9.6.2; python_version<'3.13'",  # artifacts VisualSpec VTK engine backing pyvista; no cp315 wheel
    "weasyprint",
    "zstandard",
]
# Marker-gated native + companion-server stack on its own interpreter floor (python_version<'3.13'), the one sanctioned
# divergence from the >=3.15 pure-Python runtime/data/artifacts floor. ifcopenshell hard-requires <3.15 and bundles OCCT;
# open3d/topologicpy/compiled cores cap at cp312; the grpcio trio rides the same floor as the native geometry stack. The
# isolated companion environment also keeps the LGPL-3.0-or-later ifcopenshell wheel out of the MIT/Apache library lock.
geometry-companion = [
    "compas>=2.15.1; python_version<'3.13'",            # geometry GeometryAlgebra: AEC computational geometry, networks, form-finding
    "grpcio>=1.81.1; python_version<'3.13'",            # companion inbound wire speaking the EXISTING C# ComputeService/ArtifactSync gRPC contract
    "grpcio-tools>=1.81.1; python_version<'3.13'",      # compiles the C# proto descriptors into Python server stubs
    "ifcopenshell>=0.8.5; python_version<'3.13'",       # geometry IfcCompanion: the load-bearing IFC->mesh/GLB tessellation daemon (LGPL-3.0-or-later)
    "open3d>=0.19.0; python_version<'3.13'",            # geometry ScanProcessing: point-cloud/3D-scan ICP registration, reconstruction
    "protobuf>=7.35.1; python_version<'3.13'",          # protobuf runtime backing the companion gRPC server
    "small-gicp>=1.0.1; python_version<'3.13'",         # geometry ScanProcessing speed-path: parallel GICP/VGICP fine registration
    "topologicpy>=0.9.43; python_version<'3.13'",       # geometry GeometryAlgebra: non-manifold cell/aperture topology (gated against C# IfcSemanticModel)
]

# --- [UV] ------------------------------------------------------------------

[tool.uv]
package =   false
cache-dir = ".cache/uv"

[tool.uv.sources]
beartype = { git = "https://github.com/beartype/beartype.git", rev = "f370a0b1733413681e7a72bf36fbe839e60b3c85" }

# --- [TY] ------------------------------------------------------------------

[tool.ty.environment]
python-platform = "all"
python-version = "3.15"

[tool.ty.analysis]
respect-type-ignore-comments = false

[tool.ty.src]
exclude = [
    ".approval_tests_temp",
    ".artifacts",
    ".cache",
    ".claude/skills/**/.cache",
    ".claude/worktrees",
    ".nx",
    ".venv",
    "coverage",
    "mutants",
    "node_modules",
    "test-results",
    "tests/ast-grep/fail/**",
    "tests/ast-grep/pass/**",  # ast-grep probes; excluded from ty/mypy/ruff — negative verification is the ast-grep VERIFY catalog row
    "tmp",
]

[tool.ty.rules]
all = "error"

[tool.ty.terminal]
error-on-warning = true

# --- [MYPY] ----------------------------------------------------------------

# ADVISORY checker only — `ty` ([tool.ty], all = "error") is the BINDING type gate. mypy diverges on intentional
# 3.15 / ty-clean idioms (typing.TypeForm absent in mypy; no-for-loop side-effect comprehensions read as
# func-returns-value; disallow_any_explicit flags Callable[..., R] test signatures; unfollowed-import Any on
# fsspec). Those divergences are NOT defects: they are scoped in the `[[tool.mypy.overrides]]` stanzas below, never
# in inline suppressions that ty would reject under respect-type-ignore-comments = false. `files` makes the two
# disjoint subtrees the canonical bare-`uv run mypy` target. Resolve real type defects through ty.
[tool.mypy]
files =                   ["tools/assay", "tests"]
python_version =          "3.15"
cache_dir =               ".cache/mypy"
strict =                  true
pretty =                  true
warn_unreachable =        true
explicit_package_bases =  true
warn_unused_configs =     true
disallow_any_explicit =   true
disallow_any_unimported = true
plugins =                 ["pydantic.mypy"]
enable_error_code = [
    "exhaustive-match",
    "explicit-override",
    "ignore-without-code",
    "redundant-self",
    "truthy-bool",
    "truthy-iterable",
    "unused-awaitable",
]
exclude = [
    "^\\.approval_tests_temp/",
    "^\\.artifacts/",
    "^\\.cache/",
    "^\\.claude/skills/.*/\\.cache/",
    "^\\.claude/worktrees/",
    "^\\.git/",
    "^\\.nx/",
    "^\\.venv/",
    "^build/",
    "^dist/",
    "^coverage/",
    "^mutants/",
    "^test-results/",
    "^node_modules/",
    "^tests/ast-grep/fail/",
    "^tests/ast-grep/pass/",
    "^tmp/",
]

[tool.pydantic-mypy]
init_typed =                    true
init_forbid_extra =             true
warn_required_dynamic_aliases = true
warn_untyped_fields =           true

# tests/** are ty-clean but diverge from strict mypy on intentional idioms; each relaxation maps to a real divergence,
# not a defect. disallow_any_*: Callable[..., R] test signatures + TypeForm unfollowed-import Any. warn_unreachable:
# exhaustive seam match arms ty proves live. disable_error_code: mypy typeshed lag — TypeForm + PEP 661 sentinel
# (attr-defined), no-for-loop side-effect comprehensions (func-returns-value), test Callable signatures (type-arg),
# RailProbe.install LSP narrowing (override), **dict-splat into typed ctors + mypy Never-collapse arg propagation (arg-type).
[[tool.mypy.overrides]]
module =                  "tests.*"
disallow_any_explicit =   false
disallow_any_unimported = false
warn_unreachable =        false
disable_error_code =      ["func-returns-value", "attr-defined", "type-arg", "override", "arg-type"]

# fsspec ships no py.typed marker (the backend laws import fsspec.implementations.* directly).
[[tool.mypy.overrides]]
module =                 ["fsspec", "fsspec.*", "boto3", "boto3.*"]
ignore_missing_imports = true

# --- [PYTEST] --------------------------------------------------------------

# Session-separation policy: under `filterwarnings = ["error"]`, loading pytest-benchmark and pytest-xdist in the
# same session raises an xdist worker INTERNALERROR (re-verified 2026-06-09 with `-n 2` and `-n auto`, both exit 3:
# `pytest_benchmark.logger.PytestBenchmarkWarning: Benchmarks are automatically disabled because xdist plugin is
# active...` escalated to error by the filter). `-n` is deliberately NOT in addopts; the main suite runs serially
# and benchmarks run in their own session via `-m benchmark --benchmark-only`. Keep these invocations separate; do not
# add `-n` here. Parallel runs must opt in per-invocation AND unload the benchmark PLUGIN — the escalated warning
# fires at configure time when both plugins load, so `-m "not benchmark"` does NOT help. Bare `-p no:benchmark` also
# aborts: `required_plugins` still demands the plugin and the addopts `--benchmark-storage` flag has no owner once it
# unloads. The working opt-in is `-n auto -p no:benchmark -o required_plugins= -o "addopts=<addopts minus --benchmark-*>"`
# (verified 2026-06-11 while probing the bench hook revival).
[tool.pytest]
minversion =               "9.0"
strict =                   true
cache_dir =                ".cache/pytest"
testpaths =                ["tests"]
pythonpath =               ["."]
python_files =             ["test_*.py", "*_test.py", "bench_*.py"]
python_functions =         ["test_*", "bench_*"]
collect_imported_tests =   false
empty_parameter_set_mark = "fail_at_collect"
addopts = [
    "-p",
    "tests.python._testkit.runtime",  # testkit runtime plugin: hypothesis profiles + OTel provider + markers; -p loads it pre-configure for every invocation shape
    "-x",
    "--tb=short",
    "--import-mode=importlib",
    "-m",
    "not benchmark",
    "--disable-socket",
    "--allow-unix-socket",
    "--benchmark-storage=file://.artifacts/python/benchmarks",  # canonical owner: tools.assay.composition.catalog.BENCHMARK_STORAGE_URI
    "--hypothesis-profile=rasm",
]
filterwarnings = ["error"]
# pytest-timeout registers `timeout` via `addini(..., type=<string default>)`; pytest 9 TOML mode strictly enforces
# the declared option type and raises INTERNALERROR on a native int. The string form is required here.
timeout = "30"
required_plugins = [
    "anyio",
    "hypothesis",
    "inline-snapshot",
    "pytest-benchmark",
    "pytest-cov",
    "pytest-randomly",
    "pytest-socket",
    "pytest-timeout",
    "pytest-xdist",
]
markers = [
    "benchmark: benchmark measurement tests",
    "mutation: mutation-testing acceptance and survivor-triage tests",
    "network: tests that need real INET sockets lifted (loopback servers or egress); excluded from mutation lanes",
    "property: property-based tests",
]

[tool.anyio]
asyncio_mode = "auto"

# --- [INLINE_SNAPSHOT] -----------------------------------------------------

[tool.inline-snapshot]
# CI-safe default (short-report: fails on mismatch, never mutates files); external snapshot storage routed under cache.
default-flags = ["short-report"]
storage-dir =   ".cache/inline-snapshot"

# --- [COVERAGE] ------------------------------------------------------------

# Canonical coverage command: `uv run coverage run -m pytest tests/python/tools/assay -q && uv run coverage combine --append && uv run coverage report`.
# The combine step folds the `cli(isolate=True)` subprocess lane's parallel data files (written under
# `COVERAGE_PROCESS_START=.config/coverage-subprocess.ini`, gated on the parent's COVERAGE_RUN) into the main data file;
# `--append` keeps the in-process session's data, which `combine` would otherwise start clean.
# Per-test contexts are opt-in and xdist-safe via pytest-cov's hook: `uv run pytest tests/python/tools/assay --cov=tools/assay --cov-context=test -q`.
# `dynamic_context = "test_function"` is intentionally absent: coverage's own dynamic context hard-errors under `pytest --cov`
# (and blocks `-n auto`), and it mis-attributes property-test lines to the Hypothesis internal frame.
[tool.coverage.run]
branch =          true
relative_files =  true
source =          ["tools/assay"]
data_file =       ".cache/coverage/.coverage"
# CPython 3.15.0b1 ships no compiled C tracer (`coverage.tracer.CTracer` absent); `sys.monitoring` (PEP 669) is the only
# working core. Verified to record branch arcs + per-test contexts (coarser than the pure-Python core, but contexts are
# diagnostic — the law-coverage gate reads the law MANIFEST, not coverage contexts).
core =            "sysmon"

[tool.coverage.report]
# 95 floor: sysmon's PEP 669 core captures slightly fewer arcs than the (absent) C core on this beta interpreter; the
# line+branch rail is one of three (law-coverage manifest gate + mutation survivors are the compensating rails).
fail_under =    95
show_missing =  true
skip_covered =  true
exclude_also = [
    "if TYPE_CHECKING:",
    "assert_never\\(",
    "\\.\\.\\.$",
    "if __name__ == .__main__.:",
]

[tool.coverage.json]
output = ".artifacts/python/coverage/coverage.json"
pretty_print = true
show_contexts = true

[tool.coverage.html]
directory = ".artifacts/python/coverage/html"
show_contexts = true

[tool.coverage.xml]
output = ".artifacts/python/coverage/coverage.xml"

[tool.coverage.lcov]
output = ".artifacts/python/coverage/coverage.lcov"

# --- [MUTMUT] --------------------------------------------------------------

# mutmut rides the MAIN venv via the `mutation` dependency group (verified live 2026-06-12: the full staged rail run used
# `uv run mutmut`). The historical `.cache/mut-venv` (libcst no-cp315-wheel era) is a stale artifact scheduled for deletion
# in roadmap phase R3 (tools/assay/BACKLOG.md) along with `.cache/mutation-requirements.txt` — do not rebuild it.
#
# SUPPORTED RUNNER (one posture only): the RAIL — `uv run python -m tools.assay test run --mutation full|changed`.
# It stages the project into `.artifacts/python/mutmut/work` (mutmut hard-codes `./mutants` relative to its cwd, so
# the staged cwd is what keeps the repo root litter-free; the testkit litter law forbids root `mutants/`), splices
# `--max-children` from `mutation_max_cpu`, injects `COVERAGE_RCFILE` from the catalog row env (see the
# `mutate_only_covered_lines` note below for why the coverage map is poisoned without it), and rides the kill-rate
# gate (floor 0.80) on the same lease over the staged cache. Manual fallback (debugging only) runs FROM the staged
# work dir, never the repo root:
#   cd .artifacts/python/mutmut/work && COVERAGE_RCFILE=.config/coverage-mutmut.ini uv run mutmut run
#   cd .artifacts/python/mutmut/work && uv run python -m tools.assay.rails.mutation_gate
#
# `-o required_plugins=` below waives the required-plugins guard for the mutation invocation only: mutmut disables
# pytest-randomly (`-p no:randomly`, its own default) for deterministic kill verdicts, which would otherwise trip the
# project's `required_plugins` check and abort before any mutant runs.
#
# The historical stats-phase exit-4 abort was NOT a cwd/rootdir defect: it was `max_stack_depth != -1` opting into a
# strict-resolve stack walk that dies on `<frozen importlib._bootstrap>` pseudo-filenames (see the note at that key).
# With the walk disabled the stats phase passes in full (1045 passed under mutants/, verified 2026-06-09). KNOWN CEILING,
# local not mutmut: the clean-tests phase still fails because mutmut re-invokes `pytest.main` IN-PROCESS and the session
# OTel fixture (`tests/conftest.py::_otel_provider`) calls set-once `set_tracer_provider` — the second invocation's
# provider is silently ignored after the first was shut down, so `otel_spans` tests observe zero spans.
[tool.mutmut]
source_paths = ["tools/assay"]
# Type-check pre-filter DISABLED (tests are the kill mechanism — disabling loses no kill power). Root cause, traced to the
# installed mutmut 3.6.0: `filter_mutants_with_type_checker` (`mutmut/mutation/file_mutation.py:494`) RAISES on ANY checker
# diagnostic whose line falls outside a mutated-method span (`mutant is None` -> bare `raise Exception(...)`), aborting the
# entire run. It is NOT ty failing to resolve the injected `mutmut.mutation.trampoline` import (that line is `# type: ignore`'d
# and respected). Re-enable only once `ty check tools/assay` is provably zero-diagnostic at HEAD over the `mutants/` copy.
pytest_add_cli_args_test_selection = ["tests/python/tools/assay"]
pytest_add_cli_args = [
    "--hypothesis-profile=rasm-mutation",
    "-o",
    "required_plugins=",
    "-m",
    "not benchmark and not network",
    # subprocess/integration test spawns the real `uv run python -m tools.assay`, which runs the UNMUTATED binary
    # (and fails inside mutmut's mutants/ copy) — useless for mutation, deselected here.
    "--deselect",
    "tests/python/tools/assay/test_main.py::test_main_subprocess_exit_code",
    "--deselect",
    "tests/python/tools/assay/test_main.py::test_main_subprocess_bootstrap_error_config_fault",
    "--deselect",
    "tests/python/tools/assay/test_main.py::test_main_subprocess_failing_rail_channel_separation",
    "--deselect",
    "tests/python/tools/assay/test_main.py::test_main_subprocess_human_renderer_console_stderr",
]
do_not_mutate = ["tools/assay/__init__.py", "tools/assay/rails/mutation_gate.py"]
# Coverage-to-mutant map (Rank 13/14). With `mutate_only_covered_lines = true`, mutmut's `gather_coverage`
# (`mutmut/code_coverage.py:54-55`) keys covered lines by the ABSOLUTE mutant path then reads them back via
# `CoverageData.lines(abs)`. The project's `[tool.coverage.run] relative_files = true` makes coverage store RELATIVE keys,
# so `lines(abs)` returns `None`, every covered set collapses to empty, and the run aborts at "no covered mutants" before a
# single mutant is tested (reproduced live on coverage 7.14.x: relative-keyed data yields `lines(abspath)=None`,
# `lines(rel)=[1,2,3]`). The `COVERAGE_RCFILE=.config/coverage-mutmut.ini` override (`relative_files = false`) restores
# absolute keys for the mutmut invocation ONLY — it is row-owned (mutation catalog row `env`) and exported by the manual
# card; the main suite + the coverage gate keep `relative_files = true` untouched. Flipped to `true` 2026-06-11: scopes
# the mutant population to covered lines and cuts wall-clock; uncovered lines are the coverage gate's jurisdiction, so
# losing their survivors costs no signal the gates do not already own.
mutate_only_covered_lines = true
# -1 (upstream default) disables the trampoline stack walk. Any other value makes `record_trampoline_hit`
# (`mutmut/__main__.py:130`) call `Path(frame.co_filename).resolve(strict=True)` on every caller frame; module-level calls
# into mutated code during conftest import put `<frozen importlib._bootstrap>` pseudo-filenames on that stack, the strict
# resolve raises FileNotFoundError, the conftest import dies, and pytest exits 4 — the stats-phase abort previously
# misattributed to the changed cwd. Reproduced and cleared empirically 2026-06-09.
max_stack_depth = -1

# --- [RUFF] ----------------------------------------------------------------

[tool.ruff]
cache-dir =        ".cache/ruff"
preview =          true
line-length =      150
required-version = ">=0.15.12,<0.16"
target-version =   "py315"
extend-exclude = [
    "**/.approval_tests_temp/**",
    "**/.artifacts/**",
    "**/.cache/**",
    "**/.claude/skills/**/.cache/**",
    "**/.claude/worktrees/**",
    "**/test-results/**",
    "**/coverage/**",
    "**/mutants/**",
    "**/.history/**",
    "**/tests/ast-grep/**",
]

[tool.ruff.format]
line-ending =               "lf"
docstring-code-format =     true
skip-magic-trailing-comma = true

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    # -- Formatter-handled (redundant with ruff format) ---------------------
    "COM812",  # trailing-comma (conflicts with formatter)
    "ISC001",  # implicit-string-concat (conflicts with formatter)
    # -- Match/case + FP style conflicts ------------------------------------
    "RET504",  # unnecessary-assign (named intermediates in flow() pipelines)
    "RET505",  # superfluous-else-return (exhaustive match dispatch)
    "RET506",  # superfluous-else-raise (explicit else in ROP error handling)
    "SIM108",  # use-ternary-operator (match/case is sole dispatch mechanism)
    "SIM114",  # combine-if-arms (no if/else — match/case only)
    # -- Error messaging (expression Result / TaggedError patterns) ---------
    "EM101",   # raw-string-in-exception (inline error messages in frozen errors)
    "EM102",   # f-string-in-exception (f-string error constructors)
    "TRY003",  # raise-vanilla-args (descriptive domain error messages)
    "TRY301",  # raise-within-try (ROP @safe boundary patterns)
    "TRY400",  # error-instead-of-exception (structlog .error() outside handlers)
    # -- Docstring exception sections (pydoclint) ---------------------------
    "DOC502",  # extraneous-exception: a propagate-through-helper Raises: documents a callee-raised exception with no in-body raise; documenting every exception the function surfaces is the chosen convention (DOC501 still enforces the inverse)
    # -- Sorting rules (semantic section ordering preferred) ----------------
    "RUF022",  # unsorted-dunder-all (semantic > alphabetical)
    "RUF023",  # unsorted-dunder-slots (semantic > alphabetical)
    # -- Development workflow -----------------------------------------------
    "TD003",   # missing-todo-link (git blame provides context)
    "FIX002",  # todo-found (CI gate, not editor noise)
    "INP001",  # implicit-namespace-package (monorepo structure)
    "CPY001",  # missing-copyright-notice (top-level LICENSE)
    # -- Section-divider convention -----------------------------------------
    "ERA001",  # bare '# --- [LABEL]' sub-section dividers (CLAUDE.md [6]) read as commented-out code by eradicate
]

[tool.ruff.lint.per-file-ignores]
"__init__.py"      = ["F401"]
"**/.claude/skills/**/scripts/**" = [
    "TC003",
    "ANN001",
    "ANN401",
    "B905",
    "C901",
    "E501",
    "ERA001",
    "EXE001",
    "FBT001",
    "PLC0415",
    "PLC2701",
    "PLC3002",
    "PLR0911",
    "PLR0912",
    "PLR0914",
    "PLR0915",
    "PLR6201",
    "PLW1510",
    "PTH109",
    "S105",
    "S310",
    "S404",
    "S603",
    "S607",
    "TID251",
    "TRY300",
]
"tools/py_analyzer/**" = ["PLR0912", "TC003"]
"tests/**"         = ["S101", "PLR2004", "PLR0913", "ARG001", "ARG002", "ANN201", "ANN401", "D101", "D102", "D103", "SLF001", "PLC2701"]  # PLC2701: the _testkit package is private-by-design; every spec imports it
"**/adapters/**"   = ["ANN401"]
"**/conftest.py"   = ["E402", "F401", "ARG001"]
"tests/python/_testkit/runtime.py" = ["E402"]  # runtime plugin: hypothesis env gates must precede hypothesis imports

[tool.ruff.lint.flake8-annotations]
allow-star-arg-any =      false
mypy-init-return =        true
suppress-dummy-args =     true
suppress-none-returning = true

[tool.ruff.lint.flake8-bandit]
check-typed-exception = true

[tool.ruff.lint.flake8-bugbear]
extend-immutable-calls = [
    "beartype.BeartypeConf",
    "msgspec.Meta",
    "msgspec.field",
    "pydantic.ConfigDict",
    "pydantic.Field",
    "pydantic.PrivateAttr",
    "stamina.retry",
]

[tool.ruff.lint.flake8-builtins]
ignorelist = ["id", "type", "input", "format", "hash"]

[tool.ruff.lint.flake8-import-conventions.extend-aliases]
"dask.array" =     "da"
"dask.dataframe" = "dd"
"scipy" =          "sp"
"sympy" =          "sym"
"xarray" =         "xr"

[tool.ruff.lint.flake8-pytest-style]
parametrize-names-type =          "csv"
raises-extend-require-match-for = ["AttributeError", "KeyError", "RuntimeError", "TypeError", "msgspec.ValidationError", "pydantic.ValidationError",]

[tool.ruff.lint.flake8-self]
extend-ignore-names = ["_validate", "_disc", "_check", "_value_"]

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports =        "all"
banned-module-level-imports = ["dask", "numpy", "pandas", "polars", "scipy", "sympy", "xarray"]
ban-lazy =                    "all"

