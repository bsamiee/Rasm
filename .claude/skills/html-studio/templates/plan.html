  const storedTheme = (() => { try { return localStorage.getItem(themeKey); } catch { return null; } })();
  if (storedTheme) root.dataset.theme = storedTheme;
  const toggleTheme = () => {
    const dark = root.dataset.theme ? root.dataset.theme === "dark" : !matchMedia("(prefers-color-scheme: light)").matches;
    const next = dark ? "light" : "dark";
    try { localStorage.setItem(themeKey, root.dataset.theme = next); } catch { root.dataset.theme = next; }
  };

  let toastTimer = 0;
  const flash = message => {
    const toast = $("#toast"); if (!toast?.showPopover) return;
    toast.textContent = message;
    try { toast.showPopover(); } catch { /* already open */ }
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { try { toast.hidePopover(); } catch { /* already hidden */ } }, 1600);
  };

  const mirror = text => { const box = $("#egress"); if (box) { box.value = text; box.focus(); box.select(); } };
  const copyText = async text => {
    mirror(text);
    try { await navigator.clipboard.writeText(text); flash("Copied"); return true; }
    catch { flash("Clipboard denied — mirror selected, copy manually"); return false; }
  };
  const download = (name, mime, text) => {
    const url = URL.createObjectURL(new Blob([text], { type: mime }));
    Object.assign(document.createElement("a"), { href: url, download: name }).click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  const REDACT = [
    /AKIA[0-9A-Z]{16}/g, /ghp_[A-Za-z0-9]{36,}/g, /xox[baprs]-[A-Za-z0-9-]{10,}/g, /sk-[A-Za-z0-9]{20,}/g,
    /-----BEGIN [A-Z ]*PRIVATE KEY-----[\s\S]*?-----END [A-Z ]*PRIVATE KEY-----/g,
    /eyJ[A-Za-z0-9_-]{8,}\.eyJ[A-Za-z0-9_-]{8,}\.[A-Za-z0-9_-]+/g,
    /(\b(?:password|passwd|secret|token|api[_-]?key)\b['"]?\s*[:=]\s*['"]?)[^\s'",;]{6,}/gi,
    /(:\/\/[^\/\s:@]+):[^\/\s@]+@/g,
  ];
  const redact = text => {
    let hits = 0;
    const out = REDACT.reduce((acc, pattern) => acc.replace(pattern, (all, keep) => { hits += 1; return (keep && all.startsWith(keep) ? keep : "") + `«REDACTED:${hits}»`; }), text);
    return { text: out, hits };
  };

  const VOCAB = ["approve", "approve_with_notes", "reject", "defer", "edit", "comment", "dismiss"];
  const validateEnvelope = (env, kind) => {
    const errs = [];
    if (env.kind !== kind) errs.push("kind");
    if (env.version !== 1) errs.push("version");
    if (!env.artifact?.id || !env.artifact?.title) errs.push("artifact");
    if (!VOCAB.includes(env.decision?.status)) errs.push("decision.status");
    for (const key of ["decisions", "changes", "annotations"]) { if (!Array.isArray(env[key])) errs.push(key); }
    (env.decisions ?? []).forEach(row => { if (!row.id || !VOCAB.includes(row.verdict)) errs.push("decision:" + row.id); });
    return errs;
  };

  const returnMeta = document.querySelector('meta[name="artifact-return"]');
  const tokenMeta = document.querySelector('meta[name="artifact-token"]');
  const served = Boolean(returnMeta);
  const send = async env => {
    const res = await fetch(returnMeta.content, {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Artifact-Token": tokenMeta?.content ?? "" },
      body: JSON.stringify({ kind: env.kind, artifact: env.artifact.id, version: env.version, data: env }),
    });
    if (!res.ok) throw new Error("submit " + res.status);
    return res.json();
  };

  const view = {
    read: () => { try { return Object.fromEntries(new URLSearchParams(location.hash.slice(1))); } catch { return {}; } },
    write: patch => {
      const params = new URLSearchParams(location.hash.slice(1));
      for (const [key, value] of Object.entries(patch)) { if (value == null || value === "") params.delete(key); else params.set(key, value); }
      history.replaceState(null, "", "#" + params);
    },
  };

  const spy = () => {
    const anchors = $$(".toc a[href^='#']"); if (!anchors.length) return;
    const forId = id => $(`.toc a[href="#${CSS.escape(id)}"]`);
    const watcher = new IntersectionObserver(entries => {
      entries.forEach(entry => { if (entry.isIntersecting) { $$(".toc a.on").forEach(a => a.classList.remove("on")); forId(entry.target.id)?.classList.add("on"); } });
    }, { rootMargin: "-20% 0px -70% 0px" });
    anchors.forEach(anchor => { const target = document.getElementById(anchor.hash.slice(1)); if (target) watcher.observe(target); });
  };

  const boot = config => {
    const { kind, envelope, toMarkdown, filename = slug || kind, isChanged, onExported = () => {}, redactPayload = false, narrative = false } = config;
    addEventListener("beforeprint", () => $$("details").forEach(d => { d.dataset.wasOpen = String(d.open); d.open = true; }));
    addEventListener("afterprint", () => $$("details").forEach(d => { d.open = d.dataset.wasOpen === "true"; }));
    if (narrative) $('[data-export="send"]')?.closest("section")?.remove();
    else if (served) { const sendBtn = $('[data-export="send"]'); if (sendBtn) sendBtn.hidden = false; }
    else $('[data-export="send"]')?.closest("section")?.setAttribute("hidden", "");
    if (narrative || !isChanged) $('[data-export="changed"]')?.remove();
    const changedNow = isChanged ?? (() => false);
    const outbound = text => (redactPayload ? redact(text) : { text, hits: 0 });
    const doExport = async (mode, control) => {
      const env = envelope(mode === "changed");
      const errs = validateEnvelope(env, kind);
      if (errs.length) { mirror("[BLOCKED] invalid payload: " + errs.join(", ")); flash("Export blocked"); return; }
      if (mode === "send") {
        control.disabled = true;
        try { await send(env); control.textContent = "Sent"; flash("Sent to agent"); onExported("sent"); }
        catch {
          control.textContent = "Send failed — copied instead";
          const { text } = outbound(JSON.stringify(env, null, 2));
          if (await copyText(text)) onExported("copied");
        }
        finally { control.disabled = false; refresh(); }
        return;
      }
      const payload = mode === "md" ? toMarkdown(env) : JSON.stringify(env, null, 2);
      const { text, hits } = outbound(payload);
      if (hits) flash(`${hits} value${hits > 1 ? "s" : ""} redacted`);
      if (mode === "json") { mirror(text); download(filename + ".json", "application/json", text); onExported("downloaded"); }
      else if (await copyText(text)) onExported("copied");
      refresh();
    };
    const refresh = () => { const changed = $('[data-export="changed"]'); if (changed) changed.disabled = !changedNow(); };
    document.addEventListener("click", event => {
      if (event.target.closest("[data-toggle-theme]")) { toggleTheme(); return; }
      const hit = event.target.closest("[data-export]");
      if (hit && !hit.disabled) doExport(hit.dataset.export, hit);
    });
    spy();
    refresh();
    return { refresh, flash, copyText };
  };

  return {
    $, $$, el, svg, esc, clone, payload, index, md, fmt, slug, flash, copyText,
    download, exportSvg, debounce, delegate, capture, redact, VOCAB,
    validateEnvelope, served, send, view, boot,
  };
})();
// --- [NOCTURNE_RUNTIME:END] ---
// --- [TEMPLATE_LOCAL] --- model, render, actions, wire
(() => {
"use strict";
const { $, $$, el, md } = NOCTURNE;

// --- [MODELS]
const model = NOCTURNE.payload();
const state = { captures: {}, answers: {}, global: { status: "", note: "" } };
model.questions.forEach(q => { state.answers[q.id] = ""; });
const baseline = structuredClone(state);
const cap = id => (state.captures[id] ??= { verdict: "", note: "", ann: "active" });
const capture = NOCTURNE.capture(state.captures);

const phaseIndex = Object.fromEntries(model.phases.map(p => [p.id, p]));
const pct = p => (p.stages.length ? Math.round(p.stages.filter(s => s.status === "done").length / p.stages.length * 100) : 0);
const phaseDone = p => p.stages.length > 0 && p.stages.every(s => s.status === "done");
const unmetDeps = p => (p.depends || []).filter(d => !(phaseIndex[d] && phaseDone(phaseIndex[d])));
const phaseState = p => (unmetDeps(p).length ? "blocked" : phaseDone(p) ? "done" : p.stages.some(s => s.status === "active") ? "active" : "planned");
const CHIP = { done: "ok", active: "info", planned: "", blocked: "fail" };
const MARK = { done: "[DONE]", active: "[ACTIVE]", planned: "[PLANNED]", blocked: "[BLOCKED]" };
const STAGE_CHIP = { done: "ok", active: "info", planned: "" };
const exposures = () => model.risks.map(r => ({ ...r, exp: r.likelihood * r.impact })).sort((a, b) => b.exp - a.exp);

const annotations = () => Object.entries(state.captures).filter(([, c]) => c.note).map(([id, c]) => ({ id: "a-" + id, itemId: id, intent: "note", status: c.ann, text: c.note }));
const decisionsOut = () => Object.entries(state.captures).filter(([, c]) => c.verdict).map(([id, c]) => ({ id, verdict: c.verdict, ...(c.note ? { note: c.note } : {}) }));
const changesOut = () => Object.entries(state.answers).filter(([id, v]) => v !== (baseline.answers[id] || "")).map(([id, v]) => ({ itemId: id, path: "/questions/" + id + "/answer", from: baseline.answers[id] || "", to: v }));
const isChanged = () => Boolean(decisionsOut().length || changesOut().length || annotations().length || state.global.status || state.global.note);

const envelope = changedOnly => ({
  kind: "plan", version: 1,
  artifact: { id: model.meta.id, title: model.meta.title, baseline: model.meta.baseline },
  decision: { status: state.global.status || "comment", at: new Date().toISOString(), ...(state.global.note ? { note: state.global.note } : {}) },
  decisions: decisionsOut(), changes: changesOut(), annotations: annotations(),
  state: { captures: state.captures, answers: state.answers, global: state.global },
  ...(changedOnly ? { extensions: { diffBaseline: model.meta.baseline } } : {}),
});
const toMarkdown = env => {
  const L = ["# " + model.meta.title, "",
    "**Verdict:** " + (env.decision.status || "(none)") + (env.decision.note ? " — " + env.decision.note : ""),
    "Owner: " + model.meta.owner + " · Date: " + model.meta.date, "", "## Decisions"];
  if (env.decisions.length) {
    L.push("| Item | Verdict | Note |", "| --- | --- | --- |");
    env.decisions.forEach(d => L.push("| " + d.id + " | " + d.verdict + " | " + md.cell(d.note || "") + " |"));
  } else L.push("_No item verdicts captured._");
  if (env.changes.length) { L.push("", "## Answers"); env.changes.forEach(c => L.push("- " + c.itemId + ": " + md.cell(c.to))); }
  if (env.annotations.length) { L.push("", "## Annotations"); env.annotations.forEach(a => L.push("- [" + a.status + "] " + a.itemId + " (" + a.intent + "): " + md.cell(a.text))); }
  return L.join("\n") + "\n";
};

// --- [OPERATIONS]
const verdict = id => capture.choice({
  name: "v-" + id, legend: "Verdict for " + id, value: cap(id).verdict,
  options: ["approve", "reject", "defer"], input: () => ({ "data-verdict-for": id, "aria-label": "Verdict for " + id }),
});
const note = id => capture.note({ id, label: "Annotation text for " + id, value: cap(id).note || "", attrs: { "data-note-for": id, placeholder: "Anchored to " + id } });

const renderHeader = () => {
  $("#doc-title").textContent = model.meta.title;
  $("#doc-deck").textContent = model.meta.deck || "";
  $("#doc-eyebrow").textContent = "Implementation plan · " + model.meta.owner;
  $("#doc-date").textContent = model.meta.date;
  const anyBlocked = model.phases.some(p => unmetDeps(p).length);
  const anyActive = model.phases.some(p => p.stages.some(s => s.status === "active"));
  const chip = $("#doc-status");
  chip.className = "chip " + (anyBlocked ? "warn" : anyActive ? "info" : "ok");
  chip.textContent = anyBlocked ? "[AT-RISK]" : anyActive ? "[ACTIVE]" : "[DONE]";
};

const renderStats = () => {
  const stages = model.phases.flatMap(p => p.stages);
  const top = exposures()[0];
  const rows = [
    ["Phases done", model.phases.filter(phaseDone).length + " / " + model.phases.length],
    ["Stages done", stages.filter(s => s.status === "done").length + " / " + stages.length],
    ["Open questions", String(model.questions.length)],
    top ? ["Top risk", top.text, String(top.exp)] : ["Top risk", "none recorded"],
  ];
  $("#stats").replaceChildren(...rows.map(([k, v, x]) => el("div", { class: "stat" },
    el("small", { text: k }),
    x != null ? el("span", { class: "rowline" }, el("b", { class: "num", text: x }), el("span", { class: "desc", text: v })) : el("b", { text: v }))));
};

const renderSpine = () => {
  const kids = [];
  model.phases.forEach((p, i) => {
    if (i > 0) {
      const prev = model.phases[i - 1];
      kids.push(el("span", { class: "link", "data-state": phaseDone(prev) ? "done" : unmetDeps(p).length ? "blocked" : "", "aria-hidden": "true" }));
    }
    const ps = phaseState(p);
    kids.push(el("button", { type: "button", class: "node", "data-state": ps, "data-goto": p.id, "aria-label": p.title + " " + MARK[ps] },
      el("span", { class: "mark" }), el("small", { text: p.title }), el("small", { class: "mono muted num", text: pct(p) + "%" })));
  });
  $("#spine").replaceChildren(...kids);
};

const renderPhases = () => {
  $("#phases-body").replaceChildren(...model.phases.map(p => {
    const ps = phaseState(p);
    const unmet = new Set(unmetDeps(p));
    const statusChip = unmet.size
      ? el("div", { class: "blocked-by" },
          el("span", { class: "chip fail", text: "[BLOCKED-BY]" }),
          el("small", { text: [...unmet].map(d => phaseIndex[d]?.title ?? d).join(" + ") }))
      : el("span", { class: "chip " + CHIP[ps], text: MARK[ps] });
    const meta = el("div", { class: "phase__meta" },
      el("div", {}, statusChip),
      el("div", { class: "meter", role: "img", "aria-label": "Completion " + pct(p) + " percent" }, el("span")),
      el("small", { class: "mono muted num", text: pct(p) + "% complete" }),
      (p.depends || []).some(d => !unmet.has(d))
        ? el("ul", { class: "deps", "aria-label": "Met dependencies" },
            (p.depends || []).filter(d => !unmet.has(d)).map(d => el("li", {}, el("span", { class: "dot ok", "aria-hidden": "true" }), (phaseIndex[d]?.title ?? d))))
        : null);
    meta.querySelector(".meter > span").style.setProperty("--value", String(pct(p)));
    const body = el("div", {},
      el("p", { class: "muted", text: p.intent }),
      ...p.stages.map(s => el("div", { class: "stage" },
        el("div", { class: "rowline" },
          el("strong", { text: s.title }),
          el("span", { class: "chip " + (STAGE_CHIP[s.status] ?? ""), text: "[" + s.status.toUpperCase() + "]" }),
          s.acceptance.length === 0 ? el("span", { class: "chip warn", text: "[NO-ACCEPTANCE]" }) : null),
        s.acceptance.length
          ? el("details", {}, el("summary", { text: "Acceptance (" + s.acceptance.length + ")" }), el("ul", {}, s.acceptance.map(a => el("li", { text: a }))))
          : null,
        el("div", { class: "cap" }, verdict(s.id), note(s.id)))));
  return el("article", { class: "card phase", id: p.id, "data-verdict": cap(p.id).verdict || "", "aria-label": "Phase " + p.title },
      el("h3", { text: p.title }),
      el("div", { class: "phase__grid" }, body, meta));
  }));
};

const renderDecisions = () => {
  $("#decisions-body").replaceChildren(...model.decisions.map(d => el("tr", {},
    el("td", { text: d.topic }),
    el("td", { text: d.ruling }),
    el("td", { class: "muted", text: d.rationale }),
    el("td", {}, el("span", { class: "chip " + (d.status === "ruled" ? "ok" : "info"), text: "[" + d.status.toUpperCase() + "]" })),
        el("td", {}, el("div", { class: "cap" }, verdict(d.id), note(d.id))))));
};

const renderStaticSections = () => {
  $("#context-body").replaceChildren(...model.context.map(t => el("p", { text: t })));
  const kc = model.keycode || [];
  $("#keycode").hidden = !kc.length;
  $("#keycode-body").replaceChildren(...kc.map(k =>
    el("details", { id: k.id }, el("summary", { text: k.title }), el("pre", {}, el("code", { text: k.code })))));
  $("#risks-body").replaceChildren(...exposures().map((r, i) => el("tr", { "data-risk": i === 0 ? "top" : null },
    el("td", { text: r.text }),
    el("td", {}, el("small", { class: "mono muted", text: phaseIndex[r.phaseId]?.title ?? r.phaseId })),
    el("td", { class: "num", text: String(r.likelihood) }),
    el("td", { class: "num", text: String(r.impact) }),
    el("td", { class: "num" }, i === 0 ? el("span", { class: "chip warn", text: "[" + r.exp + "]" }) : el("b", { class: "num", text: String(r.exp) })),
    el("td", { class: "muted", text: r.mitigation }))));
  $("#questions-body").replaceChildren(...model.questions.map(q => el("div", { class: "qcard", "aria-label": "Question " + q.id },
    el("div", { class: "rowline" }, el("strong", { text: q.text })),
    el("dl", { class: "kv" }, el("dt", { text: "owner" }), el("dd", { text: q.owner }), el("dt", { text: "due" }), el("dd", { class: "num", text: q.due })),
    el("textarea", { "data-answer-for": q.id, "aria-label": "Answer for " + q.id, placeholder: "Answer slot" }, state.answers[q.id] || ""))));
  const toc = [["context", "Context"], ["decisions", "Decisions"], ["phases", "Phases"], ...(kc.length ? [["keycode", "Key code"]] : []), ["risks", "Risk register"], ["questions", "Open questions"]];
  $("#toc").replaceChildren(...toc.map(([id, label]) => el("a", { href: "#" + id, text: label })));
};

const drawerFields = () => {
  const sel = el("select", { id: "global-verdict", "aria-label": "Global verdict" });
  ["", ...NOCTURNE.VOCAB].forEach(v => sel.append(el("option", { value: v }, v || "(no global verdict)")));
  $("[data-drawer-fields]").prepend(el("label", { class: "rowline" }, "Global verdict ", sel));
};

const paintMeta = () => {
  $("#egress-meta").textContent = decisionsOut().length + " verdicts · " + annotations().filter(a => a.status === "active").length + " open notes";
};

// --- [OPERATIONS]
const wire = NOCTURNE.boot({ kind: "plan", envelope, toMarkdown, filename: model.meta.id, isChanged,
  onExported: () => { Object.values(state.captures).forEach(c => { if (c.note) c.ann = "exported"; }); paintMeta(); } });

document.addEventListener("click", e => {
  const g = e.target.closest("[data-goto]");
  if (g) document.getElementById(g.dataset.goto)?.scrollIntoView({ behavior: "smooth" });
});
document.addEventListener("change", e => {
  const v = e.target.closest("[data-verdict-for]");
  if (v) {
    const id = v.dataset.verdictFor;
    cap(id).verdict = v.value;
    document.getElementById(id)?.setAttribute("data-verdict", v.value);
    wire.refresh(); paintMeta();
  }
  if (e.target.id === "global-verdict") { state.global.status = e.target.value; wire.refresh(); paintMeta(); }
});
document.addEventListener("input", e => {
  const n = e.target.closest("[data-note-for]");
  if (n) {
    const id = n.dataset.noteFor;
    cap(id).note = n.value; cap(id).ann = "active";
    $$('[data-note-btn="' + CSS.escape(id) + '"]').forEach(b => { b.textContent = n.value ? "note*" : "note"; });
    wire.refresh(); paintMeta();
  }
  const a = e.target.closest("[data-answer-for]");
  if (a) { state.answers[a.dataset.answerFor] = a.value; wire.refresh(); }
});

// --- [COMPOSITION]
renderHeader(); renderStats(); renderSpine(); renderDecisions(); renderPhases(); renderStaticSections(); drawerFields(); paintMeta();
})();
</script>
</body>
